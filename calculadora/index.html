<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111'/><rect x='4' y='4' width='24' height='24' rx='4' fill='none' stroke='%2300f2ff' stroke-width='2'/><rect x='6' y='6' width='20' height='7' rx='2' fill='%23222'/><rect x='6' y='15' width='5' height='5' rx='1' fill='%2300f2ff'/><rect x='13' y='15' width='5' height='5' rx='1' fill='%2300f2ff'/><rect x='20' y='15' width='5' height='5' rx='1' fill='%23ff0033'/><rect x='6' y='22' width='5' height='5' rx='1' fill='%2300f2ff'/><rect x='13' y='22' width='5' height='5' rx='1' fill='%2300f2ff'/><rect x='20' y='22' width='5' height='5' rx='1' fill='%2300f2ff'/></svg>">
    
    <style>html, body { background-color: #000000; }</style>
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Calculadora">
    <title>Calculadora</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
   <style>
    :root { 
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --header-height: 60px; 
        
        --neon-red: #ff0033; 
        --neon-cyan: #00f2ff;
        --neon-lime: #ccff00;
        --neon-yellow: #ffff00;
        
        --crypto-up: #00ff9d;
        --crypto-down: #ff0033;

        --bg-body: #000000;
        --chassis-bg: #050505;
        --chassis-border: 1px solid #222;
        --screen-bg: #000000;
        --screen-inset: inset 0 0 30px rgba(0,0,0,1);
        --screen-border: 1px solid rgba(255, 0, 51, 0.2);
        --screen-glow: 0 0 20px rgba(255, 0, 51, 0.05);
        --primary-text: #ffffff;
        --secondary-text: #888;
        --clock-text: var(--neon-yellow);
        --clock-glow: 0 0 15px rgba(255, 255, 0, 0.7);
        
        --history-op-color: #00f2ff;
        --history-res-color: #39ff14;
        --history-glow: 0 0 8px rgba(0, 242, 255, 0.3);
        
        --btn-bg: linear-gradient(160deg, #333333 0%, #000000 100%);
        --btn-border: 1px solid rgba(255,255,255,0.08);
        --btn-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 6px 0 #000000, 0 8px 20px rgba(0,0,0,0.8);
        --btn-shadow-active: inset 0 10px 20px rgba(0,0,0,1), 0 0 0 #000000;
        --btn-text: #dddddd;
        
        --accent-blue-text: var(--neon-cyan);
        --accent-red-text: var(--neon-red);
        --accent-green-bg: linear-gradient(180deg, #ccff00 0%, #4caf50 100%);
        --text-glow-blue: 0 0 15px rgba(0, 242, 255, 0.7);
        --text-glow-red: 0 0 15px rgba(255, 0, 51, 0.7);
        
        --card-bg: rgba(20, 20, 20, 0.85);
        --card-border: 1px solid rgba(255,255,255,0.1);
        --card-hover: rgba(30, 30, 30, 0.95);
        --edit-highlight: rgba(255, 0, 51, 0.15);
        
        --skeleton-bg: #1a1a1a;
        --skeleton-shine: rgba(255,255,255,0.05);
    }

    /* REGLA CORREGIDA */
body { 
    overscroll-behavior: none; /* Evita el efecto rebote elástico de iOS/Android */
    /* ELIMINA: touch-action: none; (para que las listas respiren y scrollen) */
    background: var(--bg-body);
    height: var(--doc-height, 100dvh);
    width: 100vw; 
    font-family: 'Lexend', sans-serif; 
    overflow: hidden; /* Evita que la pantalla completa se mueva */
}

/* Aplica el scroll controlado solo a los contenedores que lo necesitan */
#history-list, .crypto-content { 
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch; /* Suavidad nativa en iOS */
}
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    
    :focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 2px; }
    :focus:not(:focus-visible) { outline: none; }

    button, .card, li { touch-action: manipulation; cursor: pointer; }

    .tabular-nums { font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
    
    .small-decimal { font-size: 0.6em; vertical-align: top; margin-top: 0.3em; opacity: 0.9; margin-left: 1px; font-weight: 500; display: inline-block;}

    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    @keyframes superFlash { 
        0% { background-color: rgba(255, 255, 255, 0); } 
        10% { background-color: rgba(255, 255, 255, 0.2); } 
        100% { background-color: rgba(255, 255, 255, 0); } 
    }
    .super-flash-active { animation: superFlash 0.3s ease-out; }

    @keyframes popScale { 0% { transform: scale(1); } 50% { transform: scale(1.05); color: var(--neon-lime); text-shadow: 0 0 20px var(--neon-lime); } 100% { transform: scale(1); } }
    .pop-active { animation: popScale 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @keyframes particleExplosion { 
        0% { opacity: 1; transform: translate(0,0) scale(1); } 
        100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } 
    }
    
    @keyframes glowPulseBorder { 0% { border-color: rgba(255,255,255,0.1); } 50% { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); } 100% { border-color: rgba(255,255,255,0.1); } }
    .glow-border { animation: glowPulseBorder 3s infinite; }

    @keyframes skeletonPulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { opacity: 0.3; }
    }
    .skeleton { background: var(--skeleton-bg); border-radius: 12px; animation: skeletonPulse 1.5s infinite; }

    .view-container { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    
    .view { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        display: flex; flex-direction: column; 
        opacity: 0; pointer-events: none; transform: scale(0.98); 
        transition: opacity 0.25s ease, transform 0.25s ease; 
        will-change: transform, opacity;
    }
    .view.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }
    
    .optimized-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
        background-color: #000000;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0505 0%, #000000 70%),
            linear-gradient(rgba(255, 0, 51, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 0, 51, 0.05) 1px, transparent 1px);
        background-size: 100% 100%, 30px 30px, 30px 30px;
    }

    .particles-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; overflow: hidden; }
    .particle { position: absolute; pointer-events: none; z-index: 1000; border-radius: 50%; }

    .app-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: max(var(--safe-top), 10px) 15px 5px; z-index: 20; gap: 10px; height: calc(var(--header-height) + var(--safe-top)); width: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    
    .embedded-ui { background: var(--card-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: var(--card-border); transition: all 0.2s; flex-shrink: 0; position: relative; }

    .icon-btn { width: 44px; height: 44px; cursor: pointer; color: var(--secondary-text); padding: 10px; position: relative; overflow: hidden; }
    .icon-btn:active { transform: scale(0.9); }
    
    a.icon-btn { display: flex; align-items: center; justify-content: center; }

    .icon-swap svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: opacity 0.3s, transform 0.3s; }
    .icon-swap .hidden { opacity: 0; transform: translate(-50%, -40%); pointer-events: none; }
    .icon-swap .shown { opacity: 1; transform: translate(-50%, -50%); }

    #btn-mute { color: var(--neon-cyan) !important; }
    #btn-go-crypto { color: var(--crypto-up) !important; }
    #btn-go-calc { color: #ff00ff !important; }

    .app-title { font-weight: 800; font-size: 1.2rem; color: #ff0033 !important; text-shadow: 0 0 10px rgba(255, 0, 51, 0.8); flex-grow: 1; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center; height: 44px; letter-spacing: 2px; }
    
    #clock, #clock-crypto { font-weight: 700; font-size: 0.8rem; color: var(--clock-text); text-shadow: var(--clock-glow); padding: 0 12px; min-width: 80px; text-align: center; height: 44px; }

    .upper-section { 
    flex: 1 1 58%; /* Aumentado para conquistar el espacio liberado */
    display: flex; 
    flex-direction: column; 
    padding: 12px 16px; /* Ajuste sutil de paddings */
    min-height: 0; 
    justify-content: flex-end; 
    position: relative; 
}
    
    .display-lens { 
    width: 100%; 
    flex: 1; 
    min-height: 0; /* CRÍTICO: Permite que el contenedor flex se encoja/estire de forma flexible sin romperse */
    background: #080808; 
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8), var(--screen-glow); 
    border: var(--screen-border); 
    border-radius: 24px; 
    display: flex; 
    flex-direction: column; 
    padding: 16px; /* Reducido levemente de 20px a 16px */
    position: relative; 
    overflow: hidden; 
    backdrop-filter: blur(5px); 
}
    #history-list { 
        flex: 1; overflow-y: auto; padding: 5px; 
        display: flex; flex-direction: column; 
        list-style: none; gap: 8px; 
        mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        scrollbar-width: none; 
    }
    #history-list li { 
        display: flex; justify-content: flex-end; align-items: center; gap: 8px;
        text-align: right; cursor: default; 
        opacity: 0.9; 
        font-size: 1.35rem;
        margin-bottom: 4px;
        color: var(--history-op-color); 
        padding: 8px 10px; 
        border-radius: 8px; transition: all 0.2s; 
    }

    .hist-expr { cursor: pointer; border-bottom: 1px dashed rgba(0, 242, 255, 0.3); }
    .hist-expr:hover { color: #fff; border-bottom-color: #fff; }

    .hist-res { cursor: pointer; color: var(--history-res-color); font-weight: 700; padding: 2px 6px; border-radius: 4px; }
    .hist-res:hover { background: rgba(57, 255, 20, 0.1); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

    .hist-del { cursor: pointer; color: #555; font-size: 1rem; line-height: 1; padding: 2px 6px; border-radius: 4px; margin-right: auto; flex-shrink: 0; transition: color 0.15s; }
    .hist-del:hover { color: var(--neon-red); background: rgba(255,0,51,0.1); }

    .status-dot.warning { background-color: var(--neon-lime); box-shadow: 0 0 8px var(--neon-lime); }
    #history-list li:hover { opacity: 1; background: var(--edit-highlight); }
    #history-list b { color: var(--history-res-color); font-weight: 700; margin-left: 8px; }
    
    .display-area { flex-shrink: 0; text-align: right; padding-top: 10px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 90px; z-index: 2; width: 100%; overflow: hidden; }
    #secondary-display { color: var(--accent-blue-text); text-shadow: var(--text-glow-blue); min-height: 1.5rem; font-size: 1.1rem; opacity: 0; transition: opacity 0.2s; white-space: nowrap; margin-bottom: 5px; }
    #secondary-display.visible { opacity: 1; }
    
    #main-display { 
        color: var(--primary-text); 
        font-size: 3.5rem; 
        font-weight: 600;
        line-height: 1.1; 
        width: 100%; 
        text-align: right; 
        white-space: pre-wrap;       
        word-break: break-all;           
        overflow-y: auto;            
        overflow-x: hidden;          
        max-height: 180px;           
        scrollbar-width: none; 
        text-shadow: 0 0 15px rgba(255,255,255,0.4); 
        padding-bottom: 2px; 
        transition: color 0.1s; 
    }

    .calculator-body { 
    flex: 1 1 42%; /* Reducido drásticamente para cederle el espacio a la pantalla */
    width: 100%; 
    background: var(--chassis-bg); 
    border-top: var(--chassis-border); 
    border-radius: 35px 35px 0 0; 
    z-index: 10; 
    padding: 16px; /* Reducido de 25px a 16px para ganar espacio en vertical */
    padding-bottom: max(16px, var(--safe-bottom)); 
    box-shadow: 0 -20px 60px rgba(0,0,0,0.4); 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    backdrop-filter: blur(8px); 
    -webkit-backdrop-filter: blur(8px); 
}
  .keypad { 
    flex: 1; 
    width: 100%; 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    /* Cambiamos las filas a un tamaño responsivo dinámico (6vh) para que no queden gigantes */
    grid-template-rows: repeat(5, clamp(42px, 6vh, 56px)); 
    gap: 10px; /* Reducido de 12px a 10px para compactar */
}

.btn { 
    background: linear-gradient(to bottom, #3d3d3d 0%, #252525 100%);
    color: #ffffff;
    border: none;
    border-radius: 14px; /* Un pelo más compacto para que encaje mejor */
    box-shadow: 0 4px 0 #000000, 0 8px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4); /* Sombra vertical reducida de 6px a 4px */
    font-family: 'Lexend', sans-serif; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    width: 100%; 
    height: 100%; /* Cambiado de 90% a 100% para maximizar la superficie de pulsación útil */
    font-size: 1.8rem; /* Reducido de 2.4rem a 1.8rem para balancear el nuevo tamaño */
    font-weight: 500;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
    position: relative; 
    transition: all 0.1s cubic-bezier(0.4, 0, 1, 1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
    
    .btn:active, .btn.btn-active { 
    transform: translateY(4px); /* Cambiado de 6px a 4px */
    box-shadow: 0 0 0 #000000, inset 0 4px 8px rgba(0,0,0,0.6);
    background: linear-gradient(to bottom, #252525 0%, #1a1a1a 100%);
}

    .btn[data-key="AC"], .btn[data-key="Backspace"] { 
        background: linear-gradient(to bottom, #ff3333 0%, #cc0000 100%);
        box-shadow: 0 6px 0 #800000, 0 12px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        color: white;
        font-weight: 700;
    }
    .btn[data-key="AC"]:active, .btn[data-key="Backspace"]:active,
    .btn[data-key="AC"].btn-active, .btn[data-key="Backspace"].btn-active {
        box-shadow: 0 0 0 #800000, inset 0 4px 8px rgba(0,0,0,0.4);
    }

    .token-op, .btn[data-color="blue"] { 
        color: #00f2ff; 
        background: linear-gradient(to bottom, #2a3a40 0%, #152025 100%);
        font-size: 2.8rem;
        font-weight: 400;
        text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
    }

    .btn.btn-large { 
        grid-column: span 2; 
        background: linear-gradient(to bottom, #00ff9d 0%, #00b36b 100%);
        color: #004d2e; 
        box-shadow: 0 6px 0 #00663d, 0 15px 20px rgba(0, 255, 157, 0.2), inset 0 1px 0 rgba(255,255,255,0.4);
        font-weight: 800; 
        font-size: 3rem;
        text-shadow: none;
    }
    .btn.btn-large:active, .btn.btn-large.btn-active { 
        transform: translateY(6px);
        box-shadow: 0 0 0 #00663d, inset 0 4px 10px rgba(0,0,0,0.3);
    }

    .btn[data-key=","] { padding-bottom: 10px; }

    .crypto-content { flex: 1; padding: 15px; padding-bottom: max(20px, var(--safe-bottom)); display: flex; flex-direction: column; overflow: hidden; }
    #timestamp { flex-shrink: 0; text-align: center; color: var(--secondary-text); font-size: 0.75rem; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .crypto-list { flex: 1; display: flex; flex-direction: column; min-height: 0; gap: 15px; }

    .card { 
        background: var(--card-bg); 
        border: var(--card-border); 
        border-radius: 18px; 
        padding: 12px 16px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        cursor: pointer; 
        position: relative; 
        overflow: hidden; 
        backdrop-filter: blur(10px); 
        -webkit-backdrop-filter: blur(10px); 
        transition: transform 0.2s; 
        min-height: 70px; 
        flex: 0 0 auto;
        will-change: transform;
    }
    .card:active { transform: scale(0.98); background: #222; }
    
    .coin-details { display: flex; align-items: center; gap: 12px; }
    .coin-logo { width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    
    .coin-info h2 { font-size: 1.1rem; margin: 0; color: var(--primary-text); font-weight: 700; letter-spacing: 0.5px; }
    
    .change-percentage { 
        font-size: 0.95rem; 
        font-weight: 700; 
        padding: 4px 10px;
        border-radius: 12px;
        letter-spacing: 0.5px;
    }
    .change-positive { color: var(--crypto-up); background: rgba(0, 255, 157, 0.1); border: 1px solid rgba(0, 255, 157, 0.2); }
    .change-negative { color: var(--crypto-down); background: rgba(255, 0, 51, 0.1); border: 1px solid rgba(255, 0, 51, 0.2); }
    
    .price-eur { 
        font-size: 1.4rem; 
        font-weight: 700; 
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
        text-align: right; 
    }
    .price-usd { font-size: 0.85rem; color: var(--secondary-text); text-align: right; margin-top: 2px; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--secondary-text); transition: 0.3s; }
    .status-dot.online { background-color: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }
    .status-dot.error { background-color: var(--neon-red); }

    .skeleton-card { 
        background: var(--skeleton-bg); 
        border-radius: 18px; 
        padding: 12px 16px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        min-height: 70px; 
        flex: 0 0 auto;
    }
    .skeleton-left { display: flex; align-items: center; gap: 12px; width: 60%; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a2a2a; }
    .skeleton-text { flex: 1; height: 20px; background: #2a2a2a; border-radius: 10px; }
    .skeleton-price { width: 80px; height: 30px; background: #2a2a2a; border-radius: 10px; }

    #chart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.2s; padding: 20px; }
    #chart-modal.visible { opacity: 1; pointer-events: auto; }
    .modal-content { width: 100%; max-width: 500px; background: #111; border: 1px solid #333; border-radius: 30px; padding: 25px; transform: scale(0.95); transition: 0.2s; }
    #chart-modal.visible .modal-content { transform: scale(1); }
    .close-chart { align-self: flex-end; background: none; border: none; font-size: 2rem; color: #888; padding: 10px; line-height: 1; }
    .chart-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; background: #222; padding: 5px; border-radius: 12px; }
    .time-btn { background: transparent; border: none; color: #888; padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; }
    .time-btn.active { background: #444; color: white; }
    
    .toast { position: fixed; top: 90px; left: 50%; transform: translate(-50%, -20px); background: #222; border: 1px solid #ff0033; color: white; padding: 12px 30px; border-radius: 40px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    
    @media(min-width: 600px) {
        body { display: flex; align-items: center; justify-content: center; background: #050505; }
        .view-container { max-width: 420px; height: 92vh; border-radius: 45px; border: 8px solid #111; box-shadow: 0 0 0 2px #333, 0 20px 50px rgba(0,0,0,0.8); }
        .optimized-bg { border-radius: 45px; }
    }
</style>
</head>
<body data-theme="dark">

    <div class="optimized-bg"></div>
    <div id="particles-layer" class="particles-layer"></div>
        
    <div class="view-container">
        <div id="view-calculator" class="view active">
            <header class="app-header">
                <button class="embedded-ui icon-btn icon-swap" id="btn-mute" aria-label="Silenciar">
                    <svg class="shown" id="icon-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg class="hidden" id="icon-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>

                <div class="app-title embedded-ui">aiDANaI Calc</div>

    <script>
    const App = {
        expr: '',
        fresh: true,
        chart: null,
        currentCoinId: null,
        
        audioCtx: null,
        audioEnabled: false,
        pendingSound: null,
        
        state: { 
            muted: false, 
            history: [], 
            cryptoCache: null, 
            lastFetchTime: 0 
        },
        
        init() {
            this.loadState();
            this.updateMuteIcon();
            this.fixHeight();
            this.bindEvents();
            this.startClocks();
            this.renderHistory(); 
            this.initAudio();
            this.unlockAudio();
            
            if ('serviceWorker' in navigator && !window.location.href.startsWith('blob:')) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }

            if(this.state.cryptoCache) {
                const now = Date.now();
                if(now - this.state.lastFetchTime < 300000) this.renderCryptoData(this.state.cryptoCache);
                else this.fetchPrices();
            } else {
                this.showSkeletonCards();
                this.fetchPrices();
            }
        },

        fixHeight() {
            const setH = () => document.documentElement.style.setProperty('--doc-height', `${window.innerHeight}px`);
            setH(); window.addEventListener('resize', setH);
        },

        initAudio() {
            try {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.audioEnabled = true;
            } catch(e) { this.audioEnabled = false; }
        },

        unlockAudio() {
            const unlockHandler = () => {
                if (this.audioCtx && this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume().then(() => {
                        if (this.pendingSound) {
                            this.playTone(this.pendingSound.freq, this.pendingSound.duration);
                            this.pendingSound = null;
                        }
                    });
                }
            };
            document.addEventListener('click', unlockHandler);
            document.addEventListener('touchstart', unlockHandler);
            document.addEventListener('keydown', unlockHandler);
        },

        playKeySound(key) {
            if(this.state.muted || !this.audioEnabled || !this.audioCtx) return;
            
            let freq = 600; 
            let duration = 0.1;
            
            if (key === 'Enter') {
                freq = 800; duration = 0.15;
            } else if (key === 'AC' || key === 'Backspace') {
                freq = 400; duration = 0.08;
            } else if (['+', '-', '*', '/', '%'].includes(key)) {
                freq = 700;
            } else if (key === ',') {
                freq = 550;
            }
            
            if (this.audioCtx.state === 'suspended') {
                this.pendingSound = { freq, duration };
                this.audioCtx.resume();
                return;
            }
            this.playTone(freq, duration);
        },

        playTone(freq, duration = 0.1) {
            if(this.state.muted || !this.audioEnabled || !this.audioCtx) return;
            if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
            
            try {
                const o = this.audioCtx.createOscillator();
                const g = this.audioCtx.createGain();
                o.connect(g);
                g.connect(this.audioCtx.destination);
                o.type = 'triangle'; 
                o.frequency.value = freq;
                
                g.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + duration);
                
                o.start();
                o.stop(this.audioCtx.currentTime + duration);
            } catch(e) {}
        },

        bindEvents() {
            document.getElementById('btn-go-crypto').onclick = () => { 
                document.getElementById('view-calculator').classList.remove('active');
                document.getElementById('view-crypto').classList.add('active');
                if(Date.now() - this.state.lastFetchTime > 60000) this.fetchPrices();
            };
            document.getElementById('btn-go-calc').onclick = () => { 
                document.getElementById('view-crypto').classList.remove('active');
                document.getElementById('view-calculator').classList.add('active');
            };
            document.getElementById('btn-mute').onclick = () => this.toggleMute();

            document.querySelectorAll('.btn[data-key]').forEach(b => {
                const key = b.dataset.key;
                const handlePress = (e) => {
                    if(e.cancelable) e.preventDefault();
                    b.classList.add('btn-active');
                    setTimeout(() => b.classList.remove('btn-active'), 80);
                    
                    this.playKeySound(key); 
                    this.processKey(key);
                };
                b.addEventListener('pointerdown', handlePress);
            });

            document.addEventListener('keydown', (e) => {
                const keyMap = { 'Enter': 'Enter', 'Backspace': 'Backspace', 'Delete': 'AC', 'Escape': 'AC', '+': '+', '-': '-', '*': '*', '/': '/', '.': ',', ',': ',', '%': '%' };
                if (e.key >= '0' && e.key <= '9') { 
                    this.triggerKeyVisual(e.key); 
                    this.playKeySound(e.key); 
                    this.processKey(e.key); 
                    return; 
                }
                const mapped = keyMap[e.key];
                if (mapped) { 
                    e.preventDefault(); 
                    this.triggerKeyVisual(mapped === ',' ? ',' : mapped); 
                    this.playKeySound(mapped); 
                    this.processKey(mapped); 
                } 
                else if (e.key === '=') { 
                    e.preventDefault(); 
                    this.triggerKeyVisual('Enter'); 
                    this.playKeySound('Enter'); 
                    this.processKey('Enter'); 
                }
            });

            document.querySelector('.close-chart').onclick = () => document.getElementById('chart-modal').classList.remove('visible');
            document.getElementById('chart-modal').onclick = (e) => {
                if(e.target === document.getElementById('chart-modal')) document.getElementById('chart-modal').classList.remove('visible');
            };
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    this.updateChartData(e.target.dataset.days);
                }
            });
        },

        triggerKeyVisual(key) {
            const btn = document.querySelector(`.btn[data-key="${key}"]`);
            if (btn) { btn.classList.add('btn-active'); setTimeout(() => btn.classList.remove('btn-active'), 80); }
        },

        // --- MEJORAS ALTA PRIORIDAD ---
        processKey(key) {
            if(navigator.vibrate) navigator.vibrate(key === 'Enter' ? 15 : 5);
            
            if (key === 'AC') this.clearAll();
            else if (key === 'Backspace') { this.expr = this.expr.toString().slice(0, -1); this.render(); }
            else if (key === 'Enter') { this.calculate(); } 
            else if (key === '%') { this.handlePercent(); }
            else { this.handleInput(key); }
        },

        handlePercent() {
            if (!this.expr) return;
            // Buscar último número y operador
            let match = this.expr.match(/([+\-*/]?)([^+\-*/]+)$/);
            if (!match) return;
            let operator = match[1] || '';
            let lastNum = match[2];
            if (!lastNum) return;
            let numVal = parseFloat(lastNum);
            if (isNaN(numVal)) return;

            if (operator === '') {
                // sin operador: dividir entre 100
                this.expr = String(numVal / 100);
            } else {
                // con operador: buscar el primer número de la izquierda
                let leftMatch = this.expr.match(/^(.+?)([+\-*/])[^+\-*/]+$/);
                if (leftMatch) {
                    let leftExpr = leftMatch[1];
                    let leftVal = this.safeEval(leftExpr);
                    if (!isNaN(leftVal)) {
                        let percentVal = leftVal * (numVal / 100);
                        this.expr = leftExpr + operator + percentVal;
                    } else {
                        this.expr = this.expr.slice(0, -lastNum.length) + (numVal / 100);
                    }
                } else {
                    this.expr = this.expr.slice(0, -lastNum.length) + (numVal / 100);
                }
            }
            this.render();
        },

        handleInput(k) {
            if(this.fresh) {
                if(!"+-*/%".includes(k)) { this.expr=''; document.getElementById('secondary-display').classList.remove('visible'); }
                this.fresh = false;
            }
            
            if (k === ',') k = '.';
            
            // Signo negativo unario después de operador
            if (k === '-' && (this.expr === '' || /[+\-*/]$/.test(this.expr))) {
                this.expr += '-';
                this.render();
                return;
            }
            
            const last = this.expr.slice(-1);
            const isOp = "+-*/".includes(k);
            const lastIsOp = "+-*/".includes(last);

            if (isOp && lastIsOp) {
                this.expr = this.expr.slice(0, -1) + k;
            } 
            else if (k === '.') {
                const parts = this.expr.split(/[\+\-\*\/]/); 
                if (!parts[parts.length-1].includes('.')) this.expr += k;
            } 
            else {
                this.expr += k; 
            }
            this.render();
        },

        // Parser matemático seguro — sustituye new Function() y eval()
        safeEval(expr) {
            let pos = 0;
            const s = expr.trim();

            const peek   = () => s[pos];
            const consume = () => s[pos++];
            const skipSp = () => { while (pos < s.length && s[pos] === ' ') pos++; };

            const parseNum = () => {
                skipSp();
                let start = pos;
                while (pos < s.length && ((s[pos] >= '0' && s[pos] <= '9') || s[pos] === '.')) pos++;
                if (pos === start) throw new Error('Número esperado en posición ' + pos);
                return parseFloat(s.slice(start, pos));
            };

            const parseFactor = () => {
                skipSp();
                if (peek() === '(') {
                    consume();
                    const v = parseAddSub();
                    skipSp();
                    if (peek() !== ')') throw new Error('Paréntesis sin cerrar');
                    consume();
                    return v;
                }
                if (peek() === '-') { consume(); return -parseFactor(); }
                if (peek() === '+') { consume(); return  parseFactor(); }
                return parseNum();
            };

            const parseMulDiv = () => {
                let left = parseFactor();
                skipSp();
                while (pos < s.length && (peek() === '*' || peek() === '/')) {
                    const op = consume();
                    const right = parseFactor();
                    if (op === '/') {
                        if (right === 0) throw new Error('División por cero');
                        left /= right;
                    } else { left *= right; }
                    skipSp();
                }
                return left;
            };

            const parseAddSub = () => {
                let left = parseMulDiv();
                skipSp();
                while (pos < s.length && (peek() === '+' || peek() === '-')) {
                    const op = consume();
                    left = op === '+' ? left + parseMulDiv() : left - parseMulDiv();
                    skipSp();
                }
                return left;
            };

            const result = parseAddSub();
            skipSp();
            if (pos < s.length) throw new Error('Carácter inesperado: "' + peek() + '"');
            return result;
        },

        // Tokenizador para render() — diferencia operadores unarios de binarios
        _tokenizeExpr(expr) {
            const tokens = [];
            let i = 0;
            while (i < expr.length) {
                const c = expr[i];
                const last = tokens[tokens.length - 1];
                const prevIsNum   = last && last.type === 'num';
                const prevIsClose = last && last.type === 'paren' && last.val === ')';
                const prevIsValue = prevIsNum || prevIsClose;

                if (c === '(' || c === ')') {
                    tokens.push({ type: 'paren', val: c }); i++;
                } else if ('*/'.includes(c) || ((c === '+' || c === '-') && prevIsValue)) {
                    tokens.push({ type: 'op', val: c }); i++;
                } else {
                    // Número (con posible signo unario)
                    let numStr = '';
                    if ((c === '-' || c === '+') && !prevIsValue) { numStr += c; i++; }
                    while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
                        numStr += expr[i++];
                    }
                    if (numStr) tokens.push({ type: 'num', val: numStr });
                }
            }
            return tokens;
        },

        calculate() {
            if(!this.expr) return;
            try {
                let clean = this.expr.replace(/[^0-9+\-*/().]/g, '');
                let res = this.safeEval(clean);
                if(!isFinite(res) || isNaN(res)) throw new Error("Err");
                res = parseFloat(res.toPrecision(12));
                this.addToHistory(this.expr, res);
                const prettyExpr = this.expr.replace(/\./g, ',').replace(/\*/g, '×').replace(/\//g, '÷');
                document.getElementById('secondary-display').innerText = prettyExpr + ' =';
                document.getElementById('secondary-display').classList.add('visible');
                this.expr = String(res); 
                this.fresh = true;
                this.render(true); 
                this.triggerSuperNova(); 
            } catch(e) { 
                document.getElementById('main-display').innerHTML = '<span style="color:#ff0033">Error</span>';
                this.expr = '';
                this.fresh = true;
                this.showToast("Expresión inválida");
            }
        },

        render(isResult = false) {
            const d = document.getElementById('main-display');
            if(!this.expr) { d.innerHTML = '0'; d.style.fontSize = '3.5rem'; return; }

            let html = '';
            const tokens = this._tokenizeExpr(this.expr);
            tokens.forEach(tok => {
                if (tok.type === 'op') {
                    const sym = tok.val === '*' ? '×' : tok.val === '/' ? '÷' : tok.val;
                    html += `<span style="color:var(--neon-cyan)">${sym}</span>`;
                } else if (tok.type === 'paren') {
                    html += `<span style="color:var(--neon-cyan)">${tok.val}</span>`;
                } else {
                    // Número: preservar el punto decimal en curso mientras se escribe
                    const raw = tok.val;
                    if (raw === '-' || raw === '+' || raw.endsWith('.')) {
                        html += raw.replace('.', ',');
                    } else {
                        const num = parseFloat(raw);
                        if (!isNaN(num)) {
                            // Preservar decimales exactos que el usuario está escribiendo
                            if (raw.includes('.')) {
                                const [intPart, decPart] = raw.split('.');
                                const formattedInt = parseInt(intPart || '0').toLocaleString('es-ES');
                                html += (num < 0 && !intPart ? '-' : '') + formattedInt + ',' + decPart;
                            } else {
                                html += num.toLocaleString('es-ES', { maximumFractionDigits: 10 });
                            }
                        } else {
                            html += raw;
                        }
                    }
                }
            });

            d.innerHTML = html;
            this.adjustFontSize(d);
        },

        adjustFontSize(el) {
            if (el.textContent.length < 6) { 
                el.style.fontSize = '3.5rem'; 
                return; 
            }
            let min = 1.4;
            let max = 3.5;
            let optimal = min;
            const maxHeight = 140; 
            while (max - min > 0.1) {
                const mid = (min + max) / 2;
                el.style.fontSize = `${mid}rem`;
                if (el.scrollHeight > maxHeight) {
                    max = mid; 
                } else {
                    optimal = mid; 
                    min = mid;
                }
            }
            el.style.fontSize = `${optimal}rem`;
        },

        triggerSuperNova() {
            const lens = document.getElementById('display-container');
            lens.classList.remove('super-flash-active');
            void lens.offsetWidth;
            lens.classList.add('super-flash-active');
            
            const mainD = document.getElementById('main-display');
            mainD.classList.remove('pop-active');
            void mainD.offsetWidth;
            mainD.classList.add('pop-active');
            
            this.createExplosionParticles();
        },

        createExplosionParticles() {
            const container = document.getElementById('particles-layer');
            const rect = document.querySelector('.btn[data-key="Enter"]').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const frag = document.createDocumentFragment();

            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 3;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                p.style.cssText = `width: ${size}px; height: ${size}px; background: ${Math.random()>0.5 ? '#ccff00' : '#fff'}; left: ${centerX}px; top: ${centerY}px; box-shadow: 0 0 10px #ccff00; --tx: ${Math.cos(angle) * dist}px; --ty: ${Math.sin(angle) * dist}px; animation: particleExplosion 0.5s ease-out forwards;`;
                frag.appendChild(p);
                setTimeout(() => p.remove(), 550);
            }
            container.appendChild(frag);
        },

        addToHistory(ex, r) {
            this.state.history.unshift({ expr: ex, res: r }); 
            if (this.state.history.length > 50) this.state.history.pop(); 
            this.saveState();
            this.renderHistory(); 
        },

        renderHistory() {
            const list = document.getElementById('history-list');
            const header = document.getElementById('history-header');
            if (header) header.style.display = this.state.history.length > 0 ? 'flex' : 'none';
            list.innerHTML = this.state.history.map((item, index) => {
                const resF = item.res.toLocaleString('es-ES', { maximumFractionDigits: 10 });
                const prettyExpr = item.expr.replace(/\./g, ',').replace(/\*/g,'×').replace(/\//g,'÷');
                return `
                    <li>
                        <span class="hist-del" onclick="App.deleteHistoryItem(${index})" title="Borrar entrada">×</span>
                        <span class="hist-expr" onclick="App.handleHistoryClick(${index}, 'expr')" title="Recuperar operación">${prettyExpr}</span> 
                        <span>=</span> 
                        <span class="hist-res" onclick="App.handleHistoryClick(${index}, 'res')" title="Usar resultado">${resF}</span>
                    </li>`;
            }).join('');
        },

        deleteHistoryItem(index) {
            this.state.history.splice(index, 1);
            this.saveState();
            this.renderHistory();
            this.showToast("Entrada eliminada");
        },

        handleHistoryClick(index, type) {
            const item = this.state.history[index];
            if (!item) return;
            if (type === 'expr') {
                this.expr = String(item.expr);
                this.showToast("Operación recuperada");
            } else {
                this.expr = String(item.res);
                this.showToast("Resultado recuperado");
            }
            this.fresh = true; 
            this.render(true);
            if(this.audioEnabled && !this.state.muted) this.playTone(600, 0.05);
        },
        
        clearAll() { 
            this.expr = ''; 
            this.fresh = true;
            const sec = document.getElementById('secondary-display');
            sec.classList.remove('visible'); 
            sec.innerText = '';              
            this.render();
        },

        clearHistory() {
            this.state.history = [];
            this.saveState();
            this.renderHistory();
            this.showToast("Historial borrado");
        },

        // CRYPTO mejorado con skeletons
        showSkeletonCards() {
            const container = document.getElementById('crypto-list-container');
            const skeletons = ['bitcoin','ethereum','binancecoin','solana','ripple'].map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-left">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-text"></div>
                    </div>
                    <div class="skeleton-price"></div>
                </div>
            `).join('');
            container.innerHTML = skeletons;
        },

        async fetchPrices() {
            const timeText = document.getElementById('time-text');
            const statusDot = document.querySelector('#timestamp .status-dot');
            
            const now = Date.now();
            const CACHE_DURATION = 60000; 
            
            if (this.state.cryptoCache && (now - this.state.lastFetchTime < CACHE_DURATION)) {
                this.renderCryptoData(this.state.cryptoCache);
                this.updateStatusUI('cached');
                return;
            }

            try {
                if(timeText) timeText.innerText = 'Actualizando...';
                if(statusDot) statusDot.className = 'status-dot'; 
                
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,binancecoin&vs_currencies=eur,usd&include_24hr_change=true');
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                const d = await res.json();
                
                this.state.cryptoCache = d;
                this.state.lastFetchTime = Date.now();
                this.saveState();
                
                this.renderCryptoData(d);
                this.updateStatusUI('online');
            } catch(e) {
                console.warn("API Error:", e);
                if (this.state.cryptoCache) {
                    this.renderCryptoData(this.state.cryptoCache);
                    this.updateStatusUI('offline-cached');
                    this.showToast("Sin conexión: Usando caché");
                } else {
                    const container = document.getElementById('crypto-list-container');
                    if(container) container.innerHTML = '<div style="color:#888; text-align:center; padding:2rem;">Error de conexión</div>';
                    const ts = document.getElementById('timestamp');
                    if(ts) ts.innerHTML = '<span class="status-dot error"></span> Error Conexión';
                }
            }
        },

        updateStatusUI(status) {
            const ts = document.getElementById('timestamp');
            const time = new Date(this.state.lastFetchTime || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (status === 'online') {
                ts.innerHTML = `<span class="status-dot online"></span> Act. ${time}`;
            } else if (status === 'cached' || status === 'offline-cached') {
                ts.innerHTML = `<span class="status-dot warning"></span> Memoria (${time})`;
            }
        },

        renderCryptoData(d) {
            const container = document.getElementById('crypto-list-container');
            const fmt = (v, c) => new Intl.NumberFormat('es-ES', {style:'currency', currency:c}).format(v);
            const cards = ['bitcoin','ethereum','binancecoin','solana','ripple'].map(id => {
                const data = d[id];
                if(!data) return '';
                const change = data.eur_24h_change;
                const changeClass = change >= 0 ? 'change-positive' : 'change-negative';
                const changeSign = change >= 0 ? '+' : '';
                return `
                    <div class="card glow-border" data-id="${id}" data-name="${id === 'bitcoin' ? 'Bitcoin' : id === 'ethereum' ? 'Ethereum' : id === 'binancecoin' ? 'BNB' : id === 'solana' ? 'Solana' : 'XRP'}">
                        <div class="coin-details">
                            <img src="https://assets.coingecko.com/coins/images/${id === 'bitcoin' ? '1/large/bitcoin.png' : id === 'ethereum' ? '279/large/ethereum.png' : id === 'binancecoin' ? '825/large/bnb-icon2_2x.png' : id === 'solana' ? '4128/large/solana.png' : '44/large/xrp-symbol-white-128.png'}" class="coin-logo" onerror="this.style.display='none'">
                            <div class="coin-info">
                                <h2>${id === 'bitcoin' ? 'Bitcoin' : id === 'ethereum' ? 'Ethereum' : id === 'binancecoin' ? 'BNB' : id === 'solana' ? 'Solana' : 'XRP'}</h2>
                                <p class="change-percentage ${changeClass} tabular-nums">${changeSign}${change.toFixed(2)}%</p>
                            </div>
                        </div>
                        <div class="price-container">
                            <p class="price-eur tabular-nums">${fmt(data.eur, 'EUR')}</p>
                            <p class="price-usd tabular-nums">${fmt(data.usd, 'USD')}</p>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = cards;
            // Rebind click events
            document.querySelectorAll('.card').forEach(c => {
                c.onclick = () => this.openChart(c.dataset.id, c.dataset.name);
            });
        },
        
        async openChart(id, name) {
            this.currentCoinId = id;
            document.getElementById('chart-title').innerText = name;
            document.getElementById('chart-modal').classList.add('visible');
            if(this.chart) { this.chart.destroy(); }
            
            this.chart = new ApexCharts(document.querySelector("#chart-container"), {
                series: [],
                chart: { type: 'area', height: 250, toolbar:{show:false}, background:'transparent', animations:{enabled:false} },
                theme: { mode: 'dark' },
                stroke: { curve: 'smooth', width: 2, colors:['#00f2ff'] },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.5, opacityTo: 0.1 } },
                dataLabels: { enabled: false },
                xaxis: { type: 'datetime', labels: { show: false }, axisBorder:{show:false} },
                yaxis: { show: true, labels: { style:{ colors:'#888' }, formatter: (v) => v.toLocaleString('es-ES') + '€' } },
                grid: { borderColor: '#333', strokeDashArray: 5 },
                tooltip: { theme: 'dark' }
            });
            this.chart.render();
            this.updateChartData(30);
        },
        
        async updateChartData(days) {
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/${this.currentCoinId}/market_chart?vs_currency=eur&days=${days}`);
                const data = await res.json();
                this.chart.updateSeries([{ name: 'Precio', data: data.prices }]);
            } catch(e) {}
        },

        toggleMute() { 
            this.state.muted = !this.state.muted; 
            this.updateMuteIcon(); 
            this.saveState(); 
            if(!this.state.muted) this.playTone(700, 0.1);
        },
        updateMuteIcon() { 
            const on = document.getElementById('icon-sound-on');
            const off = document.getElementById('icon-sound-off');
            if(this.state.muted) { on.classList.replace('shown', 'hidden'); off.classList.replace('hidden', 'shown'); } 
            else { off.classList.replace('shown', 'hidden'); on.classList.replace('hidden', 'shown'); }
        },
        showToast(msg) { const t = document.getElementById('toast'); t.innerText=msg; t.className='toast show'; setTimeout(()=>t.className='toast',3000); },
        saveState() { localStorage.setItem('aidanaiUltimateFusion', JSON.stringify(this.state)); },
        loadState() { try { const s = JSON.parse(localStorage.getItem('aidanaiUltimateFusion')); if(s) this.state = {...this.state, ...s}; } catch(e) {} },
        startClocks() { setInterval(() => { const s = new Date().toLocaleTimeString(); document.querySelectorAll('#clock, #clock-crypto').forEach(e => e.innerText = s); }, 1000); }
    };
    
    window.addEventListener('load', () => App.init());
    </script>
</body>
</html>
