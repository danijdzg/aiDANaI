<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>aiDANaI-Menú</title>

    <link rel="icon" type="image/png" href="icon-192.png">
    <meta name="theme-color" content="#000000"/>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #e0e0e0;
            --quote-color: #ffffff;
            --author-color: #c0c0c0;
            --font-quote: 'Cormorant Garamond', serif;
            --font-main: 'Poppins', sans-serif;
            --orbit-radius: min(220px, 38vmin);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            position: fixed;
        }

        #starfield, #galaxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }
        #galaxy-overlay {
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(229, 57, 53, 0.15) 0%, rgba(229, 57, 53, 0.05) 20%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(211, 47, 47, 0.12) 0%, rgba(211, 47, 47, 0.03) 25%, transparent 50%),
                radial-gradient(ellipse at 50% 30%, rgba(239, 83, 80, 0.1) 0%, transparent 40%);
        }

        #main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            transition: filter 0.4s ease;
        }
        #main-content.blurred {
            filter: blur(8px) brightness(0.7);
        }

        #quote-container {
            position: fixed;
            left: 50%;
            width: clamp(320px, 90%, 700px);
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.75), rgba(10, 10, 15, 0.85));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 22px 35px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 0 25px rgba(100, 150, 255, 0.2);
            text-align: center;
            cursor: pointer;
            /* CAMBIO: sustituimos "transition: all" por propiedades específicas.
               Esto evita que el motor recalcule TODAS las propiedades en cada frame
               y elimina el hack "top 0s, bottom 0s" que era consecuencia de "all". */
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
            animation: floatSpace 6s ease-in-out infinite;
        }

        .position-top {
            top: calc(40px + env(safe-area-inset-top));
            bottom: auto;
        }

        .position-bottom {
            bottom: calc(40px + env(safe-area-inset-bottom));
            top: auto;
        }

        @keyframes floatSpace {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(-12px); }
        }

        #quote-container:hover {
            transform: translateX(-50%) scale(1.03) translateY(-5px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.9),
                0 0 35px rgba(239, 83, 80, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            animation-play-state: paused;
        }

        #quote-container.fading { opacity: 0; }

        #quote-text {
            font-family: var(--font-quote);
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 500;
            color: var(--quote-color);
            line-height: 1.3;
            margin-bottom: 12px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 1), 0 0 12px rgba(255, 255, 255, 0.3);
        }

        #quote-author {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 600;
            color: #dcdcdc;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 1);
        }

        #menu-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%   { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
            50%  { box-shadow: 0 0 25px 5px rgba(239, 83, 80, 0.4), 0 0 45px 10px rgba(198, 40, 40, 0.2); }
            100% { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
        }

        #fab-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            padding: 0;
            background-color: transparent;
            position: relative;
            z-index: 1001;
            pointer-events: all;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #fab-button img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: pulse-glow 6s infinite ease-in-out;
        }

        #fab-button:hover img {
            transform: scale(1.1);
        }

        #fab-button.active {
            transform: scale(0.9) rotate(-360deg);
        }
        #fab-button.active img {
            animation-play-state: paused;
            box-shadow: 0 0 35px 10px rgba(255, 255, 255, 0.5);
        }

        #orbital-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            /* CAMBIO: eliminado "transform: rotate(0deg)" — valor por defecto, redundante */
            transition: transform 0.4s ease;
        }

        #menu-container.active #orbital-menu {
            transform: rotate(360deg);
        }

        .orbit-item {
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition:
                transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                opacity 0.3s ease,
                box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #menu-container.active .orbit-item {
            opacity: 1;
            pointer-events: all;
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle)));
        }

        #menu-container.active .orbit-item:nth-child(1) { transition-delay: 0.05s; }
        #menu-container.active .orbit-item:nth-child(2) { transition-delay: 0.10s; }
        #menu-container.active .orbit-item:nth-child(3) { transition-delay: 0.15s; }
        #menu-container.active .orbit-item:nth-child(4) { transition-delay: 0.20s; }
        #menu-container.active .orbit-item:nth-child(5) { transition-delay: 0.25s; }

        .orbit-item:hover {
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle))) scale(1.1) !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .orbit-item svg { width: 24px; height: 24px; stroke: white; stroke-width: 2; }
        .orbit-item .label { font-size: 0.7rem; font-weight: 500; color: white; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3); opacity: 0; transition: opacity 0.3s ease 0.2s; }
        #menu-container.active .orbit-item .label { opacity: 1; }

        #item-agenda       { background: linear-gradient(135deg, #ffb74d, #ffa726); }
        #item-cuentas      { background: linear-gradient(135deg, #64b5f6, #42a5f5); }
        #item-gym          { background: linear-gradient(135deg, #81c784, #66bb6a); }
        #item-DaniCalc     { background: linear-gradient(135deg, #4db6ac, #26a69a); }
        #item-cuentas-prueba { background: linear-gradient(135deg, #ba68c8, #9c27b0); }

        @media (max-width: 450px), (max-height: 650px) {
            :root { --orbit-radius: min(170px, 36vmin); }
            #fab-button { width: 130px; height: 130px; }
            .orbit-item { width: 50px; height: 50px; margin: -25px; }
            .orbit-item svg { width: 20px; height: 20px; }
            .orbit-item .label { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div id="galaxy-overlay"></div>

    <div id="main-content">
        <div id="quote-container" class="position-top">
            <p id="quote-text"></p>
            <p id="quote-author"></p>
        </div>
    </div>

    <div id="menu-container">
        <div id="orbital-menu">
            <a href="https://aidanai-agenda.vercel.app/" class="orbit-item" id="item-agenda" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="label">Agenda</span>
            </a>
            <a href="https://aidanai-ctas.vercel.app/" class="orbit-item" id="item-cuentas" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"></path><path d="M14 2v7.31"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path></svg>
                <span class="label">Ctas</span>
            </a>
            <a href="https://danijdzg.github.io/aiDANaI/calculadora/" class="orbit-item" id="item-DaniCalc" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span class="label">Calculadora</span>
            </a>
            <a href="https://aidanai-gym.vercel.app/" class="orbit-item" id="item-gym" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8L22 12L18 16"></path><path d="M6 8L2 12L6 16"></path><path d="M2 12H22"></path><path d="M17 5V19"></path><path d="M7 5V19"></path></svg>
                <span class="label">Gym</span>
            </a>
            <a href="https://danijdzg.github.io/aiDANaI/cuentas/" class="orbit-item" id="item-cuentas-prueba" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span class="label">CUENTAS</span>
            </a>
        </div>

        <button id="fab-button">
            <img src="icon-512.png" alt="Abrir menú">
        </button>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- Service Worker ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- Canvas / Starfield ---
        const canvas = document.getElementById('starfield');
        const ctx    = canvas.getContext('2d');
        let stars         = [];
        let shootingStars = [];
        let isAnimating   = true;
        let animationFrameId;
        let resizeTimeout;

        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 200);
        }, { passive: true }); // CAMBIO: passive — el handler nunca llama preventDefault()

        // CAMBIO: passive en mousemove — mejora rendimiento en scroll/touch en móvil
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth  / 2) / 50;
            mouseY = (e.clientY - window.innerHeight / 2) / 50;
        }, { passive: true });

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x             = Math.random() * canvas.width;
                this.y             = Math.random() * canvas.height;
                this.size          = Math.random() * 2;
                this.vx            = (Math.random() - 0.5) * 0.2;
                this.vy            = (Math.random() - 0.5) * 0.2;
                this.opacity       = Math.random();
                this.parallaxFactor = this.size * 0.5;
            }
            update() {
                this.x += this.vx + (mouseX * this.parallaxFactor);
                this.y += this.vy + (mouseY * this.parallaxFactor);
                if (this.x < 0)            this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0)             this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x       = Math.random() * canvas.width;
                this.y       = Math.random() * canvas.height * 0.5;
                this.length  = Math.random() * 80 + 40;
                this.speed   = Math.random() * 10 + 5;
                this.size    = Math.random() * 1 + 1;
                this.opacity = 1;
            }
            update() {
                this.x += this.speed;
                this.y += this.speed * 0.5;
                this.opacity -= 0.015;
                if (this.opacity <= 0) this.reset();
            }
            draw() {
                // CAMBIO: eliminados ctx.save()/ctx.restore() — operaciones costosas.
                // Reseteamos shadowBlur manualmente tras el trazo, lo que es más rápido.
                ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.lineWidth   = this.size;
                ctx.shadowBlur  = 10;
                ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y - this.length * 0.5);
                ctx.stroke();
                ctx.shadowBlur = 0; // reset sin stack de estado
            }
        }

        function initStars() {
            stars = [];
            const numStars = window.innerWidth < 600 ? 100 : 200;
            for (let i = 0; i < numStars; i++) stars.push(new Star());
            shootingStars = [];
            for (let i = 0; i < 3; i++) shootingStars.push(new ShootingStar());
        }

        function animate() {
            if (!isAnimating) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // CAMBIO: fillStyle blanco fijo una sola vez fuera del bucle.
            // Cada estrella usa globalAlpha en lugar de construir un string
            // "rgba(255,255,255,X)" en cada frame — reduce presión en el GC.
            ctx.fillStyle = 'white';
            for (const star of stars) {
                star.update();
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1; // restaurar para las estrellas fugaces

            for (const s of shootingStars) { s.update(); s.draw(); }

            animationFrameId = requestAnimationFrame(animate);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isAnimating = false;
                cancelAnimationFrame(animationFrameId);
            } else {
                isAnimating = true;
                animate();
            }
        });

        resizeCanvas();
        animate();

        // --- Citas ---
        const quotes = [
            { text: "La creatividad es la inteligencia divirtiéndose.",           author: "Albert Einstein"    },
            { text: "El único modo de hacer un gran trabajo es amar lo que haces.", author: "Steve Jobs"        },
            { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.", author: "Eleanor Roosevelt" },
            { text: "No cuentes los días, haz que los días cuenten.",             author: "Muhammad Ali"      },
            { text: "Un viaje de mil millas comienza con un solo paso.",          author: "Lao Tse"           }
        ];

        const quoteContainer = document.getElementById('quote-container');
        const quoteTextEl    = document.getElementById('quote-text');
        const quoteAuthorEl  = document.getElementById('quote-author');

        let quoteInterval;
        let lastQuoteIndex = -1;
        let isTopPosition  = true;

        function updateQuote() {
            let idx;
            do { idx = Math.floor(Math.random() * quotes.length); }
            while (quotes.length > 1 && idx === lastQuoteIndex);
            lastQuoteIndex = idx;

            quoteContainer.classList.add('fading');

            setTimeout(() => {
                const q = quotes[idx];
                quoteTextEl.textContent   = `"${q.text}"`;
                quoteAuthorEl.textContent = `— ${q.author}`;

                // CAMBIO: classList.toggle reemplaza el bloque if/else de 4 líneas
                isTopPosition = !isTopPosition;
                quoteContainer.classList.toggle('position-top',    isTopPosition);
                quoteContainer.classList.toggle('position-bottom', !isTopPosition);

                quoteContainer.classList.remove('fading');
            }, 400);
        }

        // Carga inicial sin cambio de posición
        lastQuoteIndex = Math.floor(Math.random() * quotes.length);
        quoteTextEl.textContent   = `"${quotes[lastQuoteIndex].text}"`;
        quoteAuthorEl.textContent = `— ${quotes[lastQuoteIndex].author}`;
        quoteInterval = setInterval(updateQuote, 6000);

        // --- Menú orbital ---
        const mainContent   = document.getElementById('main-content');
        const menuContainer = document.getElementById('menu-container');
        const fabButton     = document.getElementById('fab-button');
        const orbitItems    = document.querySelectorAll('.orbit-item');
        let menuOpen = false;

        const angleStep = 360 / orbitItems.length;
        orbitItems.forEach((item, i) => item.style.setProperty('--angle', `${angleStep * i}deg`));

        function toggleMenu() {
            menuOpen = !menuOpen;
            mainContent.classList.toggle('blurred');
            menuContainer.classList.toggle('active');
            fabButton.classList.toggle('active');
        }

        fabButton.addEventListener('click', toggleMenu);

        mainContent.addEventListener('click', (e) => {
            if (menuOpen) {
                toggleMenu();
            } else if (e.target.closest('#quote-container')) {
                clearInterval(quoteInterval);
                updateQuote();
                quoteInterval = setInterval(updateQuote, 6000);
            }
        });
    });
    </script>
</body>
</html>
