<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>aiDANaI-Menú</title>

    <link rel="icon" type="image/png" href="icon-192.png">
    <meta name="theme-color" content="#000000"/>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --text-color: #e0e0e0;
            --quote-color: #ffffff;
            --author-color: #c0c0c0;
            --font-quote: 'Cormorant Garamond', serif;
            --font-main: 'Poppins', sans-serif;
            --orbit-radius: min(220px, 38vmin);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            position: fixed;
        }

        /* ── SPLASH SCREEN ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #splash-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            animation: splashPulse 1.4s ease-in-out infinite;
        }
        #splash-text {
            font-family: var(--font-main);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }
        @keyframes splashPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50%       { opacity: 1;   transform: scale(1.05); }
        }

        /* ── NAV TRANSITION OVERLAY (PUNTO 5) ──
           Reemplaza la apertura en nueva pestaña por una transición
           "lanzamiento de app" que navega en la misma ventana PWA.      */
        #nav-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }
        #nav-overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }
        #nav-overlay-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: navIconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        #nav-overlay-icon svg {
            width: 36px;
            height: 36px;
            stroke: white;
            stroke-width: 2;
        }
        #nav-overlay-label {
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.75);
            animation: navLabelFade 0.4s ease 0.1s both;
        }
        #nav-overlay-dots {
            display: flex;
            gap: 6px;
            animation: navLabelFade 0.4s ease 0.2s both;
        }
        #nav-overlay-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            animation: dotPulse 1s ease-in-out infinite;
        }
        #nav-overlay-dots span:nth-child(2) { animation-delay: 0.15s; }
        #nav-overlay-dots span:nth-child(3) { animation-delay: 0.30s; }
        @keyframes navIconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1);   }
        }
        @keyframes navLabelFade {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        #starfield, #galaxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }
        #galaxy-overlay {
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(229, 57, 53, 0.15) 0%, rgba(229, 57, 53, 0.05) 20%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(211, 47, 47, 0.12) 0%, rgba(211, 47, 47, 0.03) 25%, transparent 50%),
                radial-gradient(ellipse at 50% 30%, rgba(239, 83, 80, 0.1) 0%, transparent 40%);
        }

        #main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            transition: filter 0.4s ease;
        }
        #main-content.blurred {
            filter: blur(8px) brightness(0.7);
        }

        /* ── CLOSE OVERLAY ── */
        #close-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            cursor: pointer;
        }
        #close-overlay.active {
            display: block;
        }
        /* Botón X de cierre explícito */
        #close-btn {
            display: none;
            position: fixed;
            top: calc(16px + env(safe-area-inset-top));
            right: 20px;
            z-index: 1100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(20,20,30,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        #close-btn.active { display: flex; }
        #close-btn:hover  { background: rgba(239,83,80,0.35); transform: rotate(90deg); }
        #close-btn svg    { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; }

        /* ── QUOTE ── */
        #quote-container {
            position: fixed;
            left: 50%;
            width: clamp(320px, 90%, 700px);
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.75), rgba(10, 10, 15, 0.85));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 22px 35px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 0 25px rgba(100, 150, 255, 0.2);
            text-align: center;
            cursor: pointer;
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
            animation: floatSpace 6s ease-in-out infinite;
        }

        .position-top {
            top: calc(40px + env(safe-area-inset-top));
            bottom: auto;
        }

        .position-bottom {
            bottom: calc(40px + env(safe-area-inset-bottom));
            top: auto;
        }

        @keyframes floatSpace {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(-12px); }
        }

        #quote-container:hover {
            transform: translateX(-50%) scale(1.03) translateY(-5px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.9),
                0 0 35px rgba(239, 83, 80, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            animation-play-state: paused;
        }

        #quote-container.fading { opacity: 0; }

        /* Loading state inside quote */
        #quote-container.loading #quote-text {
            min-height: 1.3em;
            background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
            color: transparent;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #quote-text {
            font-family: var(--font-quote);
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 500;
            color: var(--quote-color);
            line-height: 1.3;
            margin-bottom: 12px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 1), 0 0 12px rgba(255, 255, 255, 0.3);
        }

        #quote-author {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 600;
            color: #dcdcdc;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 1);
        }

        /* ── FAB HINT (primera vez) ── */
        #fab-hint {
            position: fixed;
            bottom: calc(50% - 115px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            font-size: 0.65rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
            animation: hintFade 3s ease-in-out forwards;
            white-space: nowrap;
        }
        @keyframes hintFade {
            0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
            20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── MENU ── */
        #menu-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%   { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
            50%  { box-shadow: 0 0 25px 5px rgba(239, 83, 80, 0.4), 0 0 45px 10px rgba(198, 40, 40, 0.2); }
            100% { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
        }

        #fab-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            padding: 0;
            background-color: transparent;
            position: relative;
            z-index: 1001;
            pointer-events: all;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #fab-button img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: pulse-glow 6s infinite ease-in-out;
        }

        #fab-button:hover img { transform: scale(1.1); }

        #fab-button.active {
            transform: scale(0.9) rotate(-360deg);
        }
        #fab-button.active img {
            animation-play-state: paused;
            box-shadow: 0 0 35px 10px rgba(255, 255, 255, 0.5);
        }

        /* Anillo pulsante indicador */
        #fab-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            animation: ringPulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(1);    opacity: 0.6; }
            50%       { transform: scale(1.12); opacity: 0.15; }
        }
        #menu-container.active #fab-ring { display: none; }

        #orbital-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease;
        }

        #menu-container.active #orbital-menu {
            transform: rotate(360deg);
        }

        .orbit-item {
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition:
                transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                opacity 0.3s ease,
                box-shadow 0.3s ease,
                filter 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #menu-container.active .orbit-item {
            opacity: 1;
            pointer-events: all;
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle)));
        }

        #menu-container.active .orbit-item:nth-child(1) { transition-delay: 0.05s; }
        #menu-container.active .orbit-item:nth-child(2) { transition-delay: 0.10s; }
        #menu-container.active .orbit-item:nth-child(3) { transition-delay: 0.15s; }
        #menu-container.active .orbit-item:nth-child(4) { transition-delay: 0.20s; }
        #menu-container.active .orbit-item:nth-child(5) { transition-delay: 0.25s; }

        .orbit-item:hover {
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle))) scale(1.18) !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Ripple al pulsar */
        .orbit-item:active {
            filter: brightness(1.4);
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle))) scale(0.92) !important;
            transition: transform 0.1s ease, filter 0.1s ease !important;
        }

        .orbit-item svg { width: 24px; height: 24px; stroke: white; stroke-width: 2; }

        /* ── PUNTO 2: Labels más grandes y siempre legibles ──
           Se sube de 0.7rem a 0.9rem en base, con sombra de texto
           para garantizar contraste sobre cualquier fondo.           */
        .orbit-item .label {
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            text-shadow:
                0 1px 4px rgba(0, 0, 0, 0.8),
                0 0 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.3px;
            opacity: 0;
            transition: opacity 0.3s ease 0.2s;
            white-space: nowrap;
        }
        #menu-container.active .orbit-item .label { opacity: 1; }

        #item-agenda         { background: linear-gradient(135deg, #ffb74d, #ffa726); }
        #item-cuentas        { background: linear-gradient(135deg, #64b5f6, #42a5f5); }
        #item-gym            { background: linear-gradient(135deg, #81c784, #66bb6a); }
        #item-DaniCalc       { background: linear-gradient(135deg, #4db6ac, #26a69a); }
        #item-cuentas-prueba { background: linear-gradient(135deg, #ba68c8, #9c27b0); }

        @media (max-width: 450px), (max-height: 650px) {
            :root { --orbit-radius: min(170px, 36vmin); }
            #fab-button { width: 130px; height: 130px; }
            .orbit-item { width: 50px; height: 50px; margin: -25px; }
            .orbit-item svg { width: 20px; height: 20px; }
            /* PUNTO 2: en pantallas pequeñas se baja a 0.75rem (antes 0.6rem) */
            .orbit-item .label { font-size: 0.75rem; }
            #fab-hint { bottom: calc(50% - 100px); }
        }

        /* ── REDUCED MOTION ── */
        @media (prefers-reduced-motion: reduce) {
            #splash-logo { animation: none; opacity: 1; transform: none; }
            #quote-container { animation: none !important; }
            #quote-container:hover { transform: translateX(-50%); }
            #fab-button img { animation: none !important; }
            #fab-button.active { transform: scale(0.9); }
            #fab-ring { animation: none; opacity: 0.4; }
            #menu-container.active #orbital-menu { transform: none; }
            .orbit-item { transition: opacity 0.15s ease, transform 0.15s ease !important; }
            #quote-container.loading #quote-text {
                animation: none;
                background: rgba(255,255,255,0.12);
            }
            #fab-hint { animation: none; opacity: 1; }
            #nav-overlay { transition: opacity 0.15s ease, visibility 0.15s ease; }
            #nav-overlay-icon { animation: none; }
            #nav-overlay-label { animation: none; opacity: 1; }
            #nav-overlay-dots { animation: none; opacity: 1; }
            #nav-overlay-dots span { animation: none; opacity: 0.6; }
        }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <img id="splash-logo" src="icon-512.png" alt="aiDANaI">
        <span id="splash-text">Cargando</span>
    </div>

    <!-- PUNTO 5: Overlay de transición de navegación (reemplaza nueva pestaña) -->
    <div id="nav-overlay" role="status" aria-live="polite" aria-label="Abriendo aplicación">
        <div id="nav-overlay-icon">
            <!-- El SVG del icono se inyecta por JS según el ítem pulsado -->
        </div>
        <span id="nav-overlay-label">Abriendo</span>
        <div id="nav-overlay-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <canvas id="starfield"></canvas>
    <div id="galaxy-overlay"></div>

    <!-- Overlay de cierre (zona fuera del menú) -->
    <div id="close-overlay" role="button" aria-label="Cerrar menú"></div>
    <!-- Botón X explícito -->
    <button id="close-btn" aria-label="Cerrar menú">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <div id="main-content">
        <div id="quote-container" class="position-top loading">
            <p id="quote-text">&nbsp;</p>
            <p id="quote-author">&nbsp;</p>
        </div>
    </div>

    <!-- Hint primera vez -->
    <div id="fab-hint" role="status" aria-live="polite">Toca para abrir</div>

    <div id="menu-container" role="navigation" aria-label="Menú principal">
        <div id="orbital-menu">

            <!--
                PUNTO 5: Se elimina target="_blank" y rel="noopener noreferrer" de todos
                los ítems. La navegación ahora ocurre en la misma ventana PWA mediante
                la función navigateTo(), que muestra una transición animada antes de
                redirigir con window.location.href.
            -->
            <a href="https://aidanai-agenda.vercel.app/"
               class="orbit-item" id="item-agenda"
               aria-label="Abrir Agenda">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="label">Agenda</span>
            </a>

            <a href="https://aidanai-ctas.vercel.app/"
               class="orbit-item" id="item-cuentas"
               aria-label="Abrir Cuentas">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="label">Ctas</span>
            </a>

            <a href="https://danijdzg.github.io/aiDANaI/calculadora/"
               class="orbit-item" id="item-DaniCalc"
               aria-label="Abrir Calculadora">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                    <line x1="8" y1="6" x2="16" y2="6"></line>
                    <line x1="8" y1="10" x2="8" y2="10"></line>
                    <line x1="12" y1="10" x2="12" y2="10"></line>
                    <line x1="16" y1="10" x2="16" y2="10"></line>
                    <line x1="8" y1="14" x2="8" y2="14"></line>
                    <line x1="12" y1="14" x2="12" y2="14"></line>
                    <line x1="16" y1="14" x2="16" y2="14"></line>
                    <line x1="8" y1="18" x2="12" y2="18"></line>
                    <line x1="16" y1="18" x2="16" y2="18"></line>
                </svg>
                <span class="label">Calculadora</span>
            </a>

            <a href="https://aidanai-gym.vercel.app/"
               class="orbit-item" id="item-gym"
               aria-label="Abrir Gym">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8L22 12L18 16"></path>
                    <path d="M6 8L2 12L6 16"></path>
                    <path d="M2 12H22"></path>
                    <path d="M17 5V19"></path>
                    <path d="M7 5V19"></path>
                </svg>
                <span class="label">Gym</span>
            </a>

            <a href="https://danijdzg.github.io/aiDANaI/cuentas/"
               class="orbit-item" id="item-cuentas-prueba"
               aria-label="Abrir Cuentas">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span class="label">Cuentas</span>
            </a>

        </div>

        <button id="fab-button" aria-label="Abrir menú principal" aria-expanded="false">
            <div id="fab-ring"></div>
            <img src="icon-512.png" alt="">
        </button>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- Service Worker ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- Splash Screen ---
        const splash = document.getElementById('splash');
        const splashMinTime = new Promise(res => setTimeout(res, 800));
        Promise.all([splashMinTime, document.fonts.ready]).then(() => {
            splash.classList.add('hidden');
        });

        // --- Detección de preferencia de movimiento reducido ---
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // --- Canvas / Starfield ---
        const canvas = document.getElementById('starfield');
        const ctx    = canvas.getContext('2d');
        let stars         = [];
        let shootingStars = [];
        let isAnimating   = true;
        let animationFrameId;
        let resizeTimeout;

        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 200);
        }, { passive: true });

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x       = Math.random() * canvas.width;
                this.y       = Math.random() * canvas.height;
                this.size    = Math.random() * 2;
                this.vx      = (Math.random() - 0.5) * 0.2;
                this.vy      = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0)            this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0)            this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x       = Math.random() * canvas.width;
                this.y       = Math.random() * canvas.height * 0.5;
                this.length  = Math.random() * 80 + 40;
                this.speed   = Math.random() * 10 + 5;
                this.size    = Math.random() * 1 + 1;
                this.opacity = 1;
            }
            update() {
                this.x += this.speed;
                this.y += this.speed * 0.5;
                this.opacity -= 0.015;
                if (this.opacity <= 0) this.reset();
            }
            draw() {
                ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.lineWidth   = this.size;
                ctx.shadowBlur  = 10;
                ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y - this.length * 0.5);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function initStars() {
            stars = [];
            const numStars = window.innerWidth < 600 ? 100 : 200;
            for (let i = 0; i < numStars; i++) stars.push(new Star());
            shootingStars = [];
            for (let i = 0; i < 3; i++) shootingStars.push(new ShootingStar());
        }

        function animate() {
            if (!isAnimating) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            for (const star of stars) {
                star.update();
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            if (!prefersReducedMotion) {
                for (const s of shootingStars) { s.update(); s.draw(); }
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isAnimating = false;
                cancelAnimationFrame(animationFrameId);
            } else {
                isAnimating = true;
                animate();
            }
        });

        resizeCanvas();
        animate();

        // --- Citas en español (banco local, sin API) ---
        const allQuotes = [
            { text: "La creatividad es la inteligencia divirtiéndose.",                                    author: "Albert Einstein"     },
            { text: "El único modo de hacer un gran trabajo es amar lo que haces.",                        author: "Steve Jobs"          },
            { text: "El futuro pertenece a quienes creen en la belleza de sus sueños.",                    author: "Eleanor Roosevelt"   },
            { text: "No cuentes los días, haz que los días cuenten.",                                      author: "Muhammad Ali"        },
            { text: "Un viaje de mil millas comienza con un solo paso.",                                   author: "Lao Tse"             },
            { text: "La vida es lo que pasa mientras estás ocupado haciendo otros planes.",                author: "John Lennon"         },
            { text: "En medio de la dificultad yace la oportunidad.",                                      author: "Albert Einstein"     },
            { text: "Sé el cambio que deseas ver en el mundo.",                                            author: "Mahatma Gandhi"      },
            { text: "El éxito es la suma de pequeños esfuerzos repetidos día tras día.",                   author: "Robert Collier"      },
            { text: "No es la especie más fuerte la que sobrevive, sino la más adaptable.",                author: "Charles Darwin"      },
            { text: "La paciencia es la madre de la ciencia.",                                             author: "Proverbio español"   },
            { text: "Caer está permitido. Levantarse es obligatorio.",                                     author: "Proverbio ruso"      },
            { text: "Lo que no te mata te hace más fuerte.",                                               author: "Friedrich Nietzsche" },
            { text: "El conocimiento es poder.",                                                           author: "Francis Bacon"       },
            { text: "La imaginación es más importante que el conocimiento.",                               author: "Albert Einstein"     },
            { text: "Vive como si fueras a morir mañana. Aprende como si fueras a vivir siempre.",        author: "Mahatma Gandhi"      },
            { text: "La simplicidad es la máxima sofisticación.",                                         author: "Leonardo da Vinci"   },
            { text: "No hay atajos para ningún lugar que valga la pena ir.",                               author: "Beverly Sills"       },
            { text: "El secreto de salir adelante es empezar.",                                            author: "Mark Twain"          },
            { text: "Si puedes soñarlo, puedes hacerlo.",                                                  author: "Walt Disney"         },
            { text: "La disciplina es el puente entre las metas y los logros.",                            author: "Jim Rohn"            },
            { text: "No dejes para mañana lo que puedas aprender hoy.",                                   author: "Benjamin Franklin"   },
            { text: "La felicidad no es algo hecho. Viene de tus propias acciones.",                      author: "Dalai Lama"          },
            { text: "El mejor momento para plantar un árbol fue hace veinte años. El segundo mejor es ahora.", author: "Proverbio chino" },
            { text: "Quien no arriesga, no gana.",                                                         author: "Proverbio popular"   },
            { text: "La perseverancia es el camino al éxito.",                                             author: "Charles Chaplin"     },
            { text: "No importa cuán despacio vayas, siempre que no te detengas.",                        author: "Confucio"            },
            { text: "Haz hoy lo que otros no harán, y mañana tendrás lo que otros no tienen.",             author: "Jerry Rice"          },
            { text: "La única forma de hacer algo grande es empezar antes de estar listo.",                author: "Marie Curie"         },
            { text: "Cada experto fue alguna vez un principiante.",                                        author: "Helen Hayes"         },
            { text: "El talento gana partidos, pero el trabajo en equipo gana campeonatos.",               author: "Michael Jordan"      },
            { text: "No busques los errores; busca un remedio.",                                           author: "Henry Ford"          },
            { text: "La actitud es una pequeña cosa que marca una gran diferencia.",                       author: "Winston Churchill"   },
            { text: "El optimismo es la fe que conduce al logro.",                                         author: "Helen Keller"        },
            { text: "Primero muévete, luego inspírate.",                                                   author: "Aristóteles"         },
            { text: "La vida no se mide por los momentos que respiras, sino por los que te dejan sin aliento.", author: "Maya Angelou" },
            { text: "El coraje no es la ausencia del miedo, sino el juicio de que algo más importante que el miedo.", author: "Ambrose Redmoon" },
            { text: "Aprende las reglas como un profesional para poder romperlas como un artista.",        author: "Pablo Picasso"       },
            { text: "Si tu plan A no funciona, recuerda que el abecedario tiene 26 letras más.",           author: "Anónimo"             },
            { text: "Cada día es una nueva oportunidad para cambiar tu vida.",                             author: "Anónimo"             },
        ];

        const quoteContainer = document.getElementById('quote-container');
        const quoteTextEl    = document.getElementById('quote-text');
        const quoteAuthorEl  = document.getElementById('quote-author');

        let quoteInterval;
        let lastQuoteText   = '';
        let isTopPosition   = true;
        let isUpdatingQuote = false;

        function getRandomQuote() {
            const pool = allQuotes.filter(q => q.text !== lastQuoteText);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function updateQuote() {
            if (isUpdatingQuote) return;
            isUpdatingQuote = true;

            quoteContainer.classList.add('fading');

            const quote = getRandomQuote();
            lastQuoteText = quote.text;

            setTimeout(() => {
                quoteTextEl.textContent   = `"${quote.text}"`;
                quoteAuthorEl.textContent = `— ${quote.author}`;

                isTopPosition = !isTopPosition;
                quoteContainer.classList.toggle('position-top',    isTopPosition);
                quoteContainer.classList.toggle('position-bottom', !isTopPosition);
                quoteContainer.classList.remove('fading', 'loading');

                isUpdatingQuote = false;
            }, 400);
        }

        // Carga inicial instantánea desde el banco local
        (() => {
            const first = getRandomQuote();
            lastQuoteText             = first.text;
            quoteTextEl.textContent   = `"${first.text}"`;
            quoteAuthorEl.textContent = `— ${first.author}`;
            quoteContainer.classList.remove('loading');
            quoteInterval = setInterval(updateQuote, 8000);
        })();

        // --- Menú orbital ---
        const mainContent   = document.getElementById('main-content');
        const menuContainer = document.getElementById('menu-container');
        const fabButton     = document.getElementById('fab-button');
        const closeOverlay  = document.getElementById('close-overlay');
        const closeBtn      = document.getElementById('close-btn');
        const orbitItems    = document.querySelectorAll('.orbit-item');
        const fabHint       = document.getElementById('fab-hint');
        let menuOpen = false;

        const angleStep = 360 / orbitItems.length;
        orbitItems.forEach((item, i) => item.style.setProperty('--angle', `${angleStep * i}deg`));

        fabHint.addEventListener('animationend', () => {
            fabHint.style.display = 'none';
        });

        function openMenu() {
            menuOpen = true;
            if ('vibrate' in navigator && !prefersReducedMotion) {
                navigator.vibrate(10);
            }
            mainContent.classList.add('blurred');
            menuContainer.classList.add('active');
            fabButton.classList.add('active');
            fabButton.setAttribute('aria-expanded', 'true');
            closeOverlay.classList.add('active');
            closeBtn.classList.add('active');
            fabHint.style.display = 'none';
        }

        function closeMenu() {
            menuOpen = false;
            mainContent.classList.remove('blurred');
            menuContainer.classList.remove('active');
            fabButton.classList.remove('active');
            fabButton.setAttribute('aria-expanded', 'false');
            closeOverlay.classList.remove('active');
            closeBtn.classList.remove('active');
        }

        function toggleMenu() {
            menuOpen ? closeMenu() : openMenu();
        }

        fabButton.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', closeMenu);
        closeOverlay.addEventListener('click', closeMenu);

        // Clic en la frase reinicia el intervalo
        mainContent.addEventListener('click', (e) => {
            if (e.target.closest('#quote-container') && !menuOpen) {
                clearInterval(quoteInterval);
                updateQuote();
                quoteInterval = setInterval(updateQuote, 8000);
            }
        });

        // ── PUNTO 5: Navegación en la misma ventana PWA ──────────────────────
        // Interceptamos el clic en cada ítem orbital. En lugar de abrir una nueva
        // pestaña (target="_blank"), mostramos la pantalla de transición y luego
        // redirigimos con window.location.href dentro de la misma ventana.
        // Esto mantiene la experiencia dentro del contexto de la PWA instalada.

        const navOverlay      = document.getElementById('nav-overlay');
        const navOverlayIcon  = document.getElementById('nav-overlay-icon');
        const navOverlayLabel = document.getElementById('nav-overlay-label');

        // Mapa de ítem → nombre legible para el overlay de transición
        const itemNames = {
            'item-agenda':         'Agenda',
            'item-cuentas':        'Cuentas',
            'item-DaniCalc':       'Calculadora',
            'item-gym':            'Gym',
            'item-cuentas-prueba': 'Cuentas',
        };

        orbitItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault(); // Evita la navegación inmediata del <a>

                const url        = item.getAttribute('href');
                const label      = itemNames[item.id] || 'Abriendo';
                const iconClone  = item.querySelector('svg').cloneNode(true);
                const bgStyle    = getComputedStyle(item).background;

                // Preparar el overlay con el ícono y color del ítem pulsado
                navOverlayIcon.innerHTML  = '';
                navOverlayIcon.appendChild(iconClone);
                navOverlayIcon.style.background = bgStyle;
                navOverlayLabel.textContent     = label;

                // Mostrar overlay
                navOverlay.classList.add('active');

                // Vibración háptica corta al confirmar la navegación
                if ('vibrate' in navigator && !prefersReducedMotion) {
                    navigator.vibrate([10, 50, 10]);
                }

                // Navegar en la misma ventana tras la animación de entrada
                setTimeout(() => {
                    window.location.href = url;
                }, prefersReducedMotion ? 150 : 550);
            });
        });
        // ─────────────────────────────────────────────────────────────────────

        // Soporte para gestos swipe: swipe arriba abre, swipe abajo cierra
        let touchStartY = 0;
        let touchStartX = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            const dy = touchStartY - e.changedTouches[0].clientY;
            const dx = Math.abs(touchStartX - e.changedTouches[0].clientX);
            const isVertical = Math.abs(dy) > 50 && dx < 60;
            if (!isVertical) return;

            if (dy > 0 && !menuOpen) openMenu();
            if (dy < 0 && menuOpen)  closeMenu();
        }, { passive: true });

    });
    </script>
