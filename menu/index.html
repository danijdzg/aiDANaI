<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>aiDANaI-Menú</title>

    <link rel="icon" type="image/png" href="icon-192.png">
    <meta name="theme-color" content="#000000"/>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ── VARIABLES Y CONFIGURACIÓN GLOBAL ── */
        :root {
            --bg-color: #000000;
            --text-color: #e0e0e0;
            --quote-color: #ffffff;
            --author-color: #c0c0c0;
            --accent-color: #ef5350;
            --accent-glow: rgba(239, 83, 80, 0.4);
            --font-quote: 'Cormorant Garamond', serif;
            --font-main: 'Poppins', sans-serif;
            --orbit-radius: min(220px, 38vmin);
            --transition-speed: 0.4s;
            --z-splash: 9999;
            --z-nav-overlay: 10000;
            --z-menu: 1000;
            --z-close-btn: 1100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            position: fixed;
        }

        /* ── COMPONENTES: SPLASH SCREEN ── */
        .splash {
            position: fixed;
            inset: 0;
            z-index: var(--z-splash);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .splash--hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .splash__logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            animation: splashPulse 1.4s ease-in-out infinite;
        }

        .splash__text {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }

        @keyframes splashPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50%       { opacity: 1;   transform: scale(1.05); }
        }

        /* ── COMPONENTES: NAV TRANSITION OVERLAY ── */
        .nav-overlay {
            position: fixed;
            inset: 0;
            z-index: var(--z-nav-overlay);
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .nav-overlay--active {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .nav-overlay__icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: navIconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .nav-overlay__icon svg {
            width: 36px;
            height: 36px;
            stroke: white;
            stroke-width: 2;
        }

        .nav-overlay__label {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.75);
            animation: navLabelFade 0.4s ease 0.1s both;
        }

        .nav-overlay__dots {
            display: flex;
            gap: 6px;
            animation: navLabelFade 0.4s ease 0.2s both;
        }

        .nav-overlay__dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            animation: dotPulse 1s ease-in-out infinite;
        }

        .nav-overlay__dot:nth-child(2) { animation-delay: 0.15s; }
        .nav-overlay__dot:nth-child(3) { animation-delay: 0.30s; }

        @keyframes navIconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1);   }
        }
        @keyframes navLabelFade {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        /* ── FONDO: STARFIELD Y GALAXY ── */
        .starfield, .galaxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }
        .galaxy-overlay {
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(229, 57, 53, 0.15) 0%, rgba(229, 57, 53, 0.05) 20%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(211, 47, 47, 0.12) 0%, rgba(211, 47, 47, 0.03) 25%, transparent 50%),
                radial-gradient(ellipse at 50% 30%, rgba(239, 83, 80, 0.1) 0%, transparent 40%);
        }

        /* ── CONTENIDO PRINCIPAL ── */
        .main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            transition: filter var(--transition-speed) ease;
        }
        .main-content--blurred {
            filter: blur(8px) brightness(0.7);
        }

        /* ── CONTROLES DE CIERRE ── */
        .close-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            cursor: pointer;
        }
        .close-overlay--active { display: block; }

        .close-btn {
            display: none;
            position: fixed;
            top: calc(16px + env(safe-area-inset-top));
            right: 20px;
            z-index: var(--z-close-btn);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(20,20,30,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        .close-btn--active { display: flex; }
        .close-btn:hover  { background: rgba(239,83,80,0.35); transform: rotate(90deg); }
        .close-btn svg    { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; }

        /* ── COMPONENTES: CITAS ── */
        .quote-container {
            position: fixed;
            left: 50%;
            width: clamp(320px, 90%, 700px);
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.75), rgba(10, 10, 15, 0.85));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 22px 35px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                0 0 25px rgba(100, 150, 255, 0.2);
            text-align: center;
            cursor: pointer;
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
            animation: floatSpace 6s ease-in-out infinite;
        }

        .quote-container--top {
            top: calc(40px + env(safe-area-inset-top));
            bottom: auto;
        }

        .quote-container--bottom {
            bottom: calc(40px + env(safe-area-inset-bottom));
            top: auto;
        }

        @keyframes floatSpace {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50%       { transform: translateX(-50%) translateY(-12px); }
        }

        .quote-container:hover {
            transform: translateX(-50%) scale(1.03) translateY(-5px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.9),
                0 0 35px var(--accent-glow),
                inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            animation-play-state: paused;
        }

        .quote-container--fading { opacity: 0; }

        .quote-container--loading .quote__text {
            min-height: 1.3em;
            background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
            color: transparent;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .quote__text {
            font-family: var(--font-quote);
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 500;
            color: var(--quote-color);
            line-height: 1.3;
            margin-bottom: 12px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 1), 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .quote__author {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 600;
            color: var(--author-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 1);
        }

        /* ── COMPONENTES: FAB HINT ── */
        .fab-hint {
            position: fixed;
            bottom: calc(50% - 115px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            font-size: 0.65rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
            animation: hintFade 3s ease-in-out forwards;
            white-space: nowrap;
        }
        @keyframes hintFade {
            0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
            20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── COMPONENTES: MENÚ ORBITAL ── */
        .menu-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: var(--z-menu);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%   { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
            50%  { box-shadow: 0 0 25px 5px rgba(239, 83, 80, 0.4), 0 0 45px 10px rgba(198, 40, 40, 0.2); }
            100% { box-shadow: 0 0 15px 0px rgba(239, 83, 80, 0.2), 0 0 30px 5px rgba(198, 40, 40, 0.1); }
        }

        .fab-button {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            padding: 0;
            background-color: transparent;
            position: relative;
            z-index: 1001;
            pointer-events: all;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fab-button__img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform var(--transition-speed) cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: pulse-glow 6s infinite ease-in-out;
        }

        .fab-button:hover .fab-button__img { transform: scale(1.1); }

        .fab-button--active {
            transform: scale(0.9) rotate(-360deg);
        }
        .fab-button--active .fab-button__img {
            animation-play-state: paused;
            box-shadow: 0 0 35px 10px rgba(255, 255, 255, 0.5);
        }

        .fab-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            animation: ringPulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes ringPulse {
            0%, 100% { transform: scale(1);    opacity: 0.6; }
            50%       { transform: scale(1.12); opacity: 0.15; }
        }
        .menu-container--active .fab-ring { display: none; }

        .orbital-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform var(--transition-speed) ease;
        }

        .menu-container--active .orbital-menu {
            transform: rotate(360deg);
        }

        .orbit-item {
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition:
                transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                opacity 0.3s ease,
                box-shadow 0.3s ease,
                filter 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .menu-container--active .orbit-item {
            opacity: 1;
            pointer-events: all;
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle)));
        }

        .orbit-item:hover {
            transform: rotate(var(--angle)) translateY(var(--orbit-radius)) rotate(calc(-1 * var(--angle))) scale(1.12);
            box-shadow: 0 0 25px var(--accent-glow);
            filter: brightness(1.2);
            z-index: 10;
        }

        .orbit-item svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2;
            transition: transform 0.3s ease;
        }
        .orbit-item:hover svg { transform: scale(1.15); }

        .orbit-item__label {
            font-size: 0.65rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Colores específicos para cada ítem */
        #item-agenda { background: linear-gradient(135deg, #3949ab, #1a237e); }
        #item-cuentas, #item-cuentas-prueba { background: linear-gradient(135deg, #43a047, #1b5e20); }
        #item-DaniCalc { background: linear-gradient(135deg, #fb8c00, #e65100); }
        #item-gym { background: linear-gradient(135deg, #e53935, #b71c1c); }

    </style>
</head>
<body>

    <div id="splash" class="splash" role="status" aria-live="polite">
        <img src="icon-512.png" id="splash-logo" class="splash__logo" alt="Logo aiDANaI">

    <script>

            { text: "Si puedes soñarlo, puedes hacerlo.", author: "Walt Disney" },
            { text: "La disciplina es el puente entre las metas y los logros.", author: "Jim Rohn" },
            { text: "No dejes para mañana lo que puedas aprender hoy.", author: "Benjamin Franklin" },
            { text: "La felicidad no es algo hecho. Viene de tus propias acciones.", author: "Dalai Lama" },
            { text: "El mejor momento para plantar un árbol fue hace veinte años. El segundo mejor es ahora.", author: "Proverbio chino" },
            { text: "Quien no arriesga, no gana.", author: "Proverbio popular" },
            { text: "La perseverancia es el camino al éxito.", author: "Charles Chaplin" },
            { text: "No importa cuán despacio vayas, siempre que no te detengas.", author: "Confucio" },
            { text: "Haz hoy lo que otros no harán, y mañana tendrás lo que otros no tienen.", author: "Jerry Rice" },
            { text: "La única forma de hacer algo grande es empezar antes de estar listo.", author: "Marie Curie" },
            { text: "Cada experto fue alguna vez un principiante.", author: "Helen Hayes" },
            { text: "El talento gana partidos, pero el trabajo en equipo gana campeonatos.", author: "Michael Jordan" },
            { text: "No busques los errores; busca un remedio.", author: "Henry Ford" },
            { text: "La actitud es una pequeña cosa que marca una gran diferencia.", author: "Winston Churchill" },
            { text: "El optimismo es la fe que conduce al logro.", author: "Helen Keller" },
            { text: "Primero muévete, luego inspírate.", author: "Anónimo" },
            { text: "La vida no se mide por los momentos que respiras, sino por los que te dejan sin aliento.", author: "Maya Angelou" },
            { text: "El coraje no es la ausencia del miedo, sino el juicio de que algo más importante que el miedo.", author: "Ambrose Redmoon" },
            { text: "Aprende las reglas como un profesional para poder romperlas como un artista.", author: "Pablo Picasso" },
            { text: "Si tu plan A no funciona, recuerda que el abecedario tiene 26 letras más.", author: "Anónimo" },
            { text: "Cada día es una nueva oportunidad para cambiar tu vida.", author: "Anónimo" },
        ];

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }

        // --- ELEMENTOS DEL DOM ---
        const elements = {
            splash:          document.getElementById('splash'),
            canvas:          document.getElementById('starfield'),
            mainContent:     document.getElementById('main-content'),
            quoteContainer:  document.getElementById('quote-container'),
            quoteText:       document.getElementById('quote-text'),
            quoteAuthor:     document.getElementById('quote-author'),
            menuContainer:   document.getElementById('menu-container'),
            fabButton:       document.getElementById('fab-button'),
            closeOverlay:    document.getElementById('close-overlay'),
            closeBtn:        document.getElementById('close-btn'),
            orbitItems:      document.querySelectorAll('.orbit-item'),
            fabHint:         document.getElementById('fab-hint'),
            navOverlay:      document.getElementById('nav-overlay'),
            navOverlayIcon:  document.getElementById('nav-overlay-icon'),
            navOverlayLabel: document.getElementById('nav-overlay-label')
        };

        // --- ESTADO DE LA APLICACIÓN ---
        const state = {
            isAnimating: true,
            menuOpen: false,
            lastQuoteText: '',
            isTopPosition: true,
            isUpdatingQuote: false,
            prefersReducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
            quoteInterval: null
        };

        // --- GESTIÓN DE SPLASH SCREEN ---
        const hideSplash = () => {
            const minTimePromise = new Promise(res => setTimeout(res, CONFIG.SPLASH_MIN_TIME_MS));
            Promise.all([minTimePromise, document.fonts.ready]).then(() => {
                elements.splash.classList.add('splash--hidden');
            });
        };
        hideSplash();

        // --- GESTIÓN DEL STARFIELD (CANVAS) ---
        const ctx = elements.canvas.getContext('2d');
        let stars = [];
        let shootingStars = [];
        let animationFrameId;
        let resizeTimeout;

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x       = Math.random() * elements.canvas.width;
                this.y       = Math.random() * elements.canvas.height;
                this.size    = Math.random() * 2;
                this.vx      = (Math.random() - 0.5) * 0.2;
                this.vy      = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0)            this.x = elements.canvas.width;
                if (this.x > elements.canvas.width) this.x = 0;
                if (this.y < 0)            this.y = elements.canvas.height;
                if (this.y > elements.canvas.height) this.y = 0;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x       = Math.random() * elements.canvas.width;
                this.y       = Math.random() * elements.canvas.height * 0.5;
                this.length  = Math.random() * 80 + 40;
                this.speed   = Math.random() * 10 + 5;
                this.size    = Math.random() * 1 + 1;
                this.opacity = 1;
            }
            update() {
                this.x += this.speed;
                this.y += this.speed * 0.5;
                this.opacity -= 0.015;
                if (this.opacity <= 0) this.reset();
            }
            draw() {
                ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.lineWidth   = this.size;
                ctx.shadowBlur  = 10;
                ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.length, this.y - this.length * 0.5);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        const initStars = () => {
            stars = [];
            const numStars = window.innerWidth < 600 ? 100 : 200;
            for (let i = 0; i < numStars; i++) stars.push(new Star());
            shootingStars = [];
            for (let i = 0; i < 3; i++) shootingStars.push(new ShootingStar());
        };

        const resizeCanvas = () => {
            elements.canvas.width  = window.innerWidth;
            elements.canvas.height = window.innerHeight;
            initStars();
        };

        const animate = () => {
            if (!state.isAnimating) return;
            ctx.clearRect(0, 0, elements.canvas.width, elements.canvas.height);
            ctx.fillStyle = 'white';
            stars.forEach(star => { star.update(); star.draw(); });
            ctx.globalAlpha = 1;
            if (!state.prefersReducedMotion) {
                shootingStars.forEach(s => { s.update(); s.draw(); });
            }
            animationFrameId = requestAnimationFrame(animate);
        };

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, CONFIG.RESIZE_DEBOUNCE_MS);
        }, { passive: true });

        document.addEventListener('visibilitychange', () => {
            state.isAnimating = !document.hidden;
            if (state.isAnimating) animate();
            else cancelAnimationFrame(animationFrameId);
        });

        resizeCanvas();
        animate();

        // --- GESTIÓN DE CITAS ---
        const getRandomQuote = () => {
            const pool = QUOTES_BANK.filter(q => q.text !== state.lastQuoteText);
            return pool[Math.floor(Math.random() * pool.length)];
        };

        const updateQuote = () => {
            if (state.isUpdatingQuote) return;
            state.isUpdatingQuote = true;
            elements.quoteContainer.classList.add('quote-container--fading');

            const quote = getRandomQuote();
            state.lastQuoteText = quote.text;

            setTimeout(() => {
                elements.quoteText.textContent   = `"${quote.text}"`;
                elements.quoteAuthor.textContent = `— ${quote.author}`;
                state.isTopPosition = !state.isTopPosition;
                elements.quoteContainer.classList.toggle('quote-container--top',    state.isTopPosition);
                elements.quoteContainer.classList.toggle('quote-container--bottom', !state.isTopPosition);
                elements.quoteContainer.classList.remove('quote-container--fading', 'quote-container--loading');
                state.isUpdatingQuote = false;
            }, 400);
        };

        const initQuotes = () => {
            const first = getRandomQuote();
            state.lastQuoteText             = first.text;
            elements.quoteText.textContent   = `"${first.text}"`;
            elements.quoteAuthor.textContent = `— ${first.author}`;
            elements.quoteContainer.classList.remove('quote-container--loading');
            state.quoteInterval = setInterval(updateQuote, CONFIG.QUOTE_INTERVAL_MS);
        };
        initQuotes();

        // Micro-precarga al hacer *hover* o mantener pulsado los botones del menú
        elements.orbitItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                const link = document.createElement('link');
                link.rel = 'prefetch';
                link.href = item.getAttribute('href');
                document.head.appendChild(link);
            }, { once: true });
        });

        // --- GESTIÓN DEL MENÚ ---
        const angleStep = 360 / elements.orbitItems.length;
        elements.orbitItems.forEach((item, i) => item.style.setProperty('--angle', `${angleStep * i}deg`));

        const openMenu = () => {
            state.menuOpen = true;
            if ('vibrate' in navigator && !state.prefersReducedMotion) navigator.vibrate(CONFIG.MENU_VIBRATION);
            elements.mainContent.classList.add('main-content--blurred');
            elements.menuContainer.classList.add('menu-container--active');
            elements.fabButton.classList.add('fab-button--active');
            elements.fabButton.setAttribute('aria-expanded', 'true');
            elements.closeOverlay.classList.add('close-overlay--active');
            elements.closeBtn.classList.add('close-btn--active');
            elements.fabHint.style.display = 'none';
        };

        const closeMenu = () => {
            state.menuOpen = false;
            elements.mainContent.classList.remove('main-content--blurred');
            elements.menuContainer.classList.remove('menu-container--active');
            elements.fabButton.classList.remove('fab-button--active');
            elements.fabButton.setAttribute('aria-expanded', 'false');
            elements.closeOverlay.classList.remove('close-overlay--active');
            elements.closeBtn.classList.remove('close-btn--active');
        };

        const toggleMenu = () => state.menuOpen ? closeMenu() : openMenu();

        elements.fabButton.addEventListener('click', toggleMenu);
        elements.closeBtn.addEventListener('click', closeMenu);
        elements.closeOverlay.addEventListener('click', closeMenu);
        elements.fabHint.addEventListener('animationend', () => elements.fabHint.style.display = 'none');

        elements.mainContent.addEventListener('click', (e) => {
            if (e.target.closest('#quote-container') && !state.menuOpen) {
                clearInterval(state.quoteInterval);
                updateQuote();
                state.quoteInterval = setInterval(updateQuote, CONFIG.QUOTE_INTERVAL_MS);
            }
        });

        // --- NAVEGACIÓN PWA CON TRANSICIÓN IRREVERSIBLE ---
        elements.orbitItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const url       = item.getAttribute('href');
                const label     = CONFIG.ITEM_NAMES[item.id] || 'Abriendo';
                const iconClone = item.querySelector('svg').cloneNode(true);
                const bgStyle   = getComputedStyle(item).background;

                elements.navOverlayIcon.innerHTML  = '';
                elements.navOverlayIcon.appendChild(iconClone);
                elements.navOverlayIcon.style.background = bgStyle;
                elements.navOverlayLabel.textContent     = label;
                elements.navOverlay.classList.add('nav-overlay--active');

                if ('vibrate' in navigator && !state.prefersReducedMotion) navigator.vibrate(CONFIG.NAV_VIBRATION);

                // Reemplazamos el historial de navegación para que la salida sea total e irreversible
                setTimeout(() => {
                    window.location.replace(url);
                }, state.prefersReducedMotion ? 150 : 550);
            });
        });
    });
    </script>
</body>
</html>
