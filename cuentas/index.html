window.actualizarDashboard = function() {
if (window.AppRuntime && window.AppRuntime.shouldSkipDashboard()) return;
// 1. SEGURIDAD: Si no hay datos, salimos sin romper nada
if (!window.datos || window.datos.length === 0) {
animarCifra('d-ing', 0, 'moneda');
animarCifra('d-gas', 0, 'moneda');
animarCifra('d-net', 0, 'moneda');
animarCifra('d-aho', 0, 'porcentaje');
return;
}
// 2. FILTRADO POR USUARIO (GLOBAL)
let datosUsuario = [...window.datos];
if (typeof filtroUsuarioActual !== 'undefined' && filtroUsuarioActual !== 'todos') {
datosUsuario = datosUsuario.filter(m => pasaFiltroPropietario(m));
}
// 3. FILTRADO POR FECHA (PARA LA TARJETA DE RESUMEN)
const rango = getFechasDashboard();
window.datosResumen = datosUsuario.filter(m => m.ts >= rango.start && m.ts <= rango.end);
// 4. CÁLCULO DE KPIs DE PERIODO (INGRESOS, GASTOS, AHORRO)
let ing = 0;
let gas = 0;
window.datosResumen.forEach(m => {
const conc = String(m.concepto || "").toLowerCase();
if (conc.includes('inicial') || conc.includes('traspaso')) return;
if (m.tipo === 'ingreso') {
ing += m.importe;
} else if (m.tipo === 'gasto') {
gas += Math.abs(m.importe);
}
});
const neto = ing - gas;
const tasaAhorro = (ing > 0) ? (neto / ing) * 100 : 0;
// 5. ACTUALIZAR TARJETA SUPERIOR (RESUMEN)
animarCifra('d-ing', ing, 'moneda');
animarCifra('d-gas', gas, 'moneda');
const elNeto = document.getElementById('d-net');
if(elNeto) {
animarCifra('d-net', neto, 'moneda');
elNeto.className = 'kpi-value ' + (neto >= 0 ? 'val-std-pos' : 'val-std-neg');
}
animarCifra('d-aho', tasaAhorro, 'porcentaje');
// 6. CÁLCULO DE PATRIMONIO
let totalPatrimonio = 0;
let totalLiquidez = 0;
let totalInversion = 0;
let totalAutocustodia = 0;
let totalPropiedad = 0;
if (window.mapaCuentas) {
Object.keys(window.mapaCuentas).forEach(k => {
if (filtroUsuarioActual !== 'todos') {
const letra = k.charAt(0).toUpperCase();
if (filtroUsuarioActual === 'D' && letra !== 'D') return;
if (filtroUsuarioActual === 'N' && letra !== 'N') return;
}
const c = window.mapaCuentas[k];
const saldo = c.saldoActual || 0;
const tipo = (c.tipo || '').toUpperCase();
totalPatrimonio += saldo;
if (tipo === 'AUTOCUSTODIA') {
    // const coste = c.costeTotal !== undefined ? c.costeTotal : saldo;
    // totalAutocustodia += coste;
    totalAutocustodia += saldo;
} else if (tipo === 'PROPIEDAD' || tipo === 'INMUEBLE') {
totalPropiedad += saldo;
} else if (c.esInversion) {
totalInversion += saldo;
} else {
totalLiquidez += saldo;
}
});
}
// --- 🚀 MÁQUINA DEL TIEMPO (SIMULADOR DE IMPACTO) ---
if (window.simuladorImpacto && window.simuladorImpacto > 0) {
totalLiquidez -= window.simuladorImpacto;
totalPatrimonio -= window.simuladorImpacto;
}
const elPatri = document.getElementById('d-patri-total');
if(elPatri) {
animarCifra('d-patri-total', totalPatrimonio, 'moneda');
elPatri.className = totalPatrimonio >= 0 ? 'kpi-value val-std-blue' : 'kpi-value val-std-neg';
}
animarCifra('d-patri-liq', totalLiquidez, 'moneda');
animarCifra('d-patri-inv', totalInversion, 'moneda');
animarCifra('d-patri-auto', totalAutocustodia, 'moneda');
animarCifra('d-patri-prop', totalPropiedad, 'moneda');
// NUEVO: Calcular y actualizar la tarjeta de Liquidez + Inversión en Inicio
const totalMetalico = totalLiquidez + totalInversion;
animarCifra('d-metalico', totalMetalico, 'moneda');
// 7. CÁLCULO DE KPIs FINANCIEROS AVANZADOS
let gastoTotalUltimoAno = 0;
let ingresoTotalUltimoAno = 0;
const fechaHaceUnAno = new Date();
fechaHaceUnAno.setFullYear(fechaHaceUnAno.getFullYear() - 1);
const tsCorte = fechaHaceUnAno.getTime();
const datosUltimoAno = datosUsuario.filter(m => m.ts >= tsCorte);
let primerMovAno = new Date();
let ultimoMovAno = new Date(0);
let hayDatosAno = false;
datosUltimoAno.forEach(m => {
const conc = String(m.concepto || "").toLowerCase();
if (conc.includes('inicial') || conc.includes('traspaso')) return;
if (m.tipo === 'gasto') {
gastoTotalUltimoAno += Math.abs(m.importe);
if (m.fecha < primerMovAno) primerMovAno = m.fecha;
if (m.fecha > ultimoMovAno) ultimoMovAno = m.fecha;
hayDatosAno = true;
} else if (m.tipo === 'ingreso') {
ingresoTotalUltimoAno += m.importe;
}
});
let gastoMensualMedio = 0;
if (hayDatosAno) {
const diasDif = Math.max(1, (ultimoMovAno - primerMovAno) / (1000 * 60 * 60 * 24));
gastoMensualMedio = (gastoTotalUltimoAno / diasDif) * 30.44;
}
if (gastoMensualMedio < 1) gastoMensualMedio = 1;
// A) COBERTURA
let mesesCobertura = totalLiquidez / gastoMensualMedio;
if (mesesCobertura < 0) mesesCobertura = 0;
const elCob = document.getElementById('d-cobertura');
if(elCob) {
let mesesC = Math.floor(mesesCobertura);
let diasC = Math.round((mesesCobertura - mesesC) * 30.44);
if (diasC >= 30) { mesesC += 1; diasC = 0; }
elCob.innerText = `${mesesC} mes${mesesC !== 1 ? 'es' : ''} y ${diasC} día${diasC !== 1 ? 's' : ''}`;
elCob.style.fontSize = "19px";
elCob.style.color = "var(--c-primary, #0A84FF)";
}

async function descargarBackupLocal() {
if (!window.datos || window.datos.length === 0) {
// ✅ FIX BUG-1: mostrarToast no existe en este app. Usar mostrarNotificacion.

try {

"Fecha": mov.fecha,

"Concepto": mov.concepto,
"Importe": mov.importe,

});
// 🟢 MAGIA FECHAS: Máscara visual DD/MM/YYYY para copias de seguridad
Object.keys(wsMovs).forEach(key => {
if (wsMovs[key].t === 'd') wsMovs[key].z = 'dd/mm/yyyy';
});
XLSX.utils.book_append_sheet(wb, wsMovs, "Movimientos");
// --- HOJA 2: CONFIGURACIÓN (Limpia, compatible y segura con PIN) ---
const listaCuentas = Object.entries(window.mapaCuentas || {});
const rawConceptos = window.listaConceptosConfig || window.listaConceptos || [];
const rawBeneficiarios = window.listaBeneficiariosConfig || window.listaBeneficiarios || [];
const maxFilas = Math.max(listaCuentas.length, rawConceptos.length, rawBeneficiarios.length);
const CLEAN = (txt) => String(txt || "").toUpperCase().trim();

const datosConfig = [["CUENTA", "TIPO", "ES_INVERSION", "CONCEPTO", "BENEFICIARIO", "SEC_PIN_HASH"]];
for (let i = 0; i < maxFilas; i++) {
    const c = listaCuentas[i];
    const pinHash = (i === 0) ? (localStorage.getItem('aidanai_pw_v3') || "") : "";
    datosConfig.push([
        c ? CLEAN(c[0]) : "",
        c ? CLEAN(c[1].tipo) : "",
        c ? (c[1].esInversion ? "SI" : "NO") : "",
        rawConceptos[i] ? CLEAN(rawConceptos[i]) : "",
        rawBeneficiarios[i] ? CLEAN(rawBeneficiarios[i]) : "",
        pinHash
    ]);
}
const wsConfig = XLSX.utils.aoa_to_sheet(datosConfig);
XLSX.utils.book_append_sheet(wb, wsConfig, "Configuracion");

// --- HOJA 3: RECURRENTES (Versión limpia y corregida para Producción) ---
const listaRec = window.datosRecurrentes || [];
const filasRec = listaRec.map(r => ({
    "ID": r.id,
    "PROXIMA_FECHA": window.FinanceModel.parseFecha(r.fechaProx), 
    "FRECUENCIA": r.frecuencia,
    "DIAS_SEMANA": r.diasSemana || "",
    "TIPO_REGLA": r.tipoRegla || "gasto",
    "CUENTA": r.cuenta,
    "CUENTA_DESTINO": r.cuentaDestino || "",
    "IMPORTE": r.importe,
    "CONCEPTO": r.concepto,
    "BENEFICIARIO": r.beneficiario || "",
    "DESCRIPCION": r.descripcion || ""
}));
const wsRec = XLSX.utils.json_to_sheet(filasRec, { header: ["ID", "PROXIMA_FECHA", "FRECUENCIA", "DIAS_SEMANA", "TIPO_REGLA", "CUENTA", "CUENTA_DESTINO", "IMPORTE", "CONCEPTO", "BENEFICIARIO", "DESCRIPCION"] });

// 🟢 MAGIA FECHAS: Máscara visual DD/MM/YYYY para recurrentes locales
Object.keys(wsRec).forEach(key => { if (wsRec[key].t === 'd') wsRec[key].z = 'dd/mm/yyyy'; });
XLSX.utils.book_append_sheet(wb, wsRec, "Recurrentes");

// 4. Descarga Final
const fechaHoy = new Date().toISOString().slice(0,10).replace(/-/g, "");
if (window.AppRuntime) await window.AppRuntime.yieldToUI();
XLSX.writeFile(wb, `aidanai_backup_LOCAL_${fechaHoy}.xlsx`, { compression: true });

if (typeof actualizarInfoBackup === 'function') actualizarInfoBackup(true);
notify("✅ Backup completo (3 hojas) descargado", "success");
} catch (error) {
console.error(error);
notify("❌ Error al generar el backup: " + error.message, "error");
}
}

window.cambiarPinSeguridad = async function() {
const oldInput     = document.getElementById('sec-old-pin');
const newInput     = document.getElementById('sec-new-pin');
const confirmInput = document.getElementById('sec-confirm-pin');
const oldVal     = oldInput     ? oldInput.value.trim()     : '';
const newVal     = newInput     ? newInput.value.trim()     : '';   // FIX 7: trim() para evitar bloqueo por espacio accidental
const confirmVal = confirmInput ? confirmInput.value.trim() : '';   // FIX 7: ídem
// 1. Verificar contraseña actual (con PBKDF2, asíncrono)
notify('🔄 Verificando PIN actual...', 'loading');
const correcta = await PinSecurity.verificar(oldVal);
if (!correcta) {
notify('❌ El PIN actual no es correcto', 'error');
if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
if (oldInput) oldInput.focus();
return;
}
// 2. Longitud y tipo (EXACTAMENTE 4 NÚMEROS)
if (!/^\d{4}$/.test(newVal)) {
notify('⚠️ El nuevo PIN debe tener exactamente 4 números', 'warning');
if (newInput) newInput.focus();
return;
}
// 3. Confirmación
if (newVal !== confirmVal) {
notify('⚠️ Los PINs no coinciden', 'warning');
if (confirmInput) confirmInput.focus();
return;
}
// 4. Guardar hash PBKDF2 (nunca texto plano)
notify('🔒 Actualizando PIN...', 'loading');
await PinSecurity.guardarNuevo(newVal);
// 5. Actualizar sesión activa
PinSecurity.setSession(newVal);
// 6. Re-encriptar el caché local con la nueva contraseña
try {
const rawEnc = localStorage.getItem('DATA_ENCRIPTADA');
if (rawEnc && oldVal) {
const datos = await CryptoSystem.desencriptar(rawEnc, oldVal);
const nuevo = await CryptoSystem.encriptar(datos, newVal);
localStorage.setItem('DATA_ENCRIPTADA', nuevo);
}
} catch (e) {
}
// 7. Limpiar campos
if (oldInput) oldInput.value = '';
if (newInput) newInput.value = '';
if (confirmInput) confirmInput.value = '';
notify('✅ PIN actualizado con éxito', 'success');
// 8. NUEVO: Subir las nuevas llaves a la nube inmediatamente
if (typeof guardarUniversal === 'function' && window.modoNube) {
    guardarUniversal();
}
};

// --- MOTOR DE CALENDARIO (NUEVO) ---
function calcularSiguienteFecha(fechaActual, frecuencia, diasSemana) {
let fecha = new Date(fechaActual);
// Ajuste de seguridad para fechas mal formadas
if (isNaN(fecha.getTime())) return fechaActual;
if (frecuencia === 'Mensual') {
fecha.setMonth(fecha.getMonth() + 1);
}
else if (frecuencia === 'Anual') {
fecha.setFullYear(fecha.getFullYear() + 1);
}
else if (frecuencia === 'Semanal') {
fecha.setDate(fecha.getDate() + 7);
}
else if (frecuencia === 'Diario') {
// ✅ FIX BUG-5: Antes siempre sumaba exactamente 1 día ignorando diasSemana.
// Una regla "Lunes, Miércoles" ejecutada un martes avanzaba al miércoles por
// casualidad, pero ejecutada un miércoles avanzaba al jueves (incorrecto).
// Ahora busca el siguiente día de la semana válido en la lista.
if (diasSemana && diasSemana.trim() !== '') {
// diasSemana llega como "1,3,5" (0=Dom, 1=Lun, ..., 6=Sáb)
const diasPermitidos = diasSemana
.split(',')
.map(d => parseInt(d.trim()))
.filter(d => !isNaN(d) && d >= 0 && d <= 6);
if (diasPermitidos.length > 0) {
// Avanzamos desde el día SIGUIENTE a fechaActual
let intento = new Date(fecha);
intento.setDate(intento.getDate() + 1);
// Iteramos hasta encontrar un día de la semana permitido (máx 7 pasos)
let pasos = 0;
while (!diasPermitidos.includes(intento.getDay()) && pasos < 7) {
intento.setDate(intento.getDate() + 1);
pasos++;
}
fecha = intento;
} else {
// Lista vacía o inválida → +1 día por seguridad
fecha.setDate(fecha.getDate() + 1);
}
} else {
// Sin días concretos marcados → frecuencia diaria pura (+1 día)
fecha.setDate(fecha.getDate() + 1);
}
}
// Siempre devolvemos en formato YYYY-MM-DD (compatible con Excel y Date())
return fecha.toISOString().split('T')[0];
}
// --- OPCIÓN B: AUTOCOMPLETADO MÁGICO (VERSIÓN 4.0 - TRASPASOS INTELIGENTES) ---
window.detectarMagia = function(texto) {
    // 1. Validaciones iniciales
    if (!texto || texto.length < 3) return;
    if (window.idEnEdicion) return;  // No autocompletar si estamos editando

    const busqueda = texto.toLowerCase();

    // 2. Modo especial: Traspaso
    if (busqueda.includes("traspaso") || busqueda.includes("transf") || busqueda.includes("bizum")) {
        // Fijar concepto a "TRASPASO"
        const selConcepto = document.getElementById('m-concepto');
        if (selConcepto) {
            selConcepto.value = "TRASPASO";
            selConcepto.style.backgroundColor = "rgba(255, 214, 10, 0.2)";
            setTimeout(() => selConcepto.style.backgroundColor = "", 600);
        }
        // Adivinar beneficiario según el dueño de la cuenta seleccionada
        const selCuenta = document.getElementById('m-cuenta');
        const selBen = document.getElementById('m-beneficiario');
        if (selCuenta && selBen) {
            const cuentaID = selCuenta.value.toUpperCase();
            let dueno = "";
            if (cuentaID.startsWith("D-")) dueno = "D";
            else if (cuentaID.startsWith("N-")) dueno = "N";
            else if (cuentaID.startsWith("C-")) dueno = "DN";
            if (dueno) {
                selBen.value = dueno;
                selBen.style.backgroundColor = "rgba(255, 214, 10, 0.2)";
                setTimeout(() => selBen.style.backgroundColor = "", 600);
            }
        }
        return; // No seguir con el historial
    }

    // 3. Modo normal: buscar en el historial del mismo usuario
    //    Obtener una copia de los movimientos filtrados por el usuario activo
    let datosUsuario = window.datos || [];
    if (typeof pasaFiltroPropietario === 'function') {
        datosUsuario = datosUsuario.filter(m => pasaFiltroPropietario(m));
    }

    // 4. Ordenar de más reciente a más antiguo (por si acaso)
    const movimientosOrdenados = [...datosUsuario].sort((a, b) => (b.ts || 0) - (a.ts || 0));

    // 5. Buscar el primer movimiento que coincida con el texto (descripción, beneficiario o concepto)
    const encontrado = movimientosOrdenados.find(m => {
        const desc = (m.descripcion || m.detalle || "").toLowerCase();
        const ben = (m.beneficiario || "").toLowerCase();
        const conc = (m.concepto || "").toLowerCase();
        return desc.includes(busqueda) || ben.includes(busqueda) || conc.includes(busqueda);
    });

    if (!encontrado) return;

    // 6. Rellenar los campos con los datos encontrados
    const nuevaCuenta = encontrado.cuenta;
    const nuevoConcepto = encontrado.concepto;
    const nuevoBeneficiario = encontrado.beneficiario;

    // Actualizar CUENTA
    const selCuenta = document.getElementById('m-cuenta');
    if (selCuenta && nuevaCuenta) {
        selCuenta.value = nuevaCuenta;
        selCuenta.style.transition = "background 0.2s";
        selCuenta.style.backgroundColor = "rgba(0, 184, 255, 0.20)";
        setTimeout(() => selCuenta.style.backgroundColor = "", 400);
    }

    // Actualizar CONCEPTO (solo si no es traspaso, pero ya salimos antes si era traspaso)
    const selConcepto = document.getElementById('m-concepto');
    if (selConcepto && nuevoConcepto) {
        selConcepto.value = nuevoConcepto;
        selConcepto.style.backgroundColor = "rgba(0, 184, 255, 0.20)";
        setTimeout(() => selConcepto.style.backgroundColor = "", 400);
    }

    // Actualizar BENEFICIARIO
    const selBeneficiario = document.getElementById('m-beneficiario');
    if (selBeneficiario && nuevoBeneficiario) {
        selBeneficiario.value = nuevoBeneficiario;
        // También podemos darle feedback visual (opcional)
        selBeneficiario.style.backgroundColor = "rgba(0, 184, 255, 0.20)";
        setTimeout(() => selBeneficiario.style.backgroundColor = "", 400);
    }
};

window.guardarComoRecurrenteUnificado = async function() {
    const idEdit = document.getElementById('m-id').value;
    const importeStr = document.getElementById('m-cantidad').value;
    const fecha = document.getElementById('m-fecha').value;
    const cta = document.getElementById('m-cuenta').value;
    const ctaDest = document.getElementById('m-cuenta-destino') ? document.getElementById('m-cuenta-destino').value : '';
    const conc = document.getElementById('m-concepto').value;
    const benef = document.getElementById('m-beneficiario').value;
    const desc = document.getElementById('m-desc').value;
    const frec = document.getElementById('m-frecuencia-recurrente').value;
    
    let diasStr = '';
    if (frec === 'Diario') {
        const checks = document.querySelectorAll('.chk-dia-unificado:checked');
        diasStr = Array.from(checks).map(c => c.value).join(',');
    }

    if (!importeStr || !fecha || !cta || !conc) {
        throw new Error("Rellena los campos obligatorios para la regla");
    }

    let importeNum = window.FinanceModel.parseMoney(importeStr);
    if (isNaN(importeNum) || importeNum === 0) throw new Error("Importe inválido");

    let tipo = window.modoTransaccionActual || 'gasto';
    let importeGuardar = tipo === 'gasto' ? -Math.abs(importeNum) : Math.abs(importeNum);

    if (!window.datosRecurrentes) window.datosRecurrentes = [];
    
    const reglaObj = {
        id: idEdit || ('REC-' + Date.now()), 
        fechaProx: fecha,
        frecuencia: frec,
        diasSemana: diasStr,
        tipoRegla: tipo,
        cuenta: cta,
        cuentaDestino: ctaDest,
        concepto: conc,
        beneficiario: benef,
        descripcion: desc,
        importe: importeGuardar
    };

    if (idEdit) {
        const idx = window.datosRecurrentes.findIndex(r => r.id === idEdit);
        if (idx !== -1) {
            window.datosRecurrentes[idx] = reglaObj;
        } else {
            window.datosRecurrentes.push(reglaObj);
        }
    } else {
        window.datosRecurrentes.push(reglaObj);
    }

    await guardarUniversal();
    if(typeof cerrarModal === 'function') cerrarModal();
    notify("✅ Regla fija guardada", "success");
    if(typeof cargarVistaRecurrentes === 'function') cargarVistaRecurrentes();
};

// --- FUNCIÓN MEJORADA: AGREGAR RECURRENTE (CON SOPORTE PARA TRASPASOS) ---
window.agregarDesdeRecurrente = async function(idRecurrente, fechaPrevista) {
    // 1. Usar el nuevo modal Premium
    const confirmado = await window.pedirConfirmacion(
        "Añadir Gasto Fijo",
        "¿Quieres añadir este movimiento hoy y actualizar la fecha?",
        "📅"
    );
    if (!confirmado) return; // Si cancela, no hacemos nada.

    // 2. Buscar datos originales
    const regla = window.datosRecurrentes.find(r => r.id === idRecurrente);
    if (!regla) {
        notify("❌ Regla original perdida", "error");
        return;
    }
    
    if(window.mostrarEstado) notify("⏳ Creando movimiento...", "loading");

    // Función auxiliar para detectar el dueño (igual que en el resto de tu app)
    const detectarDueno = (nombreCuenta) => {
        const c = String(nombreCuenta).toUpperCase().trim();
        if (c.startsWith("D-")) return "D";
        if (c.startsWith("N-")) return "N";
        return "DN";
    };

    const tsOperacion = new Date(fechaPrevista + 'T12:00:00').getTime();
    let movimientosAGuardar = [];

    const tipoReglaLimpio = String(regla.tipoRegla || '').toLowerCase().trim();
    const destinoLimpio = String(regla.cuentaDestino || '').trim();

    // 3. Lógica divisoria: Traspaso (2 movs) vs Gasto/Ingreso (1 mov)
    if (tipoReglaLimpio === 'traspaso' || destinoLimpio.length > 1) {
        // Movimiento 1: El dinero sale (Origen)
        movimientosAGuardar.push({
            id: uuid(),
            fecha: new Date(fechaPrevista),
            cuenta: regla.cuenta,
            concepto: regla.concepto,
            importe: -Math.abs(regla.importe), // Negativo
            descripcion: `>> A: ${destinoLimpio} | ${regla.descripcion || ''}`,
            beneficiario: detectarDueno(regla.cuenta),
            ts: tsOperacion,
            tipo: 'traspaso'
        });

        // Movimiento 2: El dinero entra (Destino)
        movimientosAGuardar.push({
            id: uuid(),
            fecha: new Date(fechaPrevista),
            cuenta: destinoLimpio,
            concepto: regla.concepto,
            importe: Math.abs(regla.importe), // Positivo
            descripcion: `<< DE: ${regla.cuenta} | ${regla.descripcion || ''}`,
            beneficiario: detectarDueno(destinoLimpio),
            ts: tsOperacion,
            tipo: 'traspaso'
        });
    } else {
        // Movimiento Normal (Gasto o Ingreso)
        movimientosAGuardar.push({
            id: uuid(),
            fecha: new Date(fechaPrevista),
            cuenta: regla.cuenta,
            concepto: regla.concepto,
            importe: regla.importe,
            descripcion: regla.descripcion || "",
            beneficiario: regla.beneficiario || "",
            ts: tsOperacion,
            tipo: regla.tipoRegla || ((regla.importe >= 0) ? 'ingreso' : 'gasto')
        });
    }

    try {
        // Guardamos el array resultante (sea de 1 o de 2 movimientos)
        await window.guardarUniversal(movimientosAGuardar);
        
        // Actualizamos la siguiente fecha de la regla
        if(typeof calcularSiguienteFecha === 'function') {
            regla.fechaProx = calcularSiguienteFecha(regla.fechaProx, regla.frecuencia, regla.diasSemana);
            await guardarUniversal();
            cargarVistaRecurrentes();
            if (window.AppInitializer && typeof window.AppInitializer.revisarRecibosProximos === 'function') {
                window.AppInitializer.revisarRecibosProximos();
            }
        }
    } catch (e) {
        console.error(e);
        notify("❌ Error al procesar fijo", "error");
    }
};

ptrTriggered = true;

return palabrasBusqueda.every(palabra => textoFila.includes(palabra));

return a.importe - b.importe;

        for (let btn of botonesPin) {

                btn.click(); // Simulamos el toque del usuario
                event.preventDefault(); // Evitamos comportamientos por defecto del navegador
                break;
            }
        }
    } 
    // 3. Si se pulsa la tecla de borrar (Retroceso / Backspace)
    else if (event.key === 'Backspace') {

// 📊 MÓDULO: PRESUPUESTO 2026 + COMPARATIVA ANUAL
// Análisis financiero avanzado sin datos adicionales
// ══════════════════════════════════════════════════════════════════
window.calcularPresupuestoYComparativa = function() {
const datos = window.datos;
if (!datos || datos.length === 0) return;
const hoy = new Date();
const anioActual = hoy.getFullYear(); // 2026
const anioAnterior = anioActual - 1;
const diaAnio = Math.floor((hoy - new Date(anioActual, 0, 1)) / (1000 * 60 * 60 * 24)) + 1;
const diasTotalesAnio = ((anioActual % 4 === 0 && anioActual % 100 !== 0) || anioActual % 400 === 0) ? 366 : 365;
const fraccionAnioTranscurrida = diaAnio / diasTotalesAnio;
// ── LÓGICA PERSONALIZADA (D, N y DN al 50%) ─────────────────────
const gastos2025 = {}; // { concepto: total_anual }
const gastos2026 = {}; // { concepto: total_ytd }
let totalGastos2025 = 0;
let totalGastos2026 = 0;
let mesesConDatos2025 = new Set();
let mesesConDatos2026 = new Set();
let anioBasePresupuesto = anioAnterior;
datos.forEach(m => {
if (typeof pasaFiltroPropietario === 'function' && !pasaFiltroPropietario(m)) return;   // 📌 NUEVO
// 1. LIMPIEZA INICIAL: Ignoramos ingresos, traspasos y saldos iniciales
const conceptoUp = String(m.concepto || '').toUpperCase().trim();
const esTraspaso = m.tipo === 'traspaso' || conceptoUp.includes('TRASPASO');
if (esTraspaso || conceptoUp === 'INICIAL') return;
if (m.tipo !== 'gasto' && m.importe >= 0) return;
// 2. DETECTAR DUEÑO DEL GASTO Y MULTIPLICADOR
const ben = String(m.beneficiario || '').toUpperCase().trim();
const cta = String(m.cuenta || '').toUpperCase().trim();
let multiplicador = 0;
// ¿Quién está usando la app ahora mismo?
const modo = window.filtroUsuarioActual || 'todos';
if (modo === 'todos') {
multiplicador = 1; // Modo conjunto: sumamos todo
} else if (modo === 'D') {
if (ben === 'D' || (ben === '' && cta.startsWith('D-'))) multiplicador = 1;
else if (ben === 'DN' || ben === 'COMUNES' || cta.startsWith('C-')) multiplicador = 0.5;
} else if (modo === 'N') {
if (ben === 'N' || (ben === '' && cta.startsWith('N-'))) multiplicador = 1;
else if (ben === 'DN' || ben === 'COMUNES' || cta.startsWith('C-')) multiplicador = 0.5;
}
// Si el multiplicador es 0, este gasto no es de este perfil, lo ignoramos
if (multiplicador === 0) return;
// 3. APLICAR MULTIPLICADOR AL IMPORTE (La magia del 50%)
const fecha = new Date(m.ts || m.fecha);
const anio = fecha.getFullYear();
const mes = fecha.getMonth();
const gasto = Math.abs(m.importe) * multiplicador;
const conc = conceptoUp || 'OTROS';
if (anio === anioAnterior) {
gastos2025[conc] = (gastos2025[conc] || 0) + gasto;
totalGastos2025 += gasto;
mesesConDatos2025.add(mes);
} else if (anio === anioActual) {
gastos2026[conc] = (gastos2026[conc] || 0) + gasto;
totalGastos2026 += gasto;
mesesConDatos2026.add(mes);
}
});
// Si no hay año anterior, usamos el año actual como base para no dejar Presupuesto vacío tras cargar datos.
if (totalGastos2025 === 0 && totalGastos2026 > 0) {
Object.keys(gastos2026).forEach(conc => { gastos2025[conc] = gastos2026[conc]; });
totalGastos2025 = totalGastos2026;
mesesConDatos2025 = mesesConDatos2026;
anioBasePresupuesto = anioActual;
}
// Cuántos meses reales tenemos para normalizar
const mesesReales2025 = Math.max(mesesConDatos2025.size, 1);
// ── PRESUPUESTO 2026 ────────────────────────────────────────────
// Extrapolamos el gasto mensual promedio de la base disponible → anualizado
const factorAnualizacion = 12 / mesesReales2025;
const presupuestoAnual2026 = totalGastos2025 * factorAnualizacion;
// Conceptos relevantes (top N que cubran el 90% del gasto)
const conceptosOrdenados = Object.entries(gastos2025)
.sort((a, b) => b[1] - a[1]);
// Tomamos los que sumen el 90% del gasto o el top 8 como máximo
let sumaAcum = 0;
const conceptosFiltrados = [];
for (const [conc, val] of conceptosOrdenados) {
conceptosFiltrados.push([conc, val]);
sumaAcum += val;
if (sumaAcum / totalGastos2025 >= 0.90 || conceptosFiltrados.length >= 8) break;

if (subtitPres) subtitPres.textContent = `Basado en ${mesesReales2025} mes${mesesReales2025>1?'es':''} reales de ${anioBasePresupuesto}`;
const maxVal = (conceptosFiltrados.length > 0 ? conceptosFiltrados[0][1] : 0) * factorAnualizacion || 1;
const presupuestoMensual = presupuestoAnual2026 / 12;
// KPIs superiores
let htmlPres = `
<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">

    if (cuenta) {
      costePorCuenta[cuenta] = (costePorCuenta[cuenta] || 0) + costeTotal;
      valorPorCuenta[cuenta] = (valorPorCuenta[cuenta] || 0) + valorActual;
    }
  });

  // 🧮 Actualizar cuentas: el saldo contable SIEMPRE será igual al COSTE TOTAL
  if (window.mapaCuentas) {
    Object.keys(costePorCuenta).forEach(cta => {
      const coste = costePorCuenta[cta];
      const valorCartera = valorPorCuenta[cta];
      const infoCuenta = window.mapaCuentas[cta];

      if (infoCuenta) {
        // Cuenta ya existente → sobreescribimos saldo con el coste de las posiciones
        infoCuenta.saldoActual  = coste;          // ← esto es lo que va al patrimonio
        infoCuenta.costeTotal   = coste;          // coste consolidado de todas sus posiciones
        infoCuenta.valorMercado = valorCartera;    // nuevo campo para el valor actual de mercado
        infoCuenta.plusvalia    = valorCartera - coste;
        infoCuenta.tieneCartera = true;
      } else {
        // Crear la cuenta dinámicamente (poco común, pero por si acaso)
        window.mapaCuentas[cta] = {
          nombre: cta,
          tipo: 'INVERSIÓN',
          esInversion: true,
          saldoActual: coste,
          costeTotal: coste,
          valorMercado: valorCartera,
          plusvalia: valorCartera - coste,
          tieneCartera: true
        };
      }
    });
  }

  const plusvalia = totalValor - totalCoste;
  const rentabilidad = totalCoste > 0 ? (plusvalia / totalCoste) * 100 : 0;

  window.resumenCartera = {
    totalValor,
    totalCoste,
    plusvalia,
    rentabilidad,
    numPosiciones: posicionesFiltradas.length,
    posiciones: posicionesFiltradas.map(p => window.sanitizarPosicionCartera(p))
  };

  // Actualizar histórico diario (si procede)
  const hoy = new Date();
  const hoyStr = hoy.toISOString().split('T')[0];
  window.historicoCartera = window.historicoCartera || [];
  const ultPunto = window.historicoCartera[window.historicoCartera.length - 1];
  const ultFechaStr = ultPunto ? new Date(ultPunto.ts).toISOString().split('T')[0] : null;
  if (ultFechaStr !== hoyStr && totalValor > 0) {
    window.historicoCartera.push({ fecha: hoy, ts: hoy.getTime(), valor: totalValor, coste: totalCoste });
  } else if (ultFechaStr === hoyStr && ultPunto) {
    ultPunto.valor = totalValor;
    ultPunto.coste = totalCoste;
  }

  if (typeof window.actualizarDashCartera === 'function') {
    window.actualizarDashCartera();
  }
};

<div class="pos-weight-pct">${((valPos / totalValorCartera) * 100).toFixed(1)}% cartera</div>

// ── GRÁFICO EVOLUCIÓN HISTÓRICA ───────────────────────────────────────
window.renderizarEvolCartera = function() {
  if (!window.ensureEChartsReady(() => window.renderizarEvolCartera())) return;
  const hist = window.historicoCartera || [];
  const card = document.getElementById('card-evol-cartera');
  const container = document.getElementById('chart-cartera-evol');
  const statsDiv = document.getElementById('evol-stats'); // nuevo div de estadísticas
  if (!container || typeof echarts === 'undefined') return;
  if (hist.length < 2) {
    if (card) card.style.display = 'none';
    if (statsDiv) statsDiv.style.display = 'none';
    return;
  }
  if (card) card.style.display = 'block';
  if (statsDiv) statsDiv.style.display = 'flex';

  let chart = echarts.getInstanceByDom(container);
  if (!chart) chart = echarts.init(container);

  const fechas = hist.map(h => new Date(h.ts).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}));
  const valores = hist.map(h => Number(h.valor.toFixed(2)));

  // Obtener el coste total actual desde el resumen de cartera
  const costeActual = window.resumenCartera ? window.resumenCartera.totalCoste : 0;
  // Usar el coste histórico real de cada punto; si no existe (puntos anteriores al fix), usar costeActual como fallback
  const primerCosteConocido = (hist.find(h => typeof h.coste === 'number') || {}).coste ?? costeActual;
const costes = hist.map(h => (typeof h.coste === 'number' ? h.coste : primerCosteConocido));

  const colorValor = valores[valores.length-1] >= valores[0] ? '#39FF14' : '#FF2E4D';
  const colorCoste = '#888888';

  // Calcular plusvalía en cada punto usando el coste histórico real
  const plusvalias = valores.map((v, i) => v - costes[i]);
  const rentabilidades = plusvalias.map((p, i) => costes[i] > 0 ? (p / costes[i]) * 100 : 0);

  // Determinar colores para el área de plusvalía
  const areaColorStops = valores.map((v, i) => {
    const isGain = v >= costeActual;
    return {
      offset: i / (valores.length - 1),
      color: isGain ? 'rgba(57, 255, 20, 0.25)' : 'rgba(255, 46, 77, 0.25)'
    };
  });

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top:20, right:10, bottom:25, left:55 },
    xAxis: { type:'category', data:fechas, boundaryGap:false,
      axisLine:{show:false}, axisTick:{show:false},
      axisLabel:{color:'#555',fontSize:9,fontFamily:'Inter'} },
    yAxis: { type:'value', axisLine:{show:false}, axisTick:{show:false},
      splitLine:{lineStyle:{color:'rgba(255,255,255,0.04)',type:'dashed'}},
      axisLabel:{color:'#555',fontSize:9,fontFamily:'Inter',
        formatter: v => v>=1000 ? (v/1000).toFixed(0)+'k' : v} },
    tooltip: {
      trigger:'axis', backgroundColor:'rgba(15,15,20,0.9)',
      borderColor:'rgba(255,255,255,0.1)', borderRadius:12,
      textStyle:{color:'#fff',fontSize:12,fontFamily:'Inter'},
      formatter: function(params) {
        const fmt2 = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(v);
        const idx = params[0].dataIndex;
        const vMercado = valores[idx];
        const coste = costes[idx];
        const pnl = vMercado - coste;
        const rent = coste > 0 ? ((vMercado / coste) - 1) * 100 : 0;
        const signo = pnl >= 0 ? '+' : '';
        const colorPnL = pnl >= 0 ? '#39FF14' : '#FF2E4D';
        return `
          <b>${params[0].axisValue}</b><br/>
          <span style="color:#ccc;">Valor mercado:</span> ${fmt2(vMercado)}<br/>
          <span style="color:#aaa;">Coste total:</span> ${fmt2(coste)}<br/>
          <span style="color:${colorPnL};font-weight:bold;">Plusvalía: ${signo}${fmt2(pnl)} (${signo}${rent.toFixed(2)}%)</span>
        `;
      }
    },
    series: [
      {
        name: 'Valor mercado',
        type:'line', data:valores, smooth:true, symbol:'none',
        lineStyle:{color:colorValor,width:2.5,shadowBlur:8,shadowColor:colorValor},
        areaStyle:{color:'transparent'}
      },
      {
        name: 'Coste total',
        type:'line', data:costes, smooth:false, symbol:'none',
        lineStyle:{color:colorCoste,width:1.5,type:'dashed'},
        itemStyle:{color:colorCoste}
      },
      {
        name: 'Plusvalía',
        type:'line', data:plusvalias, smooth:true, symbol:'none',
        lineStyle:{color:'transparent',width:0},
        areaStyle:{
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            {offset:0, color:'rgba(57,255,20,0.2)'},
            {offset:1, color:'rgba(255,46,77,0.2)'}
          ])
        },
        z: 0
      }
    ]
  }, { notMerge:true });

  // Actualizar estadísticas si existe el div
  if (statsDiv) {
    const maxVal = Math.max(...valores);
    const minVal = Math.min(...valores);
    const maxPnl = Math.max(...plusvalias);
    const minPnl = Math.min(...plusvalias);
    const ultRent = rentabilidades[rentabilidades.length-1];
    const firstVal = valores[0];
    const lastVal = valores[valores.length-1];
    const diasTotal = (hist[hist.length-1].ts - hist[0].ts) / (1000*60*60*24);
    const costeRef  = costes[costes.length - 1];   // coste actual real
    const valorRef  = valores[valores.length - 1]; // valor de mercado actual

    // Rentabilidad total simple (siempre fiable)
    const rentTotal = costeRef > 0 ? ((valorRef / costeRef) - 1) * 100 : 0;

    // CAGR solo si hay al menos 365 días de histórico real
    let labelRent, valorRent;
    if (diasTotal >= 365 && costeRef > 0 && valorRef > 0) {
      const aniosReales = diasTotal / 365;
      const cagr = (Math.pow(valorRef / costeRef, 1 / aniosReales) - 1) * 100;
      labelRent = 'Rentab. anual';
      valorRent = cagr;
    } else {
      labelRent = 'Rentab. total';
      valorRent = rentTotal;
    }

    const fmtC = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
    const signo = (v) => v >= 0 ? '+' : '';
    statsDiv.innerHTML = `
      <div style="flex:1; text-align:center;">
        <div style="font-size:9px; color:#888; text-transform:uppercase;">Valor máx.</div>
        <div style="font-size:13px; font-weight:800; color:#fff;">${fmtC(maxVal)}</div>
      </div>
      <div style="flex:1; text-align:center;">
        <div style="font-size:9px; color:#888; text-transform:uppercase;">Valor mín.</div>
        <div style="font-size:13px; font-weight:800; color:#fff;">${fmtC(minVal)}</div>
      </div>
      <div style="flex:1; text-align:center;">
        <div style="font-size:9px; color:#888; text-transform:uppercase;">+Valía máx.</div>
        <div style="font-size:13px; font-weight:800; color:${maxPnl>=0?'#39FF14':'#FF2E4D'};">${signo(maxPnl)}${fmtC(maxPnl)}</div>
      </div>
      <div style="flex:1; text-align:center;">
        <div style="font-size:9px; color:#888; text-transform:uppercase;">${labelRent}</div>
        <div style="font-size:13px; font-weight:800; color:${valorRent>=0?'#39FF14':'#FF2E4D'};">${signo(valorRent)}${valorRent.toFixed(2)}%</div>
      </div>
    `;
  }

  if (!window._evolCarteraResizeObs) {
    window._evolCarteraResizeObs = new ResizeObserver(() => { if (chart) chart.resize(); });
    window._evolCarteraResizeObs.observe(container);
  }
};
// ── MODAL: NUEVA / EDITAR POSICIÓN ───────────────────────────────────
window.abrirModalNuevaPosicion = function() {
  // Rellenar cuentas disponibles
  const sel = document.getElementById('cartera-cuenta');
  if (sel && window.mapaCuentas) {
    sel.innerHTML = '<option value="">-- Sin asociar --</option>';
    Object.keys(window.mapaCuentas).sort().forEach(cta => {
      const opt = document.createElement('option');
      opt.value = cta; opt.textContent = cta;
      sel.appendChild(opt);
    });
  }
	  // Limpiar campos
	  ['cartera-pos-id','cartera-ticker','cartera-nombre','cartera-notas','cartera-fecha-compra'].forEach(id => {
	    const el = document.getElementById(id); if (el) el.value = '';
	  });
	  ['cartera-cantidad','cartera-precio-compra','cartera-precio-actual'].forEach(id => {
	    const el = document.getElementById(id); if (el) el.value = '';
	  });
  const inputActual = document.getElementById('cartera-precio-actual');
  if (inputActual) {
    inputActual.dataset.precioFuente = 'Manual';
    inputActual.dataset.precioActualizadoEn = '';
  }
  const extBtns = document.getElementById('cartera-extra-btns');
  if (extBtns) extBtns.style.display = 'none';
  const preview = document.getElementById('preview-pnl-cartera');
  if (preview) preview.style.display = 'none';
  const titulo = document.getElementById('modal-cartera-titulo');
  if (titulo) titulo.innerText = 'NUEVA POSICIÓN';
  const modal = document.getElementById('modal-cartera-pos');
  if (modal) modal.classList.add('active');
};

window.editarPosicion = function(id) {
  const pos = (window.datosCartera || []).find(p => p.id === id);
  if (!pos) return;
  window.abrirModalNuevaPosicion();
  setTimeout(() => {
    document.getElementById('cartera-pos-id').value    = pos.id;
    document.getElementById('cartera-ticker').value    = pos.ticker;
    document.getElementById('cartera-nombre').value    = pos.nombre;
    document.getElementById('cartera-tipo').value      = window.normalizarTipoCartera(pos.tipo);
    document.getElementById('cartera-cuenta').value    = pos.cuenta;
    document.getElementById('cartera-cantidad').value  = pos.cantidad;
    document.getElementById('cartera-precio-compra').value = pos.precioCompra;
    document.getElementById('cartera-precio-actual').value = pos.precioActual;
    document.getElementById('cartera-precio-actual').dataset.precioFuente = pos.precioFuente || (window.esBTCCartera(pos) ? 'Binance BTC/EUR' : 'Manual');
    document.getElementById('cartera-precio-actual').dataset.precioActualizadoEn = pos.precioActualizadoEn || '';
    document.getElementById('cartera-fecha-compra').value = pos.fechaCompra || '';
    document.getElementById('cartera-notas').value     = pos.notas || '';
    const titulo = document.getElementById('modal-cartera-titulo');
    if (titulo) titulo.innerText = 'EDITAR: ' + (pos.ticker || pos.nombre);
    const extBtns = document.getElementById('cartera-extra-btns');
    if (extBtns) extBtns.style.display = 'grid';
    window.actualizarPreviewPnl();
    // Añadimos esta línea para que el modal se adapte al tipo de activo
    if (typeof window.comportamientoTipoActivo === 'function') {
        window.comportamientoTipoActivo();
    }
    setTimeout(() => window.actualizarPreviewPnl(), 100);
  }, 50);
};

window.guardarPosicion = async function() {
    // 1. Obtener valores del DOM
    const id = document.getElementById('cartera-pos-id').value;
    const tipoRaw = document.getElementById('cartera-tipo').value;
    const tipo = window.normalizarTipoCartera(tipoRaw);
    const esCripto = window.esCriptoCartera(tipo);
    const cuenta = document.getElementById('cartera-cuenta').value;
    const ticker = document.getElementById('cartera-ticker').value.toUpperCase().trim();
    const nombre = document.getElementById('cartera-nombre').value;
    const cantidad = window.parseNumeroCartera(document.getElementById('cartera-cantidad').value);
    let pCompra = window.parseNumeroCartera(document.getElementById('cartera-precio-compra').value);
    let pActual = window.parseNumeroCartera(document.getElementById('cartera-precio-actual').value);
    const fecha = document.getElementById('cartera-fecha-compra').value;
    const notas = document.getElementById('cartera-notas').value;
    const inputActual = document.getElementById('cartera-precio-actual');
    const precioFuente = inputActual?.dataset?.precioFuente || (ticker === 'BTC' && esCripto ? 'Binance BTC/EUR' : 'Manual');
    const precioActualizadoEn = inputActual?.dataset?.precioActualizadoEn || '';

    // 2. Validación básica
    if (!tipoRaw || !ticker || pCompra <= 0 || pActual <= 0 || (esCripto && cantidad <= 0)) {
        window.mostrarToast("Completa los campos vitales (Tipo, Ticker, Importe Invertido y Precio Actual)", "error");
        return;
    }

    // 3. Control de límite de inversión (solo si hay cuenta asociada)
    if (cuenta) {
        let dineroAportado = 0;
        if (window.datos) {
            window.datos.forEach(m => {
                if (String(m.cuenta || '').toUpperCase().trim() === String(cuenta || '').toUpperCase().trim()) dineroAportado += window.parseNumeroCartera(m.importe);
            });
        }

        let costeOtrasPosiciones = 0;
        if (window.datosCartera) {
            window.datosCartera.forEach(p => {
                if (String(p.cuenta || '').toUpperCase().trim() === String(cuenta || '').toUpperCase().trim() && p.id !== id) {
                    // El coste de cada posición es su precioCompra (que representa el total invertido en ella)
                    costeOtrasPosiciones += window.getCostePosicionCartera(p);
                }
            });
        }

        // La nueva posición cuesta exactamente pCompra (ya sea cripto o no)
        const costeNuevaPosicion = pCompra;

        if ((costeOtrasPosiciones + costeNuevaPosicion) > (dineroAportado + 0.05)) {
            const diferencia = (costeOtrasPosiciones + costeNuevaPosicion) - dineroAportado;
            const fmt = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
            window.mostrarToast(`❌ Límite excedido. Has aportado ${fmt.format(dineroAportado)} a la cuenta, pero intentas asignar ${fmt.format(costeOtrasPosiciones + costeNuevaPosicion)}. Faltan ${fmt.format(diferencia)}.`, "error");
            return;
        }
    }

    // 4. Preparar los datos finales para guardar
    //    Para cripto: cantidad = la que el usuario introdujo, precioCompra = total invertido, precioActual = precio unitario
    //    Para resto:  cantidad = 1, precioCompra = total invertido, precioActual = valor actual total (manual)
    const cantidadFinal = esCripto ? cantidad : 1;
    const pCompraFinal = pCompra;   // siempre es el importe total invertido
    const pActualFinal = pActual;   // unitario para cripto, total para resto

    if (!window.datosCartera) window.datosCartera = [];

    const generarId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : `id-${Date.now()}`;

    // Declaración ÚNICA de la variable posicion
    const posicion = window.sanitizarPosicionCartera({
        id: id || generarId(),
        tipo,
        cuenta,
        ticker,
        nombre,
        cantidad: cantidadFinal,
        precioCompra: pCompraFinal,
        precioActual: pActualFinal,
        fechaCompra: fecha,
        notas,
        precioFuente,
        precioActualizadoEn
    });

    // 5. Guardar en el array
    if (id) {
        const idx = window.datosCartera.findIndex(p => p.id === id);
        if (idx > -1) window.datosCartera[idx] = posicion;
        else window.datosCartera.push(posicion);
    } else {
        window.datosCartera.push(posicion);
    }

    window.cerrarModalCartera();

    // 6. Actualizar UI y guardar en nube
    window.calcularValoresCartera();
    window.renderizarCartera();
    if (window.UIEvents) window.UIEvents.emitir('datos:actualizados');

    if (typeof window.guardarUniversal === 'function') {
        await window.guardarUniversal();
    }

    window.mostrarToast(`Posición ${ticker} guardada`, "success");
    if ("vibrate" in navigator) navigator.vibrate(40);
};

window.borrarPosicion = async function(id) {
  const confirmado = await window.pedirConfirmacion('¿Eliminar posición?', 'Se borrará de tu cartera y del Excel.', '🗑️');
  if (!confirmado) return;
  window.datosCartera = (window.datosCartera || []).filter(p => p.id !== id);
  window.calcularValoresCartera();
  window.renderizarCartera();
  window.cerrarModalCartera();
  if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
  notify('🗑️ Posición eliminada', 'success');
};

// ── MÓDULO 5: ACTUALIZACIÓN AUTOMÁTICA DE PRECIOS (LIVE) ──────────────
window.actualizarPreciosAutomatico = async function(modoSilencioso = false) {
    const posiciones = window.datosCartera || [];
    if (posiciones.length === 0) {
        if (!modoSilencioso) notify("No hay posiciones en cartera", "warning");
        return;
    }

    const btn = document.getElementById('btn-precios-live');
    const icon = document.getElementById('precios-live-icon');
    if (btn) btn.style.opacity = '0.5';
    if (icon && !modoSilencioso) icon.textContent = '⏳';
    if (!modoSilencioso) notify("⚡ Consultando mercado (Binance)...", "info");

    try {
        let actualizados = 0;
        const criptoPos = posiciones.filter(p => window.esBTCCartera(p));
        const precioUnitario = criptoPos.length > 0 ? await window.obtenerPrecioBTC() : null;
        if (criptoPos.length > 0 && precioUnitario === null) {
            if (!modoSilencioso) notify("No se pudo obtener BTC/EUR desde Binance", "error");
            return;
        }

        for (const pos of criptoPos) {
            if (precioUnitario !== null && Math.abs(window.parseNumeroCartera(pos.precioActual) - precioUnitario) > 0.0001) {
                pos.tipo = window.normalizarTipoCartera(pos.tipo);
                pos.precioActual = precioUnitario;   // actualizamos solo BTC/EUR
                pos.precioFuente = 'Binance BTC/EUR';
                pos.precioActualizadoEn = new Date().toISOString();
                actualizados++;
            }
        }

        if (actualizados > 0) {
            window.calcularValoresCartera();
            window.renderizarCartera();
            if (window.UIEvents) window.UIEvents.emitir('datos:actualizados');
            if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
            if (!modoSilencioso) notify(`✅ Precios actualizados (${actualizados} posiciones BTC)`, "success");
        } else {
            if (!modoSilencioso) notify("Todos los precios BTC/EUR ya estaban al día", "info");
        }
        if (typeof vibrar === 'function') vibrar('success');
    } finally {
        if (btn) btn.style.opacity = '1';
        if (icon && !modoSilencioso) icon.textContent = '⚡';
    }
};

                            <span class="material-icons">system_update</span> Toca para actualizar App
                        </div>
                    `;
                    document.body.appendChild(notifUpdate);
                }
            });
