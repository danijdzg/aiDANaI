    <style>
 /* --- ESCUDO DE PRODUCCIÓN PARA MÓVILES --- */
html, body {
    overscroll-behavior-y: none !important; /* Evita que se recargue la app al deslizar hacia abajo */
    touch-action: manipulation !important; /* Evita el zoom al tocar botones rápido */
    -webkit-user-select: none; /* Evita selecciones de texto accidentales en iOS */
    user-select: none; /* Evita selecciones de texto accidentales en Android/PC */
    -webkit-tap-highlight-color: transparent; /* Quita el parpadeo azul al pulsar la pantalla */
}
/* Permitimos escribir texto solo donde hace falta (casillas y buscadores) */
input, textarea, select {
    -webkit-user-select: auto !important;
    user-select: auto !important;
}
/* =========================================
ESTILOS ORIGINALES DE INDEX.HTML
========================================= */
:root {
--c-bg: #000000;
--c-primary: #00B8FF;
--c-success: #39FF14;
--c-danger: #FF2E4D;
--c-transfer: #00B8FF;
--c-warning: #FFD60A;
--c-accent: #BF5AF2;
/* COLORES DE IDENTIDAD */
--theme-dn: #32D74B;    /* Verde (Todos) */
--theme-d: #0A84FF;  /* Azul (D) */
--theme-n: #FF453A; /* Rojo (N) */
/* Variable dinámica que cambiará con JS */
--current-theme: var(--theme-dn);
--bar-height: 70px;
}
/* 1. Aplicar color al Título */
.logo {
color: var(--current-theme) !important;
transition: color 0.3s ease; /* Transición suave */
}
/* 2. Aplicar color a la Pestaña Activa del Pie de Página */
.nav-item.active {
color: var(--current-theme) !important;
}
.nav-item.active i,
.nav-item.active span {
color: var(--current-theme) !important;
transition: color 0.3s ease;
}
body {
font-family: 'Inter', sans-serif;
background-color: #000000;
background-image: radial-gradient(circle at top right, rgba(10, 132, 255, 0.12), transparent 45%),
radial-gradient(circle at bottom left, rgba(48, 209, 88, 0.08), transparent 45%);
background-attachment: fixed;
color: #FFFFFF;
margin: 0;
padding-top: env(safe-area-inset-top);
height: 100dvh;
overflow: hidden;
display: flex;
flex-direction: column;
}
/* 1. Estilos globales para la barra de desplazamiento (Scrollbar) */
*::-webkit-scrollbar { 
    width: 6px; 
    height: 6px; 
}
*::-webkit-scrollbar-thumb { 
    background: #333; 
    border-radius: 3px; 
}

/* 2. Contenedor principal con estado inicial oculto */
#app-viewport {
    background-color: var(--c-bg); /* Asegúrate de que esta variable CSS exista en tu :root */
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    max-width: 800px;
    margin: 0 auto;
    
    /* --- ESTADO INICIAL OCULTO --- */
    opacity: 0;
    transition: opacity 1s ease-in-out; 
}
/* Clase para hacerlo visible cuando el PIN sea correcto */
#app-viewport.visible {
opacity: 1;
}
@media (min-width: 820px) { #app-viewport { width: 800px; } }
.app-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
/* --- CABECERA ULTRA COMPACTA UNIFICADA --- */
header {
position: fixed !important;
top: 0; left: 50%;
transform: translateX(-50%);
width: 100%;
max-width: 800px;
height: 48px !important;
background: #000;
border-bottom: 1px solid rgba(255,255,255,0.1);
z-index: 9999;
display: flex;
align-items: center;
}
.header-ultra-compact {
display: flex;
width: 100%;
justify-content: space-between;
align-items: center;
padding: 0 8px;
}
.h-group { display: flex; align-items: center; gap: 2px; }
.h-center { flex: 1; justify-content: center; gap: 4px; }
/* 2. ICONOS UNIFICADOS (Pequeños y sutiles) */
.btn-mini-head {
background: transparent;
border: none;
padding: 6px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
color: rgba(255, 255, 255, 0.5); /* Transparencia base para todos */
transition: all 0.2s;
}
.btn-mini-head .material-icons {
font-size: 18px; /* Tamaño pequeño universal */
}
/* Colores de herramientas al estar activos o en hover */
.btn-mini-head:active { transform: scale(0.9); color: #fff; }
#mode-local.active, #mode-cloud.active { color: #fff; opacity: 1; }
/* Colores sutiles para identificar funciones */
.tool-blue { color: rgba(0, 240, 255, 0.5); }
.tool-yellow { color: rgba(255, 214, 10, 0.5); }
.tool-purple { color: rgba(191, 90, 242, 0.5); }
.tool-green { color: rgba(57, 255, 20, 0.5); }
.tool-red { color: rgba(255, 46, 77, 0.5); }
/* Margen superior para el contenido */
.app-main {
flex: 1;
overflow-y: auto;
padding: 20px;
padding-top: 95px !important;
padding-bottom: 90px;
background-color: #000;
position: relative;
-webkit-overflow-scrolling: touch;
/* Ocultar barra en Firefox */
scrollbar-width: none;
/* Ocultar barra en IE/Edge antiguo */
-ms-overflow-style: none;
}
/* Ocultar barra en Chrome, Safari y Edge moderno */
.app-main::-webkit-scrollbar {
display: none;
}
/* ═══════════════════════════════════════════════════
PWA: BANNER DE INSTALACIÓN (Android Chrome)
Aparece automáticamente cuando detectamos el evento
beforeinstallprompt. Se oculta al instalar o cerrar.
═══════════════════════════════════════════════════ */
#pwa-install-banner {
display: none;
position: fixed;
bottom: 75px;
left: 12px; right: 12px;
background: linear-gradient(135deg, #1a0a2e 0%, #0d001a 100%);
border: 1px solid #BF5AF2;
border-radius: 16px;
padding: 14px 16px;
z-index: 20000;
box-shadow: 0 0 30px rgba(191,90,242,0.4);
animation: slideUpBanner 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes slideUpBanner {
from { transform: translateY(120px); opacity: 0; }
to   { transform: translateY(0);    opacity: 1; }
}
#pwa-install-banner .banner-row {
display: flex; align-items: center; gap: 12px;
}
#pwa-install-banner .banner-icon {
font-size: 36px; flex-shrink: 0;
}
#pwa-install-banner .banner-text {
flex: 1;
}
#pwa-install-banner .banner-title {
font-size: 13px; font-weight: 800; color: #fff;
text-transform: uppercase; letter-spacing: 0.5px;
}
#pwa-install-banner .banner-sub {
font-size: 11px; color: #FFFFFF; margin-top: 2px;
}
#pwa-install-banner .banner-actions {
display: flex; gap: 8px; margin-top: 12px;
}
#pwa-install-banner .btn-install {
flex: 1; background: #BF5AF2; color: #000; border: none;
border-radius: 10px; padding: 10px; font-size: 13px;
font-weight: 800; cursor: pointer;
box-shadow: 0 0 15px rgba(191,90,242,0.5);
}
#pwa-install-banner .btn-dismiss {
background: transparent; color: #666; border: 1px solid #333;
border-radius: 10px; padding: 10px 14px; font-size: 12px;
cursor: pointer;
}
/* ═══════════════════════════════════════════════════
TOUCH TARGETS: mínimo 44×44px (Apple HIG / Material)
Afecta a botones de nav y acciones rápidas
═══════════════════════════════════════════════════ */
.nav-item {
min-height: 48px !important;
min-width: 44px !important;
-webkit-tap-highlight-color: transparent;
}
.fab-btn {
min-width: 56px !important;
min-height: 56px !important;
}
.fab-action {
min-width: 48px !important;
min-height: 48px !important;
}
/* Botones de acción en lista de movimientos */
button, [role="button"] {
-webkit-tap-highlight-color: transparent;
touch-action: manipulation; /* Elimina el delay de 300ms en iOS */
}
/* ═══════════════════════════════════════════════════
PULL TO REFRESH: Indicador visual
═══════════════════════════════════════════════════ */
#ptr-indicator {
position: fixed;
top: 0; left: 0; right: 0;
height: 60px;
display: flex; align-items: center; justify-content: center;
background: linear-gradient(180deg, #0d001a 0%, transparent 100%);
color: #BF5AF2;
font-size: 12px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
z-index: 9999;
transform: translateY(-100%);
transition: transform 0.2s ease;
pointer-events: none;
}
#ptr-indicator.visible {
transform: translateY(0);
}
#ptr-indicator.releasing {
color: #39FF14;
}
.ptr-spinner {
width: 18px; height: 18px;
border: 2px solid #333;
border-top-color: currentColor;
border-radius: 50%;
margin-right: 8px;
animation: none;
}
#ptr-indicator.loading .ptr-spinner {
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* ═══════════════════════════════════════════════════
MODO ZEN + SWIPE: Transiciones fluidas Premium
═══════════════════════════════════════════════════ */
.view-section {
display: none;
}
.view-section.active {
display: block;
}
/* ────────────────────────────────────────────────────────────────────── */
/* 🎨 ESTILOS OPTIMIZADOS: TARJETAS Y KPIS (GLASSMORPHISM FINTECH)        */
/* ────────────────────────────────────────────────────────────────────── */
.master-card {
    /* Fondo translúcido profundo */
    background: rgba(28, 28, 30, 0.55);
    /* Desenfoque y saturación alta estilo iOS / Apple Wallet */
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    /* Borde de cristal ultra fino con luz superior */
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 24px;
    padding: 22px;
    margin-top: 20px;
    /* Sombra volumétrica */
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    position: relative;
    display: flex;
    flex-direction: column;
    /* Optimización de transiciones "Gummy" */
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.25s ease, border-color 0.3s ease;
    will-change: transform;
}
.master-card:active {
    transform: scale(0.96);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
}
/* Colores temáticos iluminando el cristal */
.master-card.blue-card { border-color: rgba(0, 184, 255, 0.25); box-shadow: 0 12px 32px rgba(0, 184, 255, 0.1), inset 0 0 20px rgba(0, 184, 255, 0.05); }
.master-card.orange-card { border-color: rgba(255, 214, 10, 0.25); box-shadow: 0 12px 32px rgba(255, 214, 10, 0.1), inset 0 0 20px rgba(255, 214, 10, 0.05); }
.master-card.green-card { border-color: rgba(57, 255, 20, 0.25); box-shadow: 0 12px 32px rgba(57, 255, 20, 0.1), inset 0 0 20px rgba(57, 255, 20, 0.05); }
/* Tipografías unificadas */
.orange-val { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--c-warning); }
.green-val-freedom { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--c-success); }
.freedom-icon { font-size: 16px; margin-right: 6px; vertical-align: middle; }
.card-header { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 12px; margin-bottom: 12px; }
.card-title { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 800; color: var(--c-warning, #FFD60A); text-transform: uppercase; letter-spacing: 1.5px; }
/* Controles de fecha y desplegables */
.period-select, .mini-date {
    background-color: rgba(0,0,0,0.3) !important; color: #FFFFFF !important;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 6px 12px; font-size: 11px; font-weight: 700;
    font-family: 'Inter', sans-serif; text-transform: uppercase; text-align: center;
    outline: none; cursor: pointer; transition: all 0.2s;
    backdrop-filter: blur(5px);
}
.period-select:hover, .mini-date:hover { border-color: var(--c-accent); background-color: rgba(191, 90, 242, 0.15) !important; box-shadow: 0 0 10px rgba(191, 90, 242, 0.2); }
.mini-date::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.7; transform: scale(0.9); }
.mini-date { width: auto; letter-spacing: 0.5px; }
/* 🐛 FIX: Fondo negro mate para el interior de las opciones del desplegable */
.period-select option, select option {
    background-color: #121214 !important;
    color: #FFFFFF !important;
    font-weight: 600;
}
/* =========================================
TARJETAS KPI (ESTILO iOS / EFECTO CRISTAL)
========================================= */
.kpi-grid-2x2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 15px;
}
.kpi-box {
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 20px; 
    padding: 20px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), inset 0 0 15px rgba(255,255,255,0.02);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease, border-color 0.2s;
    cursor: pointer;
}
.kpi-box:hover {
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255,255,255,0.05);
}
.kpi-box:active {
    transform: scale(0.92);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
}
.kpi-label {
    font-size: 10px;
    color: #A0A0A5;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    font-weight: 800;
}
.kpi-value {
    font-size: 23px;
    font-weight: 900;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
    letter-spacing: -0.5px;
}
.val-std-pos { color: var(--c-success); text-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
.val-std-neg { color: var(--c-danger); text-shadow: 0 0 15px rgba(255, 46, 77, 0.2); }
.val-std-blue { color: var(--c-primary); text-shadow: 0 0 15px rgba(0, 184, 255, 0.2); }
/* =========================================
FILTROS AVANZADOS: ESTILO CRISTAL MORADO COMPACTO
========================================= */
/* 1. BOTÓN DE ABRIR (El interruptor) */
.filters-toggle {
background: rgba(191, 90, 242, 0.1) !important; /* Fondo morado casi transparente */
backdrop-filter: blur(5px);
-webkit-backdrop-filter: blur(5px);
border: 1px solid var(--c-accent); /* Borde morado neón */
color: var(--c-accent);
/* Dimensiones más estrechas */
padding: 8px;
width: 100%;
border-radius: 12px;
margin-bottom: 5px;
/* Tipografía "Tech" */
font-family: 'Inter', sans-serif;
font-size: 11px;
font-weight: 800;
text-transform: uppercase;
letter-spacing: 2px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
transition: all 0.3s ease;
box-shadow: 0 0 10px rgba(191, 90, 242, 0.1);
}
.filters-toggle:hover {
background: rgba(191, 90, 242, 0.2) !important;
box-shadow: 0 0 20px rgba(191, 90, 242, 0.3);
text-shadow: 0 0 8px var(--c-accent);
}
/* 2. EL CONTENEDOR (El panel desplegable) */
.filters-container {
    background: rgba(10, 10, 10, 0.85) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(191, 90, 242, 0.4);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    border-radius: 16px;
    margin-bottom: 15px;
    display: none;
    padding: 24px 20px; /* Más aire interior */
    flex-direction: column; /* Fundamental para evitar amontonamiento */
    gap: 16px; /* Separación perfecta entre las filas */
}

.filters-container.open {
    display: flex; /* Cambiado de block a flex */
    animation: slideDown 0.3s ease-out;
}

/* 3. INPUTS Y SELECTS (Campos de cristal) */
.filter-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1); /* Borde sutil rodeando todo */
    border-bottom: 2px solid rgba(191, 90, 242, 0.5); /* Acento inferior morado */
    color: #fff;
    padding: 12px 10px; /* Campos más altos y cómodos para el dedo */
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px; /* Redondeo completo, no solo arriba */
    transition: all 0.3s ease;
    box-sizing: border-box;
    appearance: none; /* Elimina la flecha genérica fea del sistema */
    -webkit-appearance: none;
}

.filter-input:focus {
    outline: none;
    background: rgba(191, 90, 242, 0.15);
    border-color: var(--c-accent);
    box-shadow: 0 5px 15px rgba(191, 90, 242, 0.2);
}

/* Añadir flechita elegante a los selects */
select.filter-input {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(191, 90, 242, 0.8)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 16px;
    padding-right: 35px; /* Que el texto no pise la flecha */
}

/* Mini etiquetas para estructurar la info */
.filter-label {
    display: block;
    font-size: 10px;
    color: var(--c-accent);
    text-transform: uppercase;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-left: 2px;
}

/* 5. ESTRUCTURA DE REJILLA (Responsive) */
.filters-row-2 { 
    display: grid; 
    grid-template-columns: 1fr; /* Móvil: 1 sola columna para que respiren */
    gap: 16px; 
    width: 100%;
}
@media (min-width: 450px) {
    /* Tablets/PC: 2 columnas */
    .filters-row-2 { grid-template-columns: 1fr 1fr; }
}
/* 4. BOTONES DE ACCIÓN (Aplicar / Limpiar) */
.btn-apply {
width: 100%;
background: var(--c-accent); /* Morado sólido */
color: #000;
border: none;
padding: 8px;
border-radius: 8px;
font-size: 10px;
font-weight: 900;
letter-spacing: 1px;
cursor: pointer;
margin-bottom: 5px;
box-shadow: 0 0 15px rgba(191, 90, 242, 0.4);
transition: transform 0.2s;
}
.btn-apply:active { transform: scale(0.98); }
.btn-clear {
width: 100%;
background: transparent;
color: #888;
border: 1px solid #444;
padding: 6px;
border-radius: 8px;
font-size: 9px;
cursor: pointer;
transition: all 0.2s;
}
.btn-clear:hover { border-color: #fff; color: #fff; }
/* 5. ESTRUCTURA DE REJILLA (Más apretada) */
.filters-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
/* Ajuste para que las opciones del select sean legibles (fondo negro) */
select.filter-input option { background-color: #000; color: #fff; }
/* ESTILO ÚNICO: TARJETAS (CARDS) */
table { width: 100%; }
thead { display: none !important; } /* Aseguramos que no se vea ninguna cabecera residual */
/* ESTRUCTURA BASE DE LA TARJETA */
tbody {
/* Magia para anular la tabla y forzar centrado absoluto */
display: flex;
flex-direction: column;
align-items: center;
width: 100%;
}
tbody tr {
display: grid;
grid-template-columns: 1fr auto;
grid-template-rows: auto;
align-items: center;
/* 🚀 MAGIA DE RENDIMIENTO: No dibuja lo que no se ve en pantalla */
content-visibility: auto;
contain-intrinsic-size: 65px;
will-change: transform;
/* FONDO CRISTAL MEJORADO */
background: linear-gradient(90deg, rgba(40, 40, 40, 0.5), rgba(20, 20, 20, 0.6)) !important;
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
/* --- 5PX DE SEPARACIÓN REAL CENTRADA --- */
margin: 5px 0 !important;
width: calc(100% - 10px) !important;
box-sizing: border-box !important;
padding: 8px 12px !important;
border-radius: 12px !important;

/* =========================================
🚀 FORMULARIO "THE NEON COCKPIT" (FULLSCREEN NO-SCROLL)
/* El contenedor principal que tapa toda la pantalla */
#modal-manual {
display: none; /* Se activa con flex */
position: fixed;
top: 0;
left: 50%; /* Lo empuja al centro */
transform: translateX(-50%); /* Centrado matemático perfecto */
width: 100%;
max-width: 800px; /* Tope para que no se estire en pantallas grandes */
height: 100dvh; /* Altura dinámica real del móvil */
background: #000000;
z-index: 20000;
flex-direction: column;
overflow: hidden; /* PROHIBIDO EL SCROLL GLOBAL */
transition: all 0.3s ease;
}
#modal-manual.active { display: flex; }
/* --- COLORES DINÁMICOS SEGÚN MODO --- */
/* GASTO (Por defecto rojo) */
#modal-manual[data-mode="gasto"] { --theme-color: #FF2E4D; }
/* INGRESO */
#modal-manual[data-mode="ingreso"] { --theme-color: #39FF14; }
/* TRASPASO */
#modal-manual[data-mode="traspaso"] { --theme-color: #00B8FF; }
/* 1. CABECERA (Compacta) */
.cockpit-header {
height: 60px;
display: flex; justify-content: space-between; align-items: center;
padding: 0 20px;
border-bottom: 1px solid rgba(255,255,255,0.1);
}
.cockpit-title {
font-size: 14px; font-weight: 900; letter-spacing: 2px;
color: var(--theme-color); text-transform: uppercase;
text-shadow: 0 0 10px var(--theme-color);
}
.btn-close-cockpit {
background: transparent; border: none; color: #666; font-size: 24px;
}
/* 2. ZONA HÉROE (El Importe Gigante) */
.cockpit-hero {
flex: 0 0 auto; /* No crece ni encoge */
padding: 20px 0;
text-align: center;
position: relative;
}
.cockpit-amount {
background: transparent; border: none; outline: none;
font-size: 60px; font-weight: 800; color: #fff;
width: 100%; text-align: center;
font-family: 'Inter', sans-serif;
text-shadow: 0 0 20px var(--theme-color); /* Resplandor del color actual */
}
.cockpit-label {
font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px;
}
/* 3. LA REJILLA DE CONTROL (Grid perfecto) */
.cockpit-grid {
flex: 1; /* Ocupa todo el espacio sobrante entre la cabecera y el botón */
display: grid;
grid-template-columns: 1fr 1fr; /* 2 Columnas */
grid-auto-rows: max-content; /* Se adapta a los campos que haya */
align-content: start; /* Empuja los campos hacia arriba */
gap: 12px;
padding: 0 15px 15px 15px;
overflow-y: auto; /* PERMITE EL DESLIZAMIENTO SOLO AQUÍ DENTRO */
padding-bottom: 40px; /* Da un poco de aire antes del botón */
}
/* Cajas de input estilizadas como botones de nave */
.cockpit-input-box {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 16px;
padding: 10px 15px;
display: flex; flex-direction: column; justify-content: center;
transition: all 0.2s;
position: relative;
}
/* Cuando tocas una caja */
.cockpit-input-box:focus-within {
background: rgba(255,255,255,0.1);
border-color: var(--theme-color);
box-shadow: 0 0 15px var(--theme-color);
}
.input-label-mini { font-size: 9px; color: var(--theme-color); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; opacity: 0.8; }
.input-field-cockpit {
background: transparent; border: none; color: #fff; width: 100%;
font-size: 15px; font-weight: 600; outline: none;
font-family: 'Inter', sans-serif; padding: 0;
}
/* Excepciones de tamaño */
.span-2-cols { grid-column: span 2; } /* Ocupa todo el ancho */
/* Ocultar/Mostrar según traspaso */
.only-traspaso { display: none; }
#modal-manual[data-mode="traspaso"] .only-traspaso { display: flex; }
#modal-manual[data-mode="traspaso"] .hide-on-traspaso { display: none; }
/* 4. BOTÓN DE LANZAMIENTO (Footer) */
.cockpit-footer {
padding: 15px;
padding-bottom: calc(15px + env(safe-area-inset-bottom));
background: linear-gradient(0deg, #000 0%, transparent 100%);
}
.btn-launch {
width: 100%;
height: 55px;
background: var(--theme-color);
color: #000;
border: none; border-radius: 20px;
font-size: 18px; font-weight: 900; letter-spacing: 1px;
text-transform: uppercase;
box-shadow: 0 0 30px var(--theme-color); /* BRUTAL NEON SHADOW */
cursor: pointer;
transition: transform 0.1s;
display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-launch:active { transform: scale(0.95); }
.btn-launch:disabled { background: #333; color: #555; box-shadow: none; }
/* Iconos dentro de los inputs */
.field-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }
/* =========================================
🔧 CORRECCIÓN DE SELECTORES (LEGIBILIDAD)
========================================= */
/* 1. Forzar al navegador a usar controles oscuros nativos */
#modal-manual {
color-scheme: dark; /* Esto arregla el scroll nativo en iPhone/Android */
}
/* 2. Estilo de la caja select (Añadimos flechita personalizada) */
select.input-field-cockpit {
appearance: none; /* Quitar estilo feo del sistema */
-webkit-appearance: none;
-moz-appearance: none;
background-color: transparent;
color: #fff;
cursor: pointer;
/* Flechita blanca manual para que se vea moderna */
background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
background-repeat: no-repeat;
background-position: right 0 center;
background-size: 16px;
padding-right: 20px; /* Espacio para que el texto no toque la flecha */
}
/* 3. FONDO NEGRO PARA LAS OPCIONES DESPLEGADAS (Importante en Android/PC) */
select.input-field-cockpit option {
background-color: #1a1a1a; /* Fondo gris muy oscuro */
color: #fff; /* Texto blanco puro */
padding: 12px;
font-size: 16px;
}
/* 4. Arreglo para iOS (Fondo oscuro en selects nativos) */
select:focus > option:checked {
background: var(--theme-color) !important; /* Color neón al seleccionar */
color: #000 !important;
}
/* --- FIX FINAL: SCROLL Y ESPACIADO --- */
/* 1. Obligar al gráfico a dejar pasar el scroll vertical */
#chart-TreeMap, #chart-TreeMap canvas {
touch-action: pan-y !important;
user-select: none;
-webkit-user-select: none;

/* 2. Ajuste de espaciado en la pestaña Patrimonio */

padding-bottom: 100px !important; /* Espacio solo al FINAL de la página */
}

/* ═══════════════════════════════════════════════════════════
ESTILO DEL INTERRUPTOR (TOGGLE SWITCH) PARA BIOMETRÍA
═══════════════════════════════════════════════════════════ */
.switch {
position: relative;
display: inline-block;
width: 50px;
height: 28px;
}
.switch input {
opacity: 0;
width: 0;
height: 0;
}
.slider {
position: absolute;
cursor: pointer;
top: 0; left: 0; right: 0; bottom: 0;
background-color: rgba(255, 255, 255, 0.2);
transition: .4s;
border-radius: 34px;
}
.slider:before {
position: absolute;
content: "";
height: 20px; width: 20px;
left: 4px; bottom: 4px;
background-color: white;
transition: .4s;
border-radius: 50%;
box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
input:checked + .slider {
background-color: var(--c-primary, #00b8ff);
box-shadow: 0 0 10px rgba(0, 184, 255, 0.5);
}
input:checked + .slider:before {
transform: translateX(22px);
}

/* 3. ANIMACIÓN DE ENTRADA EN CASCADA (Lista Viva) */
@keyframes fadeSlideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
/* Aplicamos la animación a las filas de la tabla */
tbody tr {
animation: fadeSlideUp 0.4s ease-out backwards !important;
}
/* Efecto dominó: escalonamos la entrada de los primeros elementos */
tr:nth-child(1) { animation-delay: 0.05s !important; }
tr:nth-child(2) { animation-delay: 0.10s !important; }
tr:nth-child(3) { animation-delay: 0.15s !important; }
tr:nth-child(4) { animation-delay: 0.20s !important; }
tr:nth-child(5) { animation-delay: 0.25s !important; }
tr:nth-child(6) { animation-delay: 0.30s !important; }
tr:nth-child(7) { animation-delay: 0.35s !important; }
tr:nth-child(8) { animation-delay: 0.40s !important; }

   ======================================================= */
/* 1. La magia del cambio de color (Hue Rotate) y el latido (Scale) */
@keyframes corazon-neon {
    0% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(0deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(0, 184, 255, 0.8), inset 0 0 15px rgba(0, 184, 255, 0.6);
    }
    20% {
        transform: translateY(-50px) scale(1.18);

    }
    40% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(144deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(255, 46, 77, 0.8), inset 0 0 15px rgba(255, 46, 77, 0.6);

    80% {

        filter: hue-rotate(288deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(57, 255, 20, 0.8), inset 0 0 15px rgba(57, 255, 20, 0.6);
    }
    100% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(360deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(0, 184, 255, 0.8), inset 0 0 15px rgba(0, 184, 255, 0.6);
    }
}

<script>
 // INICIO REFINAMIENTO UX: Biometría sin bloqueos
window.usarHuellaMovil = async function() {
    const esEntornoSeguro = window.isSecureContext || window.location.hostname === 'localhost';
    if (!window.PublicKeyCredential || !esEntornoSeguro) {
        return window.mostrarPin();
    }
    // Comprobamos si el usuario la registró previamente
    if (localStorage.getItem('aidanai_huella_activa') !== 'SI') {
        // 1. Detectamos si es PC (puntero fino) para evitar el aviso
        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        // 2. En móvil, creamos un Toast elegante en lugar de un alert()
        if (!isDesktop) {
            let toast = document.getElementById('toast-bio');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-bio';
                toast.innerHTML = "🔐 Entra con tu PIN y activa la huella en Ajustes";
                // Estilos inyectados (Pixel Perfect & Glassmorphism)
                Object.assign(toast.style, {
                    position: 'fixed', bottom: '30px', left: '50%', transform: 'translate(-50%, 20px)',
                    background: 'rgba(30, 30, 30, 0.95)', backdropFilter: 'blur(10px)', color: '#fff',
                    padding: '12px 20px', borderRadius: '30px', boxShadow: '0 10px 25px rgba(0,0,0,0.5)',
                    border: '1px solid rgba(255,255,255,0.1)', fontSize: '13.5px', fontWeight: '500',
                    zIndex: '9999', opacity: '0', transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                    whiteSpace: 'nowrap', pointerEvents: 'none'
                });
                document.body.appendChild(toast);
                // Animación de entrada
                requestAnimationFrame(() => {
                    toast.style.transform = 'translate(-50%, 0)';
                    toast.style.opacity = '1';
                });
                // Destrucción automática a los 3.5 segundos
                setTimeout(() => {
                    toast.style.transform = 'translate(-50%, 20px)';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3500);
            }
        }
        return window.mostrarPin(); // Transición fluida
    }
    try {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const reqOpts = {
            challenge: challenge,
            timeout: 60000,
            userVerification: "required",
            rpId: window.location.hostname
        };
        const assertion = await navigator.credentials.get({ publicKey: reqOpts });
        if (assertion) {
            window.desbloquearApp();
        }
    } catch (e) {
        // En Fintech, si falla/cancela el FaceID, se muestra el PIN en silencio sin asustar al usuario.
        console.warn("Fallo o cancelación biométrica, pasando a PIN silenciosamente:", e);
        window.mostrarPin();
    }
};
// FIN REFINAMIENTO UX: Biometría sin bloqueos   

// --- LÓGICA DEL TECLADO PIN (REFACTORIZADA Y FAIL-CLOSED) ---
let pinActual = "";

function teclaPin(num) {
    const msj = document.getElementById('auth-message');
    // Limpiamos el mensaje de error visual al empezar a teclear
    if (msj && msj.innerText.includes("incorrecto")) {
        msj.innerText = "Introduce tu PIN de acceso";
        msj.style.color = "#888888"; 
    }

    if (pinActual.length < 4) {
        pinActual += num;
        actualizarPantallaPin();
        
        if (pinActual.length === 4) {
            setTimeout(comprobarPin, 100); 
        }
    }
}

function borrarPin() {
    if (pinActual.length > 0) {
        pinActual = pinActual.slice(0, -1);
        actualizarPantallaPin();
    }
}

function limpiarPin() {
    pinActual = "";
    actualizarPantallaPin();
}

function actualizarPantallaPin() {
    // FIX: Conexión con el DOM real (los 4 círculos físicos)
    const dots = document.querySelectorAll('#pin-dots .pin-dot');
    if (!dots || dots.length === 0) return;

    dots.forEach((dot, index) => {
        if (index < pinActual.length) {
            // Estado Lleno (Teclado pulsado)
            dot.style.background = '#FFD700';
            dot.style.borderColor = '#FFD700';
            dot.style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
        } else {
            // Estado Vacío (Por defecto)
            dot.style.background = 'transparent';
            dot.style.borderColor = 'rgba(255,255,255,0.3)';
            dot.style.boxShadow = 'none';
        }
    });
}

async function comprobarPin() {
    const msj = document.getElementById('auth-message');

    // 1. POSTURA FAIL-CLOSED (Seguridad Crítica)
    // Si el motor criptográfico no está en memoria, DENEGAMOS acceso incondicionalmente.
    if (typeof PinSecurity === 'undefined') {
        if (msj) {
            msj.innerText = "Error crítico de seguridad. Acceso denegado.";
            msj.style.color = "#FF2E4D"; // Rojo peligro
        }
        return limpiarPin(); // Abortamos
    }

    try {
        const esCorrecto = await PinSecurity.verificar(pinActual);

        // 2. RETURN EARLY (Fallo de validación)
        if (!esCorrecto) {
            if (msj) {
                msj.innerText = "❌ PIN incorrecto. Inténtalo de nuevo.";
                msj.style.color = "#FF2E4D";
            }
            
            // Animación de "Shake" (Agitación) y vibración para feedback táctil de error
            const pinDotsCont = document.getElementById('pin-dots');
            if (pinDotsCont) {
                pinDotsCont.style.transition = 'transform 0.1s';
                pinDotsCont.style.transform = 'translateX(-10px)';
                setTimeout(() => pinDotsCont.style.transform = 'translateX(10px)', 50);
                setTimeout(() => pinDotsCont.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => pinDotsCont.style.transform = 'translateX(10px)', 150);
                setTimeout(() => pinDotsCont.style.transform = 'translateX(0)', 200);
            }
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

            return limpiarPin();
        }

        // 3. CAMINO FELIZ (Happy Path)
        PinSecurity.setSession(pinActual);
        
        // Dependiendo de cómo lo hayas expuesto, llamamos a la función global de desbloqueo
        if (typeof window.desbloquearApp === 'function') {
            window.desbloquearApp();
        } else if (typeof desbloquearApp === 'function') {
            desbloquearApp();
        }
        
    } catch (error) {
        // Failsafe por si PinSecurity lanza una excepción no controlada
        if (msj) {
            msj.innerText = "Fallo del sistema de verificación.";
            msj.style.color = "#FF2E4D";
        }
        return limpiarPin();
    }
}
// --- NUEVA HERRAMIENTA MATEMÁTICA SEGURA ---
window.sumarDinero = function(a, b) {
    // Multiplica por 100 para operar con enteros (céntimos) y evitar errores de decimales fantasma
    return Math.round((parseFloat(a || 0) + parseFloat(b || 0)) * 100) / 100;
};
// --- HERRAMIENTA DE FUSIÓN DE DATOS (NUBE + MÓVIL) ---
// NUEVO: SMART MERGE (Fusión Inteligente Fintech)
window.fusionarMovimientos = function(movimientosNube, movimientosLocales) {
    if (!movimientosNube || movimientosNube.length === 0) return movimientosLocales || [];
    if (!movimientosLocales || movimientosLocales.length === 0) return movimientosNube;
    // 1. Usamos un Map (diccionario) para garantizar unicidad y facilitar la sobrescritura
    const mapaFusionado = new Map();
    // 2. Cargamos la "verdad de la nube" como base
    movimientosNube.forEach(function(mov) {
        const idNube = mov.Id || mov.id;
        if (idNube) mapaFusionado.set(idNube, mov);
    });
    // 3. 🟢 SMART MERGE: Aplicamos los datos locales por encima
    // Si el ID ya existe (ej. una edición tuya), Map.set() machaca el antiguo con tu versión fresca.
    // Si es un ID nuevo (un gasto recién creado), simplemente lo añade al final.
    movimientosLocales.forEach(function(movLocal) {
        const idLocal = movLocal.Id || movLocal.id;

window.ChartLifecycle = (function() {

    const registry = {
        'inicio': ['chart-Sankey'],
        'patri':  ['chart-Sunburst', 'chart-TreeMap', 'chartPatrimonio'],

        // Elimina de RAM todo lo que no pertenezca a la pestaña actual
        limpiarMemoria: function(tabDestino) {
            const graficosEnTab = registry[tabDestino] || [];
            // Recorremos todos los posibles contenedores de gráficos
            const todosLosIds = Object.values(registry).flat();
            todosLosIds.forEach(id => {
                // Si el gráfico NO pertenece a la pestaña a la que vamos, lo matamos
                if (!graficosEnTab.includes(id)) {
                    const dom = document.getElementById(id);
                    if (dom) {
                        const instance = echarts.getInstanceByDom(dom);
                        if (instance) {
                            instance.dispose();
                        }
                        // Limpiar ResizeObserver asociado para evitar fugas de memoria
                        const obsKey = '_resizeObs_' + id;
                        if (window[obsKey]) {
                            window[obsKey].disconnect();
                            window[obsKey] = null;
                        }
                    }
                }
            });
        },
        // Redibuja solo los gráficos de la pestaña activa si hay datos
        despertarGraficos: function(tabActiva) {

const SpaceEngine = (() => {

let stars = [];
let shootingStars = [];

const CONFIG = {
starCount: 220,          // Mantenemos número bajo para rendimiento
shootingStarFreq: 0.012, // Frecuencia de estrellas fugaces
bgColor: '#000000',      // Fondo negro puro
baseSpeed: 0.05          // Velocidad base del efecto 3D (Parallax)
};

const starColors = ['#ffffff', '#e0f0ff', '#b5d5ff', '#fff4e0', '#ffebd6', '#ffd2b5'];
// CLASE: ESTRELLA DE FONDO (Con efecto Parallax 3D)
class Star {
constructor() { this.reset(true); }
reset(randomizeX = false) {
// Si nace por primera vez, posición aleatoria. Si reaparece, nace en la derecha.
this.x = randomizeX ? Math.random() * w : w;
this.y = Math.random() * h;
// El tamaño determina la capa de profundidad (Parallax)
this.size = Math.random() * 1.8 + 0.2;
this.baseAlpha = Math.random() * 0.6 + 0.1;
this.phase = Math.random() * Math.PI * 2;
this.color = starColors[Math.floor(Math.random() * starColors.length)];
this.blinkSpeed = Math.random() * 0.03 + 0.01;
// MAGIA 3D: Las estrellas más grandes (más cerca) se mueven más rápido
this.driftSpeed = (this.size * CONFIG.baseSpeed) + 0.01;
}
update() {
this.phase += this.blinkSpeed; // Parpadeo orgánico
this.x -= this.driftSpeed;     // Deriva hacia la izquierda
if (this.x < 0) this.reset(false); // Si sale de pantalla, vuelve a nacer
}
draw() {
const currentAlpha = this.baseAlpha + Math.sin(this.phase) * 0.4;
// TRUCO DE RENDIMIENTO: Falso resplandor (Halo) solo para estrellas grandes y en su pico de brillo
if (this.size > 1.2 && currentAlpha > 0.6) {
ctx.globalAlpha = 0.15;
ctx.fillStyle = this.color;
ctx.fillRect(this.x - 1, this.y - 1, this.size + 2, this.size + 2);
}
ctx.globalAlpha = Math.max(0, currentAlpha);
ctx.fillStyle = this.color;
ctx.fillRect(this.x, this.y, this.size, this.size);
}
}
// CLASE: ESTRELLA FUGAZ (Más dramática y con destello eléctrico)
class ShootingStar {
constructor() { this.reset(); }
reset() {
this.x = Math.random() * w * 1.5; // Pueden nacer más a la derecha para cruzar toda la pantalla
this.y = -20;
this.speed = Math.random() * 20 + 15; // Velocidad de impacto
this.size = Math.random() * 1.5 + 1;
// Caída diagonal dramática cruzando el espacio
this.dirX = -1;
this.dirY = Math.random() * 0.5 + 0.5;
this.length = Math.random() * 80 + 50;
this.color = (Math.random() > 0.7) ? '#00e5ff' : '#ffffff'; // Cian eléctrico (neón) o blanco
}
update() {
this.x += this.speed * this.dirX;
this.y += this.speed * this.dirY;
return !(this.x < -this.length || this.x > w + this.length || this.y > h + this.length);
}
draw() {
const tailX = this.x - (this.length * this.dirX);
const tailY = this.y - (this.length * this.dirY);
// 1. Cola semitransparente (Súper eficiente, un solo trazo)
ctx.globalAlpha = 0.4;
ctx.beginPath();
ctx.strokeStyle = this.color;
ctx.lineWidth = this.size * 0.8;
ctx.moveTo(tailX, tailY);
ctx.lineTo(this.x, this.y);
ctx.stroke();
// 2. Halo de resplandor del núcleo (Falso Glow)
ctx.globalAlpha = 0.4;
ctx.fillStyle = this.color;
ctx.fillRect(this.x - 1, this.y - 1, this.size * 2.5, this.size * 2.5);
// 3. Cabeza brillante ardiente
ctx.globalAlpha = 1;
ctx.fillStyle = '#ffffff';
ctx.fillRect(this.x, this.y, this.size * 1.5, this.size * 1.5);
}
}

for (let i = 0; i < stars.length; i++) {
stars[i].update();
stars[i].draw();

// Inyección de estrellas fugaces
if (Math.random() < CONFIG.shootingStarFreq) {

}
// Motor de física de fugaces (bucle invertido súper rápido)
for (let i = shootingStars.length - 1; i >= 0; i--) {

}
animationId = requestAnimationFrame(animate);

/* ============================================================
🔒 CRYPTOSYSTEM — AES-GCM-256 con PBKDF2-SHA256
Responsabilidad única: encriptar/desencriptar blobs en b64.
============================================================ */
const CryptoSystem = (() => {
const ITER      = 200_000;   // OWASP 2024 mínimo para SHA-256
const KEY_LEN   = 256;
const SALT_LEN  = 16;        // 128 bits
const IV_LEN    = 12;        // 96 bits (óptimo GCM)
const enc       = new TextEncoder();
const dec       = new TextDecoder();
async function _derivarClave(password, salt) {
const keyMaterial = await crypto.subtle.importKey(
'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
);
return crypto.subtle.deriveKey(
{ name: 'PBKDF2', salt, iterations: ITER, hash: 'SHA-256' },
keyMaterial,
{ name: 'AES-GCM', length: KEY_LEN },
false, ['encrypt', 'decrypt']
);
}
async function encriptar(objeto, password) {
const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
const iv   = crypto.getRandomValues(new Uint8Array(IV_LEN));
const key  = await _derivarClave(password, salt);
const data = enc.encode(JSON.stringify(objeto));
const cifrado = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
// Formato: salt(16) || iv(12) || ciphertext
const blob = new Uint8Array(SALT_LEN + IV_LEN + cifrado.byteLength);
blob.set(salt, 0);
blob.set(iv, SALT_LEN);
blob.set(new Uint8Array(cifrado), SALT_LEN + IV_LEN);
// --- FIX: Iteración manual en lugar de operador spread (...blob) ---
let binaryStr = '';
const len = blob.length;
for (let i = 0; i < len; i++) {
binaryStr += String.fromCharCode(blob[i]);
}
return btoa(binaryStr);
}
async function desencriptar(b64, password) {
const bytes   = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
const salt    = bytes.slice(0, SALT_LEN);
const iv      = bytes.slice(SALT_LEN, SALT_LEN + IV_LEN);
const cifrado = bytes.slice(SALT_LEN + IV_LEN);
const key     = await _derivarClave(password, salt);
const plano   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cifrado);
return JSON.parse(dec.decode(plano));
}
return { encriptar, desencriptar };
})();

const PinSecurity = (() => {
    const STORAGE_KEY = 'aidanai_pw_v3';
    let sessionPin = ""; 
    async function _hash(pin) {
        const data = new TextEncoder().encode(pin + 'aidanai_definitivo_salt');
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    async function guardarNuevo(pin) {
        localStorage.setItem(STORAGE_KEY, await _hash(pin));
        sessionPin = pin;
        if (typeof guardarUniversal === 'function' && window.modoNube) guardarUniversal();
    }
    async function verificar(pin) {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return pin === '1234'; 
        // 🛟 SALVAVIDAS: Si has puesto tu PIN normal a mano en el Excel, 
        // la app lo reconoce, te deja entrar y lo encripta para la próxima vez.
        if (stored === pin) {
            await guardarNuevo(pin);
            return true;
        }
        return (await _hash(pin)) === stored;
    }
    function setSession(pin) { sessionPin = pin; }
    function getSession() { return sessionPin; }
    function esVirgen() {
        return !localStorage.getItem(STORAGE_KEY);
    }
    return { guardarNuevo, verificar, setSession, getSession, esVirgen, hashear: _hash };

class OneDriveManager {

async _inicializarMsal() {
if (typeof msal === 'undefined') {

clearInterval(check);
resolve();
}
}, 100);
});

}
// ==========================================
// 🛡️ OBTENER TOKEN (CON RENOVACIÓN SILENCIOSA ANTI-CADUCIDAD)
// ==========================================
async getToken() {
await this._msalReady;
const cuentas = this.msalInstance.getAllAccounts();
if (cuentas.length === 0) {
throw new Error("No hay ninguna sesión iniciada en OneDrive.");
}
const request = {
scopes: ["Files.ReadWrite", "User.Read"],
account: cuentas[0]
};
try {
// 1. Intentamos renovar el 'pase VIP' de forma silenciosa e invisible
const response = await this.msalInstance.acquireTokenSilent(request);
return response.accessToken;
} catch (error) {
console.warn("⚠️ El token silencioso caducó o falló. Forzando reconexión...", error);
try {
// 2. Si falla lo silencioso (ej. llevas días sin abrirla y Microsoft exige verte), pedimos el pase visiblemente
const response = await this.msalInstance.acquireTokenPopup(request);
return response.accessToken;
} catch (popupError) {
console.error("❌ Imposible renovar la sesión:", popupError);
// Si todo falla, forzamos a que el botón rojo de desconectado aparezca
notify("Sesión caducada. Por favor, vuelve a entrar.", "error");
throw new Error("Sesión caducada de Microsoft. Debes volver a iniciar sesión.");
}
}
}

await this._msalReady;
try {
await this.msalInstance.handleRedirectPromise().catch(()=>{});
const resp = await this.msalInstance.loginPopup({
scopes: ["User.Read", "Files.ReadWrite.All"],
prompt: "select_account"
});
return resp.accessToken;
} catch (e) {

}

const token = await this.getToken();

});

const data = await res.json();

} else {
// 🔒 ROBUSTEZ: Si el archivo no existe (404), limpiamos la caché para no quedar

localStorage.removeItem("aidanai_file_id");
this.fileId = null;
this.lastETag = null;
throw new Error("❌ No encuentro 'aidanai.xlsx' en tu OneDrive. Asegúrate de que el archivo existe en la raíz.");
}
}
// --- 3. LECTURA BINARIA (DESCARGA EXACTA DEL ARCHIVO) ---
async descargarDatosBinario() {
if(window.mostrarEstado) notify("📥 Leyendo nube (Modo Binario)...", "loading");
const token = await this.getToken();
let id = await this.getFileId();
let [resMeta, resContent] = await Promise.all([
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, { headers: { Authorization: `Bearer ${token}` } }),
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}/content`, { headers: { Authorization: `Bearer ${token}` } })
]);
// Si el ID cacheado falla, buscamos el archivo nuevo
if (resContent.status === 404) {
localStorage.removeItem("aidanai_file_id");
this.fileId = null;
id = await this.getFileId();
const retryRes = await Promise.all([
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, { headers: { Authorization: `Bearer ${token}` } }),
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}/content`, { headers: { Authorization: `Bearer ${token}` } })
]);
resMeta = retryRes[0];
resContent = retryRes[1];
}
if (resMeta.ok) {
const metaJson = await resMeta.json();
this.lastETag = metaJson.eTag || null;
}
if (!resContent.ok) throw new Error(`Error descargando desde OneDrive`);
const arrayBuffer = await resContent.arrayBuffer();
// CLAVE: cellDates=true obliga a que se lea IGUAL que en el modo local
return XLSX.read(new Uint8Array(arrayBuffer), { type: 'array', cellDates: true });
}

async saveFile(blob) {
const id = await this.getFileId();
const token = await this.getToken();
const headers = {
'Authorization': `Bearer ${token}`,
'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
};
if (this.lastETag) { headers['If-Match'] = this.lastETag; }
// 🛡️ 1. CREAR EL CORTOCIRCUITO (8 segundos máximo)
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 8000);
try {
    // 🛡️ 2. TU FETCH ORIGINAL (Añadiendo el 'signal' al final)
    const response = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}/content`, {
        method: 'PUT', 
        headers: headers, 
        body: blob,
        signal: controller.signal // <--- La conexión con el cortocircuito
    });
    // 🛡️ 3. SI RESPONDE A TIEMPO, DESACTIVAMOS EL TIMEOUT
    clearTimeout(timeoutId);
    // --- TU LÓGICA DE ETAG INTACTA ---
    if (response.status === 412) {
        this.lastETag = null;
        throw { code: 'CONFLICT_412', message: "⚠️ Conflicto detectado" };
    }
    if (!response.ok) throw new Error("Error al subir");
    if (response.headers.get('eTag')) {
        this.lastETag = response.headers.get('eTag');
    } else {
        try {
            const metaRes = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, { headers: { Authorization: `Bearer ${token}` } });
            if (metaRes.ok) { const m = await metaRes.json(); this.lastETag = m.eTag || null; }
        } catch(e) { }
    }
    // ----------------------------------
} catch (error) {
    // 🛡️ 4. CAPTURAR EL CORTE O LOS ERRORES
    clearTimeout(timeoutId); // Limpiamos la memoria por seguridad
    if (error.name === 'AbortError') {
        console.error("⏳ TIMEOUT: OneDrive no respondió en 8s.");
        // Lanzamos un error amigable para que lo gestione la función padre
        throw new Error("Red inestable. Subida cancelada por seguridad."); 
    } else {
        // Re-lanzamos cualquier otro error (como tu CONFLICT_412) para no romper tu lógica actual
        throw error; 
    }
}
}

        const primerDia = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);

        desde = `${hoy.getFullYear()}-01-01`;

isDragging = false;
const dy = e.changedTouches[0].clientY - startY;
// Restauramos la transición suave para lo que viene después
modal.style.transition = 'transform 0.3s ease';
if (dy > 120) {
// El usuario soltó tras bajar más de 120px → cerramos
modal.style.transform = 'translateX(-50%) translateY(100%)';
setTimeout(function() {
// Dejamos que la animación termine (300ms) y luego
// llamamos a cerrarModal que limpia los campos
window.cerrarModal();
// Reseteamos el transform para la próxima apertura
modal.style.transition = '';
modal.style.transform  = '';
}, 300);
} else {
// El usuario soltó antes del umbral → vuelve a su sitio
modal.style.transform = 'translateX(-50%) translateY(0)';
setTimeout(function() {
modal.style.transition = '';
modal.style.transform  = '';
}, 300);
}
}, { passive: true });
})();
// --- GENERADOR DE IDs CANÓNICO (única implementación en toda la app) ---
const uuid = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : `id-${Date.now()}-${Math.random().toString(36).slice(2)}`;
// ==========================================
// 🛡️ GUARDAR MOVIMIENTO (BLINDADO + FECHA ESPAÑOLA + 8 COLUMNAS + SALA ESPERA)
// ==========================================
window.guardarManual = async function() {
if (document.getElementById('btn-modal-action').disabled) return;
// 1. BLOQUEAMOS EL BOTÓN AL INSTANTE CON LA NUEVA FUNCIÓN (Mejora B)
window.toggleBotonCarga('btn-modal-action', true);
// --- VIBRACIÓN ---
try { if (navigator.vibrate) navigator.vibrate(40); } catch(e){}
// --- INTERCEPTOR RECURRENTE ---
const chkRecurrente = document.getElementById('m-es-recurrente');
if (chkRecurrente && chkRecurrente.checked) {
// Cambiamos el texto temporalmente para saber que es recurrente
const btnGuardar = document.getElementById('btn-modal-action');
if (btnGuardar) btnGuardar.innerText = '⏳ GUARDANDO REGLA...';
try {
await window.guardarComoRecurrenteUnificado();
} catch(e) {
console.error(e);
window.mostrarToast(e.message, "error"); // Usamos el Toast de la Mejora A
} finally {
// DESBLOQUEAMOS EL BOTÓN
window.toggleBotonCarga('btn-modal-action', false);
}
return; // Cortamos aquí para que NO se anote como movimiento de hoy
}
// --- FIN INTERCEPTOR ---
const modoActual = window.modoTransaccionActual || 'gasto';
const generarID = () => typeof uuid === 'function' ? uuid() : crypto.randomUUID();
let movimientosParaLocal = [];
try {
const elId = document.getElementById('m-id');
const idExistente = elId ? elId.value : "";
// 📅 OBTENER Y FORMATEAR LA FECHA
const fechaCruda = document.getElementById('m-fecha').value;
if (!fechaCruda) throw new Error("Falta la FECHA");
let fechaParaExcel = new Date();
if (fechaCruda.includes('-')) {
const partes = fechaCruda.split('-');
fechaParaExcel = new Date(partes[0], partes[1] - 1, partes[2]);
}
const fechaFormateada = fechaParaExcel;
const timestampInterno = new Date(fechaCruda + 'T12:00:00').getTime();
const cuentaOrigen = document.getElementById('m-cuenta').value;
const elDestino = document.getElementById('m-cuenta-destino');
const cuentaDestino = (elDestino && elDestino.offsetParent !== null) ? elDestino.value : "";
let concepto = document.getElementById('m-concepto').value;
if (modoActual === 'traspaso') concepto = "TRASPASO";
const importeStr = document.getElementById('m-cantidad').value;
const desc = (document.getElementById('m-desc').value || "").toUpperCase().trim();
const benefManual = (document.getElementById('m-beneficiario').value || "").toUpperCase().trim();
// Validaciones (usamos throw para saltar al catch y no bloquear el botón)
if (!cuentaOrigen) throw new Error("Falta la CUENTA");
if (!importeStr) throw new Error("Falta el IMPORTE");
if (!concepto) throw new Error("Falta el CONCEPTO");
let importeLimpio = importeStr.replace('€', '').replace(',', '.').trim();
let importeNum = parseFloat(importeLimpio);
if (isNaN(importeNum) || importeNum === 0) throw new Error("El importe no es válido");
importeNum = Math.abs(importeNum);
const detectarDueno = (nombreCuenta) => {
const c = String(nombreCuenta).toUpperCase().trim();
if (c.startsWith("D-")) return "D";
if (c.startsWith("N-")) return "N";
return "DN";
};
// 🅰️ TRASPASO
if (modoActual === 'traspaso') {
if (!cuentaDestino) throw new Error("Selecciona CUENTA DESTINO");
if (cuentaOrigen === cuentaDestino) throw new Error("Origen y Destino iguales");
movimientosParaLocal.push({
id: generarID(), fecha: fechaFormateada, cuenta: cuentaOrigen, concepto: "TRASPASO",
importe: -importeNum, descripcion: `>> A: ${cuentaDestino} | ${desc}`,
beneficiario: detectarDueno(cuentaOrigen), tipo: 'traspaso', ts: timestampInterno
});
movimientosParaLocal.push({
id: generarID(), fecha: fechaFormateada, cuenta: cuentaDestino, concepto: "TRASPASO",
importe: importeNum, descripcion: `<< DE: ${cuentaOrigen} | ${desc}`,
beneficiario: detectarDueno(cuentaDestino), tipo: 'traspaso', ts: timestampInterno
});
}
// 🅱️ GASTO O INGRESO
else {
if (modoActual === 'gasto' || modoActual === 'pago') importeNum = -Math.abs(importeNum);
let benefFinal = benefManual || detectarDueno(cuentaOrigen);
movimientosParaLocal.push({
id: idExistente || generarID(), fecha: fechaFormateada, cuenta: cuentaOrigen, concepto: concepto,
importe: importeNum, descripcion: desc, beneficiario: benefFinal,
tipo: (importeNum >= 0) ? 'ingreso' : 'gasto', ts: timestampInterno
});
}
// 🛡️ REVERSIÓN OPTIMISTA EN MEMORIA
if (idExistente) {
const movOriginal = window.datos.find(m => m.id === idExistente);
if (movOriginal && (movOriginal.tipo === 'traspaso' || (movOriginal.concepto && movOriginal.concepto.toUpperCase().includes('TRASPASO')))) {
window.datos = window.datos.filter(m => {
if (m.id === idExistente) return false;
if (m.tipo === 'traspaso' && m.ts === movOriginal.ts && m.id !== idExistente) return false;
return true;
});
} else {
window.datos = window.datos.filter(m => m.id !== idExistente);
}
}
movimientosParaLocal.forEach(m => window.datos.push(m));
// Actualizamos UI usando el sistema de eventos de la Fase 2 (Más limpio)
if (window.UIEvents) window.UIEvents.emitir('datos:actualizados');
// 🚀 SUBIDA A LA NUBE
await window.guardarUniversal();
if (typeof window.cerrarModal === 'function') window.cerrarModal();
// Notificación de éxito
window.mostrarToast("Guardado con éxito", "success");
if (typeof vibrar === 'function') {
if (modoActual === 'traspaso') vibrar('traspaso');
else if (modoActual === 'gasto' || modoActual === 'pago') vibrar('gasto');
else vibrar('ingreso');
}
} catch (error) {
console.error("❌ Fallo en el proceso de guardado:", error);
// Si el error es de validación (falta importe, cuenta...), se lo decimos al usuario sin sala de espera
if (error.message.startsWith("Falta") || error.message.includes("Selecciona") || error.message.includes("Origen") || error.message.includes("importe")) {
window.mostrarToast(error.message, "error");
return; // Cortamos aquí
}
// --- INICIO DE LA SALA DE ESPERA (Errores de conexión) ---
let salaEspera = JSON.parse(localStorage.getItem('salaEsperaMovimientos') || '[]');
movimientosParaLocal.forEach(nuevoMov => {
const idxEspera = salaEspera.findIndex(m => m.id === nuevoMov.id);
if(idxEspera > -1) salaEspera[idxEspera] = nuevoMov;
else salaEspera.push(nuevoMov);
});
localStorage.setItem('salaEsperaMovimientos', JSON.stringify(salaEspera));
if (typeof window.cerrarModal === 'function') window.cerrarModal();
window.mostrarToast("⚠️ Guardado en Sala de Espera local. Se sincronizará más tarde.", "info");
} finally {
// 3. DESBLOQUEAMOS EL BOTÓN PASE LO QUE PASE (Éxito o Error)
window.toggleBotonCarga('btn-modal-action', false);
}
};
// FIN de guardarManual

// 🤖 BOT INVISIBLE: SINCRONIZADOR DE LA SALA DE ESPERA
// ==========================================
window.sincronizarSalaEspera = async function() {
// 1. Miramos si hay algo en la sala de espera
const salaEsperaJSON = localStorage.getItem('salaEsperaMovimientos');
if (!salaEsperaJSON) return; // Si está vacía, el bot sigue durmiendo
let salaEspera = [];
try {
salaEspera = JSON.parse(salaEsperaJSON);
} catch (e) { return; }
if (salaEspera.length === 0) return;
// 2. Comprobamos si hay internet y verificamos que la app no esté ya ocupada guardando otra cosa
if (!navigator.onLine || (window.AppState && window.AppState.isSaving)) return;
try {
// Ponemos el cartel de "Ocupado" para no chocar con el "Escudo anti-colisiones"
if (window.AppState) window.AppState.isSaving = true;
// 3. Volcamos los datos de la sala de espera en la memoria principal (por si habías cerrado la app)
let hayCambios = false;
salaEspera.forEach(movPendiente => {
const idx = window.datos.findIndex(m => m.id === movPendiente.id);
if (idx > -1) {
window.datos[idx] = movPendiente; // Si ya existía, lo actualiza
} else {
window.datos.push(movPendiente); // Si es nuevo, lo añade
hayCambios = true;
}
});
// Si hemos inyectado movimientos nuevos, recalculamos todo para que cuadre
if (hayCambios) {
window.datos.sort((a,b) => b.ts - a.ts);
if (typeof renderizar === 'function') renderizar();
if (typeof recalcularSaldosGlobal === 'function') recalcularSaldosGlobal();
if (typeof actualizarDashboard === 'function') actualizarDashboard();
}
// 4. Intentamos subir el Excel completo a OneDrive
await window.guardarUniversal();
// 5. ¡Éxito! Limpiamos la sala de espera
localStorage.removeItem('salaEsperaMovimientos');
if (typeof notify === 'function') {
notify(`✅ ¡Conexión recuperada! ${salaEspera.length} movimientos de la Sala de Espera subidos a OneDrive.`, "success");
}
} catch (error) {
console.error("❌ Bot Sincronizador: Sigue sin poder subir a OneDrive. Lo intentará en la próxima ronda.", error);
} finally {
// Quitamos el cartel de "Ocupado" pase lo que pase
if (window.AppState) window.AppState.isSaving = false;
}
};
// --- PONEMOS AL BOT A TRABAJAR ---
// Opción A: Cuando el dispositivo detecta que vuelve a tener WiFi o 4G/5G
window.addEventListener('online', () => {
// Le damos 3 segunditos a que la conexión sea estable antes de subir cosas
setTimeout(window.sincronizarSalaEspera, 3000);
});

// --- FUNCIÓN DUPLICAR: Prepara el formulario como "Nuevo" con datos copiados ---
window.duplicarMovimiento = function(id) {
const mov = window.datos.find(m => m.id === id);
if (!mov) {
notify("❌ No encuentro el movimiento original", "error");
return;
}
const modalElement = document.getElementById('modal-manual');
if (modalElement) modalElement.classList.add('active');
const setVal = (domId, valor) => {
const el = document.getElementById(domId);
if(el) el.value = valor || "";
};
// 1. Poner fecha de HOY
const hoy = new Date().toISOString().split('T')[0];
setVal('m-fecha', hoy);
// 2. Rellenar datos comunes
setVal('m-cuenta', mov.cuenta);
setVal('m-concepto', mov.concepto);
setVal('m-beneficiario', mov.beneficiario);
setVal('m-cantidad', Math.abs(mov.importe).toFixed(2).replace('.', ',') + ' €');
// 3. DETECTAR SI ES TRASPASO O NORMAL
const esTraspaso = (mov.tipo === 'traspaso') || (mov.concepto && mov.concepto.toUpperCase().includes('TRASPASO'));
if (esTraspaso) {
window.modoTransaccionActual = 'traspaso';
modalElement.setAttribute('data-mode', 'traspaso');
const titulo = modalElement.querySelector('.cockpit-title');
if (titulo) titulo.innerText = "NUEVO TRASPASO (COPIA)";
// Recuperar cuentas origen y destino de la descripción original
let detalleLimpio = mov.descripcion || mov.detalle || '';
let otraCuenta = '';
if (detalleLimpio.includes('>> A:')) {
const partes = detalleLimpio.split('|');
otraCuenta = partes[0].replace('>> A:', '').trim();
detalleLimpio = partes.slice(1).join('|').trim();
} else if (detalleLimpio.includes('<< DE:')) {
const partes = detalleLimpio.split('|');
otraCuenta = partes[0].replace('<< DE:', '').trim();
detalleLimpio = partes.slice(1).join('|').trim();
// Si copiamos desde la pata de "entrada", invertimos para que el formulario tenga sentido (Desde -> Hacia)
setVal('m-cuenta', otraCuenta);
otraCuenta = mov.cuenta;
}
// Rellenar selector de destino clonándolo del de origen
const selectOrigen = document.getElementById('m-cuenta');
const selectDestino = document.getElementById('m-cuenta-destino');
if (selectOrigen && selectDestino) {
selectDestino.innerHTML = selectOrigen.innerHTML;
selectDestino.value = otraCuenta;
}
setVal('m-desc', detalleLimpio);
} else {
// GASTO O INGRESO
setVal('m-desc', mov.descripcion || mov.detalle || "");
if (mov.importe >= 0) {
window.modoTransaccionActual = 'ingreso';
modalElement.setAttribute('data-mode', 'ingreso');
const titulo = modalElement.querySelector('.cockpit-title');
if (titulo) titulo.innerText = "NUEVO INGRESO (COPIA)";
} else {
window.modoTransaccionActual = 'gasto';
modalElement.setAttribute('data-mode', 'gasto');
const titulo = modalElement.querySelector('.cockpit-title');
if (titulo) titulo.innerText = "NUEVO GASTO (COPIA)";
}
}
// 4. ¡CRÍTICO! VACIAR EL ID (Para que guarde como nuevo y no sobreescriba)
setVal('m-id', "");
// Actualizar texto del botón principal
const btnAction = document.getElementById('btn-modal-action');
if(btnAction) btnAction.innerText = "GUARDAR COPIA";
// Ocultar la botonera extra para evitar "duplicar un duplicado" por accidente
const extraActions = document.getElementById('extra-actions');
if(extraActions) extraActions.style.display = 'none';
if(typeof vibrar === 'function') vibrar('clonar');
};
// --- FUNCIÓN BORRAR: Elimina y guarda cambios ---
window.borrarMovimiento = async function(id) {
// --- NUEVA MEDIDA 1: EL TOQUE MÁGICO (Vibración al instante) ---
try { if (navigator.vibrate) navigator.vibrate(40); } catch(e){}
// -------------------------------------------------------------
// 1. Confirmación de seguridad
const confirmado = await window.pedirConfirmacion(
        '¿Eliminar movimiento?',
        'Esta acción no se puede deshacer. El movimiento se borrará de la nube.',
        '🗑️'
    );
    if (!confirmado) return;
// Bloqueo visual del botón borrar si existe
const btnBorrar = document.getElementById('btn-borrar-modal');
if(btnBorrar) {
btnBorrar.innerText = "⏳ Eliminando...";
btnBorrar.disabled = true;
}
try {
// 2. Filtrar: Nos quedamos con todos EXCEPTO el que tiene ese ID
const longitudAntes = window.datos.length;
// Filtramos comparando IDs como texto para evitar errores de tipo
window.datos = window.datos.filter(m => String(m.id) !== String(id));
// 3. Verificación
if (window.datos.length < longitudAntes) {
// 4. GUARDAR CAMBIOS (Usando la función universal que ya tienes)
if (typeof window.guardarUniversal === 'function') {
await window.guardarUniversal();
// Nota: guardarUniversal ya se encarga de refrescar pantalla y subir a nube
} else {
// Fallback si no existiera guardarUniversal
renderizar();
actualizarDashboard();
}
// 5. Cerrar modal y avisar
cerrarModal();
notify("🗑️ Movimiento eliminado", "success");
if(typeof vibrar === 'function') vibrar('error');
} else {
notify("❌ No encuentro el movimiento para borrar", "warning");
cerrarModal();
}
} catch (e) {
console.error(e);
notify("❌ Error al borrar: " + e.message, "error");
if(btnBorrar) {
btnBorrar.innerText = "ELIMINAR";
btnBorrar.disabled = false;
}
}
};
// --- DEBOUNCE: Colapsa múltiples llamadas rápidas en una sola ejecución ---
let _recalcTimer = null;
function _scheduleRecalculo() {
clearTimeout(_recalcTimer);
_recalcTimer = setTimeout(recalcularSaldosGlobal, 50);
}
// --- FUNCIÓN MATEMÁTICA CENTRAL (DEFINITIVA) ---
// BUG 8 FIX: Bandera de guardia para evitar recursión infinita.
// renderizar() y actualizarDashboard() podían rellamar a recalcularSaldosGlobal
// provocando un bucle que congelaba el navegador.
let _recalculandoSaldos = false;
function recalcularSaldosGlobal() {
if (_recalculandoSaldos) return;   // ← cortocircuito anti-recursión
_recalculandoSaldos = true;
try {
if (!window.datos || window.datos.length === 0) return;
// 1. Ordenamos cronológicamente (Vital para que el saldo tenga sentido histórico)
window.datos.sort((a, b) => {
if (a.ts !== b.ts) return a.ts - b.ts;
if (a.cuenta !== b.cuenta) return a.cuenta.localeCompare(b.cuenta);
// El motor calcula ingresos primero (mayor a menor) para construir el saldo
return b.importe - a.importe;
});
// 2. Reiniciamos los saldos en la configuración
let saldosTemporales = {};
if (window.mapaCuentas) {
Object.keys(window.mapaCuentas).forEach(k => {
saldosTemporales[k] = 0;
if(window.mapaCuentas[k]) window.mapaCuentas[k].saldoActual = 0;
});
}
// 3. Recorremos TODOS los movimientos para calcular saldo línea a línea
window.datos.forEach(m => {
const cta = m.cuenta;
const imp = parseFloat(m.importe) || 0;
// Si la cuenta no existe en el mapa temporal, la iniciamos
if (saldosTemporales[cta] === undefined) saldosTemporales[cta] = 0;
// Sumamos (o restamos) el importe de forma segura
saldosTemporales[cta] = window.sumarDinero(saldosTemporales[cta], imp);
// Guardamos el saldo resultante EN EL MOVIMIENTO (para verlo en el Diario)
m.saldo = saldosTemporales[cta];
});
// 4. Guardamos los saldos finales en la Configuración Global (Para el Patrimonio)
Object.keys(saldosTemporales).forEach(cta => {
if (!window.mapaCuentas[cta]) {
// CAMBIO: Si la cuenta es nueva, la marcamos como SIN CLASIFICAR para que destaque
window.mapaCuentas[cta] = { tipo: 'SIN CLASIFICAR', esInversion: false };
}
window.mapaCuentas[cta].saldoActual = saldosTemporales[cta];
});
// 4b. MÓDULO CARTERA: Sobreescribir saldos con valor de mercado real
if (typeof window.calcularValoresCartera === 'function') window.calcularValoresCartera();
// 5. ACTUALIZAR PANTALLA — solo renderiza la pestaña visible
const _tabActiva = (document.querySelector('.view-section.active') || {}).id || '';
if(typeof renderizar === 'function') renderizar();
if(typeof actualizarDashboard === 'function') actualizarDashboard();
// Patrimonio y Sunburst solo si el usuario está viéndolos ahora mismo
// (irPestana ya los renderiza cuando el usuario navega a esa pestaña)
if(_tabActiva === 'tab-patri') {
if(typeof actualizarPatrimonio === 'function') actualizarPatrimonio();
if(typeof renderizarSunburstPatrimonio === 'function') renderizarSunburstPatrimonio();
}
} finally {
_recalculandoSaldos = false;   // ← siempre liberamos la guardia
}
}
// === NUEVA FUNCIÓN SOLO PARA PATRIMONIO ===
window.verExtractoPatrimonio = function(nombreCuenta) {
const modal = document.getElementById('modal-extracto');
const titulo = document.getElementById('ext-titulo');
const saldoEl = document.getElementById('ext-saldo');
const lista = document.getElementById('ext-lista');
if (!modal) return;
titulo.innerText = String(nombreCuenta).toUpperCase();
const ctaKey = String(nombreCuenta).toUpperCase().trim();
const infoCta = (window.mapaCuentas && window.mapaCuentas[ctaKey]) ? window.mapaCuentas[ctaKey] : null;
const saldoActual = infoCta ? (infoCta.saldoActual || 0) : 0;
saldoEl.innerText = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(saldoActual);
saldoEl.style.color = saldoActual >= 0 ? '#32d74b' : '#ff453a';
let movsCuenta = window.datos.filter(m => String(m.cuenta).toUpperCase().trim() === ctaKey);
if (typeof pasaFiltroPropietario === 'function') {
movsCuenta = movsCuenta.filter(m => pasaFiltroPropietario(m));
}
// 🏦 ALGORITMO BANCARIO: Ordenar del más nuevo al más viejo
// En caso de empate (mismo día), los gastos van arriba para que
// la resta hacia atrás cuadre a la perfección.
movsCuenta.sort((a, b) => {
if (a.ts !== b.ts) return b.ts - a.ts;
return a.importe - b.importe;
});
// Variable para el saldo matemático hacia atrás
let saldoLinea = saldoActual;
let html = '';
if (movsCuenta.length === 0) {
html = '<div style="text-align:center; color:#8e8e93; padding: 20px; font-weight:bold; font-size: 13px;">No hay movimientos.</div>';
} else {
movsCuenta.forEach(m => {
const esIngreso = m.importe >= 0;
let colorImporte = esIngreso ? '#32d74b' : '#ff453a';
if (m.tipo === 'traspaso' || (m.concepto && m.concepto.toUpperCase().includes('TRASPASO'))) {
colorImporte = '#0a84ff';
}
const signo = esIngreso ? '+' : '';
const fechaTxt = new Date(m.ts).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' });
const importeFmt = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Math.abs(m.importe));
const saldoFmt = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(saldoLinea);
// Unir beneficiario y descripción (Línea 2)
let textoDetalle = m.descripcion || m.detalle || '';
const ben = m.beneficiario || '';
if (ben) {
textoDetalle = textoDetalle ? ben + ' - ' + textoDetalle : ben;
}
if (!textoDetalle) textoDetalle = 'Sin detalle';
html += `
<div class="ext-row" onclick="cerrarModalExtracto(); window.editarMovimiento('${m.id}')">
<div class="ext-line">
<span class="ext-fecha">${fechaTxt}</span>
<span class="ext-concepto">${m.concepto}</span>
<span class="ext-importe" style="color: ${colorImporte};">${signo}${importeFmt}</span>
</div>
<div class="ext-line">
<span class="ext-detalle">${textoDetalle}</span>
<span class="ext-saldo">${saldoFmt}</span>
</div>
</div>`;
// Restamos para calcular el saldo de la fila inferior (más antigua)
saldoLinea = saldoLinea - m.importe;
});
}
lista.innerHTML = html;
modal.classList.add('active');
};
window.cerrarModalExtracto = function() {
const modal = document.getElementById('modal-extracto');
if(modal) modal.classList.remove('active');
};
function cambiarOrdenPatrimonio(campo) {
if (ordenPatri.campo === campo) { ordenPatri.asc = !ordenPatri.asc; }

function togglePatriGroup(id) {
