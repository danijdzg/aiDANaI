    <script>
    // Silencia únicamente un falso positivo frecuente de canales async de extensiones/navegador.
    // No tapa errores reales de la aplicación: OneDrive, Excel, gráficos o guardado siguen saliendo en consola.
    (function() {
        const ASYNC_CHANNEL_NOISE = 'A listener indicated an asynchronous response by returning true, but the message channel closed before a response was received';
        function isAsyncChannelNoise(value) {
            const message = value && value.message ? value.message : String(value || '');
            return message.includes(ASYNC_CHANNEL_NOISE);
        }
        window.addEventListener('unhandledrejection', function(event) {
            if (isAsyncChannelNoise(event.reason)) {
                event.preventDefault();
            }
        });
        window.addEventListener('error', function(event) {
            if (isAsyncChannelNoise(event.error || event.message)) {
                event.preventDefault();
            }
        }, true);
    })();
    // Carga diferida: mantiene un único index.html, pero despierta librerías pesadas solo cuando hacen falta.
    window.AppAssets = (function() {
        const urls = {
            xlsx: 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js',
            msal: 'https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js',
            echarts: 'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js'
        };
        const globals = { xlsx: 'XLSX', msal: 'msal', echarts: 'echarts' };
        const promises = {};
        function ensure(name) {
            const globalName = globals[name];
            if (globalName && window[globalName]) return Promise.resolve(window[globalName]);
            if (promises[name]) return promises[name];
            promises[name] = new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = urls[name];
                script.async = true;
                script.onload = () => resolve(globalName ? window[globalName] : true);
                script.onerror = () => {
                    delete promises[name];
                    reject(new Error('No se pudo cargar ' + name));
                };
                document.head.appendChild(script);
            });
            return promises[name];
        }
        return {
            ensure,
            xlsx: () => ensure('xlsx'),
            msal: () => ensure('msal'),
            echarts: () => ensure('echarts'),
            url: (name) => urls[name]
        };
    })();
    window.AppXlsxWorker = (function() {
        let worker = null;
        function getWorker() {
            if (worker) return worker;
            if (!window.Worker || !window.Blob || !window.URL || !window.AppAssets) return null;
            const code = `
                let xlsxReady = false;
                self.onmessage = async (event) => {
                    const { id, type, buffer, url } = event.data || {};
                    try {
                        if (!xlsxReady) { importScripts(url); xlsxReady = true; }
                        if (type === 'read') {
                            const wb = XLSX.read(new Uint8Array(buffer), { type: 'array', cellDates: true });
                            self.postMessage({ id, ok: true, wb });
                        }
                    } catch (error) {
                        self.postMessage({ id, ok: false, error: error && error.message ? error.message : String(error) });
                    }
                };
            `;
            worker = new Worker(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })));
            return worker;
        }
        function read(buffer) {
            const w = getWorker();
            if (!w) return Promise.resolve(null);
            return new Promise((resolve, reject) => {
                const id = 'xlsx-' + Date.now() + '-' + Math.random().toString(16).slice(2);
                const onMessage = (event) => {
                    if (!event.data || event.data.id !== id) return;
                    w.removeEventListener('message', onMessage);
                    if (event.data.ok) resolve(event.data.wb);
                    else reject(new Error(event.data.error || 'Error leyendo Excel'));
                };
                w.addEventListener('message', onMessage);
                w.postMessage({ id, type: 'read', buffer, url: window.AppAssets.url('xlsx') }, [buffer]);
            });
        }
        return { read };
    })();
    window.ensureEChartsReady = function(retry) {
        if (window.echarts) return true;
        window.AppAssets.echarts().then(retry).catch(() => {
            if (typeof notify === 'function') notify('No se pudieron cargar los gráficos', 'error');
        });
        return false;
    };
    </script>

    background: rgba(10, 14, 23, 0.75) !important;

    width: 18px;
    height: 18px;
    background: rgba(255, 255, 255, 0.15);

    background: rgba(255, 70, 70, 0.2);

h1, h2, h3, .importe, .kpi-value, .saldo, input[type="number"], input[inputmode="decimal"], .numero {
font-variant-numeric: tabular-nums !important;
letter-spacing: -0.5px !important; /* Le da un toque más compacto y pro */
}
/* 3. ANIMACIÓN DE ENTRADA EN CASCADA (Lista Viva) */
@keyframes fadeSlideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
/* Aplicamos la animación a las filas de la tabla */
tbody tr {
animation: fadeSlideUp 0.4s ease-out backwards !important;
}
/* Efecto dominó: escalonamos la entrada de los primeros elementos */
tr:nth-child(1) { animation-delay: 0.05s !important; }
tr:nth-child(2) { animation-delay: 0.10s !important; }
tr:nth-child(3) { animation-delay: 0.15s !important; }
tr:nth-child(4) { animation-delay: 0.20s !important; }
tr:nth-child(5) { animation-delay: 0.25s !important; }
tr:nth-child(6) { animation-delay: 0.30s !important; }
tr:nth-child(7) { animation-delay: 0.35s !important; }
tr:nth-child(8) { animation-delay: 0.40s !important; }
tr:nth-child(n+9) { animation-delay: 0.45s !important; }
/* ============================================================ */
/* 🎨 MEJORA FASE 4: ANIMACIONES VISUALES Y GUMMY EFFECT        */
/* ============================================================ */
/* 2. Suavizado en el cambio de pestañas/vistas (Fade & Slide in) */
.view-section.active {
animation: aparecerSuave 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards !important;
}
/* ============================================================ */
/* 📭 MEJORA C: ESTADOS VACÍOS INTELIGENTES (Empty States)       */
/* ============================================================ */
.empty-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 60px 20px;
text-align: center;
color: var(--c-text-muted, #888);
}
.empty-state-icon {
font-size: 48px;
margin-bottom: 15px;
opacity: 0.6;
animation: flotar 3s ease-in-out infinite;
}
.empty-state h4 {
color: var(--c-text, #fff);
margin-bottom: 8px;
font-size: 18px;
}
.empty-state p {
font-size: 14px;
margin-bottom: 25px;
max-width: 280px;
line-height: 1.4;
}
.btn-limpiar-filtros {
background: transparent;
color: var(--c-accent, #4ade80);
border: 1px solid var(--c-accent, #4ade80);
padding: 10px 24px;
border-radius: 25px;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
@keyframes flotar {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-10px); }
}
/* ============================================================ */
/* ❌ MEJORA H: BOTÓN RÁPIDO DE BORRAR (Buscadores)             */
/* ============================================================ */
.btn-clear-input {
position: absolute;
right: 12px;
top: 50%;
transform: translateY(-50%);
color: #888;
cursor: pointer;
transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
z-index: 10;
}
.btn-clear-input:active { color: #fff; }
/* LA MAGIA: Si el input está vacío (se ve el placeholder), la 'X' se encoge y desaparece */
input:placeholder-shown + .btn-clear-input {
opacity: 0;
pointer-events: none;
transform: translateY(-50%) scale(0.5);
}
/* Si el input tiene texto escrito, la 'X' aparece con una animación de zoom */
input:not(:placeholder-shown) + .btn-clear-input {
opacity: 1;
pointer-events: auto;
transform: translateY(-50%) scale(1);
}

/* ────────────────────────────────────────────────────────────────────── */
/* 🖱️ MICRO-INTERACCIONES FINTECH: BOTONES, MODALES Y NAVEGACIÓN          */
/* ────────────────────────────────────────────────────────────────────── */
/* 1. Botones Generales (Feedback Táctil Gummy) */
button, .btn {
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                box-shadow 0.2s ease, filter 0.2s ease !important;
    will-change: transform, box-shadow;
}
button:hover:not(:disabled), .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    filter: brightness(1.1);
}
button:active:not(:disabled), .btn:active:not(:disabled) {
    transform: translateY(2px) scale(0.95) !important;
    filter: brightness(0.9);
}
/* 2. Panel Inferior y Nodos de Navegación */
.bottom-nav {
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.nav-item {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}
.nav-item:active {
    transform: scale(0.85) !important;
    opacity: 0.7 !important;
}
/* 3. Listas (Hover magnético) - Diario, Extractos y Patrimonio */
tbody tr, .ext-row, .patri-account-item {
    transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}
tbody tr:active, .ext-row:active, .patri-account-item:active {
    transform: scale(0.97) translateX(4px) !important;
    background: rgba(255, 255, 255, 0.08) !important;
}
/* 4. Modales (Efecto Pop-In Físico) */
#modal-manual.active .cockpit-hero,
#modal-manual.active .cockpit-grid,
.modal-overlay.active .modal-card-pro {
    animation: modalPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes modalPopIn {
    0% { opacity: 0; transform: scale(0.85) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* =======================================================
   🚀 UPGRADE CYBERPUNK: LATENCIA Y CORAZÓN DE LA APP 
   ======================================================= */
/* 1. La magia del cambio de color (Hue Rotate) y el latido (Scale) */
@keyframes corazon-neon {
    0% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(0deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(0, 184, 255, 0.8), inset 0 0 15px rgba(0, 184, 255, 0.6);
    }
    20% {
        transform: translateY(-50px) scale(1.18);
        filter: hue-rotate(72deg) brightness(1.3);
        box-shadow: 0 0 40px rgba(191, 90, 242, 0.9), inset 0 0 30px rgba(191, 90, 242, 0.8);
    }
    40% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(144deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(255, 46, 77, 0.8), inset 0 0 15px rgba(255, 46, 77, 0.6);
    }
    60% {
        transform: translateY(-50px) scale(1.18);
        filter: hue-rotate(216deg) brightness(1.3);
        box-shadow: 0 0 40px rgba(255, 214, 10, 0.9), inset 0 0 30px rgba(255, 214, 10, 0.8);
    }
    80% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(288deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(57, 255, 20, 0.8), inset 0 0 15px rgba(57, 255, 20, 0.6);
    }
    100% {
        transform: translateY(-50px) scale(1);
        filter: hue-rotate(360deg) brightness(1.1);
        box-shadow: 0 0 20px rgba(0, 184, 255, 0.8), inset 0 0 15px rgba(0, 184, 255, 0.6);
    }
}

/* 2. Forzamos la máxima prioridad sobre el botón principal */
body #fab-main {
	pointer-events: auto !important;   /* ← Añade esta línea */
    width: 70px !important; 
    height: 70px !important;
    /* Un gradiente base sólido que rotará sus colores matemáticamente */
    background: linear-gradient(135deg, #0A84FF, #BF5AF2) !important;
    border: 2px solid rgba(255, 255, 255, 0.9) !important;
    border-radius: 50% !important;
    /* Aplicamos la animación infinita de latido y color */
    animation: corazon-neon 3.5s cubic-bezier(0.25, 0.8, 0.25, 1) infinite !important;
    z-index: 99999 !important;
    /* Aceleración por hardware para móviles */
    will-change: transform, filter, box-shadow !important;

@keyframes slideUpGlow {

<script>

// ============================================================
// MODELO FINANCIERO CENTRAL
// Se define al inicio para que cualquier carga local/nube tenga
// helpers disponibles antes de procesar Excel o pintar la interfaz.
// ============================================================
window.FinanceModel = (function() {
    const CARTERA_TIPOS = Object.freeze({
        BOLSA:          { label: 'Bolsa',             color: '#0A84FF', badge: 'badge-bolsa',   emoji: '📈' },
        CRIPTOMONEDAS: { label: 'Criptomonedas',     color: '#FF9F1B', badge: 'badge-cripto',  emoji: '🪙' },
        AUTOCUSTODIA:  { label: 'Autocustodia',      color: '#39FF14', badge: 'badge-custodia',emoji: '🔐' },
        PLANPENSIONES: { label: 'Plan de Pensiones', color: '#BF5AF2', badge: 'badge-pension', emoji: '🏦' },
        CROWDFUNDING:  { label: 'Crowdfunding',      color: '#00B8FF', badge: 'badge-bolsa',   emoji: '🤝' },
        OTRO:          { label: 'Otros',             color: '#888888', badge: '',              emoji: '💼' }
    });

    function crearId() {
        try {
            if (typeof uuid === 'function') return uuid();
        } catch (e) {}
        if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
        return `id-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function limpiarTexto(valor) {
        return String(valor || '').toUpperCase().trim().replace(/\s+/g, ' ');
    }

    function nuclearTexto(valor) {
        return String(valor || '')
            .toUpperCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^A-Z0-9]/g, '');
    }

    function quitarAcentos(valor) {
        return String(valor || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function getCampo(fila, posiblesNombres, fallback = '') {
        if (!fila) return fallback;
        for (const nombre of posiblesNombres) {
            if (fila[nombre] !== undefined && fila[nombre] !== null && fila[nombre] !== '') {
                return fila[nombre];
            }
        }
        const normalizados = posiblesNombres.map(n => nuclearTexto(n));
        const clave = Object.keys(fila).find(k => normalizados.includes(nuclearTexto(k)));
        const valor = clave ? fila[clave] : fallback;
        return (valor === undefined || valor === null || valor === '') ? fallback : valor;
    }

    function parseMoney(valor) {
        if (typeof valor === 'number') return Number.isFinite(valor) ? valor : 0;
        if (valor === null || valor === undefined) return 0;

        let raw = String(valor)
            .trim()
            .replace(/\u00A0/g, ' ')
            .replace(/[−–—]/g, '-');

        if (!raw) return 0;

        let negativo = /^\s*\(.*\)\s*$/.test(raw) || raw.includes('-');
        raw = raw.replace(/[()]/g, '');
        raw = raw.replace(/[^\d.,+\-]/g, '');
        raw = raw.replace(/[+\-]/g, '');
        if (!raw) return 0;

        const coma = raw.lastIndexOf(',');
        const punto = raw.lastIndexOf('.');
        let normalizado = raw;

        if (coma !== -1 && punto !== -1) {
            const separadorDecimal = coma > punto ? ',' : '.';
            const separadorMiles = separadorDecimal === ',' ? '.' : ',';
            normalizado = raw
                .replace(new RegExp('\\' + separadorMiles, 'g'), '')
                .replace(separadorDecimal, '.');
        } else if (coma !== -1) {
            const partes = raw.split(',');
            const decimales = partes[partes.length - 1] || '';
            const entero = partes.slice(0, -1).join('');
            const pareceMiles = partes.length > 2 || (decimales.length === 3 && entero !== '0' && entero.length <= 3);
            if (pareceMiles) {
                normalizado = raw.replace(/,/g, '');
            } else {
                normalizado = raw.replace(',', '.');
            }
        } else if (punto !== -1) {
            const partes = raw.split('.');
            const decimales = partes[partes.length - 1] || '';
            const entero = partes.slice(0, -1).join('');
            const pareceMiles = partes.length > 2 || (decimales.length === 3 && entero !== '0' && entero.length <= 3);
            normalizado = pareceMiles ? raw.replace(/\./g, '') : raw;
        }

        const numero = Number(normalizado);
        if (!Number.isFinite(numero)) return 0;
        return negativo ? -Math.abs(numero) : numero;
    }

    function redondearDinero(valor) {
        return Math.round(parseMoney(valor) * 100) / 100;
    }

    function sumarDinero(a, b) {
        return Math.round((parseMoney(a) + parseMoney(b)) * 100) / 100;
    }

    function fechaDesdeSerialExcel(serial) {
        const base = new Date(Math.round((Number(serial) - 25569) * 86400 * 1000));
        return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
    }

    function fechaFallback(fallback) {
        if (fallback === null) return null;
        const fecha = fallback instanceof Date ? new Date(fallback) : new Date(fallback || Date.now());
        return isNaN(fecha.getTime()) ? new Date() : fecha;
    }

    function parseFecha(valor, fallback = new Date()) {
        if (valor instanceof Date) {
            return isNaN(valor.getTime()) ? fechaFallback(fallback) : new Date(valor.getFullYear(), valor.getMonth(), valor.getDate());
        }

        if (typeof valor === 'number') {
            if (valor > 10000000000) {
                const fechaTs = new Date(valor);
                return isNaN(fechaTs.getTime()) ? new Date(fallback) : fechaTs;
            }
            if (valor > 10000) return fechaDesdeSerialExcel(valor);
        }

        const raw = String(valor || '').trim();
        if (!raw) return fechaFallback(fallback);

        if (/^\d+([.,]\d+)?$/.test(raw)) {
            const n = parseMoney(raw);
            if (n > 10000) return fechaDesdeSerialExcel(n);
        }

        let match = raw.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
        if (match) {
            const fecha = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
            return isNaN(fecha.getTime()) ? fechaFallback(fallback) : fecha;
        }

        match = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2,4})$/);
        if (match) {
            const year = Number(match[3].length === 2 ? `20${match[3]}` : match[3]);
            const fecha = new Date(year, Number(match[2]) - 1, Number(match[1]));
            return isNaN(fecha.getTime()) ? fechaFallback(fallback) : fecha;
        }

        const fechaLibre = new Date(raw);
        return isNaN(fechaLibre.getTime()) ? fechaFallback(fallback) : fechaLibre;
    }

    function fechaISO(valor) {
        const fecha = parseFecha(valor, null);
        if (!fecha || isNaN(fecha.getTime())) return '';
        const y = fecha.getFullYear();
        const m = String(fecha.getMonth() + 1).padStart(2, '0');
        const d = String(fecha.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function detectarDuenoCuenta(nombreCuenta) {
        const cuenta = limpiarTexto(nombreCuenta);
        if (cuenta.startsWith('D-')) return 'D';
        if (cuenta.startsWith('N-')) return 'N';
        return 'DN';
    }

    function normalizarTipoMovimiento(tipoRaw, importe, concepto) {
        const tipo = limpiarTexto(tipoRaw).toLowerCase();
        if (tipo === 'traspaso') return 'traspaso';
        if (tipo === 'ingreso') return 'ingreso';
        if (tipo === 'gasto') return 'gasto';
        if (limpiarTexto(concepto).includes('TRASPASO')) return 'traspaso';
        return parseMoney(importe) >= 0 ? 'ingreso' : 'gasto';
    }

    function buscarInfoCuenta(rawCuenta, mapaCuentas) {
        const cuentaLimpia = limpiarTexto(rawCuenta);
        const cuentaNuclear = nuclearTexto(rawCuenta);
        let infoCuenta = mapaCuentas[cuentaLimpia];
        if (infoCuenta) return infoCuenta;

        const matchNuclear = Object.keys(mapaCuentas).find(k => mapaCuentas[k].idNuclear === cuentaNuclear);
        if (matchNuclear) return mapaCuentas[matchNuclear];

        const matchParcial = Object.keys(mapaCuentas).find(k => {
            const cNuc = mapaCuentas[k].idNuclear;
            if (cNuc.length < 3 || cuentaNuclear.length < 3) return false;
            if ('D' + cNuc === cuentaNuclear || 'N' + cNuc === cuentaNuclear) return true;
            if (cNuc === 'D' + cuentaNuclear || cNuc === 'N' + cuentaNuclear) return true;
            return cNuc.includes(cuentaNuclear) || cuentaNuclear.includes(cNuc);
        });
        return matchParcial ? mapaCuentas[matchParcial] : null;
    }

    function normalizarTipoCartera(tipo) {
        const limpio = quitarAcentos(tipo || 'OTRO').toUpperCase().trim().replace(/[\s_-]+/g, '');
        const alias = {
            CRIPTO: 'CRIPTOMONEDAS',
            CRYPTO: 'CRIPTOMONEDAS',
            CRIPTOMONEDA: 'CRIPTOMONEDAS',
            CRIPTOMONEDAS: 'CRIPTOMONEDAS',
            BTC: 'CRIPTOMONEDAS',
            BITCOIN: 'CRIPTOMONEDAS',
            PENSION: 'PLANPENSIONES',
            PENSIONES: 'PLANPENSIONES',
            PLANPENSION: 'PLANPENSIONES',
            PLANPENSIONES: 'PLANPENSIONES',
            FONDO: 'CROWDFUNDING',
            FONDOS: 'CROWDFUNDING',
            CROWDFUNDING: 'CROWDFUNDING',
            CROWDLENDING: 'CROWDFUNDING',
            AUTOCUSTODIA: 'AUTOCUSTODIA',
            BOLSA: 'BOLSA',
            ACCION: 'BOLSA',
            ACCIONES: 'BOLSA',
            ETF: 'BOLSA',
            OTRO: 'OTRO',
            OTROS: 'OTRO'
        };
        return alias[limpio] || (CARTERA_TIPOS[limpio] ? limpio : 'OTRO');
    }

    function esCriptoCartera(posOTipo) {
        const tipo = typeof posOTipo === 'object' ? posOTipo.tipo : posOTipo;
        const normalizado = normalizarTipoCartera(tipo);
        return normalizado === 'CRIPTOMONEDAS' || normalizado === 'AUTOCUSTODIA';
    }

    function esBTCCartera(pos) {
        return esCriptoCartera(pos) && String(pos?.ticker || '').toUpperCase().trim() === 'BTC';
    }

    function sanitizarPosicionCartera(pos) {
        const tipo = normalizarTipoCartera(pos?.tipo);
        const esCripto = esCriptoCartera(tipo);
        const posicion = {
            id: String(pos?.id || crearId()),
            ticker: String(pos?.ticker || pos?.nombre || '').toUpperCase().trim(),
            nombre: String(pos?.nombre || '').trim(),
            tipo,
            cuenta: limpiarTexto(pos?.cuenta),
            cantidad: esCripto ? parseMoney(pos?.cantidad) : 1,
            precioCompra: parseMoney(pos?.precioCompra),
            precioActual: parseMoney(pos?.precioActual),
            fechaCompra: pos?.fechaCompra || '',
            notas: String(pos?.notas || '').trim(),
            precioFuente: pos?.precioFuente || '',
            precioActualizadoEn: pos?.precioActualizadoEn || ''
        };
        if (!posicion.precioFuente) posicion.precioFuente = esBTCCartera(posicion) ? 'Binance BTC/EUR' : 'Manual';
        return posicion;
    }

    function posicionCarteraDesdeFila(fila) {
        const rawFecha = getCampo(fila, ['FECHA_COMPRA','FechaCompra','fecha_compra','FECHA','Fecha','fecha']);
        const ticker = String(getCampo(fila, ['TICKER','Ticker','ticker']) || '').toUpperCase().trim();
        const nombre = String(getCampo(fila, ['NOMBRE','Nombre','nombre']) || '').trim();
        return sanitizarPosicionCartera({
            id: getCampo(fila, ['ID','Id','id'], crearId()),
            ticker: ticker || nombre,
            nombre,
            tipo: getCampo(fila, ['TIPO','Tipo','tipo'], 'OTRO'),
            cuenta: getCampo(fila, ['CUENTA','Cuenta','cuenta'], ''),
            cantidad: getCampo(fila, ['CANTIDAD','Cantidad','cantidad'], 0),
            precioCompra: getCampo(fila, ['PRECIO_COMPRA','PrecioCompra','precio_compra','PRECIOCOMPRA'], 0),
            precioActual: getCampo(fila, ['PRECIO_ACTUAL','PrecioActual','precio_actual','PRECIOACTUAL'], 0),
            fechaCompra: rawFecha ? fechaISO(rawFecha) : '',
            notas: getCampo(fila, ['NOTAS','Notas','notas'], ''),
            precioFuente: getCampo(fila, ['PRECIO_FUENTE','PrecioFuente','precio_fuente','FUENTE_PRECIO'], ''),
            precioActualizadoEn: getCampo(fila, ['PRECIO_ACTUALIZADO','PrecioActualizado','precio_actualizado','FECHA_PRECIO'], '')
        });
    }

    function puntoHistoricoCarteraDesdeFila(fila) {
        const fecha = parseFecha(getCampo(fila, ['FECHA','Fecha','fecha'], new Date()));
        const costeRaw = getCampo(fila, ['COSTE','Coste','coste'], '');
        const punto = {
            fecha,
            ts: fecha.getTime(),
            valor: parseMoney(getCampo(fila, ['VALOR','Valor','valor'], 0))
        };
        if (costeRaw !== '') punto.coste = parseMoney(costeRaw);
        return punto;
    }

    function getCantidadCartera(pos) {
        return esCriptoCartera(pos) ? parseMoney(pos?.cantidad) : 1;
    }

    function getCostePosicionCartera(pos) {
        return parseMoney(pos?.precioCompra);
    }

    function getValorMercadoPosicionCartera(pos) {
        const precioActual = parseMoney(pos?.precioActual);
        return esCriptoCartera(pos) ? getCantidadCartera(pos) * precioActual : precioActual;
    }

    function movimientoDesdeFila(fila, contexto) {
        const mapaCuentas = contexto?.mapaCuentas || {};
        const keyCuenta = contexto?.keyCuenta || 'CUENTA';
        const rawCuenta = getCampo(fila, [keyCuenta, 'CUENTA', 'Cuenta', 'cuenta'], 'DESCONOCIDA');
        const cuenta = limpiarTexto(rawCuenta);
        const infoCuenta = buscarInfoCuenta(rawCuenta, mapaCuentas);
        const rawImporte = getCampo(fila, ['IMPORTE','Importe','importe'], 0);
        const importe = parseMoney(rawImporte);
        const concepto = limpiarTexto(getCampo(fila, ['CONCEPTO','Concepto','concepto'], ''));
        const fecha = parseFecha(getCampo(fila, ['FECHA','Fecha','fecha'], new Date()));
        return {
            id: String(getCampo(fila, ['ID','Id','id'], crearId())),
            ts: fecha.getTime(),
            fecha,
            cuenta,
            tipoCuenta: infoCuenta ? infoCuenta.tipo : 'SIN CLASIFICAR',
            esInversion: infoCuenta ? infoCuenta.esInversion : false,
            concepto,
            importe,
            descripcion: limpiarTexto(getCampo(fila, ['DESCRIPCION','Descripcion','descripcion','Detalle','detalle'], '')),
            beneficiario: limpiarTexto(getCampo(fila, ['BENEFICIARIO','Beneficiario','beneficiario'], '')),
            tipo: normalizarTipoMovimiento(getCampo(fila, ['TIPO','Tipo','tipo'], ''), importe, concepto)
        };
    }

    function recurrenteDesdeFila(fila) {
        const importe = parseMoney(getCampo(fila, ['IMPORTE','Importe','importe'], 0));
        return {
            id: getCampo(fila, ['ID','Id','id'], crearId()),
            fechaProx: getCampo(fila, ['PROXIMA_FECHA','Proxima_Fecha','fechaProx'], ''),
            frecuencia: getCampo(fila, ['FRECUENCIA','Frecuencia','frecuencia'], ''),
            diasSemana: getCampo(fila, ['DIAS_SEMANA','Dias_Semana','diasSemana'], ''),
            tipoRegla: getCampo(fila, ['TIPO_REGLA','Tipo_Regla','tipoRegla'], '') || (importe < 0 ? 'gasto' : 'ingreso'),
            cuenta: getCampo(fila, ['CUENTA','Cuenta','cuenta'], ''),
            cuentaDestino: getCampo(fila, ['CUENTA_DESTINO','Cuenta_Destino','cuentaDestino'], ''),
            importe,
            concepto: getCampo(fila, ['CONCEPTO','Concepto','concepto'], ''),
            beneficiario: getCampo(fila, ['BENEFICIARIO','Beneficiario','beneficiario'], ''),
            descripcion: getCampo(fila, ['DESCRIPCION','Descripcion','descripcion'], '')
        };
    }

    function crearSnapshot(origen = {}) {
        const movimientos = origen.movimientos || window.datos || [];
        const cuentas = origen.cuentas || window.mapaCuentas || {};
        const cartera = origen.cartera || window.datosCartera || [];
        const recurrentes = origen.recurrentes || window.datosRecurrentes || [];
        const historicoCartera = origen.historicoCartera || window.historicoCartera || [];
        const totalMovimientos = movimientos.reduce((acc, m) => sumarDinero(acc, m.importe), 0);
        const totalCarteraCoste = cartera.reduce((acc, p) => sumarDinero(acc, getCostePosicionCartera(p)), 0);
        const totalCarteraMercado = cartera.reduce((acc, p) => sumarDinero(acc, getValorMercadoPosicionCartera(p)), 0);
        return {
            creadoEn: new Date().toISOString(),
            movimientos,
            cuentas,
            cartera,
            recurrentes,
            historicoCartera,
            totales: {
                movimientos: totalMovimientos,
                carteraCoste: totalCarteraCoste,
                carteraMercado: totalCarteraMercado
            }
        };
    }

    return {
        parseMoney,
        redondearDinero,
        sumarDinero,
        parseFecha,
        fechaISO,
        getCampo,
        texto: { limpiar: limpiarTexto, nuclear: nuclearTexto, sinAcentos: quitarAcentos },
        cuentas: { buscarInfo: buscarInfoCuenta, detectarDueno: detectarDuenoCuenta },
        movimientos: { desdeFila: movimientoDesdeFila, normalizarTipo: normalizarTipoMovimiento },
        recurrentes: { desdeFila: recurrenteDesdeFila },
        cartera: {
            tipos: CARTERA_TIPOS,
            normalizarTipo: normalizarTipoCartera,
            getMetaTipo: tipo => CARTERA_TIPOS[normalizarTipoCartera(tipo)] || CARTERA_TIPOS.OTRO,
            parseNumero: parseMoney,
            esCripto: esCriptoCartera,
            esBTC: esBTCCartera,
            sanitizar: sanitizarPosicionCartera,
            desdeFila: posicionCarteraDesdeFila,
            historicoDesdeFila: puntoHistoricoCarteraDesdeFila,
            getCantidad: getCantidadCartera,
            getCoste: getCostePosicionCartera,
            getValorMercado: getValorMercadoPosicionCartera,
            getPnl: pos => getValorMercadoPosicionCartera(pos) - getCostePosicionCartera(pos),
            getRentabilidad: pos => {
                const coste = getCostePosicionCartera(pos);
                return coste > 0 ? ((getValorMercadoPosicionCartera(pos) - coste) / coste) * 100 : 0;
            }
        },
        snapshots: { crear: crearSnapshot }
    };
})();

// Aliases legacy: mantienen compatible el resto del archivo y evitan carreras de carga.
window.CARTERA_TIPOS = window.FinanceModel.cartera.tipos;
window.normalizarTipoCartera = tipo => window.FinanceModel.cartera.normalizarTipo(tipo);
window.getMetaTipoCartera = tipo => window.FinanceModel.cartera.getMetaTipo(tipo);
window.parseNumeroCartera = valor => window.FinanceModel.parseMoney(valor);
window.esCriptoCartera = pos => window.FinanceModel.cartera.esCripto(pos);
window.esBTCCartera = pos => window.FinanceModel.cartera.esBTC(pos);
window.getCantidadCartera = pos => window.FinanceModel.cartera.getCantidad(pos);
window.getCostePosicionCartera = pos => window.FinanceModel.cartera.getCoste(pos);
window.getValorMercadoPosicionCartera = pos => window.FinanceModel.cartera.getValorMercado(pos);
window.getPnlPosicionCartera = pos => window.FinanceModel.cartera.getPnl(pos);
window.getRentabilidadPosicionCartera = pos => window.FinanceModel.cartera.getRentabilidad(pos);
window.sanitizarPosicionCartera = pos => window.FinanceModel.cartera.sanitizar(pos);

// --- NUEVA HERRAMIENTA MATEMÁTICA SEGURA ---
window.sumarDinero = function(a, b) {
    // Multiplica por 100 para operar con enteros (céntimos) y evitar errores de decimales fantasma
    return window.FinanceModel.sumarDinero(a, b);
};
// --- HERRAMIENTA DE FUSIÓN DE DATOS (NUBE + MÓVIL) ---
// NUEVO: SMART MERGE (Fusión Inteligente Fintech)
window.fusionarMovimientos = function(movimientosNube, movimientosLocales) {
    if (!movimientosNube || movimientosNube.length === 0) return movimientosLocales || [];
    if (!movimientosLocales || movimientosLocales.length === 0) return movimientosNube;
    // 1. Usamos un Map (diccionario) para garantizar unicidad y facilitar la sobrescritura
    const mapaFusionado = new Map();
    // 2. Cargamos la "verdad de la nube" como base
    movimientosNube.forEach(function(mov) {
        const idNube = mov.Id || mov.id;
        if (idNube) mapaFusionado.set(idNube, mov);
    });
    // 3. 🟢 SMART MERGE: Aplicamos los datos locales por encima
    // Si el ID ya existe (ej. una edición tuya), Map.set() machaca el antiguo con tu versión fresca.
    // Si es un ID nuevo (un gasto recién creado), simplemente lo añade al final.
    movimientosLocales.forEach(function(movLocal) {
        const idLocal = movLocal.Id || movLocal.id;
        if (idLocal) {
            mapaFusionado.set(idLocal, movLocal);
        }
    });
    // 4. Convertir a Array y ordenar por fecha (de más antiguo a más nuevo)
    const listaFusionada = Array.from(mapaFusionado.values());
    listaFusionada.sort(function(a, b) {
        return new Date(a.Fecha || a.fecha) - new Date(b.Fecha || b.fecha);
    });
    return listaFusionada;
};

    const registry = {
        'inicio': ['chart-Sankey'],
        'patri':  ['chart-Sunburst', 'chart-TreeMap', 'chartPatrimonio'],
        'salud':  ['chartRadar', 'chart-FIRE'],
        'inversiones': ['chart-cartera-donut', 'chart-cartera-evol']
    };

        // Elimina de RAM todo lo que no pertenezca a la pestaña actual
        limpiarMemoria: function(tabDestino) {
            if (typeof echarts === 'undefined') return;
            const graficosEnTab = registry[tabDestino] || [];
            // Recorremos todos los posibles contenedores de gráficos
            const todosLosIds = Object.values(registry).flat();
            todosLosIds.forEach(id => {
                // Si el gráfico NO pertenece a la pestaña a la que vamos, lo matamos
                if (!graficosEnTab.includes(id)) {
                    const dom = document.getElementById(id);
                    if (dom) {
                        const instance = echarts.getInstanceByDom(dom);
                        if (instance) {
                            instance.dispose();
                        }
                        // Limpiar ResizeObserver asociado para evitar fugas de memoria
                        const obsKey = '_resizeObs_' + id;
                        if (window[obsKey]) {
                            window[obsKey].disconnect();
                            window[obsKey] = null;
                        }
                    }
                }
            });
        },
        // Redibuja solo los gráficos de la pestaña activa si hay datos
        despertarGraficos: function(tabActiva) {

                if (tabActiva === 'inicio') {
                    if (window.AppRuntime) window.AppRuntime.scheduleDashboard(true);

const SpaceEngine = (() => {

starCount: 220,          // Mantenemos número bajo para rendimiento
shootingStarFreq: 0.012, // Frecuencia de estrellas fugaces
bgColor: '#000000',      // Fondo negro puro
baseSpeed: 0.05          // Velocidad base del efecto 3D (Parallax)
};

const starColors = ['#ffffff', '#e0f0ff', '#b5d5ff', '#fff4e0', '#ffebd6', '#ffd2b5'];
// CLASE: ESTRELLA DE FONDO (Con efecto Parallax 3D)
class Star {
constructor() { this.reset(true); }
reset(randomizeX = false) {
// Si nace por primera vez, posición aleatoria. Si reaparece, nace en la derecha.
this.x = randomizeX ? Math.random() * w : w;
this.y = Math.random() * h;
// El tamaño determina la capa de profundidad (Parallax)
this.size = Math.random() * 1.8 + 0.2;
this.baseAlpha = Math.random() * 0.6 + 0.1;
this.phase = Math.random() * Math.PI * 2;
this.color = starColors[Math.floor(Math.random() * starColors.length)];
this.blinkSpeed = Math.random() * 0.03 + 0.01;

this.driftSpeed = (this.size * CONFIG.baseSpeed) + 0.01;
}
update() {
this.phase += this.blinkSpeed; // Parpadeo orgánico
this.x -= this.driftSpeed;     // Deriva hacia la izquierda
if (this.x < 0) this.reset(false); // Si sale de pantalla, vuelve a nacer
}
draw() {
const currentAlpha = this.baseAlpha + Math.sin(this.phase) * 0.4;
// TRUCO DE RENDIMIENTO: Falso resplandor (Halo) solo para estrellas grandes y en su pico de brillo
if (this.size > 1.2 && currentAlpha > 0.6) {
ctx.globalAlpha = 0.15;
ctx.fillStyle = this.color;
ctx.fillRect(this.x - 1, this.y - 1, this.size + 2, this.size + 2);
}
ctx.globalAlpha = Math.max(0, currentAlpha);
ctx.fillStyle = this.color;
ctx.fillRect(this.x, this.y, this.size, this.size);
}
}
// CLASE: ESTRELLA FUGAZ (Más dramática y con destello eléctrico)
class ShootingStar {
constructor() { this.reset(); }
reset() {
this.x = Math.random() * w * 1.5; // Pueden nacer más a la derecha para cruzar toda la pantalla
this.y = -20;
this.speed = Math.random() * 20 + 15; // Velocidad de impacto
this.size = Math.random() * 1.5 + 1;
// Caída diagonal dramática cruzando el espacio
this.dirX = -1;
this.dirY = Math.random() * 0.5 + 0.5;
this.length = Math.random() * 80 + 50;
this.color = (Math.random() > 0.7) ? '#00e5ff' : '#ffffff'; // Cian eléctrico (neón) o blanco
}
update() {
this.x += this.speed * this.dirX;
this.y += this.speed * this.dirY;
return !(this.x < -this.length || this.x > w + this.length || this.y > h + this.length);
}
draw() {
const tailX = this.x - (this.length * this.dirX);
const tailY = this.y - (this.length * this.dirY);
// 1. Cola semitransparente (Súper eficiente, un solo trazo)
ctx.globalAlpha = 0.4;
ctx.beginPath();
ctx.strokeStyle = this.color;
ctx.lineWidth = this.size * 0.8;
ctx.moveTo(tailX, tailY);
ctx.lineTo(this.x, this.y);
ctx.stroke();
// 2. Halo de resplandor del núcleo (Falso Glow)
ctx.globalAlpha = 0.4;
ctx.fillStyle = this.color;
ctx.fillRect(this.x - 1, this.y - 1, this.size * 2.5, this.size * 2.5);
// 3. Cabeza brillante ardiente
ctx.globalAlpha = 1;
ctx.fillStyle = '#ffffff';
ctx.fillRect(this.x, this.y, this.size * 1.5, this.size * 1.5);
}

ctx.fillStyle = CONFIG.bgColor;
ctx.fillRect(0, 0, w, h);

for (let i = 0; i < stars.length; i++) {
stars[i].update();
stars[i].draw();

if (Math.random() < CONFIG.shootingStarFreq) {
shootingStars.push(new ShootingStar());

// Motor de física de fugaces (bucle invertido súper rápido)
for (let i = shootingStars.length - 1; i >= 0; i--) {
const star = shootingStars[i];

/* ============================================================
🔒 CRYPTOSYSTEM — AES-GCM-256 con PBKDF2-SHA256
Responsabilidad única: encriptar/desencriptar blobs en b64.
============================================================ */
const CryptoSystem = (() => {
const ITER = 200000;// OWASP 2024 mínimo para SHA-256
const KEY_LEN   = 256;
const SALT_LEN  = 16;        // 128 bits
const IV_LEN    = 12;        // 96 bits (óptimo GCM)
const enc       = new TextEncoder();
const dec       = new TextDecoder();
async function _derivarClave(password, salt) {
const keyMaterial = await crypto.subtle.importKey(
'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
);
return crypto.subtle.deriveKey(
{ name: 'PBKDF2', salt, iterations: ITER, hash: 'SHA-256' },
keyMaterial,
{ name: 'AES-GCM', length: KEY_LEN },
false, ['encrypt', 'decrypt']
);
}
async function encriptar(objeto, password) {
const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
const iv   = crypto.getRandomValues(new Uint8Array(IV_LEN));
const key  = await _derivarClave(password, salt);
const data = enc.encode(JSON.stringify(objeto));
const cifrado = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
// Formato: salt(16) || iv(12) || ciphertext
const blob = new Uint8Array(SALT_LEN + IV_LEN + cifrado.byteLength);
blob.set(salt, 0);
blob.set(iv, SALT_LEN);
blob.set(new Uint8Array(cifrado), SALT_LEN + IV_LEN);
return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => {
        // Extrae la cadena Base64 pura eliminando el prefijo Data URL
        resolve(reader.result.split(',')[1]);
    };
    reader.readAsDataURL(new Blob([blob]));
});
}
async function desencriptar(b64, password) {
const bytes   = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
const salt    = bytes.slice(0, SALT_LEN);
const iv      = bytes.slice(SALT_LEN, SALT_LEN + IV_LEN);
const cifrado = bytes.slice(SALT_LEN + IV_LEN);
const key     = await _derivarClave(password, salt);
const plano   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cifrado);
return JSON.parse(dec.decode(plano));
}
return { encriptar, desencriptar };
})();

}
}, 100);
});

// ==========================================
async getToken() {
await this._ensureMsalReady();
const cuentas = this.msalInstance.getAllAccounts();
if (cuentas.length === 0) {
throw new Error("No hay ninguna sesión iniciada en OneDrive.");
}
const request = {
scopes: ["Files.ReadWrite", "User.Read"],
account: cuentas[0]
};
try {
// 1. Intentamos renovar el 'pase VIP' de forma silenciosa e invisible
const response = await this.msalInstance.acquireTokenSilent(request);
return response.accessToken;
} catch (error) {
try {
// 2. Si falla lo silencioso (ej. llevas días sin abrirla y Microsoft exige verte), pedimos el pase visiblemente
const response = await this.msalInstance.acquireTokenPopup(request);
return response.accessToken;
} catch (popupError) {
console.error("❌ Imposible renovar la sesión:", popupError);
// Si todo falla, forzamos a que el botón rojo de desconectado aparezca
notify("Sesión caducada. Por favor, vuelve a entrar.", "error");
throw new Error("Sesión caducada de Microsoft. Debes volver a iniciar sesión.");
}
}
}

async descargarDatosBinario() {

]);

id = await this.getFileId();
const retryRes = await Promise.all([
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, { headers: { Authorization: `Bearer ${token}` } }),
fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}/content`, { headers: { Authorization: `Bearer ${token}` } })
]);
resMeta = retryRes[0];
resContent = retryRes[1];
}
if (resMeta.ok) {
const metaJson = await resMeta.json();
this.lastETag = metaJson.eTag || null;
}
if (!resContent.ok) throw new Error(`Error descargando desde OneDrive`);
const arrayBuffer = await resContent.arrayBuffer();

catch (workerError) { console.warn('Worker XLSX no disponible, usando lectura principal:', workerError); }
}
if (window.AppAssets) await window.AppAssets.xlsx();
// Aunque el Worker lea el libro, procesarLibroLeido necesita XLSX.utils en la ventana principal.
if (wbWorker) return wbWorker;
// CLAVE: cellDates=true obliga a que se lea IGUAL que en el modo local
return XLSX.read(new Uint8Array(arrayBuffer), { type: 'array', cellDates: true });

// --- 4. GUARDADO CON CONTROL DE VERSIÓN ---
async saveFile(blob) {
const id = await this.getFileId();
const token = await this.getToken();
const headers = {
'Authorization': `Bearer ${token}`,
'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
};
if (this.lastETag) { headers['If-Match'] = this.lastETag; }
// 🛡️ 1. CREAR EL CORTOCIRCUITO (8 segundos máximo)
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), 8000);
try {
    // 🛡️ 2. TU FETCH ORIGINAL (Añadiendo el 'signal' al final)
    const response = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}/content`, {
        method: 'PUT', 
        headers: headers, 
        body: blob,
        signal: controller.signal // <--- La conexión con el cortocircuito
    });
    // 🛡️ 3. SI RESPONDE A TIEMPO, DESACTIVAMOS EL TIMEOUT
    clearTimeout(timeoutId);
    // --- TU LÓGICA DE ETAG INTACTA ---
    if (response.status === 412) {
        this.lastETag = null;
        throw { code: 'CONFLICT_412', message: "⚠️ Conflicto detectado" };
    }
    if (!response.ok) throw new Error("Error al subir");
    if (response.headers.get('eTag')) {
        this.lastETag = response.headers.get('eTag');
    } else {
        try {
            const metaRes = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, { headers: { Authorization: `Bearer ${token}` } });
            if (metaRes.ok) { const m = await metaRes.json(); this.lastETag = m.eTag || null; }
        } catch(e) { }
    }
    // ----------------------------------
} catch (error) {
    // 🛡️ 4. CAPTURAR EL CORTE O LOS ERRORES
    clearTimeout(timeoutId); // Limpiamos la memoria por seguridad
    if (error.name === 'AbortError') {
        console.error("⏳ TIMEOUT: OneDrive no respondió en 8s.");
        // Lanzamos un error amigable para que lo gestione la función padre
        throw new Error("Red inestable. Subida cancelada por seguridad."); 
    } else {
        // Re-lanzamos cualquier otro error (como tu CONFLICT_412) para no romper tu lógica actual
        throw error; 
    }
}
}

async function cargarDesdeNube(esSilencioso = false) {

        // --- INICIO MEJORA: Sincronización Silenciosa ---
        // Verificamos si el archivo realmente ha cambiado antes de descargarlo entero y redibujar la UI.
        if (esSilencioso && oneDrive.lastETag) {
            const token = await oneDrive.getToken();

            const resMeta = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}?$select=eTag`, {

            });
            if (resMeta.ok) {
                const metaJson = await resMeta.json();
                if (metaJson.eTag && metaJson.eTag === oneDrive.lastETag) {
                    return false;
                }

        }
        // --- FIN MEJORA ---
        // AHORA: oneDrive.loadFile devuelve el Workbook YA PROCESADO (Rápido)
        const wb = await oneDrive.loadFile();
        // Pasamos el libro directamente a tu procesador
        procesarLibroLeido(wb);
        return true;

// BUG 8 FIX: Bandera de guardia para evitar recursión infinita.
// renderizar() y actualizarDashboard() podían rellamar a recalcularSaldosGlobal
// provocando un bucle que congelaba el navegador.
let _recalculandoSaldos = false;
function recalcularSaldosGlobal() {
if (_recalculandoSaldos) return;   // ← cortocircuito anti-recursión
_recalculandoSaldos = true;
try {
if (!window.datos || window.datos.length === 0) return;
// 1. Ordenamos cronológicamente (Vital para que el saldo tenga sentido histórico)
window.datos.sort((a, b) => {
if (a.ts !== b.ts) return a.ts - b.ts;
if (a.cuenta !== b.cuenta) return a.cuenta.localeCompare(b.cuenta);
// El motor calcula ingresos primero (mayor a menor) para construir el saldo
return b.importe - a.importe;
});
// 2. Reiniciamos los saldos en la configuración
let saldosTemporales = {};
if (window.mapaCuentas) {
Object.keys(window.mapaCuentas).forEach(k => {
saldosTemporales[k] = 0;
if(window.mapaCuentas[k]) window.mapaCuentas[k].saldoActual = 0;
});
}
// 3. Recorremos TODOS los movimientos para calcular saldo línea a línea
window.datos.forEach(m => {
const cta = m.cuenta;
const imp = window.FinanceModel.parseMoney(m.importe);
// Si la cuenta no existe en el mapa temporal, la iniciamos
if (saldosTemporales[cta] === undefined) saldosTemporales[cta] = 0;
// Sumamos (o restamos) el importe de forma segura
saldosTemporales[cta] = window.sumarDinero(saldosTemporales[cta], imp);
// Guardamos el saldo resultante EN EL MOVIMIENTO (para verlo en el Diario)
m.saldo = saldosTemporales[cta];
});
// 4. Guardamos los saldos finales en la Configuración Global (Para el Patrimonio)
Object.keys(saldosTemporales).forEach(cta => {
if (!window.mapaCuentas[cta]) {
// CAMBIO: Si la cuenta es nueva, la marcamos como SIN CLASIFICAR para que destaque
window.mapaCuentas[cta] = { tipo: 'SIN CLASIFICAR', esInversion: false };
}
window.mapaCuentas[cta].saldoActual = saldosTemporales[cta];
});
// 4b. MÓDULO CARTERA: Patrimonio siempre a coste; mercado queda como plusvalía latente
if (typeof window.calcularValoresCartera === 'function') window.calcularValoresCartera();
// 4c. Actualizar plusvalía visible en Patrimonio
if (typeof window.actualizarPlusvaliaPatrimonio === 'function') {
  window.actualizarPlusvaliaPatrimonio();
}
// 5. ACTUALIZAR PANTALLA — solo renderiza la pestaña visible
const _tabActiva = (document.querySelector('.view-section.active') || {}).id || '';
if(typeof renderizar === 'function') renderizar();
if(typeof actualizarDashboard === 'function') actualizarDashboard();
// Patrimonio y Sunburst solo si el usuario está viéndolos ahora mismo
// (irPestana ya los renderiza cuando el usuario navega a esa pestaña)
if(_tabActiva === 'tab-patri') {
if(typeof actualizarPatrimonio === 'function') actualizarPatrimonio();
if(typeof renderizarSunburstPatrimonio === 'function') renderizarSunburstPatrimonio();
}
} finally {
_recalculandoSaldos = false;   // ← siempre liberamos la guardia
}
}

window.verExtractoPatrimonio = function(nombreCuenta) {

const titulo = document.getElementById('ext-titulo');
const saldoEl = document.getElementById('ext-saldo');

const saldoActual = infoCta ? (infoCta.saldoActual || 0) : 0;
saldoEl.innerText = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(saldoActual);
saldoEl.style.color = saldoActual >= 0 ? '#32d74b' : '#ff453a';
let movsCuenta = window.datos.filter(m => String(m.cuenta).toUpperCase().trim() === ctaKey);

movsCuenta = movsCuenta.filter(m => pasaFiltroPropietario(m));
}
// 🏦 ALGORITMO BANCARIO: Ordenar del más nuevo al más viejo
// En caso de empate (mismo día), los gastos van arriba para que
// la resta hacia atrás cuadre a la perfección.
movsCuenta.sort((a, b) => {
if (a.ts !== b.ts) return b.ts - a.ts;
return a.importe - b.importe;
});
// Variable para el saldo matemático hacia atrás
let saldoLinea = saldoActual;
let html = '';
if (movsCuenta.length === 0) {
html = '<div style="text-align:center; color:#8e8e93; padding: 20px; font-weight:bold; font-size: 13px;">No hay movimientos.</div>';
} else {
movsCuenta.forEach(m => {

if (m.tipo === 'traspaso' || (m.concepto && m.concepto.toUpperCase().includes('TRASPASO'))) {
colorImporte = '#0a84ff';
}

const saldoFmt = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(saldoLinea);
// Unir beneficiario y descripción (Línea 2)
let textoDetalle = m.descripcion || m.detalle || '';
const ben = m.beneficiario || '';
if (ben) {
textoDetalle = textoDetalle ? ben + ' - ' + textoDetalle : ben;
}
if (!textoDetalle) textoDetalle = 'Sin detalle';
html += `
<div class="ext-row" onclick="cerrarModalExtracto(); window.editarMovimiento('${m.id}')">
<div class="ext-line">
<span class="ext-fecha">${fechaTxt}</span>
<span class="ext-concepto">${m.concepto}</span>
<span class="ext-importe" style="color: ${colorImporte};">${signo}${importeFmt}</span>
</div>
<div class="ext-line">
<span class="ext-detalle">${textoDetalle}</span>
<span class="ext-saldo">${saldoFmt}</span>
</div>
</div>`;
// Restamos para calcular el saldo de la fila inferior (más antigua)
saldoLinea = saldoLinea - m.importe;
});
}
lista.innerHTML = html;
modal.classList.add('active');
};

        modal.setAttribute('data-mode', 'ingreso'); // Dispara el CSS Verde
        if (titulo) titulo.innerText = "NUEVO INGRESO";
        if (btnAction) btnAction.innerText = "RECIBIR DINERO";
        if (lblOrigen) lblOrigen.innerText = "INGRESADO EN";

    else if (tipo === 'traspasos') {

window.UIEvents.emitir('datos:actualizados');
setTimeout(() => { if(btn) btn.innerHTML = originalText; }, 2000);
return true;
} catch (errorCritico) {
    console.error("🚨 ERROR CRÍTICO AL GUARDAR:", errorCritico);
    // --- 7. FALLO: BUZÓN DE SALIDA (OFFLINE QUEUE) ---
    if (nuevasFilas) {
        const buzonAnterior = JSON.parse(localStorage.getItem('aidanai_buzon') || '[]');
        const filasArray = Array.isArray(nuevasFilas) ? nuevasFilas : [nuevasFilas];
        filasArray.forEach(f => {
            if (!buzonAnterior.find(b => b.id === (f.id || f.ID))) {
                buzonAnterior.push(f);
            }
        });
        localStorage.setItem('aidanai_buzon', JSON.stringify(buzonAnterior));
        if (typeof notify === 'function') notify("📶 Sin conexión. Guardado offline en espera.", "warning");
        if (window.AppState) window.AppState.actualizarSemaforo('naranja');
        // 🟢 NUEVO: FIX OPTIMISTIC UI (El truco Fintech)
        // Aunque no haya red, inyectamos el dato visualmente para que no desaparezca de la pantalla
        window.datos = datosFinales;
        if (window.UIEvents) window.UIEvents.emitir('datos:actualizados');
    } else {
        if (window.AppState) window.AppState.actualizarSemaforo('error');
    }
    // 🟢 NUEVO: Devolvemos true para que el modal/formulario se cierre. 
    // Para el usuario, la experiencia es fluida y sin bloqueos.
    return true; 
} finally {
    // --- 8. LIBERAR MUTEX SIEMPRE ---
    if (window.AppState) window.AppState.setGuardando(false);
    if (btnModal) btnModal.innerHTML = 'GUARDAR';
    setTimeout(() => { if (btn) btn.innerHTML = originalText; }, 2000);
}
};

// 🌊 GRÁFICO SANKEY (RÍOS DE DINERO) - [OPTIMIZADO RAM]
// ==========================================
window.renderizarSankey = function(datosPeriodo) {
    if (!window.ensureEChartsReady(() => window.renderizarSankey(datosPeriodo))) return;
    const container = document.getElementById('chart-Sankey');
    if (!container) return;
    if (!datosPeriodo || datosPeriodo.length === 0) {
        container.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;font-size:12px;font-style:italic;">Sin flujo de dinero en este periodo...</div>';
        return;
    }
    // 🟢 NUEVO: PATRÓN DE RECICLAJE (Adiós dispose y fugas de memoria)
    let echartSankey = echarts.getInstanceByDom(container);
    if (!echartSankey) {
        echartSankey = echarts.init(container, null, { renderer: 'canvas' });
    }
    window.echartSankey = echartSankey;
    // 1. Agrupar datos por concepto
    let totalIngresos = 0;
    const gastosPorConcepto = {};
    datosPeriodo.forEach(m => {
        const conc = String(m.concepto || "OTROS").toUpperCase().trim();
        if (conc.includes('INICIAL') || m.tipo === 'traspaso' || conc.includes('TRASPASO')) return;
        if (m.tipo === 'ingreso' || m.importe > 0) {
            totalIngresos += window.FinanceModel.parseMoney(m.importe);
        } else {
            gastosPorConcepto[conc] = (gastosPorConcepto[conc] || 0) + Math.abs(window.FinanceModel.parseMoney(m.importe));
        }
    });
    let totalGastos = Object.values(gastosPorConcepto).reduce((a, b) => a + b, 0);
    let ahorro = totalIngresos - totalGastos;
    // --- SEGURO ANTI-DUPLICADOS ---
    let nodoOrigen = "INGRESOS ";
    if (totalIngresos === 0 && totalGastos > 0) {
        nodoOrigen = "FONDOS PREVIOS ";
        totalIngresos = totalGastos;
        ahorro = 0;
    } else if (totalIngresos === 0 && totalGastos === 0) {
        // En lugar de innerHTML que rompe la instancia de ECharts, limpiamos el gráfico
        window.echartSankey.clear(); 
        return;
    }
    // 2. Construir Nodos y Enlaces
    const nodes = [];
    const links = [];
    // Nodo Raíz (Verde Neón Brillante)
    nodes.push({
        name: nodoOrigen,
        itemStyle: { color: '#39FF14', shadowBlur: 20, shadowColor: 'rgba(57, 255, 20, 0.8)', borderColor: '#fff', borderWidth: 1 }
    });
    const listaGastos = Object.entries(gastosPorConcepto).sort((a, b) => b[1] - a[1]);
    let otrosGastos = 0;
    const paletaGastos = ['#FF2E4D', '#FF007F', '#B500FF', '#00D4FF', '#FF9900', '#FFEA00'];
    listaGastos.forEach((g, index) => {
        let nombreNodo = g[0];
        if (nombreNodo === nodoOrigen) nombreNodo += " (Gasto)";
        if (index < 6) {
            const colorNeón = paletaGastos[index % paletaGastos.length];
            nodes.push({
                name: nombreNodo,
                itemStyle: { color: colorNeón, shadowBlur: 15, shadowColor: colorNeón, borderRadius: 4 }
            });
            links.push({ source: nodoOrigen, target: nombreNodo, value: g[1] });
        } else {
            otrosGastos += g[1];
        }
    });
    if (otrosGastos > 0) {
        nodes.push({ name: 'RESTO DE GASTOS', itemStyle: { color: '#888888', shadowBlur: 10, shadowColor: '#888888' } });
        links.push({ source: nodoOrigen, target: 'RESTO DE GASTOS', value: otrosGastos });
    }
    if (ahorro > 0) {
        nodes.push({ name: 'AHORRO NETO', itemStyle: { color: '#0A84FF', shadowBlur: 20, shadowColor: 'rgba(10, 132, 255, 0.8)', borderColor: '#fff', borderWidth: 1 } });
        links.push({ source: nodoOrigen, target: 'AHORRO NETO', value: ahorro });
    }
    if (nodes.length < 2 || links.length === 0) {
        window.echartSankey.clear();
        return;
    }
    // 3. Configuración ULTRA VISUAL de ECharts
    const option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            triggerOn: 'mousemove',
            backgroundColor: 'rgba(15, 15, 20, 0.85)',
            borderColor: 'var(--c-primary, #0A84FF)',
            borderWidth: 1,
            padding: 15,
            borderRadius: 12,
            textStyle: { color: '#fff', fontSize: 13, fontFamily: 'Inter' },
            formatter: function (params) {
                const formatter = new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR'});
                if (params.dataType === 'node') {
                    return `<div style="text-align:center;">
                    <span style="font-size:10px;color:#FFFFFF;letter-spacing:1px;text-transform:uppercase;">${params.name}</span><br/>
                    <strong style="font-size:22px;color:${params.color || '#fff'};text-shadow: 0 0 10px ${params.color || '#fff'};">${formatter.format(params.value)}</strong>
                    </div>`;
                } else {
                    return `<div style="text-align:center;">
                    <span style="font-size:10px;color:#FFFFFF;text-transform:uppercase;">Flujo de capital</span><br/>
                    <b style="color:#39FF14;">${params.data.source}</b> <span style="color:#666;">➔</span> <b style="color:#FF2E4D;">${params.data.target}</b><br/>
                    <strong style="font-size:18px;color:#fff;">${formatter.format(params.value)}</strong>
                    </div>`;
                }
            }
        },
        series: {
            type: 'sankey',
            layout: 'none',
            top: 25, bottom: 25, left: 10, right: 130,
            nodeGap: 16,
            nodeWidth: 12,
            nodeAlign: 'justify',
            data: nodes,
            links: links,
            label: {
                color: '#fff',
                fontFamily: 'Inter',
                fontWeight: 'bold',
                fontSize: 11,
                padding: [0, 0, 0, 10],
                textShadowBlur: 4,
                textShadowColor: 'rgba(0,0,0,1)'
            },
            lineStyle: {
                color: 'gradient',
                curveness: 0.6,
                opacity: 0.45,
                shadowBlur: 8,
                shadowColor: 'rgba(0,0,0,0.5)'
            },
            emphasis: {
                focus: 'adjacency',
                lineStyle: {
                    opacity: 0.85,
                    shadowBlur: 15,
                    shadowColor: 'rgba(255,255,255,0.2)'
                }
            },
            animationEasing: 'cubicOut',
            animationDuration: 1800
        }
    };
    // Inyectamos los datos sin parpadeos
    window.echartSankey.setOption(option);
    // 🟢 NUEVO: Seguro contra roturas al girar la pantalla del móvil
    if (!window._sankeyResizeObs) {
        window._sankeyResizeObs = new ResizeObserver(() => {
            if (window.echartSankey) window.echartSankey.resize();
        });
        window._sankeyResizeObs.observe(container);
    }
};

// 🗺️ TREEMAP DEFINITIVO (FILTROS HTML + SINGLE SERIES) - [OPTIMIZADO RAM]
// ==========================================
window.tiposExcluidos = window.tiposExcluidos || new Set();
window.renderTreeMap = function() {
    if (!window.ensureEChartsReady(() => window.renderTreeMap())) return;
    const container = document.getElementById('chart-TreeMap');
    const filterContainer = document.getElementById('treemap-filters');
    if (!container || !filterContainer) return;
    if (!window.datos || window.datos.length === 0) {
        container.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;">Sin datos para el mapa...</div>';
        return;
    }
    // 🟢 NUEVO: PATRÓN DE RECICLAJE (Memoria RAM plana)
    let echartTreeMap = echarts.getInstanceByDom(container);
    if (!echartTreeMap) {
        echartTreeMap = echarts.init(container);
    }
    window.echartTreeMap = echartTreeMap;
    // 1. PROCESAR DATOS Y COLORES
    const mapaColores = {
        'BANCO': '#00F0FF', 'BOLSA': '#F72585', 'CRIPTOMONEDAS': '#7209B7',
        'CRIPTO': '#7209B7', 'EFECTIVO': '#4CC9F0', 'VIVIENDA': '#FFD60A',
        'PLANPENSIONES': '#39FF14', 'CROWDFUNDING': '#FF4444', 'OTROS': '#888888'
    };
    const datosFiltrados = window.datos.filter(m => (typeof pasaFiltroPropietario === 'function') ? pasaFiltroPropietario(m) : true);
    const saldos = {};
    datosFiltrados.forEach(m => {
        const cta = String(m.cuenta || '').trim().toUpperCase();
        if(cta) saldos[cta] = (saldos[cta] || 0) + m.importe;
    });
    const grupos = {};
    Object.keys(saldos).forEach(cta => {
        const valor = saldos[cta];
        // 🔥 FIX 2 APLICADO: Ignoramos saldos a cero (±0.01€). Aparecen deudas.
        if (Math.abs(valor) < 0.01) return;
        let config = (window.mapaCuentas && window.mapaCuentas[cta]) ? window.mapaCuentas[cta] : { tipo: 'OTROS' };
        const tipo = String(config.tipo || 'OTROS').toUpperCase().trim();
        if (!grupos[tipo]) grupos[tipo] = [];
        grupos[tipo].push({ name: cta.replace('D-', '').replace('N-', ''), value: Math.abs(valor) }); // Usamos valor absoluto para el tamaño visual
    });
    // 2. CREAR BOTONES DE FILTRO (LEYENDA)
    const todosLosTipos = Object.keys(grupos).sort();
    filterContainer.innerHTML = '';
    todosLosTipos.forEach(tipo => {
        const estaActivo = !window.tiposExcluidos.has(tipo);
        const color = mapaColores[tipo] || '#888';
        const btn = document.createElement('button');
        btn.style = `
        background: ${estaActivo ? color + '20' : '#111'};
        color: ${estaActivo ? color : '#444'};
        border: 1px solid ${estaActivo ? color : '#333'};
        padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800;
        cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        box-shadow: ${estaActivo ? '0 0 10px ' + color + '30' : 'none'};
        margin: 2px;
        `;
        btn.innerText = tipo;
        btn.onclick = () => {
            if (window.tiposExcluidos.has(tipo)) window.tiposExcluidos.delete(tipo);
            else window.tiposExcluidos.add(tipo);
            window.renderTreeMap(); // Redibujar
        };
        filterContainer.appendChild(btn);
    });
    // 3. PREPARAR DATA PARA EL GRÁFICO (Solo tipos no excluidos)
    const dataTree = [];
    todosLosTipos.forEach(tipo => {
        if (!window.tiposExcluidos.has(tipo)) {
            dataTree.push({
                name: tipo,
                children: grupos[tipo],
                itemStyle: { color: mapaColores[tipo] || '#888' }
            });
        }
    });
    // 4. CONFIGURACIÓN DEL GRÁFICO
    const option = {
        backgroundColor: 'transparent',
        tooltip: {
            backgroundColor: 'rgba(0,0,0,0.9)',
            textStyle: { color: '#fff' },
            formatter: (info) => {
                // Recuperamos el signo real para el tooltip (por si es una deuda)
                let nombreOriginal = info.name;
                let ctaBusqueda = Object.keys(saldos).find(k => k.replace('D-', '').replace('N-', '') === nombreOriginal);
                let saldoReal = ctaBusqueda ? saldos[ctaBusqueda] : info.value;
                const val = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(saldoReal);
                return `<div style="color:${info.color}; font-weight:bold; margin-bottom: 4px;">${info.name}</div><div style="font-size: 16px;">${val}</div>`;
            }
        },
        series: [{
            type: 'treemap',
            width: '100%', height: '100%',
            roam: false, nodeClick: false, breadcrumb: { show: false },
            label: { show: true, formatter: '{b}', color: '#fff', fontWeight: 'bold', fontSize: 10 },
            itemStyle: { borderColor: '#000', borderWidth: 2, gapWidth: 1 },
            levels: [
                { itemStyle: { borderColor: '#000', borderWidth: 4, gapWidth: 4 } },
                { colorSaturation: [0.3, 0.6], itemStyle: { gapWidth: 2, borderColorSaturation: 0.6 } }
            ],
            data: dataTree
        }]
    };
    // Inyección de datos sin parpadeos
    window.echartTreeMap.setOption(option);
    // 🟢 NUEVO: Seguro contra roturas al girar la pantalla del móvil
    if (!window._treeMapResizeObs) {
        window._treeMapResizeObs = new ResizeObserver(() => {
            if (window.echartTreeMap) window.echartTreeMap.resize();
        });
        window._treeMapResizeObs.observe(container);
    }
};

// 💎 RAYO X PATRIMONIAL (MODO NEÓN CLEAN) - [OPTIMIZADO]
// ==========================================
window.renderizarSunburstPatrimonio = function() {
    if (!window.ensureEChartsReady(() => window.renderizarSunburstPatrimonio())) return;
    // 1. OBTENER CONTENEDOR
    const container = document.getElementById('chart-Sunburst');
    if (!container) return;
    // PATRÓN RECICLAJE
    if (!window.echartSunburst || window.echartSunburst.isDisposed()) {
        window.echartSunburst = echarts.init(container);
    }
    const chart = window.echartSunburst;
    chart.off('mouseover');
    chart.off('mouseout');
    if (!window.datos || window.datos.length === 0) return;
    // 2. PROCESAMIENTO
    const saldos = {};
    const datosFiltrados = window.datos.filter(m => pasaFiltroPropietario(m));
    datosFiltrados.forEach(m => {
        if (!m.cuenta) return;
        const cta = String(m.cuenta || '').trim().toUpperCase();
        saldos[cta] = (saldos[cta] || 0) + m.importe;
    });
    let patrimonioNetoReal = 0;
    let activosBrutos = 0;
    const childrenLiquidez = [];
    const childrenInversion = [];
    const childrenAutocustodia = [];
    const childrenPropiedad = [];
    // --- PALETA DE COLORES "CYBERPUNK NEÓN" MEJORADA ---
    const cLiq = ['#00F0FF', '#00B8FF', '#0066FF', '#00FFFF', '#2DE2E6', '#03DAC6']; // Cianes/Azules
    const cInv = ['#F72585', '#B5179E', '#7209B7', '#560BAD', '#FF00CC', '#FF4081']; // Fucsias/Morados
    const cAuto = ['#39FF14', '#00FF41', '#32D74B', '#00FA9A', '#7CFC00', '#00FF00']; // Verdes Neón
    const cProp = ['#FFD60A', '#FF9F1C', '#FFB703', '#FCA311', '#FB8500', '#FFC300']; // Naranjas/Oro
    let totalLiquidez = 0;
    let totalInversion = 0;
    let totalAutocustodia = 0;
    let totalPropiedad = 0;
    Object.keys(saldos).forEach(cta => {
        const valor = saldos[cta];
        patrimonioNetoReal += valor;
        if (Math.abs(valor) < 0.01) return; // Ignorar saldos a cero
        activosBrutos += valor;
        let config = (window.mapaCuentas && window.mapaCuentas[cta]) 
            ? window.mapaCuentas[cta] 
            : { tipo: 'SIN CLASIFICAR', esInversion: false };
        const tipoStr = String(config.tipo || '').toUpperCase().trim();
        const nombreLimpio = cta.replace('D-', '').replace('N-', '');
        // Repartimos en 4 montones usando la misma lógica
        if (tipoStr === 'AUTOCUSTODIA') {
            totalAutocustodia += valor;
            childrenAutocustodia.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cAuto[childrenAutocustodia.length % cAuto.length], shadowBlur: 20, shadowColor: cAuto[childrenAutocustodia.length % cAuto.length] }
            });
        } else if (tipoStr === 'PROPIEDAD' || tipoStr === 'INMUEBLE') {
            totalPropiedad += valor;
            childrenPropiedad.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cProp[childrenPropiedad.length % cProp.length], shadowBlur: 20, shadowColor: cProp[childrenPropiedad.length % cProp.length] }
            });
        } else if (config.esInversion) {
            totalInversion += valor;
            childrenInversion.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cInv[childrenInversion.length % cInv.length], shadowBlur: 20, shadowColor: cInv[childrenInversion.length % cInv.length] }
            });
        } else {
            totalLiquidez += valor;
            childrenLiquidez.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cLiq[childrenLiquidez.length % cLiq.length], shadowBlur: 20, shadowColor: cLiq[childrenLiquidez.length % cLiq.length] }
            });
        }
    });
    childrenLiquidez.sort((a, b) => b.value - a.value);
    childrenInversion.sort((a, b) => b.value - a.value);
    childrenAutocustodia.sort((a, b) => b.value - a.value);
    childrenPropiedad.sort((a, b) => b.value - a.value);
    // Solo añadimos los trozos si hay dinero dentro
    const dataTree = [];
    if (childrenLiquidez.length > 0) dataTree.push({ name: 'LIQUIDEZ', itemStyle: { color: '#00F0FF' }, children: childrenLiquidez });
    if (childrenInversion.length > 0) dataTree.push({ name: 'INVERSIÓN', itemStyle: { color: '#F72585' }, children: childrenInversion });
    if (childrenAutocustodia.length > 0) dataTree.push({ name: 'AUTOCUSTODIA', itemStyle: { color: '#39FF14' }, children: childrenAutocustodia });
    if (childrenPropiedad.length > 0) dataTree.push({ name: 'PROPIEDAD', itemStyle: { color: '#FFD60A' }, children: childrenPropiedad });
    // 3. ACTUALIZAR TEXTO CENTRAL
    const elLabelTotal = document.querySelector('#sunburst-center-info div:first-child');
    const elValorTotal = document.getElementById('sb-total-val');
    if(elValorTotal && elLabelTotal) {
        elLabelTotal.innerText = "PATRIMONIO";
        elLabelTotal.style.color = "#888";
        elValorTotal.innerText = FMT_EUR0.format(patrimonioNetoReal);
        elValorTotal.style.color = patrimonioNetoReal >= 0 ? '#fff' : '#FF2E4D';
        elValorTotal.style.textShadow = "0 0 20px rgba(255,255,255,0.4)";
    }
    const elRatioLiq = document.getElementById('kpi-ratio-liq');
    const elRatioInv = document.getElementById('kpi-ratio-inv');
    const elRatioAuto = document.getElementById('kpi-ratio-auto');
    const elRatioProp = document.getElementById('kpi-ratio-prop');
    if (activosBrutos > 0) {
        if(elRatioLiq) elRatioLiq.innerText = ((totalLiquidez / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioInv) elRatioInv.innerText = ((totalInversion / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioAuto) elRatioAuto.innerText = ((totalAutocustodia / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioProp) elRatioProp.innerText = ((totalPropiedad / activosBrutos) * 100).toFixed(0) + '%';
    }
    // 4. CONFIGURACIÓN DEL GRÁFICO (MODO NEÓN)
    const option = {
        backgroundColor: 'transparent',
        tooltip: { show: false },
        series: {
            type: 'sunburst',
            data: dataTree,
            radius: ['50%', '90%'],
            sort: undefined,
            itemStyle: { borderRadius: 6, borderColor: '#050505', borderWidth: 2 },
            label: { show: false },
            levels: [
                {},
                { r0: '50%', r: '58%', itemStyle: { opacity: 0.6, borderWidth: 1 } },
                { r0: '60%', r: '90%', itemStyle: { opacity: 1 } }
            ]
        }
    };
    chart.setOption(option, { notMerge: true });
    // 5. INTERACCIÓN
    chart.on('mouseover', function(params) {
        if(elValorTotal) {
            elLabelTotal.innerText = params.name;
            elLabelTotal.style.color = params.color;
            elLabelTotal.style.fontSize = "13px";
            elLabelTotal.style.fontWeight = "bold";
            const valStr = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(params.value);
            const pct = ((params.value / activosBrutos) * 100).toFixed(2);
            elValorTotal.innerHTML = `<div style="font-size:18px; text-shadow:0 0 20px ${params.color}">${valStr} €</div><div style="font-size:12px; color:#fff; margin-top:5px; font-weight:700">${pct}%</div>`;
        }
        chart.dispatchAction({ type: 'highlight', dataIndex: params.dataIndex });
    });
    chart.on('mouseout', function(params) {
        if(elValorTotal) {
            elLabelTotal.innerText = "PATRIMONIO";
            elLabelTotal.style.color = "#888";
            elLabelTotal.style.fontSize = "10px";
            elLabelTotal.style.fontWeight = "normal";
            elValorTotal.innerHTML = FMT_EUR0.format(patrimonioNetoReal);
            elValorTotal.style.textShadow = "0 0 20px rgba(255,255,255,0.4)";
        }
        chart.dispatchAction({ type: 'downplay', dataIndex: params.dataIndex });
    });
    // 🟢 NUEVO: Seguro contra roturas al girar la pantalla del móvil
    if (!window._sunburstResizeObs) {
        window._sunburstResizeObs = new ResizeObserver(() => {
            if (window.echartSunburst) window.echartSunburst.resize();
        });
        window._sunburstResizeObs.observe(container);
    }
};

    const container = document.getElementById('chart-FIRE');
    const subtitulo = document.getElementById('fire-subtitle');

    let patrimonioSeguro = (kpis.patrimonio > 0) ? kpis.patrimonio : 1;
    let ratioInversion = ((kpis.inversiones || 0) / patrimonioSeguro) * 100;
    let scoreInversion = Math.max(0, Math.min((ratioInversion / 50) * 100, 100));

        }

    // PENTÁGONO: Solo 5 métricas
    const scores = [

// 1. Traductor de formatos (Monedas, Porcentajes, etc)
function formatearDatoMaestro(valor, tipo) {
if (tipo === 'moneda') {
return (typeof FMT_EUR2 !== 'undefined') ? FMT_EUR2.format(valor) : valor.toFixed(2) + ' €';
}
else if (tipo === 'porcentaje') {
return (typeof FMT_PCT !== 'undefined') ? FMT_PCT.format(valor) + '%' : valor.toFixed(2) + '%';
}
else if (tipo === 'meses') {
return valor.toFixed(1) + ' Meses';
}
else {
return (typeof FMT_NUM !== 'undefined') ? FMT_NUM.format(valor) : valor;
}
}
window.formatearDatoMaestro = formatearDatoMaestro;
// 2. Efecto Odómetro Fluido (Sin parpadeos y a prueba de Hoisting)
function animarCifra(idElemento, valorFinal, tipo = 'moneda') {
// 🛠️ FIX: Nos aseguramos de que el registro exista DENTRO de la función
// Así, sin importar cuándo se llame, nunca será "undefined"
window.animacionesActivas = window.animacionesActivas || {};
const el = document.getElementById(idElemento);
if (!el) return;
// 🛑 CANCELAR ANIMACIÓN ANTERIOR SI EXISTE EN ESTE ELEMENTO
if (window.animacionesActivas[idElemento]) {
cancelAnimationFrame(window.animacionesActivas[idElemento]);
}
// Extraemos el valor de la memoria oculta para no pelear con símbolos
let valorInicial = window.FinanceModel.parseMoney(el.getAttribute('data-prev'));
el.setAttribute('data-prev', valorFinal);
// Si el salto es minúsculo (céntimos), lo ponemos de golpe para ahorrar batería
if (Math.abs(valorFinal - valorInicial) < 0.01) {
el.innerText = formatearDatoMaestro(valorFinal, tipo);
return;
}
const duracion = 800; // 0.8 segundos de animación fluida
const startTime = performance.now();
function actualizar(currentTime) {
const elapsed = currentTime - startTime;
const progress = Math.min(elapsed / duracion, 1);
// Curva de aceleración suave
const easeOut = 1 - Math.pow(1 - progress, 4);
const valorActual = valorInicial + (valorFinal - valorInicial) * easeOut;
// Pintar el número en cada fotograma
el.innerText = formatearDatoMaestro(valorActual, tipo);
if (progress < 1) {
window.animacionesActivas[idElemento] = requestAnimationFrame(actualizar);
} else {
// Cuadrar el último céntimo exacto
el.innerText = formatearDatoMaestro(valorFinal, tipo);
delete window.animacionesActivas[idElemento];
}
}
// Iniciar la animación
window.animacionesActivas[idElemento] = requestAnimationFrame(actualizar);
}
window.animarCifra = animarCifra;
