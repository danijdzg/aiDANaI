function actualizarPatrimonio() {
// 1. Localizar elementos
const contenedorLista = document.getElementById('lista-cuentas-patri');
const elTotalDetalle = document.getElementById('total-patri-valor');
const elTotalHome = document.getElementById('d-patri-total');
// 2. Seguridad
if (!datos || datos.length === 0) {
if(contenedorLista) contenedorLista.innerHTML = '<div style="text-align:center; padding:20px; color:#FFFFFF;">ESPERANDO DATOS...</div>';
return;
}
// 3. Cálculos en memoria
const saldos = {};
const datosFiltrados = datos.filter(m => pasaFiltroPropietario(m));
datosFiltrados.forEach(m => {
const cta = String(m.cuenta || '').trim();
if (!cta) return;
const val = parseFloat(m.importe) || 0;
saldos[cta] = window.sumarDinero(saldos[cta] || 0, val);
});
const grupos = {};
let sumaTotal = 0;
// Agrupar saldos
Object.keys(saldos).forEach(cta => {
if (Math.abs(saldos[cta]) >= 0.01) sumaTotal = window.sumarDinero(sumaTotal, saldos[cta]);
});
Object.keys(saldos).forEach(cta => {
const saldo = saldos[cta];
if (Math.abs(saldo) < 0.01) return;
const ctaKey = cta.trim().toUpperCase();
const mapa = window.mapaCuentas || {};
const config = mapa[ctaKey] ? mapa[ctaKey] : { tipo: 'SIN CLASIFICAR', esInversion: false };
const nombreGrupo = config.tipo ? config.tipo.toUpperCase() : 'SIN CLASIFICAR';
if (!grupos[nombreGrupo]) grupos[nombreGrupo] = { nombre: nombreGrupo, total: 0, cuentas: [], esInversion: config.esInversion };
grupos[nombreGrupo].total = window.sumarDinero(grupos[nombreGrupo].total, saldo);
grupos[nombreGrupo].cuentas.push({ nombre: cta, valor: saldo });
});
// 4. Actualizar Totales (UI Superior con Efecto Odómetro)
const claseColor = sumaTotal >= 0 ? 'val-std-blue' : 'val-std-neg';
if (elTotalDetalle) {
window.animarCifra('total-patri-valor', sumaTotal, 'moneda');
elTotalDetalle.className = 'kpi-value ' + claseColor;
}
if (elTotalHome) {
window.animarCifra('d-patri-total', sumaTotal, 'moneda');
elTotalHome.className = 'kpi-value ' + claseColor;
}
// 5. PINTADO ORDENADO POR IMPORTE
if (contenedorLista) {
if (Object.keys(grupos).length === 0) {
contenedorLista.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">SIN CUENTAS ACTIVAS</div>';
return;
}
let htmlFinal = '';
// --- CAMBIO CLAVE: CONVERTIR A ARRAY Y ORDENAR POR TOTAL ---
const listaGrupos = Object.values(grupos);
// Ordenamos: Mayor dinero primero
listaGrupos.sort((a, b) => b.total - a.total);
listaGrupos.forEach(grupo => {
const colorTitle = grupo.esInversion ? '#BF5AF2' : '#FFFFFF';
// Si es inversión borde morado, si no blanco
const borderStyle = grupo.esInversion ? 'border-left: 3px solid #BF5AF2;' : 'border-left: 3px solid #FFFFFF;';
const pctGrupo = sumaTotal !== 0 ? ((grupo.total / sumaTotal) * 100).toFixed(0) : '0';
const groupId = grupo.nombre.replace(/[^a-zA-Z0-9]/g, '');
// Generar HTML cuentas (Ordenadas por valor también)
let htmlCuentas = '';
grupo.cuentas.sort((a,b) => b.valor - a.valor).forEach(c => {
const colorVal = c.valor >= 0 ? 'var(--c-success)' : 'var(--c-danger)';
const pctCuenta = sumaTotal !== 0 ? ((c.valor / sumaTotal) * 100).toFixed(1) : '0.0';
htmlCuentas += `
<div class="patri-account-item" onclick="verExtractoPatrimonio('${c.nombre}')" style="border-bottom: 1px solid #333;">
<div class="patri-acc-name-col">
<span class="patri-acc-name" style="color:#FFFFFF; font-size:13px;">${c.nombre}</span>
<div class="patri-progress-bar-bg" style="background:#222;">
<div class="patri-progress-bar-fill" style="width:${Math.abs(pctCuenta)}%; background:${colorVal}; opacity:1;"></div>
</div>
</div>
<div class="patri-acc-val-col">
<div class="patri-acc-val" style="color:${colorVal}">${FMT_PCT.format(c.valor)}€</div>
<div class="patri-acc-pct" style="color:var(--c-warning); font-size:10px;">${pctCuenta}%</div>
</div>
</div>
`;
});
htmlFinal += `
<div class="patri-group-card" style="${borderStyle} background:#000; border:1px solid #222;">
<div class="patri-group-header" onclick="togglePatriGroup('${groupId}')" style="cursor:pointer; background:#0a0a0a; border-bottom:1px solid #222;">
<div style="display:flex; gap:8px; align-items:center;">
<span class="patri-group-title" style="color:${colorTitle}; font-size:12px;">${grupo.nombre}</span>
<span style="color:var(--c-warning); border:1px solid var(--c-warning); padding:1px 6px; border-radius:4px; font-size:9px; font-weight:800">${pctGrupo}%</span>
</div>
<div style="display:flex; align-items:center; gap:10px">
<span class="patri-group-total" style="color:#FFFFFF;">${FMT_PCT.format(grupo.total)}€</span>
<span class="material-icons" id="icon-${groupId}" style="font-size:20px; color:#FFFFFF;">expand_more</span>
</div>
</div>
<div id="list-${groupId}" class="patri-account-list" style="display:none; animation: fadeIn 0.3s ease;">
${htmlCuentas}
</div>
</div>
`;
});
contenedorLista.innerHTML = htmlFinal;
}
}
function renderizarGraficoEvolucion(movimientos) {
const container = document.getElementById('chartPatrimonio');
const boxGrafico = document.getElementById('box-grafico');
// Validación de seguridad
if (!movimientos || movimientos.length === 0) {
if (boxGrafico) boxGrafico.classList.remove('visible');
return;
}
if (boxGrafico) boxGrafico.classList.add('visible');
// 1. PREPARACIÓN DE DATOS (FIX: Fallback a m.fecha seguro)
const movs = [...movimientos].sort((a, b) => {
const valA = a.ts || new Date(a.fecha).getTime();
const valB = b.ts || new Date(b.fecha).getTime();
return valA - valB;
});
const historiaMap = new Map();
let saldoAcumulado = 0;
movs.forEach(m => {
saldoAcumulado += m.importe;
const d = new Date(m.ts || m.fecha);
// Nos aseguramos de que la fecha sea válida antes de formatear
if (!isNaN(d.getTime())) {
const fechaKey = d.toISOString().split('T')[0];
historiaMap.set(fechaKey, saldoAcumulado);
}
});
const labels = Array.from(historiaMap.keys());
const dataPoints = Array.from(historiaMap.values());
// 2. DESTRUIR INSTANCIA ANTERIOR
if (window.chartInstance) {
window.chartInstance.dispose();
}
// 3. CREAR GRÁFICO (MODO MONTAÑA RUSA Y EFECTO NEÓN)
// 🟢 NUEVO: PATRÓN DE RECICLAJE (Adiós fugas de memoria RAM)
let chartInstance = echarts.getInstanceByDom(container);
if (!chartInstance) {
    // Si no existe el lienzo, lo creamos por primera vez
    chartInstance = echarts.init(container, null, { renderer: 'canvas' });
}
window.chartInstance = chartInstance;
// Usamos setOption con un segundo parámetro 'false' (o sin él) para que fusione los datos 
// de forma fluida sin tener que reiniciar todo el motor interno.
window.chartInstance.setOption({
    backgroundColor: 'transparent',
    grid: { top: 15, right: 45, bottom: 15, left: 10, containLabel: false },
    xAxis: {
        type: 'category',
        data: labels,
        show: false
    },
    yAxis: {
        type: 'value',
        position: 'right',
        scale: true, // 🚀 MAGIA: Esto hace que el gráfico NO empiece en 0, magnificando el esfuerzo
        splitLine: {
            lineStyle: { color: 'rgba(255,255,255,0.08)', type: 'dashed' }
        },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
            color: '#FFFFFF', fontSize: 10, fontFamily: 'Inter', fontWeight: 'bold',
            formatter: v => Math.abs(v) >= 1000 ? (v / 1000).toFixed(0) + 'k' : v
        }
    },
    series: [{
        type: 'line',
        data: dataPoints,
        smooth: 0.4,
        symbol: 'none',
        lineStyle: {
            color: '#BF5AF2', // Morado neón premium (más elegante)
            width: 3,
            shadowColor: 'rgba(191, 90, 242, 0.6)', // Brillo espectacular
            shadowBlur: 15,
            shadowOffsetY: 5
        },
        emphasis: {
            scale: true,
            itemStyle: { color: '#000000', borderColor: '#BF5AF2', borderWidth: 3 }
        },
        areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(191, 90, 242, 0.5)' },
                { offset: 1, color: 'rgba(191, 90, 242, 0.0)' }
            ])
        }
    }],
    tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'line', lineStyle: { color: 'rgba(191, 90, 242, 0.4)', width: 2, type: 'dashed' } },
        backgroundColor: 'rgba(10,10,10,0.95)',
        borderColor: 'rgba(191, 90, 242, 0.3)',
        borderWidth: 1,
        borderRadius: 12,
        padding: 15,
        textStyle: { color: '#fff', fontSize: 14, fontWeight: 'bold', fontFamily: 'Inter' },
        formatter: params => {
            const p = params[0];
            const fecha = new Date(p.name).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
            const valor = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(p.value);
            return `<div style="font-size:10px; color:#FFFFFF; text-transform:uppercase; margin-bottom:4px; letter-spacing:1px;">${fecha}</div>
                    <div style="font-size:18px; color:#BF5AF2; text-shadow:0 0 10px rgba(191,90,242,0.4);">${valor}</div>`;
        }
    }
});
// 🟢 NUEVO: Blindaje del ResizeObserver para que no se multiplique
if (!window._chartResizeObs) {
    window._chartResizeObs = new ResizeObserver(() => {
        if (window.chartInstance) window.chartInstance.resize();
    });
    window._chartResizeObs.observe(container);
}
}

function accionFab(tipo) {
    // 1. Limpiamos datos residuales antes de abrir
    if (typeof abrirModal === 'function') abrirModal();
    
    const modal = document.getElementById('modal-manual');
    if (!modal) return;

    // 2. Apertura instantánea del modal
    modal.classList.add('active');
    modal.style.display = 'flex';

    // 3. Referencias a los elementos que cambian de texto
    const titulo = modal.querySelector('.cockpit-title');
    const btnAction = document.getElementById('btn-modal-action');
    const lblOrigen = document.getElementById('lbl-cuenta-origen');
    const inputDesc = document.getElementById('m-desc');

    // Feedback táctil sutil (si el móvil lo soporta)
    if("vibrate" in navigator) navigator.vibrate(8);

    // 4. Lógica de Modos (Cambia colores y textos al vuelo)
    if (tipo === 'pagos') {
        window.modoTransaccionActual = 'gasto';
        modal.setAttribute('data-mode', 'gasto'); // Dispara el CSS Rojo
        if (titulo) titulo.innerText = "NUEVO GASTO";
        if (btnAction) btnAction.innerText = "REGISTRAR GASTO";
        if (lblOrigen) lblOrigen.innerText = "PAGADO CON";
    } 
    else if (tipo === 'ingresos') {
        window.modoTransaccionActual = 'ingreso';
        modal.setAttribute('data-mode', 'ingreso'); // Dispara el CSS Verde
        if (titulo) titulo.innerText = "NUEVO INGRESO";
        if (btnAction) btnAction.innerText = "RECIBIR DINERO";
        if (lblOrigen) lblOrigen.innerText = "INGRESADO EN";
    } 
    else if (tipo === 'traspasos') {
        window.modoTransaccionActual = 'traspaso';
        modal.setAttribute('data-mode', 'traspaso'); // Dispara el CSS Azul
        if (titulo) titulo.innerText = "NUEVO TRASPASO";
        if (btnAction) btnAction.innerText = "EJECUTAR TRASPASO";
        if (lblOrigen) lblOrigen.innerText = "DESDE";
        if (inputDesc && !inputDesc.value) inputDesc.value = "Traspaso";

        // Autocompletado de cuentas para traspaso
        const selectOrigen = document.getElementById('m-cuenta');
        const selectDestino = document.getElementById('m-cuenta-destino');
        if (selectOrigen && selectDestino) {
            selectDestino.innerHTML = selectOrigen.innerHTML;
        }
    }
}

window.renderizarSankey = function(datosPeriodo) {
    const container = document.getElementById('chart-Sankey');
    if (!container) return;
    if (!datosPeriodo || datosPeriodo.length === 0) {
        container.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;font-size:12px;font-style:italic;">Sin flujo de dinero en este periodo...</div>';
        return;
    }
    // 🟢 NUEVO: PATRÓN DE RECICLAJE (Adiós dispose y fugas de memoria)
    let echartSankey = echarts.getInstanceByDom(container);
    if (!echartSankey) {
        echartSankey = echarts.init(container, null, { renderer: 'canvas' });
    }
    window.echartSankey = echartSankey;
    // 1. Agrupar datos por concepto
    let totalIngresos = 0;
    const gastosPorConcepto = {};
    datosPeriodo.forEach(m => {
        const conc = String(m.concepto || "OTROS").toUpperCase().trim();
        if (conc.includes('INICIAL') || m.tipo === 'traspaso' || conc.includes('TRASPASO')) return;
        if (m.tipo === 'ingreso' || m.importe > 0) {
            totalIngresos += Number(m.importe);
        } else {
            gastosPorConcepto[conc] = (gastosPorConcepto[conc] || 0) + Math.abs(Number(m.importe));
        }
    });
    let totalGastos = Object.values(gastosPorConcepto).reduce((a, b) => a + b, 0);
    let ahorro = totalIngresos - totalGastos;
    // --- SEGURO ANTI-DUPLICADOS ---
    let nodoOrigen = "INGRESOS ";
    if (totalIngresos === 0 && totalGastos > 0) {
        nodoOrigen = "FONDOS PREVIOS ";
        totalIngresos = totalGastos;
        ahorro = 0;
    } else if (totalIngresos === 0 && totalGastos === 0) {
        // En lugar de innerHTML que rompe la instancia de ECharts, limpiamos el gráfico
        window.echartSankey.clear(); 
        return;
    }
    // 2. Construir Nodos y Enlaces
    const nodes = [];
    const links = [];
    // Nodo Raíz (Verde Neón Brillante)
    nodes.push({
        name: nodoOrigen,
        itemStyle: { color: '#39FF14', shadowBlur: 20, shadowColor: 'rgba(57, 255, 20, 0.8)', borderColor: '#fff', borderWidth: 1 }
    });
    const listaGastos = Object.entries(gastosPorConcepto).sort((a, b) => b[1] - a[1]);
    let otrosGastos = 0;
    const paletaGastos = ['#FF2E4D', '#FF007F', '#B500FF', '#00D4FF', '#FF9900', '#FFEA00'];
    listaGastos.forEach((g, index) => {
        let nombreNodo = g[0];
        if (nombreNodo === nodoOrigen) nombreNodo += " (Gasto)";
        if (index < 6) {
            const colorNeón = paletaGastos[index % paletaGastos.length];
            nodes.push({
                name: nombreNodo,
                itemStyle: { color: colorNeón, shadowBlur: 15, shadowColor: colorNeón, borderRadius: 4 }
            });
            links.push({ source: nodoOrigen, target: nombreNodo, value: g[1] });
        } else {
            otrosGastos += g[1];
        }
    });
    if (otrosGastos > 0) {
        nodes.push({ name: 'RESTO DE GASTOS', itemStyle: { color: '#888888', shadowBlur: 10, shadowColor: '#888888' } });
        links.push({ source: nodoOrigen, target: 'RESTO DE GASTOS', value: otrosGastos });
    }
    if (ahorro > 0) {
        nodes.push({ name: 'AHORRO NETO', itemStyle: { color: '#0A84FF', shadowBlur: 20, shadowColor: 'rgba(10, 132, 255, 0.8)', borderColor: '#fff', borderWidth: 1 } });
        links.push({ source: nodoOrigen, target: 'AHORRO NETO', value: ahorro });
    }
    if (nodes.length < 2 || links.length === 0) {
        window.echartSankey.clear();
        return;
    }
    // 3. Configuración ULTRA VISUAL de ECharts
    const option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            triggerOn: 'mousemove',
            backgroundColor: 'rgba(15, 15, 20, 0.85)',
            borderColor: 'var(--c-primary, #0A84FF)',
            borderWidth: 1,
            padding: 15,
            borderRadius: 12,
            textStyle: { color: '#fff', fontSize: 13, fontFamily: 'Inter' },
            formatter: function (params) {
                const formatter = new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR'});
                if (params.dataType === 'node') {
                    return `<div style="text-align:center;">
                    <span style="font-size:10px;color:#FFFFFF;letter-spacing:1px;text-transform:uppercase;">${params.name}</span><br/>
                    <strong style="font-size:22px;color:${params.color || '#fff'};text-shadow: 0 0 10px ${params.color || '#fff'};">${formatter.format(params.value)}</strong>
                    </div>`;
                } else {
                    return `<div style="text-align:center;">
                    <span style="font-size:10px;color:#FFFFFF;text-transform:uppercase;">Flujo de capital</span><br/>
                    <b style="color:#39FF14;">${params.data.source}</b> <span style="color:#666;">➔</span> <b style="color:#FF2E4D;">${params.data.target}</b><br/>
                    <strong style="font-size:18px;color:#fff;">${formatter.format(params.value)}</strong>
                    </div>`;
                }
            }
        },
        series: {
            type: 'sankey',
            layout: 'none',
            top: 25, bottom: 25, left: 10, right: 130,
            nodeGap: 16,
            nodeWidth: 12,
            nodeAlign: 'justify',
            data: nodes,
            links: links,
            label: {
                color: '#fff',
                fontFamily: 'Inter',
                fontWeight: 'bold',
                fontSize: 11,
                padding: [0, 0, 0, 10],
                textShadowBlur: 4,
                textShadowColor: 'rgba(0,0,0,1)'
            },
            lineStyle: {
                color: 'gradient',
                curveness: 0.6,
                opacity: 0.45,
                shadowBlur: 8,
                shadowColor: 'rgba(0,0,0,0.5)'
            },
            emphasis: {
                focus: 'adjacency',
                lineStyle: {
                    opacity: 0.85,
                    shadowBlur: 15,
                    shadowColor: 'rgba(255,255,255,0.2)'
                }
            },
            animationEasing: 'cubicOut',
            animationDuration: 1800
        }
    };
    // Inyectamos los datos sin parpadeos
    window.echartSankey.setOption(option);
    // 🟢 NUEVO: Seguro contra roturas al girar la pantalla del móvil
    if (!window._sankeyResizeObs) {
        window._sankeyResizeObs = new ResizeObserver(() => {
            if (window.echartSankey) window.echartSankey.resize();
        });
        window._sankeyResizeObs.observe(container);
    }
};

window.tiposExcluidos = window.tiposExcluidos || new Set();
window.renderTreeMap = function() {
    const container = document.getElementById('chart-TreeMap');
    const filterContainer = document.getElementById('treemap-filters');
    if (!container || !filterContainer) return;
    if (!window.datos || window.datos.length === 0) {
        container.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;">Sin datos para el mapa...</div>';
        return;
    }
    // 🟢 NUEVO: PATRÓN DE RECICLAJE (Memoria RAM plana)
    let echartTreeMap = echarts.getInstanceByDom(container);
    if (!echartTreeMap) {
        echartTreeMap = echarts.init(container);
    }
    window.echartTreeMap = echartTreeMap;
    // 1. PROCESAR DATOS Y COLORES
    const mapaColores = {
        'BANCO': '#00F0FF', 'BOLSA': '#F72585', 'CRIPTOMONEDAS': '#7209B7',
        'CRIPTO': '#7209B7', 'EFECTIVO': '#4CC9F0', 'VIVIENDA': '#FFD60A',
        'PLANPENSIONES': '#39FF14', 'CROWDFUNDING': '#FF4444', 'OTROS': '#888888'
    };
    const datosFiltrados = window.datos.filter(m => (typeof pasaFiltroPropietario === 'function') ? pasaFiltroPropietario(m) : true);
    const saldos = {};
    datosFiltrados.forEach(m => {
        const cta = String(m.cuenta || '').trim().toUpperCase();
        if(cta) saldos[cta] = (saldos[cta] || 0) + m.importe;
    });
    const grupos = {};
    Object.keys(saldos).forEach(cta => {
        const valor = saldos[cta];
        // 🔥 FIX 2 APLICADO: Ignoramos saldos a cero (±0.01€). Aparecen deudas.
        if (Math.abs(valor) < 0.01) return;
        let config = (window.mapaCuentas && window.mapaCuentas[cta]) ? window.mapaCuentas[cta] : { tipo: 'OTROS' };
        const tipo = String(config.tipo || 'OTROS').toUpperCase().trim();
        if (!grupos[tipo]) grupos[tipo] = [];
        grupos[tipo].push({ name: cta.replace('D-', '').replace('N-', ''), value: Math.abs(valor) }); // Usamos valor absoluto para el tamaño visual
    });
    // 2. CREAR BOTONES DE FILTRO (LEYENDA)
    const todosLosTipos = Object.keys(grupos).sort();
    filterContainer.innerHTML = '';
    todosLosTipos.forEach(tipo => {
        const estaActivo = !window.tiposExcluidos.has(tipo);
        const color = mapaColores[tipo] || '#888';
        const btn = document.createElement('button');
        btn.style = `
        background: ${estaActivo ? color + '20' : '#111'};
        color: ${estaActivo ? color : '#444'};
        border: 1px solid ${estaActivo ? color : '#333'};
        padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800;
        cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        box-shadow: ${estaActivo ? '0 0 10px ' + color + '30' : 'none'};
        margin: 2px;
        `;
        btn.innerText = tipo;
        btn.onclick = () => {
            if (window.tiposExcluidos.has(tipo)) window.tiposExcluidos.delete(tipo);
            else window.tiposExcluidos.add(tipo);
            window.renderTreeMap(); // Redibujar
        };
        filterContainer.appendChild(btn);
    });
    // 3. PREPARAR DATA PARA EL GRÁFICO (Solo tipos no excluidos)
    const dataTree = [];
    todosLosTipos.forEach(tipo => {
        if (!window.tiposExcluidos.has(tipo)) {
            dataTree.push({
                name: tipo,
                children: grupos[tipo],
                itemStyle: { color: mapaColores[tipo] || '#888' }
            });
        }
    });
    // 4. CONFIGURACIÓN DEL GRÁFICO
    const option = {
        backgroundColor: 'transparent',
        tooltip: {
            backgroundColor: 'rgba(0,0,0,0.9)',
            textStyle: { color: '#fff' },
            formatter: (info) => {
                // Recuperamos el signo real para el tooltip (por si es una deuda)
                let nombreOriginal = info.name;
                let ctaBusqueda = Object.keys(saldos).find(k => k.replace('D-', '').replace('N-', '') === nombreOriginal);
                let saldoReal = ctaBusqueda ? saldos[ctaBusqueda] : info.value;
                const val = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(saldoReal);
                return `<div style="color:${info.color}; font-weight:bold; margin-bottom: 4px;">${info.name}</div><div style="font-size: 16px;">${val}</div>`;
            }
        },
        series: [{
            type: 'treemap',
            width: '100%', height: '100%',
            roam: false, nodeClick: false, breadcrumb: { show: false },
            label: { show: true, formatter: '{b}', color: '#fff', fontWeight: 'bold', fontSize: 10 },
            itemStyle: { borderColor: '#000', borderWidth: 2, gapWidth: 1 },
            levels: [
                { itemStyle: { borderColor: '#000', borderWidth: 4, gapWidth: 4 } },
                { colorSaturation: [0.3, 0.6], itemStyle: { gapWidth: 2, borderColorSaturation: 0.6 } }
            ],
            data: dataTree
        }]
    };
    // Inyección de datos sin parpadeos
    window.echartTreeMap.setOption(option);
    // 🟢 NUEVO: Seguro contra roturas al girar la pantalla del móvil
    if (!window._treeMapResizeObs) {
        window._treeMapResizeObs = new ResizeObserver(() => {
            if (window.echartTreeMap) window.echartTreeMap.resize();
        });
        window._treeMapResizeObs.observe(container);
    }
};

window.renderizarSunburstPatrimonio = function() {
    // 1. OBTENER CONTENEDOR
    const container = document.getElementById('chart-Sunburst');
    if (!container) return;
    // PATRÓN RECICLAJE
    if (!window.echartSunburst || window.echartSunburst.isDisposed()) {
        window.echartSunburst = echarts.init(container);
    }
    const chart = window.echartSunburst;
    chart.off('mouseover');
    chart.off('mouseout');
    if (!window.datos || window.datos.length === 0) return;
    // 2. PROCESAMIENTO
    const saldos = {};
    const datosFiltrados = window.datos.filter(m => pasaFiltroPropietario(m));
    datosFiltrados.forEach(m => {
        if (!m.cuenta) return;
        const cta = String(m.cuenta || '').trim().toUpperCase();
        saldos[cta] = (saldos[cta] || 0) + m.importe;
    });
    let patrimonioNetoReal = 0;
    let activosBrutos = 0;
    const childrenLiquidez = [];
    const childrenInversion = [];
    const childrenAutocustodia = [];
    const childrenPropiedad = [];
    // --- PALETA DE COLORES "CYBERPUNK NEÓN" MEJORADA ---
    const cLiq = ['#00F0FF', '#00B8FF', '#0066FF', '#00FFFF', '#2DE2E6', '#03DAC6']; // Cianes/Azules
    const cInv = ['#F72585', '#B5179E', '#7209B7', '#560BAD', '#FF00CC', '#FF4081']; // Fucsias/Morados
    const cAuto = ['#39FF14', '#00FF41', '#32D74B', '#00FA9A', '#7CFC00', '#00FF00']; // Verdes Neón
    const cProp = ['#FFD60A', '#FF9F1C', '#FFB703', '#FCA311', '#FB8500', '#FFC300']; // Naranjas/Oro
    let totalLiquidez = 0;
    let totalInversion = 0;
    let totalAutocustodia = 0;
    let totalPropiedad = 0;
    Object.keys(saldos).forEach(cta => {
        const valor = saldos[cta];
        patrimonioNetoReal += valor;
        if (Math.abs(valor) < 0.01) return; // Ignorar saldos a cero
        activosBrutos += valor;
        let config = (window.mapaCuentas && window.mapaCuentas[cta]) 
            ? window.mapaCuentas[cta] 
            : { tipo: 'SIN CLASIFICAR', esInversion: false };
        const tipoStr = String(config.tipo || '').toUpperCase().trim();
        const nombreLimpio = cta.replace('D-', '').replace('N-', '');
        // Repartimos en 4 montones usando la misma lógica
        if (tipoStr === 'AUTOCUSTODIA') {
            totalAutocustodia += valor;
            childrenAutocustodia.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cAuto[childrenAutocustodia.length % cAuto.length], shadowBlur: 20, shadowColor: cAuto[childrenAutocustodia.length % cAuto.length] }
            });
        } else if (tipoStr === 'PROPIEDAD' || tipoStr === 'INMUEBLE') {
            totalPropiedad += valor;
            childrenPropiedad.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cProp[childrenPropiedad.length % cProp.length], shadowBlur: 20, shadowColor: cProp[childrenPropiedad.length % cProp.length] }
            });
        } else if (config.esInversion) {
            totalInversion += valor;
            childrenInversion.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cInv[childrenInversion.length % cInv.length], shadowBlur: 20, shadowColor: cInv[childrenInversion.length % cInv.length] }
            });
        } else {
            totalLiquidez += valor;
            childrenLiquidez.push({
                name: nombreLimpio, value: valor,
                itemStyle: { color: cLiq[childrenLiquidez.length % cLiq.length], shadowBlur: 20, shadowColor: cLiq[childrenLiquidez.length % cLiq.length] }
            });
        }
    });
    childrenLiquidez.sort((a, b) => b.value - a.value);
    childrenInversion.sort((a, b) => b.value - a.value);
    childrenAutocustodia.sort((a, b) => b.value - a.value);
    childrenPropiedad.sort((a, b) => b.value - a.value);
    // Solo añadimos los trozos si hay dinero dentro
    const dataTree = [];
    if (childrenLiquidez.length > 0) dataTree.push({ name: 'LIQUIDEZ', itemStyle: { color: '#00F0FF' }, children: childrenLiquidez });
    if (childrenInversion.length > 0) dataTree.push({ name: 'INVERSIÓN', itemStyle: { color: '#F72585' }, children: childrenInversion });
    if (childrenAutocustodia.length > 0) dataTree.push({ name: 'AUTOCUSTODIA', itemStyle: { color: '#39FF14' }, children: childrenAutocustodia });
    if (childrenPropiedad.length > 0) dataTree.push({ name: 'PROPIEDAD', itemStyle: { color: '#FFD60A' }, children: childrenPropiedad });
    // 3. ACTUALIZAR TEXTO CENTRAL
    const elLabelTotal = document.querySelector('#sunburst-center-info div:first-child');
    const elValorTotal = document.getElementById('sb-total-val');
    if(elValorTotal && elLabelTotal) {
        elLabelTotal.innerText = "PATRIMONIO";
        elLabelTotal.style.color = "#888";
        elValorTotal.innerText = FMT_EUR0.format(patrimonioNetoReal);
        elValorTotal.style.color = patrimonioNetoReal >= 0 ? '#fff' : '#FF2E4D';
        elValorTotal.style.textShadow = "0 0 20px rgba(255,255,255,0.4)";
    }
    const elRatioLiq = document.getElementById('kpi-ratio-liq');
    const elRatioInv = document.getElementById('kpi-ratio-inv');
    const elRatioAuto = document.getElementById('kpi-ratio-auto');
    const elRatioProp = document.getElementById('kpi-ratio-prop');
    if (activosBrutos > 0) {
        if(elRatioLiq) elRatioLiq.innerText = ((totalLiquidez / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioInv) elRatioInv.innerText = ((totalInversion / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioAuto) elRatioAuto.innerText = ((totalAutocustodia / activosBrutos) * 100).toFixed(0) + '%';
        if(elRatioProp) elRatioProp.innerText = ((totalPropiedad / activosBrutos) * 100).toFixed(0) + '%';
    }
    // 4. CONFIGURACIÓN DEL GRÁFICO (MODO NEÓN)
    const option = {
        backgroundColor: 'transparent',
        tooltip: { show: false },
        series: {
            type: 'sunburst',
            data: dataTree,
            radius: ['50%', '90%'],
            sort: undefined,
            itemStyle: { borderRadius: 6, borderColor: '#050505', borderWidth: 2 },
            label: { show: false },
            levels: [
                {},
                { r0: '50%', r: '58%', itemStyle: { opacity: 0.6, borderWidth: 1 } },
                { r0: '60%', r: '90%', itemStyle: { opacity: 1 } }
            ]
        }
    };
    chart.setOption(option, { notMerge: true });
    // 5. INTERACCIÓN
    chart.on('mouseover', function(params) {
        if(elValorTotal) {
            elLabelTotal.innerText = params.name;
            elLabelTotal.style.color = params.color;
            elLabelTotal.style.fontSize = "13px";
            elLabelTotal.style.fontWeight = "bold";

window.renderizarProyectorFIRE = function(totalCapital, ahorroMensual, gastoMensual) {
    const container = document.getElementById('chart-FIRE');
    const subtitulo = document.getElementById('fire-subtitle');
    if (!container) return;
    // 🟢 NUEVO: PATRÓN DE RECICLAJE (Adiós fugas de memoria)
    let echartFIRE = echarts.getInstanceByDom(container);
    if (!echartFIRE) {
        echartFIRE = echarts.init(container);
    }
    window.echartFIRE = echartFIRE;
    // Recuperamos los datos (Paso 1)
    const sueldoFijo = parseFloat(localStorage.getItem('aidanai_sueldo')) || 2000;
    const edadActual = parseInt(localStorage.getItem('aidanai_edad')) || 50;
    // PASO 2: Inyectar datos en el gráfico FIRE
    if (subtitulo) {
        subtitulo.innerHTML = `Calculando intersección de libertad... <br><span style="color:#BF5AF2; font-size:10px;">(Perfil: ${edadActual} años | Ingresos fijos: ${sueldoFijo.toLocaleString('de-DE')} €/mes)</span>`;
    }
    // 1. Blindaje de datos
    let ahorroReal = parseFloat(ahorroMensual) || 0;
    let gastoReal = parseFloat(gastoMensual) || 0;
    // Si la app no envía el ahorro, lo deducimos de forma segura
    if (ahorroReal <= 0 && sueldoFijo > 0 && gastoReal > 0) {
        ahorroReal = sueldoFijo - gastoReal;
    }
    // Prevención de errores matemáticos
    if (gastoReal <= 0 || ahorroReal <= 0) {
        subtitulo.innerHTML = "No hay ahorro positivo. <br><span style='font-size:12px;color:#FFFFFF;'>Ahorra al menos 1€ al mes para proyectar tu jubilación.</span>";
        subtitulo.style.color = "#FF4444";
        window.echartFIRE.clear();
        return;
    }
    const objetivoFIRE = gastoReal * 300; // 25 años de gastos
    const interesMensual = 0.05 / 12; // 5% anual realista
    let capitalSimulado = parseFloat(totalCapital) || 0;
    let meses = 0;
    const maxMeses = 12 * 60; // 60 años de proyección máxima
    let datosCapital = [];
    let datosObjetivo = [];
    let fechasX = [];

            datosCapital.push(Math.round(capitalSimulado));
            datosObjetivo.push(Math.round(objetivoFIRE));
        }
        capitalSimulado = capitalSimulado * (1 + interesMensual) + ahorroReal;
        meses++;
    }
    if (meses <= maxMeses) {

// 1. Traductor de formatos (Monedas, Porcentajes, etc)
function formatearDatoMaestro(valor, tipo) {
if (tipo === 'moneda') {
return (typeof FMT_EUR2 !== 'undefined') ? FMT_EUR2.format(valor) : valor.toFixed(2) + ' €';
}
else if (tipo === 'porcentaje') {
return (typeof FMT_PCT !== 'undefined') ? FMT_PCT.format(valor) + '%' : valor.toFixed(2) + '%';
}
else if (tipo === 'meses') {
return valor.toFixed(1) + ' Meses';
}
else {
return (typeof FMT_NUM !== 'undefined') ? FMT_NUM.format(valor) : valor;
}
}
window.formatearDatoMaestro = formatearDatoMaestro;
// 2. Efecto Odómetro Fluido (Sin parpadeos y a prueba de Hoisting)
function animarCifra(idElemento, valorFinal, tipo = 'moneda') {
// 🛠️ FIX: Nos aseguramos de que el registro exista DENTRO de la función
// Así, sin importar cuándo se llame, nunca será "undefined"
window.animacionesActivas = window.animacionesActivas || {};
const el = document.getElementById(idElemento);
if (!el) return;
// 🛑 CANCELAR ANIMACIÓN ANTERIOR SI EXISTE EN ESTE ELEMENTO
if (window.animacionesActivas[idElemento]) {
cancelAnimationFrame(window.animacionesActivas[idElemento]);
}
// Extraemos el valor de la memoria oculta para no pelear con símbolos
let valorInicial = parseFloat(el.getAttribute('data-prev')) || 0;
el.setAttribute('data-prev', valorFinal);
// Si el salto es minúsculo (céntimos), lo ponemos de golpe para ahorrar batería
if (Math.abs(valorFinal - valorInicial) < 0.01) {
el.innerText = formatearDatoMaestro(valorFinal, tipo);
return;
}
const duracion = 800; // 0.8 segundos de animación fluida
const startTime = performance.now();
function actualizar(currentTime) {
const elapsed = currentTime - startTime;
const progress = Math.min(elapsed / duracion, 1);
// Curva de aceleración suave
const easeOut = 1 - Math.pow(1 - progress, 4);
const valorActual = valorInicial + (valorFinal - valorInicial) * easeOut;
// Pintar el número en cada fotograma
el.innerText = formatearDatoMaestro(valorActual, tipo);
if (progress < 1) {
window.animacionesActivas[idElemento] = requestAnimationFrame(actualizar);
} else {
// Cuadrar el último céntimo exacto
el.innerText = formatearDatoMaestro(valorFinal, tipo);
delete window.animacionesActivas[idElemento];
}
}
// Iniciar la animación
window.animacionesActivas[idElemento] = requestAnimationFrame(actualizar);
}
window.animarCifra = animarCifra;

}
animarCifra('d-aho', tasaAhorro, 'porcentaje');
// 6. CÁLCULO DE PATRIMONIO
let totalPatrimonio = 0;
let totalLiquidez = 0;
let totalInversion = 0;
let totalAutocustodia = 0;
let totalPropiedad = 0;
if (window.mapaCuentas) {
Object.keys(window.mapaCuentas).forEach(k => {
if (filtroUsuarioActual !== 'todos') {
const letra = k.charAt(0).toUpperCase();
if (filtroUsuarioActual === 'D' && letra !== 'D') return;
if (filtroUsuarioActual === 'N' && letra !== 'N') return;
}
const c = window.mapaCuentas[k];
const saldo = c.saldoActual || 0;
const tipo = (c.tipo || '').toUpperCase();
totalPatrimonio += saldo;
if (tipo === 'AUTOCUSTODIA') {
totalAutocustodia += saldo;
} else if (tipo === 'PROPIEDAD' || tipo === 'INMUEBLE') {
totalPropiedad += saldo;
} else if (c.esInversion) {
totalInversion += saldo;
} else {
totalLiquidez += saldo;
}
});
}
// --- 🚀 MÁQUINA DEL TIEMPO (SIMULADOR DE IMPACTO) ---
if (window.simuladorImpacto && window.simuladorImpacto > 0) {
totalLiquidez -= window.simuladorImpacto;
totalPatrimonio -= window.simuladorImpacto;
}
const elPatri = document.getElementById('d-patri-total');
if(elPatri) {
animarCifra('d-patri-total', totalPatrimonio, 'moneda');

}
animarCifra('d-patri-liq', totalLiquidez, 'moneda');
animarCifra('d-patri-inv', totalInversion, 'moneda');
animarCifra('d-patri-auto', totalAutocustodia, 'moneda');
animarCifra('d-patri-prop', totalPropiedad, 'moneda');
// NUEVO: Calcular y actualizar la tarjeta de Liquidez + Inversión en Inicio
const totalMetalico = totalLiquidez + totalInversion;
animarCifra('d-metalico', totalMetalico, 'moneda');
// 7. CÁLCULO DE KPIs FINANCIEROS AVANZADOS
let gastoTotalUltimoAno = 0;
let ingresoTotalUltimoAno = 0;
const fechaHaceUnAno = new Date();
fechaHaceUnAno.setFullYear(fechaHaceUnAno.getFullYear() - 1);
const tsCorte = fechaHaceUnAno.getTime();
const datosUltimoAno = datosUsuario.filter(m => m.ts >= tsCorte);
let primerMovAno = new Date();
let ultimoMovAno = new Date(0);
let hayDatosAno = false;
datosUltimoAno.forEach(m => {
const conc = String(m.concepto || "").toLowerCase();
if (conc.includes('inicial') || conc.includes('traspaso')) return;
if (m.tipo === 'gasto') {
gastoTotalUltimoAno += Math.abs(m.importe);
if (m.fecha < primerMovAno) primerMovAno = m.fecha;
if (m.fecha > ultimoMovAno) ultimoMovAno = m.fecha;
hayDatosAno = true;
} else if (m.tipo === 'ingreso') {
ingresoTotalUltimoAno += m.importe;
}
});
let gastoMensualMedio = 0;
if (hayDatosAno) {
const diasDif = Math.max(1, (ultimoMovAno - primerMovAno) / (1000 * 60 * 60 * 24));

}
if (gastoMensualMedio < 1) gastoMensualMedio = 1;

}
// B) LIBERTAD
let mesesLibertad = totalPatrimonio / gastoMensualMedio;
if (mesesLibertad < 0) mesesLibertad = 0;
let aniosLib = Math.floor(mesesLibertad / 12);
let mesesLib = Math.floor(mesesLibertad % 12);
let rentaPasivaAnual = totalInversion * 0.04;
let gastoAnualProyectado = gastoMensualMedio * 12;

// 🔐 GESTOR DE SEGURIDAD (CONTRASEÑA ROBUSTA)

window.cambiarPinSeguridad = async function() {
const oldInput     = document.getElementById('sec-old-pin');
const newInput     = document.getElementById('sec-new-pin');
const confirmInput = document.getElementById('sec-confirm-pin');
const oldVal     = oldInput     ? oldInput.value.trim()     : '';
const newVal     = newInput     ? newInput.value.trim()     : '';   // FIX 7: trim() para evitar bloqueo por espacio accidental
const confirmVal = confirmInput ? confirmInput.value.trim() : '';   // FIX 7: ídem
// 1. Verificar contraseña actual (con PBKDF2, asíncrono)
notify('🔄 Verificando PIN actual...', 'loading');
const correcta = await PinSecurity.verificar(oldVal);
if (!correcta) {
notify('❌ El PIN actual no es correcto', 'error');
if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
if (oldInput) oldInput.focus();
return;
}
// 2. Longitud y tipo (EXACTAMENTE 4 NÚMEROS)
if (!/^\d{4}$/.test(newVal)) {
notify('⚠️ El nuevo PIN debe tener exactamente 4 números', 'warning');
if (newInput) newInput.focus();
return;
}
// 3. Confirmación
if (newVal !== confirmVal) {
notify('⚠️ Los PINs no coinciden', 'warning');
if (confirmInput) confirmInput.focus();
return;
}
// 4. Guardar hash PBKDF2 (nunca texto plano)
notify('🔒 Actualizando PIN...', 'loading');
await PinSecurity.guardarNuevo(newVal);
// 5. Actualizar sesión activa
PinSecurity.setSession(newVal);
// --- SEGURIDAD: Almacenar el hash PBKDF2 de la clave biométrica, NUNCA Base64 (reversible) ---
const hashBio = await PinSecurity.hashear ? await PinSecurity.hashear(newVal) : btoa(newVal + '_hashed');
localStorage.setItem('aidanai_bio_key', hashBio);
// 6. Re-encriptar el caché local con la nueva contraseña
try {
const rawEnc = localStorage.getItem('DATA_ENCRIPTADA');
if (rawEnc && oldVal) {
const datos = await CryptoSystem.desencriptar(rawEnc, oldVal);
const nuevo = await CryptoSystem.encriptar(datos, newVal);
localStorage.setItem('DATA_ENCRIPTADA', nuevo);
}
} catch (e) {
console.warn('No se pudo re-encriptar el caché (ignorado):', e);
}
// 7. Limpiar campos
if (oldInput) oldInput.value = '';
if (newInput) newInput.value = '';
if (confirmInput) confirmInput.value = '';
notify('✅ PIN actualizado con éxito', 'success');
// 8. NUEVO: Subir las nuevas llaves a la nube inmediatamente
if (typeof guardarUniversal === 'function' && window.modoNube) {
    guardarUniversal();
}
};

// --- MOTOR DE CALENDARIO (NUEVO) ---
function calcularSiguienteFecha(fechaActual, frecuencia, diasSemana) {
let fecha = new Date(fechaActual);
// Ajuste de seguridad para fechas mal formadas
if (isNaN(fecha.getTime())) return fechaActual;
if (frecuencia === 'Mensual') {
fecha.setMonth(fecha.getMonth() + 1);
}
else if (frecuencia === 'Anual') {
fecha.setFullYear(fecha.getFullYear() + 1);
}
else if (frecuencia === 'Semanal') {
fecha.setDate(fecha.getDate() + 7);
}
else if (frecuencia === 'Diario') {
// ✅ FIX BUG-5: Antes siempre sumaba exactamente 1 día ignorando diasSemana.
// Una regla "Lunes, Miércoles" ejecutada un martes avanzaba al miércoles por
// casualidad, pero ejecutada un miércoles avanzaba al jueves (incorrecto).
// Ahora busca el siguiente día de la semana válido en la lista.
if (diasSemana && diasSemana.trim() !== '') {
// diasSemana llega como "1,3,5" (0=Dom, 1=Lun, ..., 6=Sáb)
const diasPermitidos = diasSemana
.split(',')
.map(d => parseInt(d.trim()))
.filter(d => !isNaN(d) && d >= 0 && d <= 6);
if (diasPermitidos.length > 0) {
// Avanzamos desde el día SIGUIENTE a fechaActual
let intento = new Date(fecha);
intento.setDate(intento.getDate() + 1);
// Iteramos hasta encontrar un día de la semana permitido (máx 7 pasos)
let pasos = 0;
while (!diasPermitidos.includes(intento.getDay()) && pasos < 7) {
intento.setDate(intento.getDate() + 1);
pasos++;
}
fecha = intento;
} else {
// Lista vacía o inválida → +1 día por seguridad
fecha.setDate(fecha.getDate() + 1);
}
} else {
// Sin días concretos marcados → frecuencia diaria pura (+1 día)
fecha.setDate(fecha.getDate() + 1);
}
}
// Siempre devolvemos en formato YYYY-MM-DD (compatible con Excel y Date())
return fecha.toISOString().split('T')[0];
}
async function ejecutarRecurrente(idRec) {
// 1. Localizar la regla
const regla = window.datosRecurrentes.find(r => r.id === idRec);
if(!regla) return notify("❌ Regla no encontrada", "error");
const importeBonito = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(Math.abs(regla.importe));
if(!confirm(`¿Ejecutar ahora?\n\nConcepto: ${regla.concepto}\nImporte: ${importeBonito}\n\nSe generará el movimiento y la fecha avanzará.`)) return;
notify("⏳ Generando movimiento...", "loading");
// 2. Preparar datos comunes
// Usamos el texto exacto de la fecha (ej. "2026-03-01") igual que hace el formulario manual
const fechaString = regla.fechaProx;
const tsOperacion = new Date(fechaString + 'T12:00:00').getTime();
let movimientosAGuardar = [];
// Función para saber qué tipo de cuenta es
const obtenerInfoCuenta = (nombreCuenta) => {
const clave = String(nombreCuenta || '').toUpperCase().trim();
const info = (window.mapaCuentas && window.mapaCuentas[clave]) ? window.mapaCuentas[clave] : null;
return {
tipoCuenta: info ? (info.tipo || 'SIN CLASIFICAR') : 'SIN CLASIFICAR',
esInversion: info ? (info.esInversion === true || info.esInversion === 'SI') : false
};
};
// Función INTELIGENTE para detectar el dueño real de la cuenta
const detectarDueno = (nombreCuenta) => {
const c = String(nombreCuenta).toUpperCase().trim();
if (c.startsWith("D-")) return "D";
if (c.startsWith("N-")) return "N";
return "DN";
};
// 3. Lógica según tipo (Traspaso vs Normal)
// Hacemos la comprobación SÚPER robusta a prueba de mayúsculas/minúsculas y espacios
const tipoReglaLimpio = String(regla.tipoRegla || '').toLowerCase().trim();
const destinoLimpio = String(regla.cuentaDestino || '').trim();
if (tipoReglaLimpio === 'traspaso' || destinoLimpio.length > 1) {
// ES UN TRASPASO (Genera 2 movimientos: el dinero que sale y el que entra)
const infoOrigen = obtenerInfoCuenta(regla.cuenta);
const infoDestino = obtenerInfoCuenta(destinoLimpio);
// Movimiento 1: El dinero sale
movimientosAGuardar.push({
id: uuid(), // Generamos un ID 100% único e independiente
fecha: fechaString,
ts: tsOperacion,
cuenta: regla.cuenta,
concepto: regla.concepto,
importe: -Math.abs(regla.importe), // Sale dinero (negativo)
descripcion: `>> A: ${destinoLimpio} | ${regla.descripcion || 'Fijo'}`,
beneficiario: detectarDueno(regla.cuenta), // Asigna el dueño correcto
tipo: 'traspaso',
tipoCuenta: infoOrigen.tipoCuenta,
esInversion: infoOrigen.esInversion
});
// Movimiento 2: El dinero entra
movimientosAGuardar.push({
id: uuid(), // Generamos otro ID 100% único e independiente
fecha: fechaString,
ts: tsOperacion,
cuenta: destinoLimpio,
concepto: regla.concepto,
importe: Math.abs(regla.importe), // Entra dinero (positivo)
descripcion: `<< DE: ${regla.cuenta} | ${regla.descripcion || 'Fijo'}`,
beneficiario: detectarDueno(destinoLimpio), // Asigna el dueño correcto
tipo: 'traspaso',
tipoCuenta: infoDestino.tipoCuenta,
esInversion: infoDestino.esInversion
});
} else {
// ES GASTO O INGRESO (Genera 1 solo movimiento)
const infoCtaSimple = obtenerInfoCuenta(regla.cuenta);
movimientosAGuardar.push({
id: uuid(), // ID 100% único
fecha: fechaString,
ts: tsOperacion,
cuenta: regla.cuenta,
concepto: regla.concepto,
importe: regla.importe,
descripcion: `${regla.descripcion || ''} (Recurrente)`,
beneficiario: regla.beneficiario || detectarDueno(regla.cuenta),
tipo: tipoReglaLimpio || ((regla.importe >= 0) ? 'ingreso' : 'gasto'),
tipoCuenta: infoCtaSimple.tipoCuenta,
esInversion: infoCtaSimple.esInversion
});
}
try {
// 4. Meter los movimientos nuevos en la memoria
window.datos.unshift(...movimientosAGuardar);
// 5. Calcular la fecha de la próxima vez que toque este recibo
const nuevaFecha = calcularSiguienteFecha(regla.fechaProx, regla.frecuencia, regla.diasSemana);
regla.fechaProx = nuevaFecha;
// 6. Guardar la información de forma segura en Excel (OneDrive/Local)
await guardarTodoConRecurrentes();
// 7. Refrescar pantalla
if (typeof _scheduleRecalculo === 'function') _scheduleRecalculo();
notify("✅ Ejecutado. Próxima: " + nuevaFecha, "success");
if(typeof vibrar === 'function') vibrar('ingreso');
cargarVistaRecurrentes();
} catch(e) {
console.error(e);
notify("❌ Fallo al procesar: " + e.message, "error");
notify("❌ Error al guardar", "error");
}
}

window.registrarHuellaMovil = async function() {
    const esEntornoSeguro = window.isSecureContext || window.location.hostname === 'localhost';
    if (!esEntornoSeguro) {
        window.notify("La huella requiere conexión segura (HTTPS).", "error");
        return;
    }
    if (!window.PublicKeyCredential) {
        alert("Tu dispositivo no soporta biometría.");
        return;
    }
    try {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const userID = crypto.getRandomValues(new Uint8Array(16));
        const cred = await navigator.credentials.create({
            publicKey: {
                challenge: challenge,
                rp: { name: "aiDANaI", id: window.location.hostname },
                user: { id: userID, name: "usuario@aidanai", displayName: "Propietario aiDANaI" },
                pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                authenticatorSelection: {
                    authenticatorAttachment: "platform",
                    userVerification: "required",
                    residentKey: "required", // 🔴 LA CLAVE ESTRICTA PARA MÓVILES
                    requireResidentKey: true // 🔴 LA CLAVE ESTRICTA PARA MÓVILES
                },
                timeout: 60000
            }
        });
        if (cred) {
localStorage.setItem('aidanai_biometria', 'true');
localStorage.setItem('aidanai_huella_activa', 'SI');
alert("✅ Huella vinculada con éxito. Ya puedes entrar con el dedo.");
const toggle = document.getElementById('toggle-biometria');
if(toggle) toggle.checked = true;
const toggleDin = document.getElementById('toggle-biometria-dinamico');
if(toggleDin) toggleDin.checked = true;
}
} catch (e) {
console.error("Error al registrar:", e);
alert("Registro cancelado o fallido. Asegúrate de tener la huella activada en los ajustes generales de tu móvil.");
const toggle = document.getElementById('toggle-biometria');
if(toggle) toggle.checked = false;
const toggleDin = document.getElementById('toggle-biometria-dinamico');
if(toggleDin) toggleDin.checked = false;
}

window.verificarPinCriptografico = async function() {
    let esCorrecto = false;
    if (typeof PinSecurity === 'undefined') {
        const pinGuardado = localStorage.getItem('aidanai_pin') || "1234";
        esCorrecto = (window.pinActualUI === pinGuardado);
    } else {
        esCorrecto = await PinSecurity.verificar(window.pinActualUI);
        if (esCorrecto) {
            PinSecurity.setSession(window.pinActualUI);
            }
    }
    if (esCorrecto) {
        window.desbloquearApp();
    } else {
        const msg = document.getElementById('auth-message');
        if (msg) { msg.innerText = "❌ PIN INCORRECTO"; msg.style.color = "#ff5252"; }
        const pinDots = document.getElementById('pin-dots');
        if (pinDots) {
            pinDots.style.transition = 'transform 0.1s';
            pinDots.style.transform = 'translateX(-10px)';
            setTimeout(() => pinDots.style.transform = 'translateX(10px)', 50);
            setTimeout(() => pinDots.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => pinDots.style.transform = 'translateX(10px)', 150);
            setTimeout(() => pinDots.style.transform = 'translateX(0)', 200);
        }
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        window.pinActualUI = "";

window.buscarSpotlight = function(texto) {

resultadosDiv.innerHTML = '';

}
const busqueda = texto.toLowerCase();
const listaBusqueda = window.datos || [];
// 1. Buscamos de forma segura en las propiedades correctas
const palabrasBusqueda = busqueda.split(' ').filter(p => p.trim() !== '');
const encontrados = listaBusqueda.filter(m => {
const textoFila = ((m.concepto||'') + ' ' + (m.descripcion||m.detalle||'') + ' ' + (m.beneficiario||'')).toLowerCase();
// --- NUEVO: Buscador Inteligente (Spotlight) ---
return palabrasBusqueda.every(palabra => textoFila.includes(palabra));
// -----------------------------------------------
});
if (encontrados.length === 0) {
resultadosDiv.innerHTML = '<div style="color:#888; text-align:center; padding: 20px; font-style: italic;">No se han encontrado movimientos.</div>';
return;
}
// 2. 🏦 ALGORITMO BANCARIO: los más recientes arriba con desempate
encontrados.sort((a, b) => {
const valA = a.ts || 0;
const valB = b.ts || 0;
if (valA !== valB) return valB - valA;
return a.importe - b.importe;
});
// 3. Sumar Ingresos y Gastos

let totalGastos = 0;
encontrados.forEach(m => {

</div>
<div style="display:flex; flex-direction:column; gap:5px;">

colorBorde = 'var(--c-danger)';

}
// --- TEXTOS LIMPIOS Y FECHAS ---
const f = new Date(m.ts || m.fecha);

// Función para actualizar precios de todos los activos
window.actualizarPreciosInversiones = async function(mostrarCarga = true) {
    if (mostrarCarga) {
        notify('Actualizando precios...', 'loading');
    }
    
    try {
        for (let activo of window.carteraInversiones.activos) {
            let precio = null;
            
            if (activo.tipo === 'cripto') {
                precio = await window.obtenerPrecioCripto(activo.ticker);
            } else {
                precio = await window.obtenerPrecioAccion(activo.ticker);
            }
            
            if (precio) {
                activo.precioActual = precio;
                activo.valorActual = activo.cantidad * precio;
                activo.ganancia = (precio - activo.precioCompra) * activo.cantidad;
                activo.gananciaPorcentaje = ((precio - activo.precioCompra) / activo.precioCompra) * 100;
                activo.ultimaActualizacion = new Date().toISOString();
                activo.fuente = activo.tipo === 'cripto' ? 'coingecko' : 'alpha-vantage';
            }
            
            // Pequeño delay para no saturar APIs
            await new Promise(r => setTimeout(r, 500));
        }
        
        window.calcularKPIsInversiones();
        window.renderizarInversiones();
        
        if (mostrarCarga) {
            notify('✅ Precios actualizados', 'success');
        }
    } catch (e) {
        console.error('Error actualizando precios:', e);
        if (mostrarCarga) {
            notify('❌ Error al actualizar precios', 'error');
        }
    }
};

// Función para calcular KPIs
window.calcularKPIsInversiones = function() {
    const kpis = window.carteraInversiones.kpis;
    
    kpis.valorTotalCartera = 0;
    kpis.costoTotalInvertido = 0;
    kpis.porTipo = {};
    
    for (let activo of window.carteraInversiones.activos) {
        const costoActivo = activo.cantidad * activo.precioCompra;
        
        kpis.valorTotalCartera += activo.valorActual;
        kpis.costoTotalInvertido += costoActivo;
        
        // Agrupar por tipo
        if (!kpis.porTipo[activo.tipo]) {
            kpis.porTipo[activo.tipo] = {
                cantidad: 0,
                valor: 0,
                ganancia: 0,
                gananciaPorcentaje: 0
            };
        }
        
        kpis.porTipo[activo.tipo].cantidad += activo.cantidad;
        kpis.porTipo[activo.tipo].valor += activo.valorActual;
        kpis.porTipo[activo.tipo].ganancia += activo.ganancia;
    }
    
    kpis.gananciaTotalAbsoluta = kpis.valorTotalCartera - kpis.costoTotalInvertido;
    kpis.gananciaTotalPorcentaje = kpis.costoTotalInvertido > 0 
        ? (kpis.gananciaTotalAbsoluta / kpis.costoTotalInvertido) * 100 
        : 0;
    kpis.ultimaActualizacion = new Date().toISOString();
};

window.guardarInversion = function() {
    const id = document.getElementById('inv-form-id').value;
    const ticker = document.getElementById('inv-form-ticker').value.toUpperCase();
    const tipo = document.getElementById('inv-form-tipo').value;
    const cantidad = parseFloat(document.getElementById('inv-form-cantidad').value);
    const precio = parseFloat(document.getElementById('inv-form-precio').value);
    const fecha = document.getElementById('inv-form-fecha').value;
    const notas = document.getElementById('inv-form-notas').value;
    
    if (!ticker || !cantidad || !precio) {
        notify('Completa todos los campos requeridos', 'error');
        return;
    }
    
    if (id) {
        // Editar
        const activo = window.carteraInversiones.activos.find(a => a.id === id);
        if (activo) {
            activo.ticker = ticker;
            activo.tipo = tipo;
            activo.cantidad = cantidad;
            activo.precioCompra = precio;
            activo.fechaCompra = fecha;
            activo.notas = notas;
        }
    } else {
        // Crear
        window.carteraInversiones.activos.push({
            id: generateUUID(),
            ticker: ticker,
            tipo: tipo,
            cantidad: cantidad,
            precioCompra: precio,
            fechaCompra: fecha,
            notas: notas,
            precioActual: 0,
            valorActual: 0,
            ganancia: 0,
            gananciaPorcentaje: 0,
            ultimaActualizacion: null,
            fuente: null
        });
    }
    
    window.cerrarModalInversion();
    window.guardarUniversal();
    window.actualizarPreciosInversiones(false);

// Función para generar UUID
function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}

window.obtenerLiquidezDisponibleCuenta = function(nombreCuenta) {
    const infoCta = window.mapaCuentas[nombreCuenta];
    let liquidez = infoCta ? (infoCta.saldoActual || 0) : 0;
    
    if (window.datosCartera) {
        window.datosCartera.forEach(pos => {
            if (pos.cuenta === nombreCuenta) {

        });

    return liquidez;

window.actualizarPreviewPnl = function() {
  const previewBox = document.getElementById('preview-pnl-cartera');
  const previewVal = document.getElementById('preview-pnl-valor');
  const previewPct = document.getElementById('preview-pnl-pct');

  const ctd = parseFloat(document.getElementById('cartera-cantidad').value) || 0;
  const pCompra = parseFloat(document.getElementById('cartera-precio-compra').value) || 0;
  const pActual = parseFloat(document.getElementById('cartera-precio-actual').value) || 0;

  if (ctd > 0 && pCompra > 0 && pActual > 0) {
    const invertido = ctd * pCompra;
    const valorMercado = ctd * pActual; // Aquí se multiplica la Cantidad por el Precio de la API
    const pnl = valorMercado - invertido;
    const pct = (pnl / invertido) * 100;

    previewBox.style.display = 'block';
    const fmtEur = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
    previewVal.innerText = (pnl > 0 ? '+' : '') + fmtEur.format(pnl);
    previewPct.innerText = (pct > 0 ? '+' : '') + pct.toFixed(2) + '%';
    
    if (pnl >= 0) {
      previewVal.style.color = '#39FF14';
      previewPct.style.color = '#39FF14';
      previewBox.style.borderColor = 'rgba(57,255,20,0.3)';

      previewVal.style.color = '#FF2E4D';
      previewPct.style.color = '#FF2E4D';
      previewBox.style.borderColor = 'rgba(255,46,77,0.3)';

  let htmlFinal = '';

  let valorTotalGlobal = 0;

    const cta = pos.cuenta || 'Sin Cuenta';
    if (!agrupadoPorCta[cta]) agrupadoPorCta[cta] = [];
    agrupadoPorCta[cta].push(pos);
  });

  const fmtEur = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });

  Object.keys(agrupadoPorCta).forEach(cta => {
    let costeCta = 0;
    let valorCta = 0;
    
    agrupadoPorCta[cta].forEach(p => {
      costeCta += (p.cantidad * p.precioCompra);
      valorCta += (p.cantidad * p.precioActual);
    });

    costeTotalGlobal += costeCta;
    valorTotalGlobal += valorCta;

    const pnlCta = valorCta - costeCta;
    const colorCta = pnlCta >= 0 ? '#39FF14' : '#FF2E4D';

    htmlFinal += `

        <span class="cartera-section-total" style="color:${colorCta}">${fmtEur.format(valorCta)}</span>
      </div>
    `;

    agrupadoPorCta[cta].forEach(pos => {
      const costePos = pos.cantidad * pos.precioCompra;
      const valorPos = pos.cantidad * pos.precioActual;
      const pnlPos = valorPos - costePos;
      const pctPos = costePos > 0 ? (pnlPos / costePos) * 100 : 0;
      
      const claseColor = pnlPos >= 0 ? 'pos' : 'neg';
      const signo = pnlPos > 0 ? '+' : '';

      let badgeClass = 'badge-bolsa';
      if(pos.tipo === 'CRIPTOMONEDAS' || pos.tipo === 'CRIPTO') badgeClass = 'badge-cripto';
      if(pos.tipo === 'AUTOCUSTODIA') badgeClass = 'badge-custodia';
      if(pos.tipo === 'PLANPENSIONES') badgeClass = 'badge-pension';

      // Mostramos hasta 6 decimales sin arrastrar ceros innecesarios
      let cantVisible = pos.cantidad.toFixed(6).replace(/\.?0+$/, '');

      htmlFinal += `
        <div class="cartera-pos-row" onclick="window.abrirModalNuevaPosicion('${pos.id}')">
          <div style="display:flex; flex-direction:column; gap:2px;">
            <div style="display:flex; align-items:center; gap:8px;">

            <span class="cartera-cantidad">${cantVisible} unds. a ${pos.precioCompra.toFixed(2)}€</span>
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end;">
            <span class="cartera-valor">${fmtEur.format(valorPos)}</span>
            <span class="cartera-pnl ${claseColor}">${signo}${fmtEur.format(pnlPos)} (${signo}${pctPos.toFixed(2)}%)</span>
          </div>
        </div>
      `;
    });
  });

  tbody.innerHTML = htmlFinal;

  const pnlGlobal = valorTotalGlobal - costeTotalGlobal;
  const pctGlobal = costeTotalGlobal > 0 ? (pnlGlobal / costeTotalGlobal) * 100 : 0;

  window.animarCifra('inv-total-valor', valorTotalGlobal, 'moneda');
  
  const elPnl = document.getElementById('inv-total-pnl');
  if (elPnl) {
      elPnl.innerText = (pnlGlobal > 0 ? '+' : '') + fmtEur.format(pnlGlobal);
      elPnl.style.color = pnlGlobal >= 0 ? '#39FF14' : '#FF2E4D';
  }
  
  window.animarCifra('inv-coste-total', costeTotalGlobal, 'moneda');
  
  const elRent = document.getElementById('inv-rent-total');
  if (elRent) {
      window.animarCifra('inv-rent-total', pctGlobal, 'porcentaje');
      elRent.style.color = pctGlobal >= 0 ? '#39FF14' : '#FF2E4D';
  }

  document.getElementById('inv-num-pos').innerText = window.datosCartera.length;

  const cardDash = document.getElementById('card-cartera-dashboard');
  if(cardDash) {
      cardDash.style.display = 'block';
      window.animarCifra('dash-cartera-valor', valorTotalGlobal, 'moneda');
      const dPnl = document.getElementById('dash-cartera-pnl');
      if (dPnl) {
          dPnl.innerText = (pnlGlobal > 0 ? '+' : '') + fmtEur.format(pnlGlobal);
          dPnl.style.color = pnlGlobal >= 0 ? '#39FF14' : '#FF2E4D';

};

window.actualizarPreciosAutomatico = async function() {
    const btn = document.getElementById('btn-precios-live');
    if(btn) btn.innerHTML = '⏳ ACTUALIZANDO...';

    try {
        const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
        const data = await response.json();
        const precioBTC = parseFloat(data.price);

        let actualizados = 0;
        
        // Recorremos las posiciones en memoria
        if(window.datosCartera) {
            window.datosCartera.forEach(pos => {
                if (pos.tipo === 'CRIPTOMONEDAS' || pos.tipo === 'AUTOCUSTODIA' || pos.ticker === 'BTC') {
                    pos.precioActual = precioBTC;
                    actualizados++;
                }
            });
        }

        if (actualizados > 0) {
            // Guardamos el nuevo valor en el Excel de OneDrive
            if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
            
            // Recalculamos los KPIs visuales de la cartera
            if (typeof window.calcularValoresCartera === 'function') window.calcularValoresCartera();
            
            if (typeof notify === 'function') notify(`✅ ${actualizados} posiciones actualizadas (BTC a ${precioBTC.toFixed(2)}€)`, "success");
        } else {
            if (typeof notify === 'function') notify("No hay posiciones de BTC para actualizar", "info");
        }
    } catch (error) {
        console.error(error);
        if (typeof notify === 'function') notify("❌ Fallo al obtener precios en vivo", "error");
    } finally {
        if(btn) btn.innerHTML = '<span id="precios-live-icon">⚡</span> PRECIOS LIVE';
    }
};

// 📊 MÓDULO: PRESUPUESTO 2026 + COMPARATIVA ANUAL
// Análisis financiero avanzado sin datos adicionales
// ══════════════════════════════════════════════════════════════════
window.calcularPresupuestoYComparativa = function() {
const datos = window.datos;
if (!datos || datos.length === 0) return;
const hoy = new Date();
const anioActual = hoy.getFullYear(); // 2026
const diaAnio = Math.floor((hoy - new Date(anioActual, 0, 1)) / (1000 * 60 * 60 * 24)) + 1;
const diasTotalesAnio = ((anioActual % 4 === 0 && anioActual % 100 !== 0) || anioActual % 400 === 0) ? 366 : 365;
const fraccionAnioTranscurrida = diaAnio / diasTotalesAnio;
// ── LÓGICA PERSONALIZADA (D, N y DN al 50%) ─────────────────────
const gastos2025 = {}; // { concepto: total_anual }
const gastos2026 = {}; // { concepto: total_ytd }
let totalGastos2025 = 0;
let totalGastos2026 = 0;
let mesesConDatos2025 = new Set();
datos.forEach(m => {
// 1. LIMPIEZA INICIAL: Ignoramos ingresos, traspasos y saldos iniciales
const conceptoUp = String(m.concepto || '').toUpperCase().trim();
const esTraspaso = m.tipo === 'traspaso' || conceptoUp.includes('TRASPASO');
if (esTraspaso || conceptoUp === 'INICIAL') return;
if (m.tipo !== 'gasto' && m.importe >= 0) return;
// 2. DETECTAR DUEÑO DEL GASTO Y MULTIPLICADOR
const ben = String(m.beneficiario || '').toUpperCase().trim();
const cta = String(m.cuenta || '').toUpperCase().trim();
let multiplicador = 0;
// ¿Quién está usando la app ahora mismo?
const modo = window.filtroUsuarioActual || 'todos';
if (modo === 'todos') {
multiplicador = 1; // Modo conjunto: sumamos todo
} else if (modo === 'D') {
if (ben === 'D' || (ben === '' && cta.startsWith('D-'))) multiplicador = 1;
else if (ben === 'DN' || ben === 'COMUNES' || cta.startsWith('C-')) multiplicador = 0.5;
} else if (modo === 'N') {
if (ben === 'N' || (ben === '' && cta.startsWith('N-'))) multiplicador = 1;
else if (ben === 'DN' || ben === 'COMUNES' || cta.startsWith('C-')) multiplicador = 0.5;
}
// Si el multiplicador es 0, este gasto no es de este perfil, lo ignoramos
if (multiplicador === 0) return;
// 3. APLICAR MULTIPLICADOR AL IMPORTE (La magia del 50%)
const fecha = new Date(m.ts || m.fecha);
const anio = fecha.getFullYear();
const mes = fecha.getMonth();
const gasto = Math.abs(m.importe) * multiplicador;
const conc = conceptoUp || 'OTROS';
if (anio === 2025) {
gastos2025[conc] = (gastos2025[conc] || 0) + gasto;
totalGastos2025 += gasto;
mesesConDatos2025.add(mes);
} else if (anio === anioActual) {
gastos2026[conc] = (gastos2026[conc] || 0) + gasto;
totalGastos2026 += gasto;
}
});
// Cuántos meses COMPLETOS de 2025 tenemos (para normalizar)
const mesesReales2025 = Math.max(mesesConDatos2025.size, 1);
// ── PRESUPUESTO 2026 ────────────────────────────────────────────
// Extrapolamos el gasto mensual promedio de 2025 → anualizado
const factorAnualizacion = 12 / mesesReales2025;
const presupuestoAnual2026 = totalGastos2025 * factorAnualizacion;
// Conceptos relevantes (top N que cubran el 90% del gasto)
const conceptosOrdenados = Object.entries(gastos2025)
.sort((a, b) => b[1] - a[1]);
// Tomamos los que sumen el 90% del gasto o el top 8 como máximo
let sumaAcum = 0;
const conceptosFiltrados = [];
for (const [conc, val] of conceptosOrdenados) {
conceptosFiltrados.push([conc, val]);
sumaAcum += val;
if (sumaAcum / totalGastos2025 >= 0.90 || conceptosFiltrados.length >= 8) break;
}
// Renderizar PRESUPUESTO 2026
const contPres = document.getElementById('presupuesto-2026-content');
const subtitPres = document.getElementById('presupuesto-subtitulo');
if (!contPres) return;
if (totalGastos2025 === 0) {
contPres.innerHTML = '<div style="text-align:center;padding:20px;color:#555;font-size:12px;">Sin datos de 2025 para proyectar</div>';
} else {
if (subtitPres) subtitPres.textContent = `Basado en ${mesesReales2025} mes${mesesReales2025>1?'es':''} reales de 2025`;
const maxVal = (conceptosFiltrados.length > 0 ? conceptosFiltrados[0][1] : 0) * factorAnualizacion || 1;
const presupuestoMensual = presupuestoAnual2026 / 12;
// KPIs superiores
let htmlPres = `
<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
<div style="background:rgba(255,214,10,0.07); border:1px solid rgba(255,214,10,0.2); border-radius:14px; padding:12px; text-align:center;">
<div style="font-size:9px;color:#888;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:4px;">ANUAL PROYECTADO</div>
<div style="font-size:19px;font-weight:900;color:var(--c-warning);">${FMT_EUR0.format(presupuestoAnual2026)}</div>
</div>
<div style="background:rgba(255,214,10,0.05); border:1px solid rgba(255,214,10,0.1); border-radius:14px; padding:12px; text-align:center;">
<div style="font-size:9px;color:#888;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:4px;">MENSUAL MEDIO</div>
<div style="font-size:19px;font-weight:900;color:var(--c-warning);">${FMT_EUR0.format(presupuestoMensual)}</div>
</div>
</div>
<div style="font-size:9px;color:#555;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.05);">Desglose por concepto</div>
`;
conceptosFiltrados.forEach(([conc, val2025]) => {
const valAnual = val2025 * factorAnualizacion;
const anchoBarra = Math.min(100, (valAnual / maxVal) * 100);
const gastado2026 = gastos2026[conc] || 0;
// Color de la barra: si ya superamos el presupuesto anual, rojo
const colorBarra = gastado2026 > valAnual ? 'var(--c-danger)' : 'var(--c-warning)';
htmlPres += `
<div class="budget-row">
<span class="budget-concepto" title="${conc}">${conc.length > 14 ? conc.slice(0,13)+'…' : conc}</span>
<div class="budget-barra-wrap">
<div class="budget-barra-fill" style="width:${anchoBarra}%;background:${colorBarra};"></div>
</div>
<span class="budget-valor">${FMT_EUR0.format(valAnual)}</span>
</div>
`;
});
// Si hay conceptos menores, agruparlos como "OTROS"
const sumaOtros = totalGastos2025 - sumaAcum;
if (sumaOtros > 0) {
const otrosAnual = sumaOtros * factorAnualizacion;
htmlPres += `
<div class="budget-row">
<span class="budget-concepto" style="color:#666;">OTROS</span>
<div class="budget-barra-wrap">
<div class="budget-barra-fill" style="width:${(otrosAnual/maxVal)*100}%;background:#444;"></div>
</div>
<span class="budget-valor" style="color:#666;">${FMT_EUR0.format(otrosAnual)}</span>
</div>
`;
}
htmlPres += `
<div class="budget-total-row">
<span class="budget-total-label">PRESUPUESTO TOTAL 2026</span>
<span class="budget-total-valor">${FMT_EUR0.format(presupuestoAnual2026)}</span>
</div>
<div style="font-size:10px;color:#555;text-align:center;padding-top:6px;">
Dato ejecutado 2025: ${FMT_EUR0.format(totalGastos2025)} en ${mesesReales2025} mes${mesesReales2025>1?'es':''}
</div>
`;
contPres.innerHTML = htmlPres;
}
// ── COMPARATIVA 2025 vs 2026 ────────────────────────────────────
const contComp = document.getElementById('comparativa-anos-content');
const subtitComp = document.getElementById('comparativa-subtitulo');
if (!contComp) return;
// Conceptos presentes en ambos años o al menos uno
const todosConceptos = new Set([...Object.keys(gastos2025), ...Object.keys(gastos2026)]);
// Para comparar de forma justa: normalizamos 2025 al mismo periodo que llevamos de 2026
// Gasto 2025 esperado en el mismo tramo del año = total2025 * fraccionAnioTranscurrida
const comparativa = [];
todosConceptos.forEach(conc => {
const anual2025 = (gastos2025[conc] || 0) * factorAnualizacion;
const esperado2026ytd = anual2025 * fraccionAnioTranscurrida; // ¿cuánto debería llevar gastado?
const real2026 = gastos2026[conc] || 0;
if (anual2025 < 20 && real2026 < 20) return; // Ignorar importes insignificantes
comparativa.push({ conc, anual2025, esperado2026ytd, real2026 });
});
// Ordenar por mayor impacto (mayor gasto 2025 anualizado)
comparativa.sort((a, b) => b.anual2025 - a.anual2025);
const topComp = comparativa.slice(0, 7);
if (topComp.length === 0) {
contComp.innerHTML = '<div style="text-align:center;padding:20px;color:#555;font-size:12px;">Necesitas datos de 2025 y 2026 para la comparativa</div>';
return;
}
const pctAnio = (fraccionAnioTranscurrida * 100).toFixed(0);
if (subtitComp) subtitComp.textContent = `${pctAnio}% del año transcurrido`;
// KPIs globales de la comparativa
const totalEsperado2026 = totalGastos2025 * factorAnualizacion * fraccionAnioTranscurrida;
const diferencia = totalGastos2026 - totalEsperado2026;
const pctDesviacion = totalEsperado2026 > 0 ? (diferencia / totalEsperado2026) * 100 : 0;
const colorDif = diferencia <= 0 ? 'var(--c-success)' : 'var(--c-danger)';
const iconoDif = diferencia <= 0 ? '▼' : '▲';
const textoDif = diferencia <= 0 ? 'Por debajo del ritmo' : 'Por encima del ritmo';
let htmlComp = `
<div class="comp-kpi-grid">
<div class="comp-kpi-pill">
<span class="label">REAL 2026</span>
<span class="valor" style="color:var(--c-primary);">${FMT_EUR0.format(totalGastos2026)}</span>
</div>
<div class="comp-kpi-pill">
<span class="label">ESPERADO</span>
<span class="valor" style="color:#FFFFFF;">${FMT_EUR0.format(totalEsperado2026)}</span>
</div>
<div class="comp-kpi-pill">
<span class="label">DESVIACIÓN</span>
<span class="valor" style="color:${colorDif};">${iconoDif} ${Math.abs(pctDesviacion).toFixed(0)}%</span>
</div>
</div>
<div class="ritmo-ref-line" style="margin-bottom:12px;">
<span style="color:${colorDif};font-weight:900;">${iconoDif} ${textoDif} del presupuesto proporcional</span><br>
Referencia: ${pctAnio}% del año = deberías haber gastado ${FMT_EUR0.format(totalEsperado2026)}
</div>
<div style="font-size:9px;color:#444;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;">
<span>CONCEPTO</span><span>2025 (RITMO)</span><span>2026 (REAL)</span>
</div>
`;
topComp.forEach(({ conc, anual2025, esperado2026ytd, real2026 }) => {
const maxBarras = Math.max(esperado2026ytd, real2026, 1);
const barra2025 = (esperado2026ytd / maxBarras) * 100;
const barra2026 = (real2026 / maxBarras) * 100;
const ratio = esperado2026ytd > 0 ? real2026 / esperado2026ytd : (real2026 > 0 ? 99 : 0);
const pctDif = ((ratio - 1) * 100).toFixed(0);
const esBien = ratio <= 1.05;
const esAlerta = ratio > 1.20;
const claseBadge = esBien ? 'bien' : (esAlerta ? 'alerta' : 'ok');
const textoBadge = esBien ? `▼ ${Math.abs(pctDif)}%` : (esAlerta ? `▲ ${pctDif}%` : `▲ ${pctDif}%`);
const color2026 = esBien ? 'var(--c-success)' : (esAlerta ? 'var(--c-danger)' : 'var(--c-warning)');
htmlComp += `
<div class="comp-row">
<div class="comp-header-row">
<span class="comp-concepto">${conc.length > 16 ? conc.slice(0,15)+'…' : conc}</span>
<span class="comp-badge ${claseBadge}">${textoBadge}</span>
</div>
<div class="comp-barras">
<div>
<div class="comp-barra-label">2025 proporcional</div>
<div class="comp-barra-wrap">
<div class="comp-barra-fill" style="width:${barra2025.toFixed(1)}%;background:#555;"></div>
</div>
</div>
<div>
<div class="comp-barra-label">2026 real</div>
<div class="comp-barra-wrap">
<div class="comp-barra-fill" style="width:${barra2026.toFixed(1)}%;background:${color2026};"></div>
</div>
</div>
</div>
<div class="comp-val-row">
<span class=\"comp-val\" style=\"color:#666;\">${FMT_EUR2.format(esperado2026ytd)}</span>
<span class=\"comp-val\" style=\"color:${color2026};\">${FMT_EUR2.format(real2026)}</span>
</div>
</div>
`;
});
contComp.innerHTML = htmlComp;
// ── GUARDAR EN WINDOW PARA USO EN IA ───────────────────────────
window._analisisPresupuesto = {
presupuestoAnual2026,
totalGastos2025,
totalGastos2026,
totalEsperado2026,
diferencia,
pctDesviacion,
fraccionAnioTranscurrida,
mesesReales2025,
conceptosFiltrados,
topComp
};
};

<div id="wrapped-slides-container"></div>
`;
document.body.appendChild(overlay);

window.diapositivasWrapped = [];
window.slideActualWrapped = 0;
window.wrappedTimer = null;
window.lanzarWrapped = function() {
if (!window.datosResumen || window.datosResumen.length === 0) {
window.notify("No hay datos suficientes para generar la historia", "warning");
return;
}
let ingresos = 0;
let gastos = 0;
let gastosPorCat = {};
let numTransacciones = 0;
window.datosResumen.forEach(m => {
const conc = String(m.concepto || "OTROS").toUpperCase().trim();
if (conc.includes('INICIAL') || m.tipo === 'traspaso' || conc.includes('TRASPASO')) return;
numTransacciones++;
if (m.importe > 0) {
ingresos += Number(m.importe);
} else {
const gasto = Math.abs(Number(m.importe));
gastos += gasto;
gastosPorCat[conc] = (gastosPorCat[conc] || 0) + gasto;
}
});
const neto = ingresos - gastos;
const tasaAhorro = ingresos > 0 ? (neto / ingresos) * 100 : 0;
let catTop = "Ninguna";
let maxGasto = 0;
Object.keys(gastosPorCat).forEach(k => {
if (gastosPorCat[k] > maxGasto) { maxGasto = gastosPorCat[k]; catTop = k; }
});
const fmt = (num) => new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(num);
// USANDO LAS NUEVAS CLASES SÓLIDAS
window.diapositivasWrapped = [
{
title: "Este periodo has estado muy activo...",
val: numTransacciones,
sub: "movimientos registrados en total.",
colorClass: 'color-blanco'
},
{
title: "Has generado riqueza por valor de:",
val: fmt(ingresos),
sub: "¡Buen trabajo atrayendo capital!",
colorClass: 'color-verde'
},
{
title: "Pero el dinero también ha volado...",
val: fmt(gastos),
sub: "Es el total de tus gastos.",
colorClass: 'color-rojo'
},
{
title: "Tu mayor agujero negro ha sido:",
val: catTop,
sub: `Te ha costado un total de ${fmt(maxGasto)}.`,
colorClass: 'color-amarillo'
},
{
title: neto > 0 ? "¡MISIÓN CUMPLIDA!" : "MES EN NEGATIVO...",
val: neto > 0 ? "+" + fmt(neto) : fmt(neto),
sub: neto > 0 ? `Has logrado ahorrar un ${tasaAhorro.toFixed(1)}% de tus ingresos.` : "Has gastado más de lo que ingresaste. ¡Cuidado!",
colorClass: neto > 0 ? 'color-azul' : 'color-rojo'
}
];
window.slideActualWrapped = 0;
const contSlides = document.getElementById('wrapped-slides-container');
const contProg = document.getElementById('wrapped-progress');
contSlides.innerHTML = '';
contProg.innerHTML = '';
window.diapositivasWrapped.forEach((s, i) => {
contProg.innerHTML += `<div class="wrapped-bar-bg"><div class="wrapped-bar-fill" id="w-bar-${i}"></div></div>`;
contSlides.innerHTML += `
<div class="wrapped-slide" id="w-slide-${i}">
<div class="wrapped-title">${s.title}</div>
<div class="wrapped-value ${s.colorClass}">${s.val}</div>
<div class="wrapped-subtitle">${s.sub}</div>
</div>
`;
});
document.getElementById('wrapped-overlay').style.display = 'flex';
window.mostrarSlideWrapped(0);
};
window.mostrarSlideWrapped = function(index) {
clearTimeout(window.wrappedTimer);
window.diapositivasWrapped.forEach((_, i) => {
const slide = document.getElementById(`w-slide-${i}`);
const bar = document.getElementById(`w-bar-${i}`);
if (i < index) {
slide.classList.remove('active');
bar.style.width = '100%';
bar.style.transition = 'none';
} else if (i === index) {
slide.classList.add('active');
bar.style.width = '0%';
bar.style.transition = 'none';
setTimeout(() => {
bar.style.width = '100%';
bar.style.transition = 'width 5s linear';
}, 50);
} else {
slide.classList.remove('active');
bar.style.width = '0%';
bar.style.transition = 'none';
}
});
window.slideActualWrapped = index;
window.wrappedTimer = setTimeout(() => {
window.nextSlide();
}, 5000);
};
window.nextSlide = function() {
if (window.slideActualWrapped < window.diapositivasWrapped.length - 1) {
window.mostrarSlideWrapped(window.slideActualWrapped + 1);
} else {
window.cerrarWrapped();
}
};
window.prevSlide = function() {
if (window.slideActualWrapped > 0) {
window.mostrarSlideWrapped(window.slideActualWrapped - 1);
} else {
window.mostrarSlideWrapped(0);
}
};
window.cerrarWrapped = function() {
clearTimeout(window.wrappedTimer);
document.getElementById('wrapped-overlay').style.display = 'none';
};
