window.actualizarCuentasClaras = function() {
const inputMes = document.getElementById('mes-cuentas-claras');
if (!inputMes) return;
const datosReales = window.datos || [];
// Si el selector está vacío (ej. al abrir la app), lo rellenamos con el mes actual
if (!inputMes.value) {
const hoy = new Date();
const añoActual = hoy.getFullYear();
const mesActual = (hoy.getMonth() + 1).toString().padStart(2, '0');
inputMes.value = `${añoActual}-${mesActual}`;
}
// Leemos qué mes y año están seleccionados (sea el actual o uno que haya elegido el usuario)
const [año, mes] = inputMes.value.split('-').map(Number);
let totalD = 0;
let totalN = 0;
datosReales.forEach(m => {
if (!m.fecha) return;
const f = new Date(m.fecha);
// Filtramos por el mes y año que marca el selector
if (f.getFullYear() === año && (f.getMonth() + 1) === mes) {
if (m.beneficiario === 'DN') {
const nombreCuenta = (m.cuenta || '').toUpperCase();
const aportacionNeta = -(parseFloat(m.importe) || 0);
if (nombreCuenta.startsWith('D-')) {
totalD += aportacionNeta;
} else if (nombreCuenta.startsWith('N-')) {
totalN += aportacionNeta;
}
}
}
});
const elDPago = document.getElementById('d-pago-comun');
const elNPago = document.getElementById('n-pago-comun');
const elResultado = document.getElementById('resultado-cuentas-claras');
const fmt = typeof FMT_EUR2 !== 'undefined' ? FMT_EUR2 : new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
if (elDPago) elDPago.innerText = fmt.format(totalD);
if (elNPago) elNPago.innerText = fmt.format(totalN);
if (elResultado) {
const diferencia = Math.abs(totalD - totalN) / 2;
if (totalD === 0 && totalN === 0) {
elResultado.innerText = "Sin movimientos comunes este mes";
elResultado.style.color = "#888";
} else if (totalD > totalN) {
elResultado.innerHTML = `N debe a D: <span style="color: var(--theme-d, #0A84FF); font-size:18px;">${fmt.format(diferencia)}</span>`;
elResultado.style.color = "#fff";
} else if (totalN > totalD) {
elResultado.innerHTML = `D debe a N: <span style="color: var(--theme-n, #FF453A); font-size:18px;">${fmt.format(diferencia)}</span>`;
elResultado.style.color = "#fff";
} else {
elResultado.innerText = "Cuentas saldadas ✨";
elResultado.style.color = "var(--c-success, #39FF14)";
}
}
};

window.toggleFiltros = function(accionForzada = null) {
    // 1. Identificar los elementos del DOM (Ajusta los IDs si en tu HTML se llaman diferente)
    const panelFiltros = document.getElementById('panel-filtros');
    const overlay = document.getElementById('fab-overlay'); // o el ID que uses para oscurecer el fondo

    // 2. Return Early: Si el panel no existe, no hacemos nada y evitamos que la app colapse
    if (!panelFiltros) return;

    // 3. Determinar el estado actual y el futuro
    // Comprobamos si está abierto ya sea por clase CSS o por estilo en línea
    const estaAbierto = panelFiltros.classList.contains('active') || panelFiltros.style.display === 'flex' || panelFiltros.style.display === 'block';
    
    // Si pasamos 'abrir' o 'cerrar' forzamos ese estado, si no, lo alternamos (toggle)
    const abrir = accionForzada === 'abrir' ? true : (accionForzada === 'cerrar' ? false : !estaAbierto);

    // 4. Ejecutar cambios en la UI
    if (abrir) {
        panelFiltros.classList.add('active');
        panelFiltros.style.display = 'flex'; // O 'block', según tu CSS
        if (overlay) {
            overlay.style.display = 'block';
            // Opcional: Cerrar los filtros si se hace clic fuera de ellos
            overlay.onclick = () => window.toggleFiltros('cerrar');
        }
    } else {
        panelFiltros.classList.remove('active');
        panelFiltros.style.display = 'none';
        if (overlay) {
            overlay.style.display = 'none';
            overlay.onclick = null; // Limpiar memoria
        }
    }
};

window.limpiarFiltros = function() {
    const ids = ['f-tipo-cuenta', 'f-cuenta', 'f-concepto', 'f-beneficiario', 'f-texto', 'f-desde', 'f-hasta', 'f-min', 'f-max'];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    filtros = { tipoCuenta:'', cuenta:'', concepto:'', beneficiario:'', texto:'', desde:'', hasta:'', min:'', max:'' };
    renderizar();
    window.actualizarChivatoFiltros();
    const panel = document.getElementById('panel-filtros');
    if (panel) panel.style.display = 'none';
};

window.aplicarFiltros = function() {
    const val = (id) => { const el = document.getElementById(id); return el ? el.value : ''; };
    filtros.tipoCuenta = val('f-tipo-cuenta');
    filtros.cuenta = val('f-cuenta');
    filtros.concepto = val('f-concepto');
    filtros.beneficiario = val('f-beneficiario');
    filtros.texto = val('f-texto').toLowerCase();
    filtros.desde = val('f-desde');
    filtros.hasta = val('f-hasta');
    filtros.min = val('f-min');
    filtros.max = val('f-max');
    window.filtros = filtros; // Sincronizar con el objeto global
    renderizar();
    window.actualizarChivatoFiltros();
    const panel = document.getElementById('panel-filtros');
    if (panel) { panel.classList.remove('open'); panel.style.display = 'none'; }
};

                       filtros.beneficiario || filtros.texto || filtros.desde || 
                       filtros.hasta || filtros.min || filtros.max;

                </span>`;

        } else {

            btnToggle.style.color = "";
            btnToggle.style.borderColor = "";
        }
        // Forzamos a que siempre recupere su capacidad de abrir el menú
        btnToggle.onclick = window.toggleFiltros;

  }

  window.datosCartera.forEach(pos => {
    const cuenta  = pos.cuenta || '';
    const valPos  = pos.cantidad * pos.precioActual;
    const cosPos  = pos.cantidad * pos.precioCompra;
    if (cuenta) {
      valorPorCuenta[cuenta]  = (valorPorCuenta[cuenta]  || 0) + valPos;
      costePorCuenta[cuenta]  = (costePorCuenta[cuenta]  || 0) + cosPos;
    }
    totalValor += valPos;
    totalCoste += cosPos;
  });

  // Sobreescribir saldoActual en mapaCuentas para las cuentas con posiciones
  if (window.mapaCuentas) {
    Object.keys(valorPorCuenta).forEach(cta => {
      if (window.mapaCuentas[cta]) {
        window.mapaCuentas[cta].saldoActual  = valorPorCuenta[cta];
        window.mapaCuentas[cta].costeTotal   = costePorCuenta[cta];
        window.mapaCuentas[cta].plusvalia    = valorPorCuenta[cta] - costePorCuenta[cta];
        window.mapaCuentas[cta].tieneCartera = true;
      }
    });
  }

  const plusvalia   = totalValor - totalCoste;
      // Cálculo de rentabilidad anualizada (TWR/Anualizada simple)
      let rentabilidad = 0;
      if (totalCoste > 0) {
        // Rentabilidad absoluta simple
        const rentAbs = (totalValor / totalCoste) - 1;
        
        // Intentar anualizar si tenemos fechas de compra
        let ponderadoAnual = 0;
        let totalPesos = 0;
        const hoy = new Date();
        
        window.datosCartera.forEach(p => {
          const val = p.cantidad * p.precioActual;
          const cos = p.cantidad * p.precioCompra;
          if (cos > 0) {
            const rPos = (val / cos) - 1;
            const fCompra = p.fechaCompra ? new Date(p.fechaCompra) : null;
            
            if (fCompra && !isNaN(fCompra.getTime())) {
              const diffTime = Math.abs(hoy - fCompra);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
              const years = diffDays / 365.25;
              
              // Si ha pasado más de un mes, intentamos anualizar
              if (years > 0.08) {
                const rAnual = Math.pow(1 + rPos, 1 / years) - 1;
                ponderadoAnual += rAnual * cos;
              } else {
                ponderadoAnual += rPos * cos; // Para periodos cortos usamos la simple
              }
            } else {
              ponderadoAnual += rPos * cos;
            }
            totalPesos += cos;
          }
        });
        
        rentabilidad = totalPesos > 0 ? (ponderadoAnual / totalPesos) * 100 : rentAbs * 100;
      }

	  window.resumenCartera = {
	    totalValor, totalCoste, plusvalia, rentabilidad,
	    numPosiciones: window.datosCartera.length,
	    posiciones: window.datosCartera
	  };

  // Registrar punto en histórico (si el valor cambió)
  const hoy = new Date();
  const hoyStr = hoy.toISOString().split('T')[0];
  window.historicoCartera = window.historicoCartera || [];
  const ultPunto = window.historicoCartera[window.historicoCartera.length - 1];
  const ultFechaStr = ultPunto ? new Date(ultPunto.ts).toISOString().split('T')[0] : null;
  if (ultFechaStr !== hoyStr && totalValor > 0) {
    window.historicoCartera.push({ fecha: hoy, ts: hoy.getTime(), valor: totalValor });
  } else if (ultFechaStr === hoyStr && totalValor > 0 && ultPunto) {
    ultPunto.valor = totalValor; // Actualizar punto del día
  }

  // Actualizar tarjeta del dashboard si está visible
  window.actualizarDashCartera();
};

// ── MÓDULO 4: ACTUALIZAR TARJETA DASHBOARD ───────────────────────────
window.actualizarDashCartera = function() {
  const fmt = (v) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(v);
  const fmt2 = (v) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(v);
  const card = document.getElementById('card-cartera-dashboard');
  const r = window.resumenCartera;
  if (!r || r.numPosiciones === 0) {
    if (card) card.style.display = 'none';
    return;
  }
  if (card) card.style.display = 'block';

  const elVal  = document.getElementById('dash-cartera-valor');
  const elPnl  = document.getElementById('dash-cartera-pnl');
  const elRent = document.getElementById('dash-cartera-rent');
  const elNum  = document.getElementById('dash-cartera-num');

  if (elVal)  { elVal.innerText  = fmt(r.totalValor); elVal.style.color = '#39FF14'; }

  if (elPnl)  {
    const signo = r.plusvalia >= 0 ? '+' : '';
    elPnl.innerText   = signo + fmt2(r.plusvalia);

  }
  if (elRent) {
    const signo = r.rentabilidad >= 0 ? '+' : '';
    elRent.innerText   = signo + r.rentabilidad.toFixed(2) + '%';
    elRent.style.color = r.rentabilidad >= 0 ? '#39FF14' : '#FF2E4D';
  }

  // Actualizar fila plusvalía en Patrimonio
  const rowPnl = document.getElementById('patri-cartera-pnl-row');
  const valPnl = document.getElementById('patri-cartera-pnl-val');
  if (rowPnl && valPnl && r.numPosiciones > 0) {
    rowPnl.style.display = 'block';
    const signo = r.plusvalia >= 0 ? '+' : '';
    valPnl.innerText   = signo + fmt2(r.plusvalia) + ' (' + (r.plusvalia >= 0 ? '+' : '') + r.rentabilidad.toFixed(2) + '%)';
    valPnl.style.color = r.plusvalia >= 0 ? '#39FF14' : '#FF2E4D';
  }
};

// ── MÓDULO 3: RENDERIZAR PESTAÑA CARTERA ─────────────────────────────
window.renderizarCartera = function() {
  const fmt  = (v) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(v);
  const fmt2 = (v) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(v);
  const r = window.resumenCartera;
  const sinDatos = document.getElementById('cartera-sin-datos');
  const cardPos  = document.getElementById('card-posiciones');

  if (!r || r.numPosiciones === 0) {
    if (sinDatos) sinDatos.style.display = 'block';
    if (cardPos)  cardPos.style.display  = 'none';
    ['inv-total-valor','inv-total-pnl','inv-coste-total','inv-rent-total','inv-num-pos'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerText = '---';
    });
    return;
  }
  if (sinDatos) sinDatos.style.display = 'none';
  if (cardPos)  cardPos.style.display  = 'block';

  // KPIs principales
  const elTotalVal  = document.getElementById('inv-total-valor');
  const elTotalPnl  = document.getElementById('inv-total-pnl');
  const elCosteT    = document.getElementById('inv-coste-total');
  const elRentT     = document.getElementById('inv-rent-total');
  const elNumPos    = document.getElementById('inv-num-pos');

  if (elTotalVal)  { elTotalVal.innerText = fmt(r.totalValor); elTotalVal.style.color = '#39FF14'; }
  if (elCosteT)    elCosteT.innerText     = fmt(r.totalCoste);
  if (elNumPos)    elNumPos.innerText     = r.numPosiciones;
  if (elTotalPnl)  {
    const signo = r.plusvalia >= 0 ? '+' : '';
    elTotalPnl.innerText   = signo + fmt2(r.plusvalia) + '  (' + signo + r.rentabilidad.toFixed(2) + '%)';
    elTotalPnl.style.color = r.plusvalia >= 0 ? '#39FF14' : '#FF2E4D';
  }
  if (elRentT) {
    const signo = r.rentabilidad >= 0 ? '+' : '';
    elRentT.innerText   = signo + r.rentabilidad.toFixed(2) + '%';
    elRentT.style.color = r.rentabilidad >= 0 ? '#39FF14' : '#FF2E4D';
  }

  // Agrupar posiciones por tipo
  const grupos = {};
  const colorTipo = { BOLSA:'#0A84FF', CRIPTO:'#FF9F1B', AUTOCUSTODIA:'#39FF14', PENSION:'#BF5AF2', FONDO:'#00B8FF', OTRO:'#888' };
  const badgeTipo = { BOLSA:'badge-bolsa', CRIPTO:'badge-cripto', AUTOCUSTODIA:'badge-custodia', PENSION:'badge-pension', FONDO:'badge-bolsa', OTRO:'' };
  const emojiTipo = { BOLSA:'📈', CRIPTO:'🪙', AUTOCUSTODIA:'🔐', PENSION:'🏦', FONDO:'📊', OTRO:'💼' };

  (window.datosCartera || []).forEach(pos => {
    const tipo = pos.tipo || 'OTRO';
    if (!grupos[tipo]) grupos[tipo] = { total: 0, posiciones: [] };
    const valPos = pos.cantidad * pos.precioActual;
    grupos[tipo].total += valPos;
    grupos[tipo].posiciones.push(pos);
  });

  // Renderizar lista de posiciones
  let html = '';
  Object.keys(grupos).sort().forEach(tipo => {
    const g = grupos[tipo];
    const color = colorTipo[tipo] || '#888';
    const badgeClass = badgeTipo[tipo] || '';
    const emoji = emojiTipo[tipo] || '💼';
    const groupId = 'grp-' + tipo;
    html += `
    <div style="border-bottom:1px solid #111;">
      <div class="cartera-section-header" onclick="window.toggleCarteraGroup('${groupId}')">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:18px;">${emoji}</span>
          <span class="cartera-section-title" style="color:${color};">${tipo}</span>
          <span style="font-size:9px; color:#555; font-weight:700;">(${g.posiciones.length})</span>
        </div>
        <span class="cartera-section-total" style="color:${color};">${fmt(g.total)}</span>
      </div>
      <div id="${groupId}">`;
    g.posiciones.sort((a,b) => (b.cantidad*b.precioActual) - (a.cantidad*a.precioActual)).forEach(pos => {
	      const valPos  = pos.cantidad * pos.precioActual;
	      const cosPos  = pos.cantidad * pos.precioCompra;
	      const pnlPos  = valPos - cosPos;
          
          let rentPos = cosPos > 0 ? ((valPos / cosPos) - 1) * 100 : 0;
          const fCompra = pos.fechaCompra ? new Date(pos.fechaCompra) : null;
          if (fCompra && !isNaN(fCompra.getTime())) {
            const years = (new Date() - fCompra) / (1000 * 60 * 60 * 24 * 365.25);
            if (years > 0.08) {
              rentPos = (Math.pow(1 + (rentPos/100), 1/years) - 1) * 100;
            }
          }

	      const pnlSig  = pnlPos >= 0 ? '+' : '';
      const pnlClass = pnlPos >= 0 ? 'pos' : 'neg';
      const cantStr = pos.cantidad >= 1 ? pos.cantidad.toFixed(2) : pos.cantidad.toFixed(6);
      html += `
      <div class="cartera-pos-row" onclick="window.editarPosicion('${pos.id}')">
        <div style="flex:1; min-width:0; padding-right:8px;">
          <div class="cartera-ticker">${pos.ticker || pos.nombre}</div>
          ${pos.nombre && pos.ticker ? `<div class="cartera-nombre">${pos.nombre}</div>` : ''}
          <div class="cartera-cantidad">${cantStr} × ${fmt2(pos.precioActual)}</div>
          <span class="cartera-tipo-badge ${badgeClass}">${tipo}</span>
        </div>
        <div style="text-align:right; flex-shrink:0;">
          <div class="cartera-valor" style="color:#fff;">${fmt2(valPos)}</div>
	          <div class="cartera-pnl ${pnlClass}">${pnlSig}${fmt2(pnlPos)} (${pnlSig}${rentPos.toFixed(2)}%${pos.fechaCompra && (new Date() - new Date(pos.fechaCompra)) > 2592000000 ? ' an.' : ''})</div>
	          <div style="font-size:9px; color:#555; margin-top:2px;">${pos.fechaCompra ? pos.fechaCompra.split('-').reverse().join('/') + ' · ' : ''}Compra: ${fmt2(pos.precioCompra)}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  const lista = document.getElementById('lista-posiciones-cartera');
  if (lista) lista.innerHTML = html || '<div style="padding:20px;text-align:center;color:#555;">Sin posiciones</div>';

  // Gráfico Donut distribución
  window.renderizarDonutCartera(grupos, colorTipo);
  // Gráfico evolución histórica
  window.renderizarEvolCartera();
};

// ── GRÁFICO DONUT ─────────────────────────────────────────────────────
window.renderizarDonutCartera = function(grupos, colorTipo) {
  const container = document.getElementById('chart-cartera-donut');
  const elCenter  = document.getElementById('cartera-donut-val');
  if (!container || typeof echarts === 'undefined') return;
  let chart = echarts.getInstanceByDom(container);
  if (!chart) chart = echarts.init(container);

  const totalVal = Object.values(grupos).reduce((s,g) => s+g.total, 0);
  if (elCenter) elCenter.innerText = new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(totalVal);

  const dataDonut = Object.keys(grupos).map(tipo => ({
    name: tipo,
    value: parseFloat(grupos[tipo].total.toFixed(2)),
    itemStyle: { color: colorTipo[tipo] || '#888', shadowBlur: 15, shadowColor: colorTipo[tipo] || '#888' }
  }));

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(15,15,20,0.9)',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
      borderRadius: 12,
      textStyle: { color: '#fff', fontSize: 12, fontFamily: 'Inter' },
      formatter: p => {
        const fmt2 = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(v);
        return `<b>${p.name}</b><br/>${fmt2(p.value)}<br/><span style="color:#888;">${p.percent.toFixed(1)}%</span>`;
      }
    },
    series: [{
      type: 'pie',
      radius: ['52%', '78%'],
      center: ['50%', '50%'],
      data: dataDonut,
      label: { show: true, color: '#fff', fontSize: 11, fontWeight: 'bold', fontFamily: 'Inter',
        formatter: p => p.name + '\n' + p.percent.toFixed(1) + '%' },
      labelLine: { lineStyle: { color: 'rgba(255,255,255,0.3)' } },
      emphasis: { scale: true, scaleSize: 8,
        itemStyle: { shadowBlur: 25, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.6)' } }
    }]
  }, { notMerge: true });

  if (!window._donutCarteraResizeObs) {
    window._donutCarteraResizeObs = new ResizeObserver(() => { if (chart) chart.resize(); });
    window._donutCarteraResizeObs.observe(container);
  }
};

// ── GRÁFICO EVOLUCIÓN HISTÓRICA ───────────────────────────────────────
window.renderizarEvolCartera = function() {
  const hist = window.historicoCartera || [];
  const card = document.getElementById('card-evol-cartera');
  const container = document.getElementById('chart-cartera-evol');
  if (!container || typeof echarts === 'undefined') return;
  if (hist.length < 2) { if (card) card.style.display = 'none'; return; }
  if (card) card.style.display = 'block';

  let chart = echarts.getInstanceByDom(container);
  if (!chart) chart = echarts.init(container);

  const fechas = hist.map(h => new Date(h.ts).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}));
  const valores = hist.map(h => parseFloat(h.valor.toFixed(2)));
  const colorLinea = valores[valores.length-1] >= valores[0] ? '#39FF14' : '#FF2E4D';

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top:20, right:10, bottom:25, left:55 },
    xAxis: { type:'category', data:fechas, boundaryGap:false,
      axisLine:{show:false}, axisTick:{show:false},
      axisLabel:{color:'#555',fontSize:9,fontFamily:'Inter'} },
    yAxis: { type:'value', axisLine:{show:false}, axisTick:{show:false},
      splitLine:{lineStyle:{color:'rgba(255,255,255,0.04)',type:'dashed'}},
      axisLabel:{color:'#555',fontSize:9,fontFamily:'Inter',
        formatter: v => v>=1000 ? (v/1000).toFixed(0)+'k' : v} },
    tooltip: {
      trigger:'axis', backgroundColor:'rgba(15,15,20,0.9)',
      borderColor:'rgba(255,255,255,0.1)', borderRadius:12,
      textStyle:{color:'#fff',fontSize:12,fontFamily:'Inter'},
      formatter: p => {
        const fmt2 = v => new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(v);
        return `<b>${p[0].axisValue}</b><br/>${fmt2(p[0].value)}`;
      }
    },
    series: [{
      type:'line', data:valores, smooth:true, symbol:'none',
      lineStyle:{color:colorLinea,width:2.5,shadowBlur:8,shadowColor:colorLinea},
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
        {offset:0,color:colorLinea.replace('#','rgba(').slice(0,-1)+',.35)'.replace('rgba(','rgba(').replace('#39FF14','rgba(57,255,20').replace('#FF2E4D','rgba(255,46,77')},
        {offset:1,color:'rgba(0,0,0,0)'}
      ])}
    }]
  }, { notMerge:true });

  if (!window._evolCarteraResizeObs) {
    window._evolCarteraResizeObs = new ResizeObserver(() => { if (chart) chart.resize(); });
    window._evolCarteraResizeObs.observe(container);
  }
};

// ── MODAL: NUEVA / EDITAR POSICIÓN ───────────────────────────────────
window.abrirModalNuevaPosicion = function() {
  // Rellenar cuentas disponibles
  const sel = document.getElementById('cartera-cuenta');
  if (sel && window.mapaCuentas) {
    sel.innerHTML = '<option value="">-- Sin asociar --</option>';
    Object.keys(window.mapaCuentas).sort().forEach(cta => {
      const opt = document.createElement('option');
      opt.value = cta; opt.textContent = cta;
      sel.appendChild(opt);
    });
  }
	  // Limpiar campos
	  ['cartera-pos-id','cartera-ticker','cartera-nombre','cartera-notas','cartera-fecha-compra'].forEach(id => {
	    const el = document.getElementById(id); if (el) el.value = '';
	  });
	  ['cartera-cantidad','cartera-precio-compra','cartera-precio-actual'].forEach(id => {
	    const el = document.getElementById(id); if (el) el.value = '';
	  });
  const extBtns = document.getElementById('cartera-extra-btns');
  if (extBtns) extBtns.style.display = 'none';
  const preview = document.getElementById('preview-pnl-cartera');
  if (preview) preview.style.display = 'none';
  const titulo = document.getElementById('modal-cartera-titulo');
  if (titulo) titulo.innerText = 'NUEVA POSICIÓN';
  const modal = document.getElementById('modal-cartera-pos');
  if (modal) modal.classList.add('active');
};

window.editarPosicion = function(id) {
  const pos = (window.datosCartera || []).find(p => p.id === id);
  if (!pos) return;
  window.abrirModalNuevaPosicion();
  setTimeout(() => {
    document.getElementById('cartera-pos-id').value    = pos.id;
    document.getElementById('cartera-ticker').value    = pos.ticker;
    document.getElementById('cartera-nombre').value    = pos.nombre;
    document.getElementById('cartera-tipo').value      = pos.tipo;
    document.getElementById('cartera-cuenta').value    = pos.cuenta;
	    document.getElementById('cartera-cantidad').value  = pos.cantidad;
	    document.getElementById('cartera-precio-compra').value = pos.precioCompra;
	    document.getElementById('cartera-precio-actual').value = pos.precioActual;
        document.getElementById('cartera-fecha-compra').value = pos.fechaCompra || '';
	    document.getElementById('cartera-notas').value     = pos.notas || '';
    const titulo = document.getElementById('modal-cartera-titulo');
    if (titulo) titulo.innerText = 'EDITAR: ' + (pos.ticker || pos.nombre);
    const extBtns = document.getElementById('cartera-extra-btns');

};

// cerrarModalCartera: definición única más arriba


window.guardarPosicion = async function() {
  const idExist = document.getElementById('cartera-pos-id').value;
  const ticker  = (document.getElementById('cartera-ticker').value || '').trim().toUpperCase();
  const nombre  = (document.getElementById('cartera-nombre').value || '').trim();
  if (!ticker && !nombre) { notify('Introduce un ticker o nombre', 'warning'); return; }
  const cantidad   = parseFloat(document.getElementById('cartera-cantidad').value) || 0;
  const pCompra    = parseFloat(document.getElementById('cartera-precio-compra').value) || 0;
  const pActual    = parseFloat(document.getElementById('cartera-precio-actual').value) || 0;
  if (cantidad <= 0)  { notify('La cantidad debe ser mayor que 0', 'warning'); return; }
  if (pActual <= 0)   { notify('Introduce el precio actual', 'warning'); return; }

	  const pos = {
	    id:           idExist || uuid(),
	    ticker, nombre,
	    tipo:         document.getElementById('cartera-tipo').value || 'OTRO',
	    cuenta:       document.getElementById('cartera-cuenta').value || '',
	    cantidad, precioCompra: pCompra, precioActual: pActual,
        fechaCompra:  document.getElementById('cartera-fecha-compra').value || '',
	    notas:        document.getElementById('cartera-notas').value || ''
	  };

  window.datosCartera = window.datosCartera || [];
  const idx = window.datosCartera.findIndex(p => p.id === pos.id);
  if (idx > -1) window.datosCartera[idx] = pos;
  else          window.datosCartera.push(pos);

  window.calcularValoresCartera();
  window.renderizarCartera();
  window.cerrarModalCartera();

  if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
  notify('✅ Posición guardada', 'success');
  if (typeof vibrar === 'function') vibrar('ingreso');
};

// Guardar SOLO el precio actual (acceso rápido)
window.actualizarPrecioRapido = async function() {
  const idExist = document.getElementById('cartera-pos-id').value;
  const pActual = parseFloat(document.getElementById('cartera-precio-actual').value) || 0;
  if (!idExist || pActual <= 0) { notify('Indica un precio válido', 'warning'); return; }
  const pos = (window.datosCartera || []).find(p => p.id === idExist);
  if (!pos) return;
  pos.precioActual = pActual;
  window.calcularValoresCartera();
  window.renderizarCartera();
  window.cerrarModalCartera();
  if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
  notify('⚡ Precio actualizado', 'success');
};

window.borrarPosicion = async function(id) {
  const confirmado = await window.pedirConfirmacion('¿Eliminar posición?', 'Se borrará de tu cartera y del Excel.', '🗑️');
  if (!confirmado) return;
  window.datosCartera = (window.datosCartera || []).filter(p => p.id !== id);
  window.calcularValoresCartera();
  window.renderizarCartera();
  window.cerrarModalCartera();
  if (typeof window.guardarUniversal === 'function') await window.guardarUniversal();
  notify('🗑️ Posición eliminada', 'success');
};

// ── MÓDULO 4: INTEGRACIÓN CON actualizarDashboard ─────────────────────
// Hook en UIEvents para refrescar cartera cuando cambian los datos
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    if (window.UIEvents) {
      window.UIEvents.on('datos:actualizados', function() {
        if (typeof window.calcularValoresCartera === 'function') window.calcularValoresCartera();
        const tabInv = document.getElementById('tab-inversiones');
        if (tabInv && tabInv.classList.contains('active')) window.renderizarCartera();
      });
    }
  }, 800);
});

// ── MÓDULO 5: ACTUALIZACIÓN AUTOMÁTICA DE PRECIOS (LIVE) ──────────────
window.actualizarPreciosAutomatico = async function() {
  const posiciones = window.datosCartera || [];
  if (posiciones.length === 0) {
    notify("No hay posiciones en cartera", "warning");
    return;
  }

  const btn = document.getElementById('btn-precios-live');
  const icon = document.getElementById('precios-live-icon');
  if (btn) btn.style.opacity = '0.5';
  if (icon) icon.textContent = '⏳';
  notify("Consultando precios de mercado...", "loading");

  const bolsa  = posiciones.filter(p => p.tipo === 'BOLSA' || p.tipo === 'FONDO');
  const cripto = posiciones.filter(p => p.tipo === 'CRIPTO');

  let actualizados = 0;
  let errores = 0;

  // Detectar base URL del API (funciona tanto en localhost como en producción)
  const apiBase = window.location.origin;

  try {
    // ── Bolsa / Fondos vía Yahoo Finance proxy ──────────────────────────
    if (bolsa.length > 0) {
      const tickers = bolsa.map(p => p.ticker).filter(Boolean).join(',');
      if (tickers) {
        try {
          const resp = await fetch(`${apiBase}/api/precios/bolsa?tickers=${encodeURIComponent(tickers)}`);
          if (resp.ok) {
            const { precios } = await resp.json();
            bolsa.forEach(pos => {
              const precio = precios[pos.ticker.toUpperCase()];
              if (precio && precio > 0) {
                pos.precioActual = precio;
                actualizados++;
              } else {
                errores++;
              }
            });
          }
        } catch (e) {
          console.warn("Error precios bolsa:", e);
          errores += bolsa.length;
        }
      }
    }

    // ── Cripto vía CoinGecko proxy ──────────────────────────────────────
    if (cripto.length > 0) {
      const tickers = cripto.map(p => p.ticker).filter(Boolean).join(',');
      if (tickers) {
        try {
          const resp = await fetch(`${apiBase}/api/precios/cripto?tickers=${encodeURIComponent(tickers)}`);
          if (resp.ok) {
            const { precios } = await resp.json();
            cripto.forEach(pos => {
              const precio = precios[pos.ticker.toUpperCase()];
              if (precio && precio > 0) {
                pos.precioActual = precio;
                actualizados++;
              } else {
                errores++;
              }
            });
          }
        } catch (e) {
          console.warn("Error precios cripto:", e);
          errores += cripto.length;
        }
      }
    }
  } finally {
    if (btn) btn.style.opacity = '1';
    if (icon) icon.textContent = '⚡';
  }

  if (actualizados === 0 && errores === 0) {
    notify("No hay tickers BOLSA/CRIPTO configurados", "warning");
    return;
  }

  // Recalcular y renderizar con los nuevos precios
  if (typeof window.calcularValoresCartera === 'function') window.calcularValoresCartera();
  if (typeof window.renderizarCartera === 'function') window.renderizarCartera();

  // Guardar automáticamente si hay conexión
  if (typeof window.guardarUniversal === 'function') {
    try { await window.guardarUniversal(); } catch(e) { /* silencioso */ }
  }

  if (errores > 0 && actualizados === 0) {
    notify(`❌ Sin precios. Verifica los tickers (${errores} fallidos)`, "error");
  } else if (errores > 0) {
    notify(`⚡ ${actualizados} precios actualizados (${errores} no disponibles)`, "success");
  } else {
    notify(`✅ ${actualizados} precios actualizados en tiempo real`, "success");
  }
  if (typeof vibrar === 'function') vibrar('success');
};
// ── FIN MOTOR CARTERA ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(reg => {
        reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Se ha bajado una nueva versión en la sombra. Avisamos al usuario.
                    const notifUpdate = document.createElement('div');
                    notifUpdate.innerHTML = `
                        <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#0a84ff; color:white; padding:12px 24px; border-radius:30px; box-shadow:0 10px 25px rgba(10,132,255,0.5); z-index:100000; display:flex; align-items:center; gap:10px; font-weight:bold; cursor:pointer; font-size:14px; white-space:nowrap;" onclick="window.location.reload(true)">
                            <span class="material-icons">system_update</span> Toca para actualizar App
                        </div>
                    `;
                    document.body.appendChild(notifUpdate);
                }
            });
        });
    });
}
